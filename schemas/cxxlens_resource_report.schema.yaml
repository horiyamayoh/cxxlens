$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.resource-report.v1.schema.yaml
title: cxxlens resource protocol report v1
type: object
additionalProperties: false
required: [schema, snapshot, protocol_id, findings, counterexamples, diagnostics, unresolved, coverage, guarantee]
properties:
  schema: {const: cxxlens.resource-report.v1}
  snapshot: {type: string, minLength: 1}
  protocol_id: {type: string, minLength: 1}
  findings:
    type: array
    items:
      type: object
      required: [kind, resource_identity, state, path_id, evidence]
      properties:
        kind: {enum: [leak, double_release, use_after_release, invalid_transition]}
        resource_identity: {type: string, minLength: 1}
        state: {type: string, minLength: 1}
        path_id: {type: string, minLength: 1}
        evidence: {type: array, items: {type: object}}
  counterexamples: {type: array, items: {type: object}}
  diagnostics: {type: array, items: {type: object}}
  unresolved: {type: array, items: {type: object}}
  coverage: {type: object}
  guarantee: {enum: [exact, conservative, partial, unknown]}
