$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.suppression-policy.v1.schema.yaml
title: cxxlens suppression policy v1
type: object
additionalProperties: false
required: [schema, semantics_version, precedence, entries, require_justification, reject_expired]
properties:
  schema: {const: cxxlens.suppression-policy.v1}
  semantics_version: {const: 1.0.0}
  precedence:
    const: [inline_source, external_configuration, baseline]
  require_justification: {type: boolean}
  reject_expired: {type: boolean}
  entries:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, origin, match, justification, owner, expires_at]
      properties:
        id: {type: string, pattern: '^suppression_[0-9a-f]{64}$'}
        origin: {enum: [inline_source, external_configuration, baseline]}
        match:
          type: object
          minProperties: 1
          properties:
            file: {type: string}
            range: {type: object}
            symbol: {type: string, pattern: '^symbol_[0-9a-f]{64}$'}
            rule_id: {type: string}
            category: {type: string}
            tag: {type: string}
            minimum_severity: {enum: [note, info, warning, error, fatal]}
            baseline_finding_id: {type: string, pattern: '^finding_[0-9a-f]{64}$'}
          additionalProperties: false
        justification: {type: string}
        owner: {type: [string, 'null']}
        expires_at: {type: [string, 'null'], format: date-time}
