$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-api-development-readiness-report.v1
title: cxxlens API development Wave 0 exact-SHA baseline report
type: object
additionalProperties: false
required: [schema, result, generated_at, run_url, git, required_ci_jobs, branch_protection, authorities, implementation_learning_assets, public_headers, generated_relation_headers, toolchain_provenance, evidence_artifacts, install_manifests, test_inventory, foundation_completion, public_callable_inventory, production_scope_inventory]
properties:
  schema: {const: cxxlens.ng-api-development-readiness-report.v1}
  result: {const: passed}
  generated_at: {type: string, format: date-time}
  run_url: {type: string, format: uri}
  git:
    type: object
    additionalProperties: false
    required: [revision, tree, branch, clean]
    properties:
      revision: {type: string, pattern: '^[0-9a-f]{40}$'}
      tree: {type: string, pattern: '^[0-9a-f]{40}$'}
      branch: {const: main}
      clean: {const: true}
  required_ci_jobs:
    type: array
    minItems: 8
    uniqueItems: true
    items: {type: string, minLength: 1}
  branch_protection:
    type: object
    additionalProperties: false
    required: [strict, required_statuses, settings_evidence]
    properties:
      strict: {const: true}
      required_statuses: {type: array, minItems: 7, uniqueItems: true, items: {type: string, minLength: 1}}
      settings_evidence: {const: github-api-issue-168}
  authorities:
    allOf:
      - {$ref: '#/$defs/files'}
      - items:
          properties:
            path:
              not:
                pattern: '^(?:docs/development/implementation-learning/(?:mental-models|records)(?:/|$)|\.github/ISSUE_TEMPLATE/design-feedback\.yml$)'
  implementation_learning_assets:
    allOf:
      - {$ref: '#/$defs/files'}
      - items:
          properties:
            path:
              pattern: '^(?:docs/development/implementation-learning/(?:mental-models|records)/.+|\.github/ISSUE_TEMPLATE/design-feedback\.yml)$'
  public_headers: {$ref: '#/$defs/files'}
  generated_relation_headers: {$ref: '#/$defs/files'}
  toolchain_provenance: {$ref: '#/$defs/files'}
  evidence_artifacts: {$ref: '#/$defs/files'}
  install_manifests: {$ref: '#/$defs/files'}
  test_inventory:
    type: object
    additionalProperties: false
    required: [junit_files, test_cases, production_scope_tests]
    properties:
      junit_files: {type: integer, minimum: 1}
      test_cases: {type: integer, minimum: 1}
      production_scope_tests:
        type: array
        minItems: 1
        uniqueItems: true
        items: {type: string, pattern: '^quality\.(?:ng-[a-z0-9_]+|ownership)$'}
  foundation_completion:
    type: object
    additionalProperties: false
    required: [path, digest, result, revision, tree]
    properties:
      path: {type: string, minLength: 1}
      digest: {$ref: '#/$defs/digest'}
      result: {const: passed}
      revision: {type: string, pattern: '^[0-9a-f]{40}$'}
      tree: {type: string, pattern: '^[0-9a-f]{40}$'}
  public_callable_inventory:
    type: object
    additionalProperties: false
    required: [path, report_digest, inventory_file_digest, inventory_semantic_digest, review_path, review_digest, callable_count, doxygen_count, result, revision, tree]
    properties:
      path: {type: string, minLength: 1}
      report_digest: {$ref: '#/$defs/digest'}
      inventory_file_digest: {$ref: '#/$defs/digest'}
      inventory_semantic_digest: {$ref: '#/$defs/digest'}
      review_path: {type: string, minLength: 1}
      review_digest: {$ref: '#/$defs/digest'}
      callable_count: {type: integer, minimum: 1}
      doxygen_count: {type: integer, minimum: 1}
      result: {const: passed}
      revision: {type: string, pattern: '^[0-9a-f]{40}$'}
      tree: {type: string, pattern: '^[0-9a-f]{40}$'}
  production_scope_inventory:
    type: object
    additionalProperties: false
    required: [manifest_path, manifest_digest, authority_census_digest, evidence_census_digest, classification_digest, evidence_tests, summary, closure_status]
    properties:
      manifest_path: {const: schemas/cxxlens_ng_production_scope_closure.yaml}
      manifest_digest: {$ref: '#/$defs/digest'}
      authority_census_digest: {$ref: '#/$defs/digest'}
      evidence_census_digest: {$ref: '#/$defs/digest'}
      classification_digest: {$ref: '#/$defs/digest'}
      evidence_tests:
        type: array
        minItems: 1
        uniqueItems: true
        items: {type: string, pattern: '^quality\.(?:ng-[a-z0-9_]+|ownership)$'}
      summary:
        type: object
        additionalProperties: false
        required: [domain_count, assignable_count, expanded_count, aggregate_count, qualified, tracked_gap, blocked, not_applicable]
        properties:
          domain_count: {const: 30}
          assignable_count: {type: integer, minimum: 1}
          expanded_count: {type: integer, minimum: 1}
          aggregate_count: {const: 14}
          qualified: {type: integer, minimum: 0}
          tracked_gap: {type: integer, minimum: 0}
          blocked: {type: integer, minimum: 0}
          not_applicable: {type: integer, minimum: 0}
      closure_status: {enum: [classified-with-gaps, qualified]}
$defs:
  digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  files:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [path, digest]
      properties:
        path: {type: string, minLength: 1}
        digest: {$ref: '#/$defs/digest'}
