$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.m2-acceptance-report.v1.json
title: cxxlens.m2-acceptance-report.v1
type: object
required: [schema, status, manifest, catalog_api_count, matrix_executions, vectors, performance, artifact_digests]
additionalProperties: false
properties:
  schema: {const: cxxlens.m2-acceptance-report.v1}
  status: {enum: [passed, failed]}
  manifest: {const: cxxlens.m2-completion.v1}
  catalog_api_count: {type: integer, minimum: 1}
  matrix_executions: {type: integer, minimum: 1}
  vectors:
    type: array
    minItems: 4
    items:
      type: object
      required: [id, status, fixture]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^M2-[A-Z0-9-]+$'}
        status: {enum: [passed, failed]}
        fixture: {type: string, minLength: 1}
  performance:
    type: object
    required: [cold_scheduled_tasks, warm_scheduled_tasks, fact_candidates, refinements]
    additionalProperties: false
    properties:
      cold_scheduled_tasks: {type: integer, minimum: 0}
      warm_scheduled_tasks: {type: integer, minimum: 0}
      fact_candidates: {type: integer, minimum: 0}
      refinements: {type: integer, minimum: 0}
  artifact_digests:
    type: object
    minProperties: 3
    additionalProperties: {type: string, pattern: '^[0-9a-f]{64}$'}
