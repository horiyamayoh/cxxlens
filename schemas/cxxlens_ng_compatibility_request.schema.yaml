$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-compatibility-request.v1
title: cxxlens next-generation compatibility request
type: object
additionalProperties: false
required: [schema, request_id, operation, release_id, context, required_axes, offered_axes]
properties:
  schema:
    const: cxxlens.ng-compatibility-request.v1
  request_id:
    type: string
    pattern: '^[a-z][a-z0-9.-]+$'
  operation:
    enum: [inspect, doctor]
  release_id:
    type: string
    pattern: '^[a-z][a-z0-9.-]+$'
  context:
    enum: [provider-handshake, snapshot-open, query-load, release-startup]
  required_axes:
    $ref: '#/$defs/axis_tuple'
  offered_axes:
    $ref: '#/$defs/axis_tuple'
  environment:
    type: object
    additionalProperties: false
    required: [runtime_qualified, evidence_refs]
    properties:
      runtime_qualified:
        type: boolean
      evidence_refs:
        type: array
        uniqueItems: true
        items:
          type: string
          minLength: 1
allOf:
  - if:
      properties:
        operation:
          const: doctor
    then:
      required: [environment]
    else:
      not:
        required: [environment]
$defs:
  axis_tuple:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [axis, version, features, contract_digest]
      properties:
        axis:
          type: string
          pattern: '^[a-z][a-z0-9.-]+$'
        version:
          type: string
          pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
        features:
          type: array
          uniqueItems: true
          items:
            type: object
            additionalProperties: false
            required: [id, requirement]
            properties:
              id:
                type: string
                pattern: '^[a-z][a-z0-9.-]+$'
              requirement:
                enum: [required, optional]
        contract_digest:
          oneOf:
            - type: 'null'
            - type: string
              pattern: '^sha256:[0-9a-f]{64}$'
