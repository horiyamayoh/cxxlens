$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.config.explain.v1.json
title: cxxlens.config.explain.v1
type: object
required: [key, library_version, schema, semantics_version, shadowed, winner]
additionalProperties: false
properties:
  schema: {const: cxxlens.config.explain.v1}
  library_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  semantics_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  key: {type: string}
  winner: {$ref: '#/$defs/origin'}
  shadowed:
    type: array
    items: {$ref: '#/$defs/origin'}
$defs:
  value:
    oneOf:
      - {type: boolean}
      - {type: integer}
      - {type: string}
      - type: array
        items: {type: string}
  origin:
    type: object
    required: [layer, source, value]
    additionalProperties: false
    properties:
      layer: {enum: [built_in_default, config_default, named_profile, cli, api_option]}
      source: {type: string}
      value: {$ref: '#/$defs/value'}
