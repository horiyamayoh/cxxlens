$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.claim-envelope.v2
title: cxxlens system claim envelope
x-cxxlens-batch-content-identity:
  schema: cxxlens.claim-batch.v2
  public_encoder: cxxlens::sdk::claim_batch_content_encoding
  public_digest: cxxlens::sdk::claim_batch_content_digest
  encoding: canonical-value-v2-typed-self-delimiting-tuple
  root_fields: [schema_tag, claims, unresolved_references, conflicts, differential_disagreements]
  records:
    claim: [tag, content, full_occurrence_projection]
    unresolved_reference: [tag, source_assertion, source_relation, target_relation, source_columns, reason]
    claim_conflict: [tag, relation, semantic_key, interpretation, overlap_fragments, assertions, contents]
    differential_disagreement: [tag, relation, semantic_key, left_interpretation, right_interpretation, left_content, right_content, overlap_fragments]
  collection_contract:
    count: encoded-by-canonical-tuple
    order: canonical-total-order
    nested_sets: canonical-sorted-unique
    claims: canonical-occurrence-order-with-relation-multiplicity-law-preserved
type: object
additionalProperties: false
required:
  - schema
  - descriptor
  - semantic_key
  - assertion
  - content
  - presence
  - interpretation
  - stage
  - producer
  - producer_input_basis
  - provenance_root
  - guarantee
properties:
  schema:
    const: cxxlens.claim-envelope.v2
  descriptor:
    $ref: '#/$defs/strong_id'
  semantic_key:
    $ref: '#/$defs/strong_id'
  assertion:
    $ref: '#/$defs/strong_id'
  content:
    $ref: '#/$defs/typed_digest'
  presence:
    type: object
    additionalProperties: false
    required: [universe, condition]
    properties:
      universe:
        $ref: '#/$defs/strong_id'
      condition:
        $ref: '#/$defs/strong_id'
  interpretation:
    $ref: '#/$defs/strong_id'
  stage:
    enum: [assertion, canonical_claim, derived_claim]
  producer:
    $ref: '#/$defs/strong_id'
  producer_input_basis:
    oneOf:
      - $ref: '#/$defs/direct_basis'
      - $ref: '#/$defs/derived_basis'
  provenance_root:
    $ref: '#/$defs/strong_id'
  guarantee:
    type: object
    additionalProperties: false
    required: [approximation, scope, assumptions, verification_modalities]
    properties:
      approximation:
        enum: [unknown, under_approximation, over_approximation, exact]
      scope:
        $ref: '#/$defs/strong_id'
      assumptions:
        $ref: '#/$defs/strong_id'
      verification_modalities:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: '^[a-z][a-z0-9_.-]+$'
$defs:
  strong_id:
    type: string
    minLength: 1
    maxLength: 512
    pattern: '^[^\u0000-\u001f\u007f]+$'
  digest:
    type: string
    pattern: '^sha256:[0-9a-f]{64}$'
  semantic_digest:
    oneOf:
      - {$ref: '#/$defs/digest'}
      - {type: string, pattern: '^semantic-v2:sha256:[0-9a-f]{64}$'}
  typed_digest:
    type: string
    pattern: '^[a-z][a-z0-9_.-]*:sha256:[0-9a-f]{64}$'
  direct_basis:
    type: object
    additionalProperties: false
    required: [kind, basis_digest]
    properties:
      kind: {const: direct}
      basis_digest: {$ref: '#/$defs/semantic_digest'}
  derived_basis:
    type: object
    additionalProperties: false
    required:
      - kind
      - input_snapshot
      - consumed_partition_content_digests
      - transform_semantics
    properties:
      kind: {const: derived}
      input_snapshot: {$ref: '#/$defs/strong_id'}
      consumed_partition_content_digests:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/typed_digest'}
      transform_semantics: {$ref: '#/$defs/digest'}
