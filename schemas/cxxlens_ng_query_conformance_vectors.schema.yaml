$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.query-conformance-vectors.v1
title: cxxlens Logical Query IR conformance vectors
type: object
additionalProperties: false
required: [schema, document_version, authority, contract, vectors]
properties:
  schema:
    const: cxxlens.query-conformance-vectors.v1
  document_version:
    type: string
    pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
  authority:
    type: object
    additionalProperties: false
    required: [owner_issue, decision_adr]
    properties:
      owner_issue:
        const: '#61'
      decision_adr:
        const: docs/design/adr/0007-logical-query-algebra.md
  contract:
    const: schemas/cxxlens_ng_logical_query_contract.yaml
  vectors:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, class, operation, expected, input]
      properties:
        id:
          type: string
          pattern: ^[a-z][a-z0-9_.-]+$
        class:
          enum: [positive, negative]
        operation:
          enum:
          - validate_contract
          - validate_operator_use
          - validate_deferred_operator
          - compare_normalized_ir
          - evaluate_backend_matrix
          - validate_cell
          - validate_schema_minor
          - validate_dynamic_literal
          - validate_continuation
          - validate_partial_execution
          - validate_logical_authority
        expected:
          type: object
          additionalProperties: false
          required: [decision, reason_code]
          properties:
            decision:
              enum: [accepted, rejected]
            reason_code:
              type: string
              pattern: ^query\.[a-z0-9.-]+$
            execution_status:
              enum: [complete, truncated, cancelled_with_partial, failed_before_result]
            row_count:
              type: integer
              minimum: 0
        input:
          type: object
          minProperties: 1
          additionalProperties: true
