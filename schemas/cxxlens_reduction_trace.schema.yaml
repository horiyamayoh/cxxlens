$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.reduction-trace.v1.json
title: cxxlens.reduction-trace.v1
type: object
required: [schema, semantics_version, library_version, facts, trace, conflicts, diagnostics, coverage]
additionalProperties: false
properties:
  schema: {const: cxxlens.reduction-trace.v1}
  semantics_version: {type: string, minLength: 1}
  library_version: {type: string, minLength: 1}
  facts:
    type: array
    items:
      type: object
      required: [id, kind, stable_key, compile_units, variants]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^fact_[0-9a-f]{64}$'}
        kind: {type: string, minLength: 1}
        stable_key: {type: string, minLength: 1}
        compile_units: {type: integer, minimum: 1}
        variants: {type: integer, minimum: 1}
  trace:
    type: array
    items:
      type: object
      required: [group_key, decision, facts, contributors, variants]
      additionalProperties: false
      properties:
        group_key: {type: string, minLength: 1}
        decision: {enum: [merged, variant_split, conflict]}
        facts: {type: integer, minimum: 0}
        contributors: {type: integer, minimum: 1}
        variants: {type: integer, minimum: 1}
  conflicts:
    type: array
    items:
      type: object
      required: [id, code, group_key]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^conflict_[0-9a-f]{64}$'}
        code: {const: reducer.authoritative-conflict}
        group_key: {type: string, minLength: 1}
  diagnostics: {type: integer, minimum: 0}
  coverage:
    type: object
    required: [requested, covered, excluded, failed, unresolved, not_applicable]
    additionalProperties: false
    properties:
      requested: {type: integer, minimum: 0}
      covered: {type: integer, minimum: 0}
      excluded: {type: integer, minimum: 0}
      failed: {type: integer, minimum: 0}
      unresolved: {type: integer, minimum: 0}
      not_applicable: {type: integer, minimum: 0}
