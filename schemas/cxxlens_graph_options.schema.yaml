$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.graph-options.v1.schema.yaml
title: cxxlens semantic graph options v1
type: object
additionalProperties: false
required: [schema, semantics_version, direction, limits, include_unresolved]
properties:
  schema: {const: cxxlens.graph-options.v1}
  semantics_version: {const: 1.0.0}
  direction: {enum: [forward, reverse, both]}
  include_unresolved: {type: boolean}
  limits:
    type: object
    additionalProperties: false
    required: [max_depth, max_nodes, max_edges, max_paths]
    properties:
      max_depth: {type: integer, minimum: 1}
      max_nodes: {type: integer, minimum: 1}
      max_edges: {type: integer, minimum: 1}
      max_paths: {type: integer, minimum: 1}
  path_policy: {enum: [shortest, all_bounded, representative]}
  relation_allowlist:
    type: array
    uniqueItems: true
    items:
      enum: [base, override_relation, direct_call, possible_dynamic_call, indirect_call, include, impact, custom]
