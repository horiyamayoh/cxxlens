$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.review-report.v1.schema.yaml
title: cxxlens review report v1
type: object
additionalProperties: false
required: [schema, identity, snapshot, diff, stages, findings, coverage, gate, diagnostics, unresolved, guarantee]
properties:
  schema: {const: cxxlens.review-report.v1}
  identity: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  snapshot: {type: object}
  diff: {type: object}
  stages: {type: array, items: {type: object}}
  findings: {type: array, items: {type: object}}
  coverage: {type: object}
  gate:
    type: object
    additionalProperties: false
    required: [state, exit_code, reasons]
    properties:
      state: {enum: [pass, warn, fail, indeterminate]}
      exit_code: {type: integer, minimum: 0, maximum: 255}
      reasons: {type: array, items: {type: object}}
  diagnostics: {type: array, items: {type: object}}
  unresolved: {type: array, items: {type: object}}
  guarantee: {enum: [complete, bounded, partial, none]}
