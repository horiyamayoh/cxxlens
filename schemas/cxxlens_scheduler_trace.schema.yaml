$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.scheduler-trace.v1.json
title: cxxlens.scheduler-trace.v1
type: object
required: [schema, tasks, trace, coverage]
additionalProperties: false
properties:
  schema: {const: cxxlens.scheduler-trace.v1}
  tasks:
    type: array
    items:
      type: object
      required:
      - task_key
      - input_fingerprint
      - kind
      - state
      - reason_code
      - dependencies
      - deliveries
      - diagnostics
      - frontend_coverage
      - semantic_batch
      additionalProperties: false
      properties:
        task_key: {type: string, pattern: '^task_[0-9a-f]{64}$'}
        input_fingerprint: {type: string, pattern: '^input_[0-9a-f]{64}$'}
        kind: {enum: [parse, refinement]}
        state:
          enum: [succeeded, failed, cancelled, deadline_exceeded, budget_exhausted,
                 output_limited, dependency_failed]
        reason_code: {type: string, minLength: 1}
        dependencies:
          type: array
          items: {type: string, pattern: '^task_[0-9a-f]{64}$'}
          uniqueItems: true
        deliveries:
          type: array
          items:
            type: object
            required: [id, state, reason_code]
            additionalProperties: false
            properties:
              id: {type: string, minLength: 1}
              state:
                enum: [succeeded, failed, cancelled, deadline_exceeded, budget_exhausted,
                       output_limited, dependency_failed]
              reason_code: {type: string, minLength: 1}
        diagnostics:
          type: array
          items:
            type: object
            required: [id, severity, file, line, column, message]
            additionalProperties: false
            properties:
              id: {type: string, minLength: 1}
              severity: {enum: [note, warning, error, fatal]}
              file: {type: string}
              line: {type: integer, minimum: 0}
              column: {type: integer, minimum: 0}
              message: {type: string, pattern: '^[^\u001b]*$'}
        frontend_coverage:
          type: object
          required: [requested, parsed, failed, cancelled]
          additionalProperties: false
          properties:
            requested: {type: integer, minimum: 0, maximum: 1}
            parsed: {type: integer, minimum: 0, maximum: 1}
            failed: {type: integer, minimum: 0, maximum: 1}
            cancelled: {type: integer, minimum: 0, maximum: 1}
        semantic_batch: {type: string}
  trace:
    type: array
    items:
      type: object
      required: [task_key, input_fingerprint, event, detail]
      additionalProperties: false
      properties:
        task_key: {type: string, pattern: '^task_[0-9a-f]{64}$'}
        input_fingerprint: {type: string, pattern: '^input_[0-9a-f]{64}$'}
        event:
          enum: [scheduled, coalesced, succeeded, failed, cancelled, deadline_exceeded,
                 budget_exhausted, output_limited, dependency_failed]
        detail: {type: string, minLength: 1}
  coverage:
    type: object
    required: [requested, succeeded, failed, cancelled, deadline_exceeded,
               budget_exhausted, output_limited, dependency_failed]
    additionalProperties: false
    properties:
      requested: {type: integer, minimum: 0}
      succeeded: {type: integer, minimum: 0}
      failed: {type: integer, minimum: 0}
      cancelled: {type: integer, minimum: 0}
      deadline_exceeded: {type: integer, minimum: 0}
      budget_exhausted: {type: integer, minimum: 0}
      output_limited: {type: integer, minimum: 0}
      dependency_failed: {type: integer, minimum: 0}
