$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-sqlite-store-contract.v1
title: cxxlens NG SQLite physical store contract
type: object
additionalProperties: false
required:
  - schema
  - document_version
  - maturity
  - authority
  - physical_format
  - runtime
  - tables
  - indexes
  - counter_storage
  - payload
  - transaction
  - compaction
  - corruption
properties:
  schema: {const: cxxlens.ng-sqlite-store-contract.v1}
  document_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  maturity: {const: implemented}
  authority:
    type: object
    additionalProperties: false
    required: [semantic_contract, decision_adr, owner_issue]
    properties:
      semantic_contract: {const: schemas/cxxlens_ng_snapshot_store_contract.yaml}
      decision_adr: {const: docs/design/adr/0079-checked-publication-counters.md}
      owner_issue: {const: '#148'}
  physical_format:
    type: object
    additionalProperties: false
    required: [id, current, semantic_snapshot_id_excludes_format]
    properties:
      id: {const: cxxlens.sqlite-semantic-store.v2}
      current: {const: 2.6.0}
      semantic_snapshot_id_excludes_format: {const: true}
  runtime: {$ref: '#/$defs/open_object'}
  tables:
    type: array
    minItems: 2
    uniqueItems: true
    items: {$ref: '#/$defs/open_object'}
  indexes:
    type: array
    minItems: 1
    uniqueItems: true
    items: {$ref: '#/$defs/open_object'}
  counter_storage:
    type: object
    additionalProperties: false
    required: [logical_domain, sqlite_integer_encoding, decode, ordering_authority]
    properties:
      logical_domain: {const: unsigned-64-bit}
      sqlite_integer_encoding: {$ref: '#/$defs/open_object'}
      decode: {const: exact-u64}
      ordering_authority: {const: decoded-logical-value}
  payload: {$ref: '#/$defs/open_object'}
  transaction: {$ref: '#/$defs/open_object'}
  compaction: {$ref: '#/$defs/open_object'}
  corruption: {$ref: '#/$defs/open_object'}
$defs:
  open_object:
    type: object
    minProperties: 1
    additionalProperties: true
