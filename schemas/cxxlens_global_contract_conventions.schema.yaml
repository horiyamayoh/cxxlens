$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.global-contract-conventions.v1.schema.yaml
title: cxxlens global public contract conventions v1
type: object
additionalProperties: false
required:
  - schema
  - document_version
  - contract_state
  - transition_issue
  - authority
  - state_machine
  - package_candidate_owners
  - required_contract_sections
  - naming_and_family
  - value_lifetime_and_concurrency
  - execution_context
  - result_decisions
  - evidence_coverage_and_guarantee
  - determinism
  - serialization_and_versioning
  - change_policy
  - candidate_checklist
properties:
  schema: {const: cxxlens.global-contract-conventions.v1}
  document_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  contract_state: {const: candidate}
  transition_issue: {const: '#42'}
  authority:
    type: object
    additionalProperties: false
    required: [catalog, normative_document, checklist_template, ownership_registry]
    properties:
      catalog: {const: schemas/cxxlens_public_api_contract.yaml}
      normative_document: {const: docs/design/public_contract_conventions.md}
      checklist_template: {const: docs/design/contract_candidate_checklist.md}
      ownership_registry: {const: schemas/cxxlens_contract_ownership.yaml}
  state_machine:
    type: object
    additionalProperties: false
    required: [states, transitions, final_freeze_issue, direct_package_freeze_forbidden, independent_axes]
    properties:
      states:
        type: array
        prefixItems:
          - {const: draft}
          - {const: unresolved}
          - {const: candidate}
          - {const: frozen}
        minItems: 4
        maxItems: 4
      transitions:
        type: array
        minItems: 4
        maxItems: 4
        items: {$ref: '#/$defs/transition'}
      final_freeze_issue: {const: '#54'}
      direct_package_freeze_forbidden: {const: true}
      independent_axes:
        type: array
        uniqueItems: true
        contains: {const: implementation_state}
        minContains: 1
        items: {enum: [declaration_status, contract_state, implementation_state, readiness_state]}
  package_candidate_owners:
    type: array
    minItems: 9
    maxItems: 9
    items:
      type: object
      additionalProperties: false
      required: [issue, packages]
      properties:
        issue: {pattern: '^#(43|44|45|46|47|48|49|50|51)$'}
        packages:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, minLength: 1}
  required_contract_sections:
    type: array
    uniqueItems: true
    minItems: 12
    items: {type: string, minLength: 1}
  naming_and_family: {$ref: '#/$defs/policy'}
  value_lifetime_and_concurrency: {$ref: '#/$defs/policy'}
  execution_context: {$ref: '#/$defs/policy'}
  result_decisions:
    type: array
    minItems: 6
    maxItems: 6
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - result_channel
        - payload
        - error_required
        - unresolved_required
        - coverage_complete
        - allowed_guarantees
        - authoritative_rows_preserved
      properties:
        id: {enum: [empty_success, unresolved, unsupported, ambiguous, partial, failure]}
        result_channel: {enum: [value, error]}
        payload: {enum: [empty, none, partial]}
        error_required: {type: boolean}
        unresolved_required: {type: boolean}
        coverage_complete: {type: boolean}
        allowed_guarantees:
          type: array
          minItems: 1
          uniqueItems: true
          items: {enum: [exact, conservative, best_effort, none]}
        authoritative_rows_preserved: {type: boolean}
  evidence_coverage_and_guarantee:
    type: object
    additionalProperties: false
    required: [coverage_states, conservation_rule, evidence_authoritative, prose_is_projection, downgrade_rules]
    properties:
      coverage_states:
        type: array
        uniqueItems: true
        minItems: 6
        maxItems: 6
        items: {enum: [requested, excluded, covered, failed, unresolved, not_applicable]}
      conservation_rule: {type: string, minLength: 1}
      evidence_authoritative: {const: true}
      prose_is_projection: {const: true}
      downgrade_rules:
        type: array
        minItems: 3
        uniqueItems: true
        items: {type: string, minLength: 1}
  determinism:
    type: object
    additionalProperties: false
    required: [total_order_required, forbidden_order_sources, duplicate_policies, variant_states]
    properties:
      total_order_required: {const: true}
      forbidden_order_sources:
        type: array
        uniqueItems: true
        minItems: 5
        items: {type: string, minLength: 1}
      duplicate_policies:
        type: array
        uniqueItems: true
        minItems: 4
        maxItems: 4
        items: {enum: [merge, preserve, reject, identity_collapse]}
      variant_states:
        type: array
        uniqueItems: true
        minItems: 3
        maxItems: 3
        items: {enum: [equal, divergent, conflicting]}
  serialization_and_versioning:
    type: object
    additionalProperties: false
    required: [canonical_json_required, version_axes, unknown_field_policy, unknown_value_policy, migration_outcomes]
    properties:
      canonical_json_required: {const: true}
      version_axes:
        type: array
        uniqueItems: true
        minItems: 5
        maxItems: 5
        items: {enum: [cpp_api, public_schema, fact_schema, semantics, adapter]}
      unknown_field_policy: {enum: [schema_declared, reject]}
      unknown_value_policy: {enum: [schema_declared, reject]}
      migration_outcomes:
        type: array
        uniqueItems: true
        minItems: 3
        items: {enum: [compatible, migrate, rebuild, reject]}
  change_policy:
    type: object
    additionalProperties: false
    required: [classes, frozen_approval_issue, invalidate_on, deprecation_requires_migration]
    properties:
      classes:
        type: array
        minItems: 4
        maxItems: 4
        items:
          type: object
          additionalProperties: false
          required: [id, fingerprint_invalidated, major_version_required, migration_required]
          properties:
            id: {enum: [additive, source_breaking, semantic_breaking, schema_breaking]}
            fingerprint_invalidated: {const: true}
            major_version_required: {type: boolean}
            migration_required: {type: boolean}
      frozen_approval_issue: {const: '#54'}
      invalidate_on:
        type: array
        minItems: 5
        uniqueItems: true
        items: {type: string, minLength: 1}
      deprecation_requires_migration: {const: true}
  candidate_checklist:
    type: object
    additionalProperties: false
    required: [required_fields, positive_negative_ambiguous_fixtures, production_implementation_forbidden]
    properties:
      required_fields:
        type: array
        minItems: 12
        uniqueItems: true
        items: {type: string, minLength: 1}
      positive_negative_ambiguous_fixtures: {const: true}
      production_implementation_forbidden: {const: true}
$defs:
  transition:
    type: object
    additionalProperties: false
    required: [from, to, authority]
    properties:
      from: {enum: [draft, unresolved, candidate]}
      to: {enum: [unresolved, candidate, frozen]}
      authority: {enum: [package_candidate_owner, '#54']}
  policy:
    type: object
    additionalProperties: false
    required: [rules]
    properties:
      rules:
        type: array
        minItems: 4
        uniqueItems: true
        items: {type: string, minLength: 1}
