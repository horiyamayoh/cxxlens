$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.report-options.v1.schema.yaml
title: cxxlens report options v1
type: object
additionalProperties: false
required: [schema, output, paths, include_source_excerpt, include_evidence, include_unresolved, source_context_lines, output_budget_bytes]
properties:
  schema: {const: cxxlens.report-options.v1}
  output: {enum: [json, markdown, sarif, unified_diff]}
  paths: {enum: [project_relative, redacted_token, basename_only]}
  schema_version: {type: [string, 'null']}
  include_source_excerpt: {type: boolean}
  include_evidence: {type: boolean}
  include_unresolved: {type: boolean}
  source_context_lines: {type: integer, minimum: 0, maximum: 20}
  output_budget_bytes: {type: integer, minimum: 1}
