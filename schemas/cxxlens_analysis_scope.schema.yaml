$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.analysis-scope.v1.json
title: cxxlens.analysis-scope.v1
type: object
required: [schema, semantics_version, library_version, compile_units, files, include_headers, kind, variants]
additionalProperties: false
properties:
  schema: {const: cxxlens.analysis-scope.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  kind: {enum: [all, files, compile_units, changed_files]}
  include_headers: {type: boolean}
  files:
    type: array
    items: {type: string}
    uniqueItems: true
  compile_units:
    type: array
    items: {type: string, pattern: '^cu_[0-9a-f]{64}$'}
    uniqueItems: true
  variants:
    oneOf:
    - {type: 'null'}
    - type: array
      items: {type: string, pattern: '^variant_[0-9a-f]{64}$'}
      uniqueItems: true
