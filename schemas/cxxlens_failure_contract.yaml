schema: cxxlens.failure-contract.v1
semantics:
  error: operation-cannot-be-established
  unresolved: partial-semantic-uncertainty-within-success
  diagnostic: external-tool-observation
  finding: user-code-result
stable_code:
  pattern: '^[a-z][a-z0-9-]*(\.[a-z][a-z0-9-]*)+$'
  message_is_semantic: false
  duplicate_policy: hard-error
  unknown_reference_policy: reject
error:
  required: [code, message, scope, locations, causes, suggested_actions, attributes, retryable]
  scopes: [operation, file, compile_unit, build_variant, symbol, workspace]
  causes:
    ownership: recursive-value
    cycle_representable: false
    maximum_validation_depth: 64
  canonical_semantics:
    includes: [code, scope, locations, causes, suggested_actions, attributes, retryable]
    excludes: [message]
    locations_order: lexical-canonical-source-span
    causes_order: lexical-canonical-semantics
unresolved:
  required:
  - kind
  - stable_code
  - summary
  - scope
  - related
  - missing_inputs
  - suggested_actions
  - required_precision
  - required_capability
  - attributes
  canonical_semantics:
    excludes: [summary]
  kinds:
  - {kind: missing_compile_command, code: workspace.missing-compile-command}
  - {kind: inferred_compile_command, code: workspace.inferred-compile-command}
  - {kind: malformed_compile_command, code: workspace.malformed-compile-command}
  - {kind: parse_failed, code: parse.failed}
  - {kind: incomplete_ast, code: parse.incomplete-ast}
  - {kind: ambiguous_symbol, code: semantic.ambiguous-symbol}
  - {kind: dependent_type, code: semantic.dependent-type}
  - {kind: unresolved_overload, code: semantic.unresolved-overload}
  - {kind: unsupported_language_extension, code: parse.unsupported-language-extension}
  - {kind: missing_module_bmi, code: parse.missing-module-bmi}
  - {kind: macro_origin_ambiguous, code: source.macro-origin-ambiguous}
  - {kind: macro_edit_unsafe, code: transform.macro-edit-unsafe}
  - {kind: generated_code_read_only, code: source.generated-code-read-only}
  - {kind: function_pointer_target_unknown, code: semantic.function-pointer-target-unknown}
  - {kind: callback_target_unknown, code: semantic.callback-target-unknown}
  - {kind: virtual_dynamic_type_unknown, code: semantic.virtual-dynamic-type-unknown}
  - {kind: open_world_virtual_target, code: semantic.open-world-virtual-target}
  - {kind: alias_analysis_required, code: flow.alias-analysis-required}
  - {kind: dataflow_budget_exceeded, code: flow.dataflow-budget-exceeded}
  - {kind: path_sensitive_budget_exceeded, code: flow.path-sensitive-budget-exceeded}
  - {kind: capability_unavailable, code: core.capability-unavailable}
  - {kind: build_variant_disagreement, code: workspace.build-variant-disagreement}
  - {kind: stale_source, code: workspace.stale-source}
  - {kind: custom, code: package-namespaced-required}
  precision_levels:
  - ast_structural
  - local_semantic
  - workspace_semantic
  - local_flow
  - interprocedural_summary
  - path_sensitive
  - dynamic_observation
common_error_codes:
- config.file-not-found
- config.invalid-value
- config.overlay-conflict
- config.profile-not-found
- config.unknown-key
- config.yaml-invalid
- core.budget-exhausted
- core.cancelled
- core.capability-unavailable
- core.deadline-exceeded
- core.internal-invariant-violation
- core.invalid-argument
- core.schema-validation-failed
- core.unsupported-capability
- core.version-mismatch
- extractor.invalid-observation
- facts.cache-incompatible
- facts.identity-collision
- facts.reduction-conflict
- facts.store-corrupt
- facts.transaction-failed
- flow.cfg-unavailable
- flow.model-invalid
- flow.non-convergent
- flow.path-budget-exhausted
- generate.artifact-quarantined
- generate.macro-surface-rejected
- generate.odr-risk-rejected
- generate.payload-missing
- generate.plan-invalid
- generate.structural-audit-failed
- generate.surface-census-incomplete
- generate.target-ambiguous
- generate.type-unspellable
- generate.unknown-decision
- generate.variant-artifact-conflict
- interop.borrowed-lifetime-violation
- interop.custom-schema-conflict
- interop.nondeterministic-extractor
- io.retryable
- parse.crashed
- parse.frontend-failed
- parse.invocation-build-failed
- parse.timeout
- qa.build-failed
- qa.coverage-missing
- qa.process-not-allowed
- qa.report-parse-failed
- report.format-unsupported
- review.baseline-invalid
- review.diff-invalid
- review.gate-failed
- rules.invalid-metadata
- rules.suppression-invalid
- search.plan-compilation-failed
- search.refinement-failed
- search.required-facts-unavailable
- select.ambiguous-name
- select.invalid-expression
- select.type-mismatch
- transform.commit-failed
- transform.format-failed
- transform.macro-edit-rejected
- transform.plan-invalid
- transform.range-conflict
- transform.reparse-failed
- transform.source-stale
- transform.target-ambiguous
- transform.variant-divergence
- transform.writer-lock-conflict
- workspace.compile-command-ambiguous
- workspace.compile-database-invalid
- workspace.compile-database-not-found
- workspace.driver-not-allowed
- workspace.header-inference-rejected
- workspace.model-load-failed
- workspace.resource-dir-not-found
- workspace.snapshot-stale
distinct_common_control_flow:
  cancellation: core.cancelled
  deadline: core.deadline-exceeded
  budget: core.budget-exhausted
  retryable_io: io.retryable
result:
  success_states: [value, void]
  failure_state: original-error-chain
  sentinel_bool_or_string_for_expected_failure: forbidden
exception_boundary:
  expected_failure: result
  user_callback_exception: catch-and-structure
  destructor_throw: forbidden
