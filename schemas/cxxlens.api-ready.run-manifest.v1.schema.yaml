$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.api-ready.run-manifest.v1.schema.yaml
title: cxxlens API task runner semantic manifest v1
type: object
additionalProperties: false
required:
  - schema
  - api_id
  - atomic_unit_id
  - shard_id
  - start_authorized
  - state
  - task_packet_digest
  - ownership_digest
  - shard_digest
  - allowed_write_prefixes
  - selected_evidence_paths
  - acceptance_command
  - blockers
  - semantic_digest
properties:
  schema: {const: cxxlens.api-ready.run-manifest.v1}
  api_id: {pattern: '^API-[A-Z]+-[0-9]{3}$'}
  atomic_unit_id: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
  shard_id: {type: string, minLength: 1}
  start_authorized: {type: boolean}
  state: {enum: [complete, ready, blocked]}
  task_packet_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  ownership_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  shard_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  allowed_write_prefixes:
    type: array
    uniqueItems: true
    items: {type: string, minLength: 1}
  selected_evidence_paths:
    type: array
    uniqueItems: true
    items: {type: string, minLength: 1}
  acceptance_command:
    type: object
  blockers:
    type: array
  semantic_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
