schema: cxxlens.snapshot-store-contract.v1
document_version: 1.10.0
maturity: accepted
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md#15-immutable-snapshot-and-store
  decision_adr: docs/design/adr/0079-checked-publication-counters.md
  sqlite_decision_adr: docs/design/adr/0097-sqlite-v3-chunked-payload-migration.md
  sqlite_decision_issue: '#200'
  owner_issue: '#148'
  owner: steward.ng-store-contract
compatibility:
  version_axis: snapshot-identity-and-publication
  current: 1.0.0
  unknown_identity_major: reject
  unknown_snapshot_format_major: migrate-or-reject
  semantic_identity_survives_format_migration: true
canonical_encoding:
  format: cxxlens-canonical-tuple-v1
  authority: versioned-length-prefixed-binary
  serialized_identity: "{identity-kind}:sha256:{64-lowercase-hex}"
  hash:
    algorithm: sha256
    digest_bits: 256
    truncation: forbidden
    domain_prefix: "cxxlens\\0{identity-kind}\\0v1\\0"
    algorithm_change: identity-contract-major
  value_types:
    - null
    - boolean
    - signed-integer
    - bytes
    - utf8-string
    - ordered-tuple
    - schema-ordered-record
    - sorted-unique-set
    - sorted-map
  prohibitions:
    - json-text-as-identity-authority
    - locale-formatting
    - unordered-iteration
    - absolute-root
    - timestamp
    - task-order
    - backend-layout
  collision:
    verify_full_digest: true
    compare_canonical_bytes_on_duplicate: true
    mismatch: quarantine-candidate-and-preserve-existing
    reason_code: store.hash-collision
canonical_vectors:
  - id: primitive-boundaries-v1
    kinds: [null, false, integer-zero, bytes-zero, text-zero, tuple-a-bc]
    encoded_hex: '05000000000000000600000000000000010000000000000000020100000000000000000b0200000000000000000100000000000000000a03000000000000000130000000000000000a04000000000000000130000000000000002e050000000000000002000000000000000a04000000000000000161000000000000000b0400000000000000026263'
  - id: domain-separated-digest-v1
    domain: canonical-vector
    values: [cxxlens, 1, true, null]
    expected: canonical-vector:sha256:ee43d1e2b86e53b4b52e5452eec0fd6843e858cc0f0230b7f5bf7922b47dde90
identity_graph:
  roots:
    - relation_descriptor_id
    - authoritative_key_tuple
    - authoritative_payload_tuple
    - condition_universe_id
    - canonical_condition
    - interpretation_domain_id
    - producer_semantic_contract
    - producer_input_basis_digest
    - coverage_units
    - partition_scope
    - precision_profile
    - assumption_set_id
    - catalog_semantic_digest
    - relation_registry_digest
    - interpretation_policy_digest
    - closure_kind
    - key_domain_digest
    - evidence_digest
  nodes:
    - id: semantic_key_id
      domain: semantic-key
      depends_on:
        - relation_descriptor_id
        - authoritative_key_tuple
    - id: assertion_id
      domain: assertion
      depends_on:
        - semantic_key_id
        - condition_universe_id
        - canonical_condition
        - interpretation_domain_id
        - producer_semantic_contract
    - id: claim_content_digest
      domain: claim-content
      depends_on:
        - assertion_id
        - authoritative_payload_tuple
    - id: coverage_digest
      domain: coverage
      depends_on:
        - coverage_units
    - id: partition_id
      domain: partition
      depends_on:
        - relation_descriptor_id
        - partition_scope
        - canonical_condition
        - interpretation_domain_id
        - producer_semantic_contract
        - producer_input_basis_digest
        - precision_profile
        - assumption_set_id
    - id: claim_set_digest
      domain: claim-set
      depends_on:
        - claim_content_digest
    - id: partition_content_digest
      domain: partition-content
      depends_on:
        - partition_id
        - claim_set_digest
        - coverage_digest
    - id: closure_certificate_id
      domain: closure-certificate
      depends_on:
        - relation_descriptor_id
        - partition_id
        - partition_content_digest
        - coverage_digest
        - key_domain_digest
        - canonical_condition
        - interpretation_domain_id
        - assumption_set_id
        - closure_kind
        - producer_semantic_contract
        - evidence_digest
    - id: snapshot_id
      domain: snapshot
      depends_on:
        - catalog_semantic_digest
        - condition_universe_id
        - relation_registry_digest
        - interpretation_policy_digest
        - partition_content_digest
        - closure_certificate_id
  forbidden_edges:
    - {from: containing_snapshot_id, to: claim_content_digest}
    - {from: containing_snapshot_id, to: closure_certificate_id}
    - {from: closure_certificate_id, to: partition_content_digest}
  derived_prior_snapshot_rule: strict-prior-generation-only
claim_input_basis:
  field: producer_input_basis
  containing_snapshot: forbidden
  variants:
    direct:
      required: [kind, basis_digest]
      forbidden: [input_snapshot, consumed_partition_content_digests]
    derived:
      required:
        - kind
        - input_snapshot
        - consumed_partition_content_digests
        - transform_semantics
      input_snapshot: strict-prior-published-snapshot
      consumed_partitions: canonical-sorted-unique
      publication_validation:
        input_snapshot: committed-non-corrupt-strict-prior
        consumed_membership: every-digest-in-exact-input-snapshot-manifest
        partial_membership: atomic-reject
        cross_series: allowed-with-exact-membership
        duplicate_physical_publication: same-semantic-manifest-membership
partition:
  semantic_claim_set: canonical-sorted-unique-content-digests
  evidence_occurrences:
    identity: full-claim-envelope-canonical-tuple
    exact_duplicate: deduplicate
    metadata_distinct_same_content: preserve-losslessly
    manifest_claim_count: unique-semantic-content-count
    payload_order: canonical-total-order
  identity_fields:
    - relation_descriptor_id
    - scope
    - condition
    - interpretation
    - producer_semantics
    - producer_input_basis_digest
    - precision_profile
    - assumption_set_id
  content_fields:
    - partition_id
    - canonical_sorted_claim_content_digests
    - coverage_digest
  closure_ids_in_identity: forbidden
  partial_reuse_as_complete: forbidden
closure:
  subject: complete-immutable-partition-certificate-subject
  subject_projection:
    values: [partition-manifest, snapshot-partition-binding]
    validator: make-partition-certificate-subject
    recompute: [partition-id, partition-content-digest]
    exact_match: [relation, producer-input-basis]
  candidate_binding:
    exact_match: [relation, partition-id, partition-content, coverage, condition, interpretation, assumption-set, producer-semantics]
    key_domain: digest-required
    evidence: digest-required
    allowed_kinds: [relation-key-enumeration]
  incomplete_manifest_only_validator: forbidden
  identity_fields:
    - relation_descriptor_id
    - subject_partition_id
    - partition_content_digest
    - coverage_digest
    - key_domain_digest
    - condition
    - interpretation
    - assumption_set_id
    - closure_kind
    - producer_semantics
    - evidence_digest
  forbidden_fields: [containing_snapshot_id, input_snapshot]
  mutation_of_any_identity_field_changes_id: true
  query_projection:
    partition_identity_fields_persisted: true
    full_validated_certificate_subject_persisted: true
    id_only_legacy_payload_is_closure_proof: false
snapshot:
  manifest_schema: schemas/cxxlens_ng_snapshot_manifest.schema.yaml
  identity_fields:
    - snapshot_semantics_version
    - catalog_semantic_digest
    - condition_universe_id
    - relation_registry_digest
    - interpretation_policy_digest
    - canonical_sorted_partition_manifest_projections
    - canonical_sorted_closure_certificate_ids
  excluded_fields:
    - absolute_root
    - jobs
    - task_order
    - backend
    - physical_format
    - publication_sequence
    - parent_publication
    - created_at
    - writer
  partition_projection:
    - partition_id
    - content_digest
    - coverage_digest
publication_identity:
  domain: publication
  identity_fields: [series_id, snapshot_id, sequence, parent_publication]
  excluded_fields: [physical_generation, state, corrupt]
  sequence_canonical_codec: unsigned-64-to-explicit-two-complement-signed-canonical-integer
  persisted_binding:
    validation: recompute-and-exact-match
    shared_validator: memory-and-sqlite-persist-load-read-compact
    mismatch: store.corrupt
    before_exposure: true
  compaction: physical-generation-update-preserves-publication-id
wire_decoding:
  snapshot_semantics_version_components: [major, minor, patch]
  component_domain: unsigned-32-bit
  maximum: 4294967295
  overflow: store.corrupt
  narrowing_before_range_validation: forbidden
  accepted_v5_payload: decode-encode-byte-identical
  partition_envelope_claim_order: full-sdk-claim-occurrence-projection
publication_counters:
  domain: unsigned-64-bit
  fields: [publication_sequence, physical_generation]
  authority_record:
    required: [checksum-valid, publication-identity-valid, decoded-record-exact, semantic-graph-valid, committed]
    excluded: [created, staged, validating, rejected, rolled_back, corrupt]
  global_generation: maximum-authority-record-generation
  increment: shared-checked-add-one
  maximum_increment: reject
  overflow: store.counter-overflow
  compaction_uses_shared_increment: true
  sqlite_allocation:
    lock: begin-immediate-write-transaction
    authority_scan: all-persisted-records-revalidated-to-authority-record-conditions
    allocation: checked-max-authority-generation-plus-one-inside-transaction
    different-series-concurrency: globally-distinct-monotonic-generations
    corrupt-high-generation: excluded
    publication_and_compaction_share_allocator: true
    compaction_range:
      size: exact-authority-publication-count
      checked_allocation: max-plus-one-through-max-plus-count
      assignment_order: prior-publication-sequence-then-prior-physical-generation-then-publication-id
      distinct_generation_per_publication: true
      local_generation_after_commit: allocated-range-maximum
      overflow: rollback-entire-compaction
  sqlite_integer_encoding:
    nonnegative_range: zero-through-int64-max
    upper_unsigned_range: negative-twos-complement-int64
    round_trip: exact-u64
publication_series:
  selector_fields:
    - catalog_id
    - channel_id
    - engine_generation_id
    - condition_universe_id
    - relation_registry_digest
    - interpretation_policy_digest
    - trust_policy_digest
  series_id: hash-exact-selector
  current_api: current(snapshot_series_selector)
  catalog_only_lookup: forbidden
  missing_selector_field: reject
  cross_series_fallback: forbidden
  head_selection: highest-committed-monotonic-sequence
publication_transaction:
  states: [created, staged, validating, committed, rejected, rolled_back]
  visible_states: [committed]
  commit: compare-and-swap-series-head
  stale_parent: reject
  failed_publish_preserves_head: true
  recovery: committed-journal-record-only
  sqlite_head_cas:
    table: cxxlens_ng_series_head
    transaction: begin-immediate
    steps: [full-committed-authority-census, derive-each-series-authoritative-head, exact-compare-head-table-id-and-sequence, recheck-expected-parent, allocate-global-generation, immutable-publication-insert, head-update]
    parent_record: exact-committed-decoded-semantic-graph-valid-authority-record
    missing-head-with-existing-series-history: store.corrupt
    same-parent-head-sequence-mismatch: store.corrupt
    duplicate-publication-id-under-unchanged-parent: store.corrupt
    conflict: store.publication-conflict-parent-cas-only
    memory_update: after-commit-full-committed-census
  sqlite_terminal_recovery:
    reclassifier_id: cxxlens.sqlite-terminal-reclassifier.v1
    descendant_algebra_id: cxxlens.sqlite-authorized-descendant.v1
    authority_state_projection_id: cxxlens.sqlite-authority-state.v1
    sealed_receipt_profiles:
      post_format_prewrite: [canonical-locator, exact-pinned-vfs-identity, writer-main-open-file-instance-identity, writer-main-directory-entry-binding, exact-length-framed-prestate-authority-state-projection-bytes-and-digest, operation-kind, operation-phase, no-candidate-yet]
      post_format_candidate: [exact-post-format-prewrite-receipt, candidate-id, exact-candidate-projection]
      fresh_initialization: [canonical-locator, exact-pinned-vfs-identity, preinit-absent-or-exact-empty-anchor, actual-target-main-open-file-instance-identity-and-directory-entry-binding, pre-arm-raw-main-size-and-digest-and-sidecar-census, deterministic-expected-empty-v3-projection, initialization-id]
      fresh_empty_anchor_is_not_post_format_authority_state: true
    post_format_candidate_extension: only-after-candidate-id-and-exact-candidate-projection-are-complete
    fresh_initialization_receipt_seal: before-journal-arming
    main_file_identity_in_every_receipt: required-for-every-filesystem-receipt-memory-branches-use-no-receipt-no-reclassifier
    ephemeral_memory_uncertainty: finalize-and-attempt-exactly-one-close-v2-close-ok-discards-close-non-ok-quarantines-then-poison-with-phase-specific-opaque-result-no-filesystem-receipt-reopen-or-terminal-reclassifier
    publish_commit_unknown_result_precedence: database-opaque-always
    publish_commit_unknown_state_effect: authorized-state-installs-independent-current-v3-otherwise-poison-but-the-public-result-remains-database-opaque
    precommit_result_precedence: original-trigger-only-after-an-authorized-post-state-is-installed
    publish_precommit_unsafe_result: database-opaque-and-poison
    compaction_precommit_unsafe_result: compaction-recovery-opaque-and-poison
    install_only: independently-validated-current-v3-exact-or-authorized-descendant
    close_non_ok: quarantine-connection-and-vfs-pins-poison-reopen-required-without-reopen
    unsafe: poison-reopen-required-with-old-pins-valid
df_0200_materialization_ingress:
  status: accepted-authority-implementation-pending
  resolution_id: cxxlens.df-0200.incremental-claim-store.v1
  implementation_disposition: pending-implementation-and-qualification
  activation: accepted-df-0200-review-and-sqlite-option-a-authority-binding
  caller_scope: installed-clang22-materializer-only
  bridge: source-private-non-installed-header-without-public-catalog-entry
  public_api: unchanged
  public_writer_states:
  - created
  - staged
  - validating
  - committed
  - rejected
  - rolled_back
  public_stage_validate_publish_semantics: unchanged
  source:
    ownership: move-only-replayable-sealed
    codec:
      id: cxxlens.df-0200.partition-event-stream.v1
      event_kind_codes:
        partition-begin: 1
        claim-occurrence: 2
        detached-row: 3
        claim-annotation: 4
        coverage: 5
        unresolved: 6
        partition-end: 7
      authority_binding:
        canonical_json_sha256: sha256:b040bb8b58814e5ac1397a6f409677a1db5c9bb73304578253dc6071491fd45c
        required_sections:
        - canonical_tuple_profile
        - field_catalog
        - stream_header
        - frame
        - event_projections
        - event_container
        - digest_framing
        - digest_domains
        - canonical_order
        - stream_trailer
        - rejection
        store_checker: self-contained-hardcoded-binding-no-reverse-load
        materialization_checker: recompute-and-exact-match-full-codec-object
      validation: decode-and-validate-every-full-byte-frame-header-trailer-order-checksum-and-seal
      unknown_missing_reordered_or_truncated: reject-entire-candidate
    events:
    - partition-begin
    - claim-occurrence
    - detached-row
    - claim-annotation
    - coverage
    - unresolved
    - partition-end
    public-stage-mixing: forbidden
    materializer-receipt-is-validation-authority: false
    external_completeness_authority:
      validated_request:
        authority: selected-schema-validated-request-external-to-event-stream
        producer: request-schema-and-derived-binding-validator
        generation_timing: before-provider-dispatch-and-before-event-encoding
        seal: immutable-selected-request-journal-entry
        exact_projection:
        - materialization-request-id
        - canonical-task-id-order
        - exact-task-count
        - per-task-source-digest
        - per-task-output-and-row-budgets
        - ordered-selected-request-entry-binding-digests
        selected_request_entry_binding:
          domain: cxxlens.df-0200.selected-request-entry-binding.v1
          cardinality: exactly-one-per-selected-task
          projection:
          - materialization-request-id
          - task-id
          - canonical-task-ordinal-u64be-as-canonical-bytes
          - source-digest
          - output-budget-u64be-as-canonical-bytes
          - row-budget-u64be-as-canonical-bytes
          output: semantic-v2-sha256-string
          global_set:
            domain: cxxlens.df-0200.selected-request-entry-binding-set.v1
            projection: [materialization-request-id, exact-task-count, canonical-task-id-order, ordered-selected-request-entry-binding-digests]
            output: semantic-v2-sha256-string
          generation_timing: after-request-validation-before-provider-dispatch
      sealed_execution_journal_and_task_receipts:
        authority: sealed-execution-evidence-external-to-event-stream
        producer: runtime-transport-receipt-plus-independent-pre-encoder-oracle
        generation_timing: after-shared-task-seal-before-event-encoder
        seal: immutable-before-store-ingress
        exact_task_projection:
        - materialization-request-id
        - task-id
        - canonical-task-ordinal
        - successful-seal
        - provider-stdout-byte-count
        - provider-stdout-sha256
        - decoded-provider-frame-count
        - provider-frame-transcript-digest
        - provider-sealed-transcript-digest
        - task-partition-count-and-full-projection-digest
        - task-event-count-and-digest
        - task-claim-count-and-digest
        - task-row-count-and-digest
        - task-coverage-count-and-digest
        - task-unresolved-count-and-digest
        - pre-encoder-task-receipt-seal-digest
        - selected-request-entry-binding-digest
        exact_journal_projection:
        - materialization-request-id
        - exact-task-count
        - canonical-task-id-order
        - ordered-pre-encoder-task-receipt-seal-digests
        - execution-journal-receipt-set-digest
      pre_encoder_receipt_oracle:
        owner: installed-tool-private-independent-receipt-builder
        input: immutable-sealed-task-result-before-move-or-destruction
        generation_timing: after-task-result-seal-before-first-event-encoder-call
        enumeration: exact-event-identity-and-full-canonical-projection-multiset-for-every-partition
        canonicalization: independent-claim-law-then-sort-by-full-event-key-and-full-projection
        input_occurrence_law:
          exact_duplicate_claim_occurrence: collapse-before-event-enumeration
          metadata_distinct_same_content_occurrence: preserve-as-distinct-event
          duplicate_final_full_event_projection: reject
          qualification_binding: cxxlens.df-0200.claim-batch-differential-corpus.v1-raw-sha256-f05513d05b0b57788b6f94d9c1a477c88d589b64dd8232d88a5c6c6022a84836
        shared_implementation_allowlist: [canonical-codecs, identity-functions, field-validators]
        shared_event_enumeration_or_aggregation_control_flow: forbidden
        selected_request_entry_cross_check: exactly-one-entry-whose-task-id-and-canonical-ordinal-equal-this-task-receipt
        receipt_seal:
          domain: cxxlens.df-0200.pre-encoder-task-receipt.v1
          projection:
          - materialization-request-id
          - selected-request-entry-binding-digest
          - task-id
          - canonical-task-ordinal
          - successful-seal
          - provider-stdout-byte-count
          - provider-stdout-sha256
          - decoded-provider-frame-count
          - provider-frame-transcript-digest
          - provider-sealed-transcript-digest
          - task-partition-count-and-full-projection-digest
          - task-event-count-and-digest
          - task-claim-count-and-digest
          - task-row-count-and-digest
          - task-coverage-count-and-digest
          - task-unresolved-count-and-digest
          output: semantic-v2-sha256-string
        execution_journal_receipt_set:
          domain: cxxlens.df-0200.execution-journal-receipt-set.v1
          projection:
          - materialization-request-id
          - exact-task-count
          - canonical-task-id-order
          - ordered-pre-encoder-task-receipt-seal-digests
          output: semantic-v2-sha256-string
          seal_timing: after-all-task-receipts-before-store-ingress
        receipt_field_catalog:
          materialization-request-id: {type: strict-utf8-string, domain_id: not-applicable-scalar-bound-by-receipt-seal, exact_projection: selected-materialization-request-id}
          task-id: {type: strict-utf8-string, domain_id: not-applicable-scalar-bound-by-receipt-seal, exact_projection: selected-provider-task-id}
          canonical-task-ordinal: {type: canonical-bytes-containing-u64be, domain_id: not-applicable-scalar-bound-by-receipt-seal, exact_projection: zero-based-selected-request-canonical-task-order}
          successful-seal: {type: canonical-boolean-true, domain_id: not-applicable-scalar-bound-by-receipt-seal, exact_projection: shared-validator-produced-immutable-successful-seal}
          provider-stdout-byte-count: {type: canonical-bytes-containing-u64be, domain_id: not-applicable-scalar-bound-by-receipt-seal, exact_projection: runtime-observed-stdout-bytes-before-decode-or-move}
          provider-stdout-sha256:
            type: sha256-string
            domain_id: sha256-content-digest
            exact_projection: runtime-observed-exact-stdout-bytes-before-decode-or-move
            authority_ref: 'schemas/cxxlens_ng_provider_runtime_contract.yaml#runtime_private_receipt.raw_stdout'
          decoded-provider-frame-count: {type: canonical-bytes-containing-u64be, domain_id: not-applicable-scalar-bound-by-receipt-seal, exact_projection: exact-shared-validator-decoded-frame-census}
          provider-frame-transcript-digest:
            type: semantic-v2-sha256-string
            domain_id: cxxlens.provider-frame-transcript.v2
            exact_projection: explicit-frame-count-and-decoded-wire-order-full-eight-field-frame-projections
            authority_ref: 'schemas/cxxlens_ng_provider_runtime_contract.yaml#runtime_private_receipt.frame_transcript'
          provider-sealed-transcript-digest:
            type: semantic-v2-sha256-string
            domain_id: cxxlens.provider-sealed-transcript.v1
            exact_projection: task-terminal-batches-full-coverage-unresolved-and-evidence-projections-in-provider-authority-order
            authority_ref: 'schemas/cxxlens_ng_provider_runtime_contract.yaml#runtime_private_receipt.sealed_transcript'
          task-partition-count-and-full-projection-digest:
            type: canonical-tuple-u64be-count-and-semantic-v2-sha256-string
            domain_id: cxxlens.df-0200.task-partition-full-projection.v1
            exact_projection: task-id-partition-count-and-ordered-partition-id-plus-partition-event-full-projection-digest-tuples
          task-event-count-and-digest:
            type: canonical-tuple-u64be-count-and-semantic-v2-sha256-string
            domain_id: cxxlens.df-0200.task-event-full-projection.v1
            exact_projection: task-id-event-count-and-ordered-full-event-projection-bytes
          task-claim-count-and-digest:
            type: canonical-tuple-u64be-count-and-semantic-v2-sha256-string
            domain_id: cxxlens.df-0200.task-claim-occurrence-full-projection.v1
            exact_projection: task-id-claim-count-and-ordered-full-claim-occurrence-projection-bytes
          task-row-count-and-digest:
            type: canonical-tuple-u64be-count-and-semantic-v2-sha256-string
            domain_id: cxxlens.df-0200.task-detached-row-full-projection.v1
            exact_projection: task-id-row-count-and-ordered-full-detached-row-projection-bytes
          task-coverage-count-and-digest:
            type: canonical-tuple-u64be-count-and-semantic-v2-sha256-string
            domain_id: cxxlens.df-0200.task-coverage-full-projection.v1
            exact_projection: task-id-coverage-count-and-ordered-full-coverage-projection-bytes
          task-unresolved-count-and-digest:
            type: canonical-tuple-u64be-count-and-semantic-v2-sha256-string
            domain_id: cxxlens.df-0200.task-unresolved-full-projection.v1
            exact_projection: task-id-unresolved-count-and-ordered-full-unresolved-projection-bytes
          pre-encoder-task-receipt-seal-digest: {type: semantic-v2-sha256-string, domain_id: cxxlens.df-0200.pre-encoder-task-receipt.v1, exact_projection: receipt-seal-projection-in-listed-order}
          selected-request-entry-binding-digest:
