schema: cxxlens.ng-release-qualification.v1
document_version: 1.6.0
maturity: implemented
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md
  adr: docs/design/adr/0091-distribution-1-production-qualification.md
  amendments: [docs/design/adr/0096-clang22-installed-materialization-boundary.md]
  owner_issue: '#167'
binding:
  release: distribution-1.0
  package_version: 1.0.0
  acceptance_gate: gate.release
  branch: main
  ci_job: release-qualification
  report_schema: cxxlens.ng-release-qualification-report.v1
  report_artifact: cxxlens-ng-release-qualification-${revision}
prerequisites:
  gates: [gate.g0, gate.g1, gate.g2, gate.g3, gate.g4, gate.g5]
  migrations: [R0, R1, R2, R3, R4]
  r0_r3_evidence: cxxlens.ng-foundation-completion-report.v1
  readiness_evidence: cxxlens.ng-api-development-readiness-report.v1
  public_callable_evidence: cxxlens.ng-public-callable-inventory-report.v1
  r4_evidence: cxxlens.ng-g5-qualification-report.v1
  release_evaluation_evidence: cxxlens.ng-release-qualification-evaluation-report.v1
  same_revision: required
package:
  configurations:
    - {id: static, build_shared: 'OFF'}
    - {id: shared, build_shared: 'ON'}
  prefix_relocation: required
  real_project_consumer: install.real-project-consumer
  storage_backends: [memory, sqlite]
  required_files:
    - bin/cxxlens-clang-worker-22
    - bin/cxxlens-clang22-materialize
    - share/doc/cxxlens/LICENSE
    - share/doc/cxxlens/NOTICE
    - share/cxxlens/schemas/cxxlens_ng_clang22_materialization_contract.yaml
    - share/cxxlens/schemas/cxxlens_ng_clang22_materialization_contract.schema.yaml
    - share/cxxlens/schemas/cxxlens_ng_clang22_materialization_request.schema.yaml
    - share/cxxlens/schemas/cxxlens_ng_clang22_materialization_report.schema.yaml
    - share/cxxlens/schemas/cxxlens_ng_clang22_materialization_execution_receipt.schema.yaml
    - share/cxxlens/schemas/cxxlens_ng_clang22_materializer_occurrence_manifest.schema.yaml
    - share/cxxlens/materialization/clang22/occurrence-v1.json
    - share/cxxlens/schemas/cxxlens_ng_release_qualification.yaml
materialization:
  tool: cxxlens-clang22-materialize
  contract: schemas/cxxlens_ng_clang22_materialization_contract.yaml
  contract_schema: schemas/cxxlens_ng_clang22_materialization_contract.schema.yaml
  request_schema: schemas/cxxlens_ng_clang22_materialization_request.schema.yaml
  report_schema: schemas/cxxlens_ng_clang22_materialization_report.schema.yaml
  occurrence_manifest_schema: schemas/cxxlens_ng_clang22_materializer_occurrence_manifest.schema.yaml
  occurrence_manifest_path: share/cxxlens/materialization/clang22/occurrence-v1.json
  request_filename: cxxlens-clang22-materialization-request.json
  report_filename: cxxlens-clang22-materialization-report.json
  execution_receipt_filename: cxxlens-clang22-materialization-execution-receipt.json
  execution_receipt_schema: schemas/cxxlens_ng_clang22_materialization_execution_receipt.schema.yaml
  execution_receipt:
    schema: cxxlens.clang22-materialization-execution-receipt.v1
    encoding: strict-json-single-object
    maximum_bytes: 65536
    fields: [actual_exit_status, exact_stdout_byte_count, stdout_sha256, parsed_response_count, stderr_sha256]
    report_cross_binding: exact-stdout-bytes-equal-report-artifact
    qualified: {actual_exit_status: 0, parsed_response_count: 1}
    schema_valid_failure: {actual_exit_status: 1, parsed_response_count: 1, release_eligible: false}
    no_response_failure: {actual_exit_status: 2, parsed_response_count: 0, release_eligible: false}
  configurations: [static, shared]
  cardinality: exactly-one-per-configuration-and-backend
  relocated_installed_execution: required
  runtime_loader_environment: unset
  storage_backends: [memory, sqlite]
  exact_observation_equivalence: required-zero-non-exact-per-descriptor
  tuple_evidence_binding: exact-configuration-two-report-set-digest
  report_set_digest:
    algorithm: sha256
    encoding: canonical-json-sorted-keys-no-whitespace
    projection: [configuration, reports]
    backend_order: [memory, sqlite]
    report_entry_fields: [backend, report_digest, execution_receipt_digest]
provider:
  provider_id: cxxlens.clang22.reference
  provider_version: 1.0.0
  relations: [cc.entity@1, cc.call_site@1, cc.call_direct_target@1]
  relation_descriptors: [cc.entity.v1, cc.call_site.v1, cc.call_direct_target.v1]
  observation_relation_descriptors: [frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
  interpretation: cc.clang22-canonical-1
  qualification: production-supported
  capabilities: [canonical-entity, call-site, direct-target, process-isolation]
  guarantee: exact-claims-with-coverage-unresolved-and-provenance
  binary_digest_source: installed-worker-file
  static_pending_tuple_is_production: forbidden
  required_positive_evidence:
    - adapter.clang22-provider-normalizer
    - sdk.example-clang22-native
    - install.clang22-materialization
security:
  profile: schemas/cxxlens_ng_security_profile.yaml
  conformance_report_schema: cxxlens.security-conformance-report.v1
  required_negative_evidence:
    - unit.sdk-provider-runtime
    - adapter.clang22-provider-worker-protocol
    - install.shared-runtime-layout
    - install.legacy-zero
    - install.real-project-incompatible-version
performance:
  authority: schemas/cxxlens_ng_g5_qualification.yaml
  report_schema: cxxlens.ng-g5-qualification-report.v1
  exact_revision: required
documentation:
  doxygen_contract: required
  public_callable_inventory: schemas/cxxlens_ng_public_callable_inventory.yaml
  public_callable_inventory_schema: schemas/cxxlens_ng_public_callable_inventory.schema.yaml
  public_callable_report_schema: schemas/cxxlens_ng_public_callable_inventory_report.schema.yaml
  public_callable_report_filename: cxxlens-ng-public-callable-inventory-report.json
  public_callable_review_filename: cxxlens-ng-public-callable-inventory-review.md
  support_matrix: docs/support-matrix.md
claim_policy:
  production_authority: exact-gr-report-tuple-only
  required_tuple_fields: [provider_id, provider_version, binary_digest, relation, interpretation, toolchain, platform]
  required_claim_fields: [capabilities, guarantee, security_profile_digest, evidence_digest]
  pending_or_wildcard: forbidden
  unlisted_surface: unsupported
  tuple_evidence_projection: [install_manifest, installed_worker, materialization_tool, materialization_request_artifacts, materialization_report_set, materialization_contract, g5_report, security_report, public_callable_report, configuration]
required_artifacts:
  - LICENSE
  - NOTICE
  - schemas/cxxlens_ng_release_qualification.yaml
  - schemas/cxxlens_ng_release_qualification.schema.yaml
  - schemas/cxxlens_ng_release_qualification_report.schema.yaml
  - schemas/cxxlens_ng_release_qualification_evaluation_report.schema.yaml
  - schemas/cxxlens_ng_clang22_materialization_contract.yaml
  - schemas/cxxlens_ng_clang22_materialization_contract.schema.yaml
  - schemas/cxxlens_ng_clang22_materialization_request.schema.yaml
  - schemas/cxxlens_ng_clang22_materialization_report.schema.yaml
  - schemas/cxxlens_ng_clang22_materialization_execution_receipt.schema.yaml
  - schemas/cxxlens_ng_clang22_materializer_occurrence_manifest.schema.yaml
  - schemas/cxxlens_ng_production_scope_closure.yaml
  - schemas/cxxlens_ng_production_scope_closure.schema.yaml
  - schemas/cxxlens_ng_production_scope_closure_report.schema.yaml
  - schemas/cxxlens_ng_foundation_completion_report.schema.yaml
  - schemas/cxxlens_ng_api_development_readiness_report.schema.yaml
  - schemas/cxxlens_ng_public_callable_inventory.yaml
  - schemas/cxxlens_ng_public_callable_inventory.schema.yaml
  - schemas/cxxlens_ng_public_callable_inventory_report.schema.yaml
  - schemas/cxxlens_ng_g5_qualification_report.schema.yaml
  - schemas/cxxlens_ng_release_bundle.yaml
  - schemas/cxxlens_ng_acceptance_manifest.yaml
  - schemas/cxxlens_ng_provider_support_matrix.yaml
  - tests/install/real_project_consumer/CMakeLists.txt
  - tests/install/real_project_consumer/model.hpp
  - tests/install/real_project_consumer/model.cpp
  - tests/install/real_project_consumer/main.cpp
  - src/llvm/clang22/provider_worker.cpp
  - tests/adapter/clang22/provider_normalizer_test.cpp
  - tests/adapter/clang22/provider_worker_protocol_test.cpp
  - tests/quality/test_ng_production_scope_closure.py
  - tests/unit/sdk/provider_runtime_test.cpp
  - examples/sdk/clang22_native_provider.cpp
  - tools/quality/check_ng_release_qualification.py
  - tools/quality/check_ng_clang22_materialization.py
  - tests/quality/test_ng_clang22_materialization.py
  - tests/quality/test_ng_release_qualification.py
  - tools/quality/check_ng_production_scope_closure.py
  - tools/quality/public_callable_inventory.py
  - docs/design/adr/0092-exact-public-callable-inventory.md
  - docs/design/adr/0091-distribution-1-production-qualification.md
