schema: cxxlens.provider-runtime-contract.v1
document_version: 1.19.0
maturity: accepted
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md#17-provider-model
  decision_adr: docs/design/adr/0087-provider-budget-surface-parity.md
  owner_issue: '#151'
  owner: steward.ng-provider-runtime
dependencies:
  - schemas/cxxlens_ng_provider_protocol.yaml
  - schemas/cxxlens_ng_security_profile.yaml
  - schemas/cxxlens_ng_provider_manifest.schema.yaml
  - schemas/cxxlens_ng_snapshot_store_contract.yaml
  - schemas/cxxlens_ng_project_catalog_contract.yaml
  - schemas/cxxlens_ng_portable_provider_task_contract.yaml
runtime:
  process_effect_boundary: provider-process-port
  supported_platform:
    NG0: linux-glibc
    other: provider.runtime-unavailable
  launch:
    shell: forbidden
    argv: required
    relative_target_base: working-directory-or-parent-cwd-when-empty
    executable_binding:
      source_resolution: single-open-or-working-directory-openat
      measured_image: copied-sealed-executable-memfd
      digest_subject: exact-sealed-image-bytes
      execution: execveat-verified-fd-at-empty-path
      path_reopen_after_measurement: forbidden
      rename_symlink_in_place_mutation: verified-image-or-reject
    environment: explicit-allowlist
    standard_input: anonymous-bounded-object
    process_group: required
    timeout_kills_process_group: true
    cancellation_kills_process_group: true
    stdout_stderr_combined_limit: required
  budget:
    host_input_transfer:
      logical_input_bytes: provider-protocol-profile-limit-before-task-acceptance
      chunk_payload_bytes: provider-protocol-per-chunk-limit-before-allocation
      chunk_frames: provider-protocol-count-limit-and-contiguous-state
      accounting: shared-incremental-host-input-core
      exhaustion: fail-before-task-accepted-without-semantic-adoption
    logical_surface_independent:
      output_bytes: sum-control-and-payload-for-non-lifecycle-provider-output-frames
      rows: task-global-sum-of-validated-batch-end-row-count
      diagnostics: task-global-decoded-unresolved-record-count
      validator: shared-logical-process-production-validator
      exhaustion: provider.output-limit-without-success-adoption
    process_isolation_only:
      wall_ms: monotonic-deadline-process-group-kill
      cpu_ms: rlimit-cpu-rounded-up-to-seconds
      address_space_bytes: rlimit-as-not-rss
      transport_bytes: combined-stdout-stderr-drain-and-rlimit-fsize
      open_files: rlimit-nofile
      subprocesses: rlimit-nproc
    wire_credit: provider-output-only-independent-from-host-input-logical-and-transport-byte-budgets
    direct_run_worker: trusted-callback-logical-limits-and-cooperative-cancellation-only
    unsupported_created_file_count: omitted-not-claimed
  sandbox:
    assurance_order: [none, best_effort, enforced, certified]
    effective_minimum: max(manifest, request, security-profile)
    insufficient: security.sandbox-insufficient
    report_fields: [platform, mechanisms, achieved, policy_digest, evidence_digest]
    policy_resolution: exact-built-in-registry-before-selection-and-process-effect
    unknown_policy_digest: security.sandbox-policy-mismatch
    policy_digest_source: recomputed-applied-canonical-policy-not-request-echo
    evidence_digest_v3: [resolved-policy-canonical-form, recomputed-policy-digest, measured-executable-digest, achieved-assurance, invocation-budget-limits, exact-applied-mechanisms]
    enforced_precondition: measured-digest-equals-selected-manifest-and-exec-uses-sealed-image-fd
    report_validation: runtime-recompute-evidence-and-exact-enforced-mechanism-set
    mechanism_install_failure: achieved-none-and-security.sandbox-insufficient
    linux_enforced_mechanisms:
      - no-shell-argv-exec
      - explicit-environment
      - anonymous-readonly-input
      - inherited-fd-close-range
      - process-group-cleanup
      - address-space-limit
      - cpu-limit
      - output-file-size-limit
      - open-file-limit
      - subprocess-limit
      - no-new-privileges
      - network-syscall-deny
      - seccomp-audit-arch
    linux_strict_additional_mechanisms: [core-dump-limit, locked-memory-limit]
  identity_binding:
    required:
      - provider_id
      - provider_version
      - provider_binary_digest
      - provider_semantic_contract_digest
      - task_input_digest
      - normalized_invocation_digest
      - toolchain_digest
      - environment_digest
      - sandbox_policy_digest
    omitted_from_semantic_claim_identity:
      - process_id
      - wall_duration
      - physical_executable_path
selection:
  execution_token:
    construction: select-provider-only-private
    ownership: original-request-selected-candidate-all-decisions-fallback-binding
    mutation: const-accessors-only
    execute_revalidation: required-before-process-effect
    selected_decision: exact-one-and-candidate-bound
    trust_verdicts: [authoritative-path, validation-error-empty, trust-valid, required-certification-valid, certified-qualifications]
  precedence: [explicit_path, installation_manifest, project_config, system_registry]
  exact_before_fallback: true
  path_only: reject
  candidate_identity:
    schema: cxxlens.provider-candidate.v1
    digest: cxxlens-semantic-digest-v2
    fields: [full-canonical-manifest, ordered-executable-argv, authoritative-path, trust-verdict, certification-verdict, canonical-certified-qualifications, canonical-sandbox-report, validation-error]
    source_binding: decision-source-plus-candidate-digest
  shadowing:
    distinct-full-identity-same-provider-id-version: reject-all
    duplicate-full-identity-same-source: reject-all
    exact-full-identity-different-source: source-precedence-with-complete-explanation
  candidate_order: [discovery-source-precedence, provider-id, provider-version, binary-digest, candidate-digest]
  higher_precedence_invalid: no-downgrade
  adjacent_provider_or_version: explicit-policy-only
  fallback_policy:
    representation: named-exact-tuples-not-boolean
    tuple: [priority, provider_id, provider_version, provider_binary_digest, provider_semantic_contract_digest, direction, require_certification, required_qualifications]
    qualification_authority: certified-qualifications-not-manifest-self-claims
    selection_order: [unique-policy-priority, discovery-source-precedence, canonical-identity]
    selection_binding: policy-semantic-digest
  explanation:
    all_candidates: required
    fields: [source, provider-id, provider-version, binary-digest, candidate-digest, selected, reason, fallback-used]
  effective_sandbox:
    policy_digest: exact-selection-authority-request
    minimum: max-selection-request-process-request-manifest
    applied_to: [process-invocation, returned-sandbox-report]
protocol_session:
  negotiated_header:
    protocol_major: exact
    protocol_minor: highest-compatible-then-exact-per-frame
    flags: retained-and-validated
    semantic_transcript_projection: [protocol-major, protocol-minor, flags, message-type, stream-id, sequence, control-digest, payload-digest]
  host_input_profiles:
    '1.0':
      protocol_minor: 0
      required_features: []
      exact_frames: [hello_ack, schema_negotiate, open_task, credit, close]
      exact_sequences: [0, 1, 2, 3, 4]
      payload_policy: open-task-only
      compatibility: existing-public-five-frame-vector-api-unchanged-wrapper
    '1.1':
      protocol_minor: 1
      required_features: [task-input-chunks-v1]
      exact_frame_pattern: [hello_ack, schema_negotiate, open_task, input_descriptor, input_chunk-zero-or-more, credit, close]
      fixed_prefix_sequences: [0, 1, 2, 3]
      chunk_sequence: four-plus-chunk-index
      credit_sequence: four-plus-chunk-count
      close_sequence: five-plus-chunk-count
      payload_policy: input-chunk-only
      open_task_payload: empty
  host_input_transfer:
    activation: {protocol_minor: 1, required_features: [task-input-chunks-v1]}
    limits: {chunk_payload_bytes: 1048576, logical_input_bytes: 67108864, chunks: 64}
    descriptor_control: cxxlens.provider-control.input-descriptor.v1-exact-five-fields
    chunk_control: cxxlens.provider-control.input-chunk.v1-exact-five-fields
    sequence_and_shape: contiguous-index-offset-length-nonfinal-size-and-final-remainder
    zero_input: {total_bytes: 0, chunk_count: 0, input_chunks: 0, input_digest: 'sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855'}
    final_seal: exact-total-length-and-streaming-sha256-equal-open-task-input-digest
    task_accepted: only-after-shared-seal-task-decode-and-bottom-up-binding
    output_credit: separate-provider-output-only
    execution_transport_bytes: separate-stdout-stderr-accounting-only
    ambient_input_side_channel: forbidden
    raw_frames_and_spool: diagnostic-transport-occurrences-only
    semantic_authority: detached-decoded-task-and-existing-output-seal-only
    shared_incremental_core: host-encoder-worker-decoder-process-runtime-conformance-validator
    production_full_input_vector_adapter: forbidden
    existing_public_signatures: unchanged
    minor_0_public_vector_api: bounded-wrapper-over-shared-incremental-core
  runtime_private_receipt:
    visibility: runtime-private
    exact_fields: [raw_stdout_byte_count, raw_stdout_sha256, decoded_frame_count, frame_transcript_digest, sealed_transcript_digest]
    additional_fields: reject
    construction: same-shared-validation-pass-that-constructs-immutable-seal
    verification_source: runtime-observed-raw-bytes-decoded-frame-values-and-immutable-seal-only
    report-supplied-digest-or-self-consistency: forbidden
    expected_provider_identity:
      exact_fields: [provider_id, provider_version, provider_binary_digest, provider_semantic_contract_digest, protocol_major, protocol_minor, required_features, sandbox_policy_digest, offered_relations]
      source: independently-validated-selected-manifest-session-and-launcher-authority-never-provider-stdout
      hello: exact-closed-projection-before-task-acceptance
      task_accepted: exact-provider-id-version-cross-binding
    raw_stdout:
      observation_order: before-frame-decode-or-move
      byte_count: exact-uint64
      digest: sha256-of-exact-observed-bytes
    frame_transcript:
      domain: cxxlens.provider-frame-transcript.v2
      digest: cxxlens-semantic-digest-v2
      encoding: cxxlens-canonical-tuple-v1
      exact_frame_fields: [protocol_major, protocol_minor, flags, message_type, stream_id, sequence, control_digest, payload_digest]
      order: decoded-wire-order-with-explicit-count
      source: same-decoded-frame-values-consumed-by-shared-validator
    sealed_transcript:
      domain: cxxlens.provider-sealed-transcript.v1
      digest: cxxlens-semantic-digest-v2
      encoding: cxxlens-canonical-tuple-v1
      exact_fields: [task_id, terminal, batches, coverage_records, unresolved_records, evidence_records]
      exact_batch_fields: [task_id, descriptor_id, descriptor_digest, dependency_group_id, atomic_output_group_id, batch_id, batch_digest, ordered_chunk_digests, row_canonical_forms]
      exact_coverage_fields: [kind, id, state, reason]
      exact_unresolved_fields: [code, subject, detail]
      exact_evidence_fields: [kind, subject, producer, summary]
      ordering: [batch-seal-order, row-order, retained-coverage-wire-order, retained-unresolved-wire-order, retained-evidence-wire-order]
      source: immutable-value-owned-seal-from-same-shared-validation-pass
    public_process_execution_report_semantic_digest:
      role: diagnostic-public-report-identity-only
      alias_for_any_receipt_field: false
      raw-frame-frame-transcript-sealed-transcript-or-adoption-authority: false
  provider_output:
    - hello
    - schema_negotiate
    - task_accepted
    - batch_begin
    - column_chunk
    - batch_end
    - coverage_chunk
    - unresolved_chunk
    - progress
    - task_complete
    - task_failed
  typed_validation:
    implementation: single-shared-provider-transcript-validator
    consumers: [process-runtime, provider-harness, logical-reference, process-reference]
    mode_difference: handshake-prefix-only
    same-transcript_reason: exact
    terminal_result: typed-complete-or-failed-kind-plus-registered-reason
    task_failed_allowlist: stable-non-success-provider-terminals-only
    task_failed_success_or_unknown: provider.schema-invalid
    handshake: exact-identity-schema-feature-order
    task_acceptance: canonical-task-and-exact-provider-session-validation-before-acceptance
    project_catalog: shared-bottom-up-validator-before-task-accepted
    direction: reject-host-only-provider-output
    credit: account-encoded-byte-and-frame-before-adoption
    output_schema: request-exact-output-descriptor-id-and-digest
    batch: exact-task-dependency-atomic-descriptor-batch-column-offset-count-index-encoding-length-order-chunk-and-batch-digest
    column_chunk_decoder: shared-host-and-logical-native-independent-value-decoder
    column_chunk_order: bounded-row-window-then-descriptor-column
    column_chunk_rejection: malformed-validity-offset-dictionary-index-or-digest-is-provider.batch-invalid
    batch_end: exact-every-column-length-count-order-and-ordered-chunk-digest-recomputation
    side_channels: coverage-unresolved-progress-complete
    closure: empty-or-independently-validated
    terminal: task-complete-and-task-failed-exact-task-id-bound-and-all-groups-sealed
    unknown_optional_extension: checksum-length-and-credit-accounted-then-state-skipped
    unknown_required_extension: reject
    compressed_payload_without_negotiated_codec: reject
    end_of_stream: final-terminal-frame-only
    structured_control: exact-schema-deterministic-cbor-map-shared-encoder-decoder
    structured_record_sets: explicit-count-indexed-exact-fields
    delimiter_parsing: forbidden
    control_text: strict-utf8-scalar-byte-preserving
    typed_control_text: schema-allowed-pipe-lf-cr-nul-and-multibyte-preserved
    evidence_summary: required-wire-field-bound-by-transcript-control-digest
    host_transcript_encoder: shared-public-profiled-incremental-core
    host_transcript_validator: exact-negotiated-profile-direction-type-order-stream-sequence-flags-control-payload-length-digest-and-binding
    host_transcript_authority: launcher-manifest-task-digests-and-negotiated-version
    host_input_incremental_core: same-transition-digest-length-and-budget-state-for-host-worker-runtime-and-conformance
    host_input_seal: required-before-task-accepted-and-semantic-task-use
    host_input_side_channel: ambient-path-fd-environment-shared-memory-forbidden
    host_input_credit: provider-output-only-never-input-accounting
    host_input_raw_occurrence: diagnostic-only-never-task-or-adoption-authority
    host_transcript_invalid: fail-before-task-acceptance-and-semantic-payload-use-without-output
    validator_bypass: forbidden
    adoption_projection:
      validated_frames: diagnostic-only-non-authoritative
      sealed_value: tool-private-immutable-complete-task-result
      reconstruction_from_public_frames: forbidden
      specialization_reference_kind: reverse-specialization-index
      specialization_dependency: false
      publication: installed-materializer-contract-only
    harness_acceptance: complete-success-terminal-only
    callback_failure_cleanup: task-failed-terminal-for-provider-and-side-channel-finalization-errors
  sequence: contiguous-from-zero
  terminal_last: required
  output_after_terminal: reject
  malformed_or_truncated: reject
terminal:
  success_derivation: validated-complete-kind-and-provider.success-and-final-task-complete-frame
  raw_terminal_text_is_not_authority: true
  report_schema_membership: exact-stable-enum
  stable:
    - provider.success
    - provider.timeout
    - provider.cancelled
    - provider.output-limit
    - provider.crash
    - provider.malformed-frame
    - provider.checksum-mismatch
    - provider.truncated-stream
    - provider.schema-invalid
    - provider.coverage-incomplete
    - provider.runtime-unavailable
    - provider.binary-identity-mismatch
    - provider.protocol-state-invalid
    - provider.credit-exceeded
    - provider.backpressure
    - provider.task-binding-mismatch
    - provider.batch-invalid
    - provider.batch-state-invalid
    - provider.relation-incompatible
    - provider.required-feature-missing
    - provider.protocol-minor-mismatch
    - provider.unknown-required-extension
    - provider.invalid-frame-flags
    - provider.unsupported-compression
    - provider.frontend-request-invalid
    - security.sandbox-insufficient
    - security.sandbox-policy-mismatch
  prior_published_snapshot: immutable
  unsealed_output: discarded
  public_frames:
    purpose: diagnostics-and-transcript-evidence-only
    claim_or_partition_adoption: forbidden
clang22:
  executable: cxxlens-clang-worker-22
  package: cxxlensClang22ProviderSDK
  provider_id: cxxlens.clang22.reference
  provider_version: 1.0.0
  exact_major: 22
  adjacent_major_fallback: forbidden
  job_local_native_objects:
    - VFS
    - CompilerInvocation
    - CompilerInstance
    - DiagnosticsEngine
    - FileManager
    - SourceManager
    - Preprocessor
    - ASTContext
    - FrontendAction
  native_escape:
    callback: forbidden
    thread: forbidden
    process: forbidden
    serialized_pointer_or_address: forbidden
  observations:
    - frontend.clang22.call_observation.v2
    - frontend.clang22.entity_observation.v2
    - frontend.clang22.type_observation.v2
  legacy_observations_v1: private-transport-only-non-adoptable
  canonical_outputs:
    - cc.call_direct_target.v1
    - cc.call_site.v1
    - cc.entity.v1
  installed_materialization:
    tool: cxxlens-clang22-materialize
    reference_kind: reverse-specialization-index
    dependency: false
    authority: schemas/cxxlens_ng_clang22_materialization_contract.yaml
    public_cpp_bridge: forbidden
    exact_outputs:
      - cc.call_direct_target.v1
      - cc.call_site.v1
      - cc.entity.v1
      - frontend.clang22.call_observation.v2
      - frontend.clang22.entity_observation.v2
      - frontend.clang22.type_observation.v2
    dependency_groups: [canonical, observation]
    partial_adoption: forbidden
    source_less_observation: retain-with-typed-unresolved-and-non-exact-guarantee
    canonical_call_site_without_complete_primary_span: reject-transaction
  semantic_loss:
    fatal_or_error: non-exact
    ignored_semantic_option: non-exact
    gcc_specific_option: non-exact
    missing_source_normalization: unresolved-no-fabrication
  normalizer:
    identity_inputs:
      - structural_observation
      - normalized_source
      - compile_unit
      - variant
      - toolchain
    forbidden_identity_inputs:
      - pretty_name_only
      - native_pointer
      - host_absolute_path
      - observation_arrival_order
report:
  schema: schemas/cxxlens_ng_provider_execution_report.schema.yaml
  measured_executable_digest: exact-sealed-image-digest-or-null-before-measurement
  frames_authority: diagnostic-only
  adoption_authority: none
  public_semantic_digest_role: diagnostic-report-identity-only-never-runtime-private-receipt-or-adoption-authority
acceptance:
  - kernel-query-store-link-closure-is-llvm-free
  - native-object-never-crosses-callback-thread-process
  - crash-timeout-cancel-malformed-are-distinct
  - failed-worker-preserves-prior-snapshot
  - semantic-loss-never-claims-exact-equivalence
  - adjacent-provider-never-silent-fallback
  - insufficient-enforced-sandbox-is-unavailable
  - worker-native-sdk-provider-package-install-conformance
  - process-transcript-typed-state-machine-and-logical-wire-parity
  - protocol-version-flags-and-extension-semantics-fail-closed
  - control-text-strict-utf8-and-typed-nul-policy
  - structured-control-metadata-lossless-and-delimiter-independent
  - host-to-provider-shared-state-validator-and-runtime-worker-fixture-parity
  - provider-protocol-minor-zero-exact-five-frame-compatibility
  - provider-protocol-minor-one-authenticated-bounded-task-input-chunks
  - provider-task-accepted-only-after-shared-input-seal
  - shared-validator-requires-one-task-transport-record-and-losslessly-retains-unknown-semantic-coverage
  - runtime-private-receipt-is-derived-in-the-same-shared-validation-pass
  - public-process-semantic-digest-never-aliases-runtime-private-receipt-authority
  - immutable-selection-token-revalidated-before-process-effect
  - public-raw-frames-never-authorize-claim-or-snapshot-adoption
  - clang22-installed-materializer-owns-exact-task-and-sealed-adoption
  - clang22-observation-v2-span-bundle-is-all-or-none-when-present
