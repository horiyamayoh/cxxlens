schema: cxxlens.provider-protocol.v1
document_version: 1.11.0
maturity: accepted
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md#18-provider-protocol
  index: docs/design/catalogs/README.md
  decision_adr: docs/design/adr/0080-provider-columnar-typed-digests.md
  owner_issue: '#149'
  owner: steward.ng-provider-protocol
compatibility:
  version_axis: provider-protocol
  current: 1.0.0
  major_mismatch: reject
  same_major_minor: feature-negotiation
  relation_schema_axis: independent
  adjacent_provider_fallback: explicit-only
profiles:
  NG0:
    required:
      - framed-wire
      - deterministic-cbor-control
      - streamed-column-chunks
      - credit-backpressure
      - ack-and-connection-resume
      - atomic-dependency-groups
      - bounded-budget
      - structured-failure
    fixed_point: reject
    process_restart_resume: restart-atomic-output-group
  NG1:
    includes: NG0
    required:
      - durable-resume-token
      - heartbeat
      - progress-rate-enforcement
      - spill-staging
      - long-run-fault-qualification
    fixed_point: explicit-monotone-contract-only
wire:
  magic_ascii: CXXP
  fixed_header_bytes: 104
  byte_order: big-endian
  fixed_header_fields:
    - {name: magic, type: bytes, bytes: 4}
    - {name: protocol_major, type: uint16, bytes: 2}
    - {name: protocol_minor, type: uint16, bytes: 2}
    - {name: message_type, type: uint16, bytes: 2}
    - {name: flags, type: uint16, bytes: 2}
    - {name: stream_id, type: uint64, bytes: 8}
    - {name: sequence, type: uint64, bytes: 8}
    - {name: control_length, type: uint32, bytes: 4}
    - {name: payload_length, type: uint64, bytes: 8}
    - {name: control_sha256, type: bytes, bytes: 32}
    - {name: payload_sha256, type: bytes, bytes: 32}
  allocation_rule: validate-fixed-header-and-negotiated-limits-before-allocation
  checksums: independent-full-sha256
  limits:
    control_bytes: 65536
    payload_bytes: 16777216
    frame_bytes: 16842856
  control_encoding:
    standard: RFC-8949
    mode: deterministic-closed-subset
    map_key_order: encoded-length-then-lexicographic
    shortest_integer_and_length: required
    duplicate_map_key: reject
    indefinite_length: reject
    floats: reject
    tags: reject
    invalid_utf8: reject
    text_representation: validated-unicode-scalar-strict-utf8-bytes
    encoder_validation: same-strict-utf8-validator-before-cbor
    normalization: forbidden-byte-preserving
    nul: valid-code-point-typed-schema-decides
    differential_corpus: schemas/cxxlens_ng_provider_fuzz_corpus.yaml
  flags:
    required_extension: 1
    optional_extension: 2
    compressed_payload: 4
    end_of_stream: 8
  header_validation:
    protocol_major: exact-session-major
    protocol_minor: exact-negotiated-session-minor
    reserved_flag_bits: reject
    unknown_required_extension: reject
    unknown_optional_extension: checksum-length-credit-account-then-skip
    compressed_payload_without_negotiated_codec: reject
    end_of_stream: final-task-complete-or-task-failed-only
    transcript_identity: [protocol_major, protocol_minor, flags, message_type, stream_id, sequence, control_digest, payload_digest]
message_types:
  registry:
    - {id: 1, name: hello, direction: provider-to-host, profile: NG0}
    - {id: 2, name: hello_ack, direction: host-to-provider, profile: NG0}
    - {id: 3, name: schema_negotiate, direction: bidirectional, profile: NG0}
    - {id: 4, name: open_task, direction: host-to-provider, profile: NG0}
    - {id: 5, name: task_accepted, direction: provider-to-host, profile: NG0}
    - {id: 6, name: input_descriptor, direction: host-to-provider, profile: NG0}
    - {id: 7, name: input_chunk, direction: host-to-provider, profile: NG0}
    - {id: 8, name: credit, direction: host-to-provider, profile: NG0}
    - {id: 9, name: batch_begin, direction: provider-to-host, profile: NG0}
    - {id: 10, name: column_chunk, direction: provider-to-host, profile: NG0}
    - {id: 11, name: batch_end, direction: provider-to-host, profile: NG0}
    - {id: 12, name: batch_ack, direction: host-to-provider, profile: NG0}
    - {id: 13, name: batch_reject, direction: host-to-provider, profile: NG0}
    - {id: 14, name: coverage_chunk, direction: provider-to-host, profile: NG0}
    - {id: 15, name: unresolved_chunk, direction: provider-to-host, profile: NG0}
    - {id: 16, name: closure_candidate, direction: provider-to-host, profile: NG0}
    - {id: 17, name: progress, direction: provider-to-host, profile: NG0}
    - {id: 18, name: cancel, direction: host-to-provider, profile: NG0}
    - {id: 19, name: resume, direction: bidirectional, profile: NG0}
    - {id: 20, name: task_complete, direction: provider-to-host, profile: NG0}
    - {id: 21, name: task_failed, direction: provider-to-host, profile: NG0}
    - {id: 22, name: close, direction: bidirectional, profile: NG0}
    - {id: 23, name: heartbeat, direction: bidirectional, profile: NG1}
  unknown_required: reject
  unknown_optional: skip-and-account
state_machine_validation:
  validator_bypass: forbidden
  implementation: single-shared-typed-validator
  consumers: [process-runtime, provider-harness, public-logical-reference, public-process-reference]
  modes:
    process: full-hello-schema-task-handshake
    logical: task-accepted-onward-same-state-machine
  logical_author_state: [context-shared-sink-registry, move-stable-open-batch, unique-task-batch-id, single-active-batch, abandon-is-failure]
  fault_injection: mutate-encoded-frame-or-credit-then-shared-decode-and-validate
  reason_parity: same-transcript-same-stable-reason
  terminal_verdict:
    success_source: validated-task-complete-only
    task_failed_reason: registered-non-success-provider-terminal-only
    provider_success_in_task_failed: reject-as-provider.schema-invalid
    unknown_reason: reject-as-provider.schema-invalid
  initial_order: [hello, schema_negotiate, task_accepted]
  exact_bindings:
    hello: [canonical-provider-manifest-v1]
    task_accepted: [provider-id, provider-version, task-id]
    batch_begin: [task-id, relation-descriptor-id, relation-descriptor-digest, dependency-group-id, atomic-output-group-id, batch-id]
    column_chunk: [task-id, dependency-group-id, atomic-output-group-id, batch-id, relation-descriptor-id, relation-descriptor-digest, column-id, row-offset, row-count, chunk-index, encoding, payload-digest, chunk-digest]
    batch_end: [task-id, dependency-group-id, atomic-output-group-id, batch-id, relation-descriptor-id, relation-descriptor-digest, declared-row-count, every-column-length, canonical-column-order, ordered-chunk-digests, batch-digest]
    task_complete: [task-id, complete]
    task_failed: [error-code, task-id, error-field]
  success_preconditions:
    - all-output-within-host-credit
    - all-message-directions-valid
    - every-batch-schema-valid-and-sealed
    - every-batch-count-and-digest-valid
    - coverage-unresolved-progress-complete
    - closure-empty-or-independently-validated
    - no-output-after-terminal
  deterministic_rejections:
    - provider.protocol-minor-mismatch
    - provider.unknown-required-extension
    - provider.invalid-frame-flags
    - provider.unsupported-compression
    - provider.protocol-state-invalid
    - provider.credit-exceeded
    - provider.backpressure
    - provider.task-binding-mismatch
    - provider.batch-invalid
    - provider.batch-state-invalid
    - provider.relation-incompatible
    - provider.coverage-incomplete
host_to_provider_state_machine:
  implementation: shared-public-encoder-and-validator
  consumers: [process-runtime, clang22-worker, process-fixture, testing-reference]
  exact_frames: [hello_ack, schema_negotiate, open_task, credit, close]
  stream_id: 1
  sequence: [0, 1, 2, 3, 4]
  flags: zero
  payload_policy: open-task-only
  control_policy: typed-canonical-cbor-nonempty
  exact_authority: [canonical-manifest, protocol-major-minor, task-id, task-input-digest, normalized-invocation-digest, toolchain-digest, environment-digest, payload-content-digest, close-task-id]
  credit: [cbor-uint64, bytes-nonzero, frames-nonzero, overflow-reject]
  invalid_action: fail-before-payload-decode-without-output
structured_control_metadata:
  encoding: deterministic-typed-cbor-map
  delimiter_parsing: forbidden
  common: [schema-discriminator, exact-field-set, text-type-and-byte-length, canonical-key-order, canonical-record-order, shortest-length, duplicate-key-reject, duplicate-record-reject, trailing-byte-reject]
  single_records:
    schema_negotiate: [protocol_schema, protocol_minor]
    open_task: [task_id, task_input_digest, normalized_invocation_digest, toolchain_digest, environment_digest]
    credit: [bytes, frames]
    close: [task_id]
    task_accepted: [provider_id, provider_version, task_id]
    batch_begin: [task_id, descriptor_id, descriptor_digest, dependency_group_id, atomic_output_group_id, batch_id]
    task_complete: [task_id, status]
    task_failed: [error_code, task_id, error_field]
  unsigned_fields: [schema_negotiate.protocol_minor, credit.bytes, credit.frames]
  record_sets:
    common: [schema, record_count, indexed-exact-fields]
    coverage: [kind, id, state, reason]
    unresolved: [code, subject, detail]
    evidence: [kind, subject, producer, summary]
  text_policy:
    codec: strict-utf8-byte-preserving
    schema-allowed: [pipe, lf, cr, nul, multi-byte-utf8]
    semantic-identifiers: validate-after-decode
  evidence_identity: summary-is-required-and-bound-by-control-digest
handshake:
  hello_required:
    - provider_id
    - provider_version
    - provider_binary_digest
    - provider_semantic_contract_digest
    - protocol_range
    - required_features
    - optional_features
    - relation_offers
    - platform_tuple
  accept_requires:
    - exact-protocol-major
    - all-required-features
    - compatible-relation-descriptors
    - exact-requested-provider-identity
  failure_reason_codes:
    - provider.protocol-major-mismatch
    - provider.required-feature-missing
    - provider.relation-incompatible
    - provider.binary-identity-mismatch
columnar_chunks:
  batch_scope: exact-relation-descriptor-partition-and-atomic-output-group
  digest_projection:
    encoding: cxxlens-canonical-tuple-v1
    digest: cxxlens-semantic-digest-v2
    chunk_domain: cxxlens.provider-column-chunk.v2
    batch_domain: cxxlens.provider-columnar-batch.v2
    fields: named-and-typed
    unsigned_integers: fixed-width-u64-big-endian-bytes
    repeated_collections: ordered-tuple-with-count-element-length-and-type-tag
    column_order: descriptor-order
    chunk_digest_order: wire-order
    delimiter_concatenation: forbidden
    control_and_digest_encoder: shared-semantic-field-projection
  sdk_row_accumulation:
    maximum_rows_per_chunk: 256
    transpose: row-author-api-to-descriptor-order-columns
    emission_order: row-window-then-descriptor-column
  chunk_key:
    - task_id
    - dependency_group_id
    - atomic_output_group_id
    - batch_id
    - column_id
    - row_offset
    - row_count
    - chunk_index
  control:
    encoding: deterministic-typed-cbor-map
    exact_keys: [task_id, dependency_group_id, atomic_output_group_id, batch_id, descriptor_id, descriptor_digest, column_id, row_offset, row_count, chunk_index, encoding, payload_digest, chunk_digest]
  payload:
    magic: CXCC
    version: 1
    header_byte_order: little-endian
    header: [magic-4, version-u8, scalar-kind-u8, reserved-zero-2, validity-bytes-u32, unknown-bytes-u32, value-auxiliary-bytes-u32, value-bytes-u32, unknown-reason-offset-bytes-u32, unknown-reason-bytes-u32]
    section_order: [validity-lsb0, unknown-lsb0, value-auxiliary, values, unknown-reason-offsets-u32-le, unknown-reasons-utf8]
    state_rules:
      present: validity-one-unknown-zero
      absent: validity-zero-unknown-zero-optional-only
      unknown: validity-zero-unknown-one-nonempty-strict-utf8-reason
      unused_bitmap_bits: zero
      null_storage: canonical-zero-or-zero-width
  encodings:
    - validity-bitset-lsb0
    - fixed-width-little-endian
    - utf8-offsets-u32-little-endian
    - bytes-offsets-u32-little-endian
    - dictionary-index-u32-little-endian
    - content-addressed-blob
  sdk_canonical_encoding:
    boolean: fixed-width-bool-u8
    signed_integer: fixed-width-i64-le
    unsigned_integer: fixed-width-u64-le
    open_or_closed_symbol: dictionary-index-u32-le
    bytes_or_set: bytes-offsets-u32-le
    other_detached_string: utf8-offsets-u32-le
  dictionary:
    auxiliary: [entry-count-u32-le, offsets-count-plus-one-u32-le, strict-utf8-entry-bytes]
    ordering: byte-lexicographic-unique
    values: row-aligned-u32-le-index
    malformed_or_out_of_range_index: reject
  native_layout_payload: forbidden
  batch_end_binds:
    - declared-row-count
    - every-column-length
    - canonical-column-order
    - chunk-digests
    - batch-digest
  batch_end:
    control_encoding: deterministic-typed-cbor-map
    exact_control_keys: [task_id, dependency_group_id, atomic_output_group_id, batch_id, descriptor_id, descriptor_digest, row_count, column_count, chunk_count, batch_digest]
    payload_magic: CXBE
    payload_version: 1
    payload_order: [descriptor-order-column-id-payload-bytes-chunk-count, ordered-chunk-digests]
    empty_batch: [zero-row-count, zero-payload-bytes-per-column, zero-chunks-per-column, empty-ordered-chunk-digests]
    host_validation: exact-length-order-offset-index-digest-recomputation-before-seal
flow_control:
  model: host-granted-byte-and-frame-credit
  send_precondition: both-credit-dimensions-available
  sequence: contiguous-per-stream-from-zero
  ack:
    binds: [stream_id, highest_contiguous_sequence, staged_digest]
    credit_return: explicit
  resume_token:
    binds:
      - task_id
      - stream_id
      - highest_contiguous_acked_sequence
      - staged_digest
      - protocol_session_id
    stale_or_foreign: reject
  cancellation:
    states: [requested, acknowledged, grace_expired, killed, terminal]
    output_after_ack: reject
atomicity:
  units:
    batch: schema-and-shape-validation
    atomic_output_group: indivisible-stream-output
    dependency_group: indivisible-adoption-and-rollback
    snapshot_draft: unpublished-task-result
  dependency_group_contains: one-or-more-atomic-output-groups
  hard_reference_rule: staged-cross-group-targets-require-same-dependency-group
  group_states: [created, streaming, sealed, validating, adopted, rejected, rolled_back]
  adoption_preconditions:
    - all-batches-sealed
    - batch-digests-valid
    - hard-references-resolved-in-base-or-group
    - coverage-balanced
    - unresolved-accounted
    - closure-candidates-independently-validated
  partial_adoption:
    declaration_time: open-task
    boundary: dependency-group-only
    implicit: forbidden
  publication: issue-63-snapshot-transaction-only
adoption_boundary:
  transcript_validation: necessary-not-sufficient-for-adoption
  public_execution_report_frames: diagnostic-only
  adoption_input: immutable-sealed-decoded-groups-from-the-shared-validator
  group_inventory: exact-task-declared-and-complete
  base_hard_references: independently-validated-before-group-adoption
  partial_policy: explicit-at-task-authority-never-inferred
  clang22_installed_reference_kind: reverse-specialization-index
  clang22_installed_dependency: false
  clang22_installed_authority: schemas/cxxlens_ng_clang22_materialization_contract.yaml
  raw_frame_redecode_or_private_codec_duplication: forbidden
planning:
  inputs:
    - required-relations
    - provided-relations
    - explicit-task-dependencies
    - input-stage
    - output-stage
  stage_order: [observation, assertion, canonical_claim, derived_claim]
  canonical_ready_order:
    - output-stage
    - provider-id
    - provider-version
    - provider-binary-digest
    - task-id
  cycle: reject
  fixed_point:
    NG0: reject
    NG1_requires:
      - monotone-lattice-id
      - join-operator-id
      - convergence-predicate-id
      - max-iterations
      - execution-budget
failures:
  terminal_reasons:
    - provider.timeout
    - provider.cancelled
    - provider.output-limit
    - provider.crash
    - provider.malformed-frame
    - provider.checksum-mismatch
    - provider.truncated-stream
    - provider.protocol-minor-mismatch
    - provider.unknown-required-extension
    - provider.invalid-frame-flags
    - provider.unsupported-compression
    - provider.schema-invalid
    - provider.hard-reference-missing
    - provider.coverage-incomplete
    - provider.protocol-state-invalid
    - provider.credit-exceeded
    - provider.backpressure
    - provider.task-binding-mismatch
    - provider.batch-invalid
    - provider.batch-state-invalid
    - provider.relation-incompatible
  current_dependency_group: rollback
  unsealed_groups: rollback
  prior_adopted_groups: retain-only-if-predeclared-partial-policy
  prior_published_snapshot: immutable
  coverage_and_unresolved: required-for-non-success-terminal
reuse_and_invalidation:
  exact_key_fields:
    - provider-id
    - provider-version
    - provider-semantic-contract-digest
    - provider-binary-digest
    - protocol-major
    - relation-descriptor-digests
    - input-partition-digests
    - condition-universe
    - interpretation
    - model-assumption-pack
  semantic_contract_change: invalidate
  binary_digest_change: invalidate
  same_version_rebuild_equivalence: forbidden-without-issue-65-certification
execution_surfaces:
  in_process:
    trust: product-linked-only
    wire_bytes_required: false
    logical_stream_state_machine: required
  out_of_process:
    wire_bytes_required: true
    process-isolation: required
  semantic_contract: identical
  validator_bypass: forbidden
fuzzing:
  corpus: schemas/cxxlens_ng_provider_fuzz_corpus.yaml
  parser_outcomes: [accepted, stable-rejection]
  crash_hang_unbounded_allocation: forbidden
  license_review: docs/design/adr/0010-provider-wire-streaming-atomicity.md#license-review
backend_authority:
  implementation: tools/quality/check_ng_provider_protocol.py
  surfaces: [in_process, out_of_process]
  orders: [forward, reverse, seeded-shuffle]
  equality: semantic-task-result
  conformance_vectors: schemas/cxxlens_ng_provider_conformance_vectors.yaml
