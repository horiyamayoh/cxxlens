$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.search-options.v1.schema.yaml
title: cxxlens semantic search options v1
type: object
additionalProperties: false
required: [schema, scope, precision, variants, include_unresolved, strict_coverage, result_limit, execution]
properties:
  schema: {const: cxxlens.search-options.v1}
  scope: {$ref: cxxlens_analysis_scope.schema.yaml}
  precision:
    enum: [ast_structural, local_semantic, workspace_semantic, local_flow, interprocedural_summary, path_sensitive, dynamic_observation]
  variants: {enum: [any_variant, all_variants, report_per_variant, reject_disagreement]}
  include_unresolved: {type: boolean}
  strict_coverage: {type: boolean}
  result_limit:
    oneOf:
    - {type: integer, minimum: 1}
    - {type: 'null'}
  execution:
    type: object
    additionalProperties: false
    required: [candidate_budget, refinement_budget, result_budget, output_bytes]
    properties:
      candidate_budget: {type: integer, minimum: 1}
      refinement_budget: {type: integer, minimum: 0}
      result_budget: {type: integer, minimum: 1}
      output_bytes: {type: integer, minimum: 1}
