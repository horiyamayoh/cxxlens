$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.m0-acceptance-report.v1.json
title: cxxlens.m0-acceptance-report.v1
type: object
required: [schema, status, manifest, matrix_executions, vectors, artifact_digests]
additionalProperties: false
properties:
  schema: {const: cxxlens.m0-acceptance-report.v1}
  status: {enum: [passed, failed]}
  manifest: {const: cxxlens.m0-completion.v1}
  matrix_executions: {type: integer, minimum: 1}
  vectors:
    type: array
    items:
      type: object
      required: [id, status, fixture, reproduction_seed]
      additionalProperties: false
      properties:
        id: {type: string}
        status: {enum: [passed, failed]}
        fixture: {type: string}
        reproduction_seed: {type: integer, minimum: 0}
  artifact_digests:
    type: object
    additionalProperties: {type: string, pattern: '^[0-9a-f]{64}$'}
