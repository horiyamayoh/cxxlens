schema: cxxlens.portable-provider-task-contract.v1
document_version: 1.2.0
maturity: accepted
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md#174-provider-task
  decision_adr: docs/design/adr/0064-portable-provider-task-session-binding.md
  owner_issue: '#122'
  owner: steward.ng-provider-runtime
session:
  identity: [provider_id, provider_version, provider_semantic_contract_digest]
  relation_authority: [offered_outputs, required_relations]
  semantic_authority: [interpretation_domains, input_stage, output_stage]
  provider_callback_binding: exact-id-version-semantic-contract-before-task-accepted
task_projection:
  codec: cxxlens-canonical-tuple-v1
  domain: cxxlens.provider-task.v1
  fields: [contract_tag, provider_identity, project_catalog_id, project_catalog_digest, requested_outputs, condition, interpretation, offered_outputs, required_relations, interpretation_domains, input_stage, output_stage, dependency_groups]
  descriptor_identity: [descriptor_id, descriptor_digest]
  ordering: canonical-byte-order
  task_id: task-prefix-plus-semantic-digest-v2
execution_identity:
  task_id_scope: semantic-task-projection-not-execution-occurrence
  input_binding: open-task-task-input-digest
  provider_execution_id: exact-provider-binary-task-digest-input-digest
  task_id_reuse: allowed-only-for-identical-validated-task-projection
  result_correlation: exact-task-id-input-digest-provider-execution-id-tuple
  duplicate_tuple: reject
validation:
  timing: before-task-accepted
  requested_outputs: nonempty-valid-sorted-unique-exact-subset-of-offers
  condition: nonempty-control-free-strict-utf8
  interpretation: namespaced-and-exact-session-domain
  dependency_groups: nonempty-sorted-unique-control-free
  mutation: recompute-and-exact-compare
context:
  relation: exact-requested-descriptor-id-digest-and-shape-only
  dependency_group: exact-task-declared-only
  ignored-rejection: remembered-and-fails-task
protocol:
  batch_begin: [task_id, descriptor_id, descriptor_digest, dependency_group_id, atomic_output_group_id, batch_id]
  logical_process_validator: shared
installed_specializations:
  clang22_materialization:
    reference_kind: reverse-specialization-index
    dependency: false
    authority: schemas/cxxlens_ng_clang22_materialization_contract.yaml
    task_owner: installed-provider-owned-tool
    public_cpp_task_builder: forbidden
    requested_outputs: exact-contract-six
    dependency_groups: exact-canonical-and-observation-both-mandatory
    validated_result: tool-private-immutable-sealed-value
    public_process_frames: diagnostic-only
    partial_adoption: forbidden
    condition_binding: exact-materializer-derived-universe-and-condition-ref
acceptance:
  - unrequested-relation-rejected
  - descriptor-shape-mismatch-rejected
  - duplicate-conflicting-output-rejected
  - invalid-condition-interpretation-rejected
  - task-mutation-identity-mismatch
  - invalid-provider-identity-rejected-before-acceptance
  - exact-session-task-succeeds
  - logical-process-verdict-parity
  - installed-specialization-does-not-create-public-task-builder
  - installed-specialization-binds-exact-task-and-all-mandatory-groups
  - shared-task-id-executions-remain-input-and-execution-distinct
