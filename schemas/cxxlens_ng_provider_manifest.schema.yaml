$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.provider-manifest.v1
type: object
additionalProperties: false
required:
  - schema
  - provider_id
  - provider_version
  - provider_binary_digest
  - provider_semantic_contract_digest
  - publisher
  - license
  - protocol_range
  - platform_tuples
  - offered_relations
  - required_relations
  - interpretation_domains
  - invalidation_contract
  - determinism_contract
  - resource_class
  - sandbox_minimum
  - task_stage
properties:
  schema: {const: cxxlens.provider-manifest.v1}
  provider_id: {$ref: '#/$defs/id'}
  provider_version: {$ref: '#/$defs/version'}
  provider_binary_digest: {$ref: '#/$defs/digest'}
  provider_semantic_contract_digest: {$ref: '#/$defs/digest'}
  publisher: {$ref: '#/$defs/id'}
  license: {type: string, minLength: 1}
  signature: {oneOf: [{$ref: '#/$defs/id'}, {type: 'null'}]}
  protocol_range:
    type: object
    additionalProperties: false
    required: [major, minimum_minor, maximum_minor, required_features, optional_features]
    properties:
      major: {type: integer, minimum: 1}
      minimum_minor: {type: integer, minimum: 0}
      maximum_minor: {type: integer, minimum: 0}
      required_features: {type: array, uniqueItems: true, items: {$ref: '#/$defs/id'}}
      optional_features: {type: array, uniqueItems: true, items: {$ref: '#/$defs/id'}}
  platform_tuples: {type: array, minItems: 1, uniqueItems: true, items: {$ref: '#/$defs/id'}}
  offered_relations: {type: array, uniqueItems: true, items: {$ref: '#/$defs/id'}}
  required_relations: {type: array, uniqueItems: true, items: {$ref: '#/$defs/id'}}
  interpretation_domains: {type: array, minItems: 1, uniqueItems: true, items: {$ref: '#/$defs/id'}}
  invalidation_contract: {$ref: '#/$defs/digest'}
  determinism_contract: {$ref: '#/$defs/digest'}
  resource_class: {$ref: '#/$defs/id'}
  sandbox_minimum: {$ref: '#/$defs/id'}
  task_stage:
    type: object
    additionalProperties: false
    required: [input, output]
    properties:
      input: {enum: [observation, assertion, canonical_claim, derived_claim]}
      output: {enum: [observation, assertion, canonical_claim, derived_claim]}
$defs:
  id: {type: string, minLength: 1, maxLength: 512}
  digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
