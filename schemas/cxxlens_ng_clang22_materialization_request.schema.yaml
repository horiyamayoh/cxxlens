$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens_ng_clang22_materialization_request.schema.yaml
title: cxxlens installed Clang 22 materialization request
type: object
additionalProperties: false
required:
  - schema
  - request_version
  - materialization_request_id
  - request_digest
  - semantic_request_digest
  - tool
  - worker
  - project
  - registry
  - engine
  - interpretation_policy
  - trust_policy
  - group_topology
  - tasks
  - publication
properties:
  schema: {const: cxxlens.clang22-materialization-request.v2}
  request_version: {const: 2.1.0}
  materialization_request_id: {$ref: '#/$defs/strong_id'}
  request_digest: {$ref: '#/$defs/semantic_digest'}
  semantic_request_digest: {$ref: '#/$defs/semantic_digest'}
  tool:
    type: object
    additionalProperties: false
    required: [executable, interface_version, distribution_version, source_revision, source_tree, installed_executable_digest, package_configuration, occurrence_manifest_digest]
    properties:
      executable: {const: cxxlens-clang22-materialize}
      interface_version: {const: 2.1.0}
      distribution_version: {const: 1.0.0}
      source_revision: {$ref: '#/$defs/revision'}
      source_tree: {$ref: '#/$defs/revision'}
      installed_executable_digest: {$ref: '#/$defs/content_digest'}
      package_configuration: {enum: [static, shared]}
      occurrence_manifest_digest: {$ref: '#/$defs/content_digest'}
  worker:
    type: object
    additionalProperties: false
    required: [executable, provider_id, provider_version, installed_binary_digest, semantic_contract_digest, protocol_major, protocol_minor, required_features, sandbox_policy_digest]
    properties:
      executable: {const: cxxlens-clang-worker-22}
      provider_id: {const: cxxlens.clang22.reference}
      provider_version: {const: 1.0.0}
      installed_binary_digest: {$ref: '#/$defs/content_digest'}
      semantic_contract_digest: {$ref: '#/$defs/content_digest'}
      protocol_major: {const: 1}
      protocol_minor: {const: 1}
      required_features: {const: [task-input-chunks-v1]}
      sandbox_policy_digest: {$ref: '#/$defs/content_digest'}
  project:
    type: object
    additionalProperties: false
    required: [project_id, catalog_id, catalog_digest, logical_root, catalog_environment_digest, catalog_compile_unit_census_digest, catalog_compile_units]
    properties:
      project_id: {$ref: '#/$defs/strong_id'}
      catalog_id: {$ref: '#/$defs/strong_id'}
      catalog_digest: {$ref: '#/$defs/content_digest'}
      logical_root: {type: string, maxLength: 4096, x-cxxlens-max-utf8-bytes: 4096, pattern: '^project://[^\u0000-\u001f\u007f]+$'}
      catalog_environment_digest: {$ref: '#/$defs/content_digest'}
      catalog_compile_unit_census_digest: {$ref: '#/$defs/semantic_digest'}
      catalog_compile_units:
        type: array
        minItems: 1
        maxItems: 4096
        uniqueItems: true
        items: {$ref: '#/$defs/catalog_compile_unit'}
  registry:
    type: object
    additionalProperties: false
    required: [path, authority_registry_digest, base_descriptors, descriptors]
    properties:
      path: {const: schemas/cxxlens_ng_relation_registry.yaml}
      authority_registry_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      base_descriptors:
        type: array
        minItems: 6
        maxItems: 6
        uniqueItems: true
        items: {$ref: '#/$defs/base_descriptor_binding'}
      descriptors:
        type: array
        minItems: 6
        maxItems: 6
        uniqueItems: true
        items: {$ref: '#/$defs/descriptor_binding'}
  engine:
    type: object
    additionalProperties: false
    required: [generation_contract, admitted_descriptors, engine_registry_digest, engine_generation_id]
    properties:
      generation_contract: {const: cxxlens.clang22-materialization-engine.v2}
      admitted_descriptors:
        type: array
        minItems: 12
        maxItems: 12
        uniqueItems: true
        prefixItems:
          - {$ref: '#/$defs/admitted_build_compile_unit'}
          - {$ref: '#/$defs/admitted_build_project'}
          - {$ref: '#/$defs/admitted_build_toolchain_context'}
          - {$ref: '#/$defs/admitted_build_variant'}
          - {$ref: '#/$defs/admitted_cc_call_direct_target'}
          - {$ref: '#/$defs/admitted_cc_call_site'}
          - {$ref: '#/$defs/admitted_cc_entity'}
          - {$ref: '#/$defs/admitted_frontend_call'}
          - {$ref: '#/$defs/admitted_frontend_entity'}
          - {$ref: '#/$defs/admitted_frontend_type'}
          - {$ref: '#/$defs/admitted_source_file'}
          - {$ref: '#/$defs/admitted_source_span'}
        items: false
      engine_registry_digest: {$ref: '#/$defs/semantic_digest'}
      engine_generation_id: {type: string, pattern: '^engine-generation:sha256:[0-9a-f]{64}$'}
  interpretation_policy:
    type: object
    additionalProperties: false
    required: [policy_id, selected_domain, interpretation_policy_digest]
    properties:
      policy_id: {const: cxxlens.clang22-interpretation-policy.v1}
      selected_domain: {const: cc.clang22-canonical-1}
      interpretation_policy_digest: {$ref: '#/$defs/semantic_digest'}
  trust_policy:
    type: object
    additionalProperties: false
    required: [policy_id, execution_profile, provider_id, provider_version, semantic_contract_digest, protocol_major, protocol_minor, required_features, required_qualification, worker_sandbox_policy_digest, task_sandbox_requirements, trust_policy_digest]
    properties:
      policy_id: {const: cxxlens.clang22-installed-native-worker-trust.v1}
      execution_profile: {const: trust.native-worker}
      provider_id: {const: cxxlens.clang22.reference}
      provider_version: {const: 1.0.0}
      semantic_contract_digest: {$ref: '#/$defs/content_digest'}
      protocol_major: {const: 1}
      protocol_minor: {const: 1}
      required_features: {const: [task-input-chunks-v1]}
      required_qualification: {const: canonical-semantic-qualified}
      worker_sandbox_policy_digest: {$ref: '#/$defs/content_digest'}
      task_sandbox_requirements:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          type: object
          additionalProperties: false
          required: [minimum, policy_digest]
          properties:
            minimum: {enum: [enforced, certified]}
            policy_digest: {$ref: '#/$defs/content_digest'}
      trust_policy_digest: {$ref: '#/$defs/semantic_digest'}
  group_topology:
    type: object
    additionalProperties: false
    required: [dependency_groups, atomic_output_group, partial_policy]
    properties:
      dependency_groups: {const: [canonical, observation]}
      atomic_output_group: {const: clang22-atomic}
      partial_policy: {const: forbid}
  tasks:
    type: array
    minItems: 1
    maxItems: 4096
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required:
        - provider_task_id
        - provider_execution_id
        - task_input_digest
        - project_id
        - catalog_id
        - catalog_digest
        - selected_catalog_compile_unit_id
        - compile_unit_id
        - build_variant_id
        - toolchain_context_id
        - toolchain_digest
        - toolchain
        - variant
        - normalized_invocation_digest
        - environment_digest
        - language
        - working_directory
        - condition_universe_id
        - condition_id
        - interpretation_domain
        - source
        - effective_argv
        - requested_descriptor_ids
        - dependency_groups
        - budget
        - sandbox
      properties:
        provider_task_id: {type: string, pattern: '^task:semantic-v2:sha256:[0-9a-f]{64}$'}
        provider_execution_id: {$ref: '#/$defs/strong_id'}
        task_input_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        project_id: {$ref: '#/$defs/strong_id'}
        catalog_id: {$ref: '#/$defs/strong_id'}
        catalog_digest: {$ref: '#/$defs/content_digest'}
        selected_catalog_compile_unit_id: {$ref: '#/$defs/strong_id'}
        compile_unit_id: {$ref: '#/$defs/strong_id'}
        build_variant_id: {$ref: '#/$defs/strong_id'}
        toolchain_context_id: {$ref: '#/$defs/strong_id'}
        toolchain_digest: {$ref: '#/$defs/content_digest'}
        toolchain:
          type: object
          additionalProperties: false
          required: [family, exact_version, target_triple, builtin_headers_digest, sysroot, abi_digest, plugin_spec_digest]
          properties:
            family: {$ref: '#/$defs/strong_id'}
            exact_version: {$ref: '#/$defs/strong_id'}
            target_triple: {$ref: '#/$defs/strong_id'}
            builtin_headers_digest: {$ref: '#/$defs/content_digest'}
            sysroot: {$ref: '#/$defs/nullable_logical_path'}
            abi_digest: {$ref: '#/$defs/content_digest'}
            plugin_spec_digest: {$ref: '#/$defs/content_digest'}
        variant:
          type: object
          additionalProperties: false
          required: [language, language_standard, target_triple, predefined_macros_digest, include_search_digest, semantic_flags_digest]
          properties:
            language: {$ref: '#/$defs/strong_id'}
            language_standard: {$ref: '#/$defs/strong_id'}
            target_triple: {$ref: '#/$defs/strong_id'}
            predefined_macros_digest: {$ref: '#/$defs/content_digest'}
            include_search_digest: {$ref: '#/$defs/content_digest'}
            semantic_flags_digest: {$ref: '#/$defs/content_digest'}
        normalized_invocation_digest: {$ref: '#/$defs/content_digest'}
        environment_digest: {$ref: '#/$defs/content_digest'}
        language: {$ref: '#/$defs/strong_id'}
        working_directory: {$ref: '#/$defs/logical_path'}
        condition_universe_id: {$ref: '#/$defs/strong_id'}
        condition_id: {$ref: '#/$defs/strong_id'}
        interpretation_domain: {const: cc.clang22-canonical-1}
        source:
          type: object
          additionalProperties: false
          required: [source_snapshot_id, file_id, logical_path, content_digest, size_bytes, encoding, line_index_id, read_only, content_base64]
          properties:
            source_snapshot_id: {$ref: '#/$defs/strong_id'}
            file_id: {$ref: '#/$defs/file_id'}
            logical_path: {type: string, maxLength: 4096, x-cxxlens-max-utf8-bytes: 4096, pattern: '^project://[^\u0000-\u001f\u007f]+$'}
            content_digest: {$ref: '#/$defs/content_digest'}
            size_bytes: {type: integer, minimum: 0, maximum: 16777216}
            encoding: {enum: [utf8, utf16le, utf16be, locale_dependent, binary_or_unknown]}
            line_index_id: {$ref: '#/$defs/line_index_id'}
            read_only: {type: boolean}
            content_base64: {type: string, maxLength: 22369624, x-cxxlens-max-utf8-bytes: 22369624, pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'}
        effective_argv:
          type: array
          minItems: 1
          maxItems: 4096
          items: {$ref: '#/$defs/strong_id'}
        requested_descriptor_ids: {const: [cc.call_direct_target.v1, cc.call_site.v1, cc.entity.v1, frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]}
        dependency_groups: {const: [canonical, observation]}
        budget:
          type: object
          additionalProperties: false
          required: [output_bytes, rows, diagnostics, wall_ms, cpu_ms, address_space_bytes, transport_bytes, open_files, subprocesses]
          properties:
            output_bytes: {$ref: '#/$defs/positive_canonical_i64'}
            rows: {$ref: '#/$defs/positive_canonical_i64'}
            diagnostics: {$ref: '#/$defs/positive_canonical_i64'}
            wall_ms: {$ref: '#/$defs/positive_canonical_i64'}
            cpu_ms: {$ref: '#/$defs/positive_canonical_i64'}
            address_space_bytes: {$ref: '#/$defs/positive_canonical_i64'}
            transport_bytes: {$ref: '#/$defs/positive_canonical_i64'}
            open_files: {$ref: '#/$defs/positive_canonical_i64'}
            subprocesses: {$ref: '#/$defs/positive_canonical_i64'}
        sandbox:
          type: object
          additionalProperties: false
          required: [minimum, policy_digest]
          properties:
            minimum: {enum: [enforced, certified]}
            policy_digest: {$ref: '#/$defs/content_digest'}
  publication:
    type: object
    additionalProperties: false
    required: [backend, selector, series_id, genesis, expected_parent_publication, sqlite_path, partial_policy, transaction_count, reopen_before_success]
    properties:
      backend: {enum: [memory, sqlite]}
      selector: {$ref: '#/$defs/series_selector'}
      series_id: {type: string, pattern: '^snapshot-series:sha256:[0-9a-f]{64}$'}
      genesis: {type: boolean}
      expected_parent_publication:
        oneOf:
          - {$ref: '#/$defs/strong_id'}
          - {type: 'null'}
      sqlite_path:
        oneOf:
          - type: string
            minLength: 1
            maxLength: 4095
            x-cxxlens-max-utf8-bytes: 4095
            pattern: '^(?!/)(?![A-Za-z]:)(?!.*(?:^|/)\.{1,2}(?:/|$))(?!.*//)(?!.*\\)[^\u0000]+$'
          - {type: 'null'}
      partial_policy: {const: forbid}
      transaction_count: {const: 1}
      reopen_before_success: {const: true}
    allOf:
      - if:
          properties: {backend: {const: sqlite}}
          required: [backend]
        then:
          properties: {sqlite_path: {type: string}}
        else:
          properties:
            sqlite_path: {type: 'null'}
            genesis: {const: true}
            expected_parent_publication: {type: 'null'}
      - if:
          properties: {genesis: {const: true}}
          required: [genesis]
        then:
          properties: {expected_parent_publication: {type: 'null'}}
        else:
          properties: {expected_parent_publication: {$ref: '#/$defs/strong_id'}}
$defs:
  admitted_descriptor:
    type: object
    additionalProperties: false
    required: [descriptor_id, runtime_descriptor_digest]
    properties:
      descriptor_id: {$ref: '#/$defs/strong_id'}
      runtime_descriptor_digest: {$ref: '#/$defs/semantic_digest'}
  admitted_build_compile_unit: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: build.compile_unit.v1}}, required: [descriptor_id]}]}
  admitted_build_project: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: build.project.v1}}, required: [descriptor_id]}]}
  admitted_build_toolchain_context: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: build.toolchain_context.v1}}, required: [descriptor_id]}]}
  admitted_build_variant: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: build.variant.v1}}, required: [descriptor_id]}]}
  admitted_cc_call_direct_target: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: cc.call_direct_target.v1}}, required: [descriptor_id]}]}
  admitted_cc_call_site: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: cc.call_site.v1}}, required: [descriptor_id]}]}
  admitted_cc_entity: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: cc.entity.v1}}, required: [descriptor_id]}]}
  admitted_frontend_call: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: frontend.clang22.call_observation.v2}}, required: [descriptor_id]}]}
  admitted_frontend_entity: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: frontend.clang22.entity_observation.v2}}, required: [descriptor_id]}]}
  admitted_frontend_type: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: frontend.clang22.type_observation.v2}}, required: [descriptor_id]}]}
  admitted_source_file: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: source.file.v1}}, required: [descriptor_id]}]}
  admitted_source_span: {allOf: [{$ref: '#/$defs/admitted_descriptor'}, {properties: {descriptor_id: {const: source.span.v1}}, required: [descriptor_id]}]}
  series_selector:
    type: object
    additionalProperties: false
    required: [catalog_id, channel_id, engine_generation_id, condition_universe_id, relation_registry_digest, interpretation_policy_digest, trust_policy_digest]
    properties:
      catalog_id: {$ref: '#/$defs/strong_id'}
      channel_id: {$ref: '#/$defs/strong_id'}
      engine_generation_id: {type: string, pattern: '^engine-generation:sha256:[0-9a-f]{64}$'}
      condition_universe_id: {$ref: '#/$defs/strong_id'}
      relation_registry_digest: {$ref: '#/$defs/semantic_digest'}
      interpretation_policy_digest: {$ref: '#/$defs/semantic_digest'}
      trust_policy_digest: {$ref: '#/$defs/semantic_digest'}
  catalog_compile_unit:
    type: object
    additionalProperties: false
    required: [catalog_compile_unit_id, effective_invocation_digest, source_digest, environment_digest]
    properties:
      catalog_compile_unit_id: {$ref: '#/$defs/strong_id'}
      effective_invocation_digest: {$ref: '#/$defs/content_digest'}
      source_digest: {$ref: '#/$defs/content_digest'}
      environment_digest: {$ref: '#/$defs/content_digest'}
  strong_id:
    type: string
    minLength: 1
    maxLength: 512
    x-cxxlens-max-utf8-bytes: 2048
    pattern: '^[^\u0000-\u001f\u007f]+$'
  content_digest:
    type: string
    x-cxxlens-max-utf8-bytes: 83
    pattern: '^(?:sha256|semantic-v2:sha256):[0-9a-f]{64}$'
  semantic_digest:
    type: string
    x-cxxlens-max-utf8-bytes: 83
    pattern: '^semantic-v2:sha256:[0-9a-f]{64}$'
  file_id:
    type: string
    x-cxxlens-max-utf8-bytes: 76
    pattern: '^file:sha256:[0-9a-f]{64}$'
  line_index_id:
    type: string
    x-cxxlens-max-utf8-bytes: 82
    pattern: '^line-index:sha256:[0-9a-f]{64}$'
  revision:
    type: string
    pattern: '^[0-9a-f]{40}$'
  positive_canonical_i64:
    type: integer
    minimum: 1
    maximum: 9223372036854775807
  logical_path:
    type: string
    maxLength: 4096
    x-cxxlens-max-utf8-bytes: 4096
    pattern: '^(?:project|build|toolchain|sysroot|generated|provider|external)://[^\u0000-\u001f\u007f]+$'
  nullable_logical_path:
    oneOf:
      - {$ref: '#/$defs/logical_path'}
      - {type: 'null'}
  base_descriptor_binding:
    type: object
    additionalProperties: false
    required: [descriptor_id, descriptor_version, contract_digest, runtime_descriptor_digest, stage_order, output_stage, owner]
    properties:
      descriptor_id:
        enum: [build.project.v1, build.toolchain_context.v1, build.variant.v1, source.file.v1, build.compile_unit.v1, source.span.v1]
      descriptor_version: {const: 1.0.0}
      contract_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      runtime_descriptor_digest: {$ref: '#/$defs/semantic_digest'}
      stage_order: {type: integer, minimum: 0, maximum: 5}
      output_stage: {const: canonical_claim}
      owner: {const: installed-tool}
  descriptor_binding:
    type: object
    additionalProperties: false
    required: [descriptor_id, descriptor_version, contract_digest, runtime_descriptor_digest, dependency_group_id, atomic_output_group_id, batch_id, output_stage]
    properties:
      descriptor_id:
        enum: [cc.call_direct_target.v1, cc.call_site.v1, cc.entity.v1, frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
      descriptor_version: {enum: [1.0.0, 2.0.0]}
      contract_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      runtime_descriptor_digest: {$ref: '#/$defs/semantic_digest'}
      dependency_group_id: {enum: [canonical, observation]}
      atomic_output_group_id: {const: clang22-atomic}
      batch_id: {type: string, pattern: '^(?:cc\.(?:call_direct_target|call_site|entity)\.v1|frontend\.clang22\.(?:call|entity|type)_observation\.v2)-batch$'}
      output_stage: {enum: [assertion, canonical_claim]}
