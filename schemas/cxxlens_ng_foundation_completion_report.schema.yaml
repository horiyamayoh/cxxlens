$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-foundation-completion-report.v1
title: cxxlens next-generation foundation completion report
type: object
additionalProperties: false
required:
  - schema
  - result
  - manifest_digest
  - git
  - authority_digests
  - version_contracts
  - evidence_claims
  - ci
  - supply_chain
  - issue_states
  - asset_ledger
  - audits
  - reproduction
properties:
  schema: {const: cxxlens.ng-foundation-completion-report.v1}
  result: {const: passed}
  manifest_digest: {$ref: '#/$defs/digest'}
  git:
    type: object
    additionalProperties: false
    required: [revision, tree, branch, clean]
    properties:
      revision: {type: string, pattern: '^[0-9a-f]{40}$'}
      tree: {type: string, pattern: '^[0-9a-f]{40}$'}
      branch: {const: main}
      clean: {const: true}
  authority_digests:
    type: object
    minProperties: 20
    additionalProperties: {$ref: '#/$defs/digest'}
  version_contracts:
    type: object
    minProperties: 11
    additionalProperties: {type: string, minLength: 1}
  evidence_claims:
    type: object
    minProperties: 7
    additionalProperties:
      type: object
      additionalProperties: false
      required: [paths, digests]
      properties:
        paths:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, minLength: 1}
        digests:
          type: object
          minProperties: 1
          additionalProperties: {$ref: '#/$defs/digest'}
  ci:
    type: object
    additionalProperties: false
    required: [repository, run_url, jobs]
    properties:
      repository: {type: string, pattern: '^[^/]+/[^/]+$'}
      run_url: {type: string, minLength: 1}
      jobs:
        type: object
        minProperties: 3
        additionalProperties: {const: success}
  supply_chain:
    type: object
    additionalProperties: false
    required:
      - schema
      - lock_digest
      - requirements_digest
      - provenance_digests
      - actions
      - actions_digest
      - runners
      - tools
      - packages
      - python_distributions
    properties:
      schema: {const: cxxlens.ci-supply-chain-summary.v1}
      lock_digest: {$ref: '#/$defs/digest'}
      requirements_digest: {$ref: '#/$defs/digest'}
      provenance_digests:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/digest'}
      actions:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [workflow, name, revision]
          properties:
            workflow: {type: string, minLength: 1}
            name: {type: string, pattern: '^[^@]+/[^@]+$'}
            revision: {$ref: '#/$defs/git_object'}
      actions_digest: {$ref: '#/$defs/digest'}
      runners:
        type: array
        minItems: 1
        items:
          type: object
          required: [label, image_os, image_version, architecture, os_release_digest, kernel]
      tools:
        type: array
        minItems: 1
        items: {type: object, minProperties: 2}
      packages:
        type: array
        minItems: 1
        items:
          type: object
          required: [package, version, package_digest]
          properties:
            package_digest: {$ref: '#/$defs/digest'}
      python_distributions:
        type: array
        minItems: 1
        items:
          type: object
          required: [name, version, record_digest]
          properties:
            record_digest: {$ref: '#/$defs/digest'}
  issue_states:
    type: object
    additionalProperties: false
    required: [required_closed, gate_issue, tracking_issue]
    properties:
      required_closed:
        type: object
        minProperties: 16
        additionalProperties: {const: closed}
      gate_issue: {const: closed}
      tracking_issue: {const: closed}
  asset_ledger:
    type: object
    additionalProperties: false
    required: [digest, asset_count, classifications]
    properties:
      digest: {$ref: '#/$defs/digest'}
      asset_count: {type: integer, minimum: 1}
      classifications:
        type: object
        additionalProperties: false
        required: [active, archived, generated]
        properties:
          active: {type: integer, minimum: 1}
          archived: {type: integer, minimum: 0}
          generated: {const: 1}
  audits:
    type: object
    additionalProperties: false
    required:
      - legacy_assets
      - legacy_authority_references
      - legacy_code_paths
      - legacy_schemas
      - legacy_public_headers
      - legacy_ci_gates
      - migration_blockers
      - unowned_contracts
      - documentation_drift
    properties:
      legacy_assets: {$ref: '#/$defs/zero_audit'}
      legacy_authority_references: {$ref: '#/$defs/zero_audit'}
      legacy_code_paths: {$ref: '#/$defs/zero_audit'}
      legacy_schemas: {$ref: '#/$defs/zero_audit'}
      legacy_public_headers: {$ref: '#/$defs/zero_audit'}
      legacy_ci_gates: {$ref: '#/$defs/zero_audit'}
      migration_blockers: {$ref: '#/$defs/zero_audit'}
      unowned_contracts: {$ref: '#/$defs/zero_audit'}
      documentation_drift: {$ref: '#/$defs/zero_audit'}
  reproduction:
    type: object
    additionalProperties: false
    required: [distribution, kernel_semantics, relation_registry_digest, generated_at]
    properties:
      distribution: {const: ng-foundation}
      kernel_semantics: {const: 1.0.0}
      relation_registry_digest: {$ref: '#/$defs/digest'}
      generated_at: {type: string, format: date-time}
$defs:
  digest:
    type: string
    pattern: '^sha256:[0-9a-f]{64}$'
  git_object:
    type: string
    pattern: '^[0-9a-f]{40}$'
  zero_audit:
    type: object
    additionalProperties: false
    required: [checker, revision, tree, targets, target_digest, count, finding_ids]
    properties:
      checker: {type: string, pattern: '^foundation-audit\.[a-z0-9.-]+/v[0-9]+$'}
      revision: {$ref: '#/$defs/git_object'}
      tree: {$ref: '#/$defs/git_object'}
      targets:
        type: array
        minItems: 1
        uniqueItems: true
        items: {type: string, minLength: 1}
      target_digest: {$ref: '#/$defs/digest'}
      count: {const: 0}
      finding_ids: {type: array, maxItems: 0}
