$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.semantic-conformance-vectors.v1
type: object
additionalProperties: false
required: [schema, document_version, authority, contract, vectors]
properties:
  schema: {const: cxxlens.semantic-conformance-vectors.v1}
  document_version: {type: string}
  authority: {type: object, required: [owner_issue, decision_adr]}
  contract: {const: schemas/cxxlens_ng_semantic_guarantee_contract.yaml}
  vectors:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, class, operation, input, expected]
      properties:
        id: {type: string, pattern: '^[a-z][a-z0-9_.-]+$'}
        class: {enum: [positive, negative]}
        operation: {enum: [truth, filter, compare_verification, compose_approximation, validate_exact, compose_metadata, summarize, validate_compression, compare_confidence, backend_matrix]}
        input: {type: object, minProperties: 1, additionalProperties: true}
        expected:
          type: object
          additionalProperties: false
          required: [decision, reason_code]
          properties:
            decision: {enum: [accepted, rejected]}
            reason_code: {type: string, pattern: '^semantic\.[a-z0-9_.-]+$'}
            value: {}
