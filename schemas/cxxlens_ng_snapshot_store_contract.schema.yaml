$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.snapshot-store-contract.v1
type: object
additionalProperties: false
required:
  - schema
  - document_version
  - maturity
  - authority
  - compatibility
  - canonical_encoding
  - canonical_vectors
  - identity_graph
  - claim_input_basis
  - partition
  - closure
  - snapshot
  - publication_identity
  - wire_decoding
  - publication_counters
  - publication_series
  - publication_transaction
  - df_0200_materialization_ingress
  - reader_pin
  - compaction
  - format_compatibility
  - corruption
  - backend_authority
properties:
  schema: {const: cxxlens.snapshot-store-contract.v1}
  document_version: {$ref: '#/$defs/version'}
  maturity: {const: accepted}
  authority:
    type: object
    additionalProperties: false
    required: [design, decision_adr, sqlite_decision_adr, sqlite_decision_issue, owner_issue, owner]
    properties:
      design:
        const: docs/design/cxxlens_next_generation_integrated_design_ja.md#15-immutable-snapshot-and-store
      decision_adr:
        const: docs/design/adr/0079-checked-publication-counters.md
      sqlite_decision_adr:
        const: docs/design/adr/0097-sqlite-v3-chunked-payload-migration.md
      sqlite_decision_issue: {const: '#200'}
      owner_issue: {const: '#148'}
      owner: {const: steward.ng-store-contract}
  compatibility:
    type: object
    required:
      - version_axis
      - current
      - unknown_identity_major
      - unknown_snapshot_format_major
      - semantic_identity_survives_format_migration
  canonical_encoding:
    type: object
    required: [format, authority, serialized_identity, hash, value_types, prohibitions, collision]
  canonical_vectors:
    type: array
    minItems: 2
    items: {type: object, minProperties: 2}
  identity_graph:
    type: object
    required: [roots, nodes, forbidden_edges, derived_prior_snapshot_rule]
    properties:
      roots: {type: array, minItems: 1, uniqueItems: true, items: {$ref: '#/$defs/name'}}
      nodes:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [id, domain, depends_on]
          properties:
            id: {$ref: '#/$defs/name'}
            domain: {$ref: '#/$defs/name'}
            depends_on:
              type: array
              minItems: 1
              uniqueItems: true
              items: {$ref: '#/$defs/name'}
      forbidden_edges:
        type: array
        minItems: 1
        items:
          type: object
          additionalProperties: false
          required: [from, to]
          properties:
            from: {$ref: '#/$defs/name'}
            to: {$ref: '#/$defs/name'}
      derived_prior_snapshot_rule: {const: strict-prior-generation-only}
  claim_input_basis: {type: object, required: [field, containing_snapshot, variants]}
  partition: {type: object, required: [identity_fields, content_fields, closure_ids_in_identity, partial_reuse_as_complete]}
  closure: {type: object, required: [subject, identity_fields, forbidden_fields, mutation_of_any_identity_field_changes_id]}
  snapshot: {type: object, required: [manifest_schema, identity_fields, excluded_fields, partition_projection]}
  publication_identity:
    type: object
    additionalProperties: false
    required: [domain, identity_fields, excluded_fields, sequence_canonical_codec, persisted_binding, compaction]
    properties:
      domain: {const: publication}
      identity_fields:
        const: [series_id, snapshot_id, sequence, parent_publication]
      excluded_fields:
        const: [physical_generation, state, corrupt]
      sequence_canonical_codec: {const: unsigned-64-to-explicit-two-complement-signed-canonical-integer}
      persisted_binding:
        type: object
        additionalProperties: false
        required: [validation, shared_validator, mismatch, before_exposure]
        properties:
          validation: {const: recompute-and-exact-match}
          shared_validator: {const: memory-and-sqlite-persist-load-read-compact}
          mismatch: {const: store.corrupt}
          before_exposure: {const: true}
      compaction: {const: physical-generation-update-preserves-publication-id}
  wire_decoding:
    type: object
    additionalProperties: false
    required: [snapshot_semantics_version_components, component_domain, maximum, overflow, narrowing_before_range_validation, accepted_v5_payload, partition_envelope_claim_order]
    properties:
      snapshot_semantics_version_components: {const: [major, minor, patch]}
      component_domain: {const: unsigned-32-bit}
      maximum: {const: 4294967295}
      overflow: {const: store.corrupt}
      narrowing_before_range_validation: {const: forbidden}
      accepted_v5_payload: {const: decode-encode-byte-identical}
      partition_envelope_claim_order: {const: full-sdk-claim-occurrence-projection}
  publication_counters:
    type: object
    additionalProperties: false
    required: [domain, fields, authority_record, global_generation, increment, maximum_increment, overflow, compaction_uses_shared_increment, sqlite_allocation, sqlite_integer_encoding]
    properties:
      domain: {const: unsigned-64-bit}
      fields: {const: [publication_sequence, physical_generation]}
      authority_record: {$ref: '#/$defs/open_object'}
      global_generation: {const: maximum-authority-record-generation}
      increment: {const: shared-checked-add-one}
      maximum_increment: {const: reject}
      overflow: {const: store.counter-overflow}
      compaction_uses_shared_increment: {const: true}
      sqlite_allocation:
        type: object
        additionalProperties: false
        required: [lock, authority_scan, allocation, different-series-concurrency, corrupt-high-generation, publication_and_compaction_share_allocator, compaction_range]
        properties:
          lock: {const: begin-immediate-write-transaction}
          authority_scan: {const: all-persisted-records-revalidated-to-authority-record-conditions}
          allocation: {const: checked-max-authority-generation-plus-one-inside-transaction}
          different-series-concurrency: {const: globally-distinct-monotonic-generations}
          corrupt-high-generation: {const: excluded}
          publication_and_compaction_share_allocator: {const: true}
          compaction_range:
            type: object
            additionalProperties: false
            required: [size, checked_allocation, assignment_order, distinct_generation_per_publication, local_generation_after_commit, overflow]
            properties:
              size: {const: exact-authority-publication-count}
              checked_allocation: {const: max-plus-one-through-max-plus-count}
              assignment_order: {const: prior-publication-sequence-then-prior-physical-generation-then-publication-id}
              distinct_generation_per_publication: {const: true}
              local_generation_after_commit: {const: allocated-range-maximum}
              overflow: {const: rollback-entire-compaction}
      sqlite_integer_encoding: {$ref: '#/$defs/open_object'}
  publication_series: {type: object, required: [selector_fields, series_id, current_api, catalog_only_lookup, missing_selector_field, cross_series_fallback, head_selection]}
