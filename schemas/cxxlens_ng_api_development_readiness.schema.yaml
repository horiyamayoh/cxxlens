$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-api-development-readiness.v1
title: cxxlens API development Wave 0 readiness contract
type: object
additionalProperties: false
required: [schema, document_version, maturity, authority, binding, target_contract, public_header_authority, public_callable_authority, implementation_learning, required_status_checks, merged_main_checks, baseline, api_unit_workflow, gate_ownership]
properties:
  schema: {const: cxxlens.ng-api-development-readiness.v1}
  document_version: {const: 1.2.0}
  maturity: {const: implemented}
  authority:
    type: object
    additionalProperties: false
    required: [design, adr, owner_issue, foundation_issue, callable_inventory_issue]
    properties:
      design: {const: docs/design/cxxlens_next_generation_integrated_design_ja.md}
      adr: {const: docs/design/adr/0089-high-level-author-sdk-and-wave0-readiness.md}
      owner_issue: {const: '#168'}
      foundation_issue: {const: '#165'}
      callable_inventory_issue: {const: '#169'}
  binding:
    type: object
    additionalProperties: false
    required: [branch, report_schema, report_artifact]
    properties:
      branch: {const: main}
      report_schema: {const: cxxlens.ng-api-development-readiness-report.v1}
      report_artifact: {const: 'cxxlens-ng-api-development-readiness-${revision}'}
  target_contract:
    type: object
    additionalProperties: false
    required: [authority, provider_sdk_role, direct_dependencies]
    properties:
      authority: {const: schemas/cxxlens_ng_release_bundle.yaml}
      provider_sdk_role: {const: high-level-author-sdk}
      direct_dependencies:
        type: object
        additionalProperties: false
        required: [cxxlens::base, cxxlens::kernel, cxxlens::query, cxxlens::cpp, cxxlens::recipes, cxxlens::cxxlens, cxxlens::provider_sdk]
        properties:
          cxxlens::base: {const: []}
          cxxlens::kernel: {const: [cxxlens::base]}
          cxxlens::query: {const: [cxxlens::kernel]}
          cxxlens::cpp: {const: [cxxlens::query]}
          cxxlens::recipes: {const: [cxxlens::query]}
          cxxlens::cxxlens: {const: [cxxlens::base, cxxlens::kernel, cxxlens::query, cxxlens::cpp]}
          cxxlens::provider_sdk: {const: [cxxlens::cxxlens, cxxlens::recipes]}
  public_header_authority:
    type: object
    additionalProperties: false
    required: [admission, generated_relation_binding, migration_checker_role, extra_header, missing_header]
    properties:
      admission: {const: schemas/cxxlens_ng_public_api_catalog.yaml}
      generated_relation_binding: {const: schemas/cxxlens_ng_relation_registry.yaml}
      migration_checker_role: {const: superseded-asset-denylist-only}
      extra_header: {const: reject}
      missing_header: {const: reject}
  public_callable_authority:
    type: object
    additionalProperties: false
    required: [decision_adr, inventory, inventory_schema, report_schema, checker, report_filename, review_filename, extractor, doxygen_correspondence, required_result]
    properties:
      decision_adr: {const: docs/design/adr/0092-exact-public-callable-inventory.md}
      inventory: {const: schemas/cxxlens_ng_public_callable_inventory.yaml}
      inventory_schema: {const: schemas/cxxlens_ng_public_callable_inventory.schema.yaml}
      report_schema: {const: schemas/cxxlens_ng_public_callable_inventory_report.schema.yaml}
      checker: {const: tools/quality/public_callable_inventory.py}
      report_filename: {const: cxxlens-ng-public-callable-inventory-report.json}
      review_filename: {const: cxxlens-ng-public-callable-inventory-review.md}
      extractor: {const: clang-ast-json-22}
      doxygen_correspondence: {const: exact-bidirectional}
      required_result: {const: passed}
  implementation_learning:
    type: object
    additionalProperties: false
    required: [decision_adr, owner_issue, handbook, mental_models, records, index, record_schema, checker, issue_template, feedback_record_authority_role, mental_model_authority_role, completion_check]
    properties:
      decision_adr: {const: docs/design/adr/0093-implementation-learning-design-feedback.md}
      owner_issue: {const: '#171'}
      handbook: {const: docs/development/implementation-learning/README.md}
      mental_models: {const: docs/development/implementation-learning/mental-models}
      records: {const: docs/development/implementation-learning/records}
      index: {const: docs/development/implementation-learning/records/README.md}
      record_schema: {const: schemas/cxxlens_ng_design_feedback_record.schema.yaml}
      checker: {const: tools/quality/check_ng_design_feedback.py}
      issue_template: {const: .github/ISSUE_TEMPLATE/design-feedback.yml}
      feedback_record_authority_role: {const: never-normative-resolution-refs-own-authority}
      mental_model_authority_role: {const: non-normative-explanatory-only}
      completion_check: {const: issue-ready}
  required_status_checks:
    type: object
    additionalProperties: false
    required: [strict, contexts]
    properties:
      strict: {const: true}
      contexts:
        const: [build-test (OFF), build-test (ON), gcc-public-headers, install-consumer (OFF), install-consumer (ON), quality-contracts, quality-evidence]
  merged_main_checks:
    const: [foundation-completion, wave0-readiness]
  baseline:
    type: object
    additionalProperties: false
    required: [exact_revision_tree, clean_main_checkout, required_evidence]
    properties:
      exact_revision_tree: {const: required}
      clean_main_checkout: {const: required}
      required_evidence:
        const: [toolchain-provenance, static-shared-build-test, static-shared-install-manifest, public-header-inventory, authority-digests, implementation-learning-contract, test-inventory, generated-header-inventory, public-callable-inventory-report, public-callable-review, foundation-completion-report, branch-protection-status-names]
  api_unit_workflow:
    type: object
    additionalProperties: false
    required: [maximum_active_write_units, active_write_units, required_stages, completion_evidence]
    properties:
      maximum_active_write_units: {const: 1}
      active_write_units:
        type: array
        maxItems: 1
        items:
          type: object
          additionalProperties: false
          required: [issue, contract_ids, write_paths, completed_stages]
          properties:
            issue: {type: string, pattern: '^#[0-9]+$'}
            contract_ids: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
            write_paths: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
            completed_stages: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
      required_stages:
        type: array
        minItems: 10
        uniqueItems: true
        items: {type: string, minLength: 1}
      completion_evidence:
        type: array
        minItems: 13
        uniqueItems: true
        items: {type: string, minLength: 1}
  gate_ownership:
    type: object
    additionalProperties: false
    required: [foundation, g5, release]
    properties:
      foundation: {const: '#113'}
      g5: {const: '#166'}
      release: {const: '#167'}
