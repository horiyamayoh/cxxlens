$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.query-execution.v1.schema.yaml
title: cxxlens internal query execution result v1
type: object
additionalProperties: false
required:
- schema
- semantics_version
- library_version
- matches
- rejected
- unresolved
- coverage
- guarantee
- trace
properties:
  schema: {const: cxxlens.query-execution.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  matches:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [call, static_target, possible_targets, per_variant, certainty, guarantee, evidence, unresolved]
      properties:
        call: {type: string, minLength: 1}
        static_target: {type: [string, 'null']}
        possible_targets: {type: array, uniqueItems: true, items: {type: string}}
        per_variant:
          type: array
          uniqueItems: true
          items:
            type: object
            additionalProperties: false
            required: [variant, candidates]
            properties:
              variant: {type: string, minLength: 1}
              candidates: {type: array, uniqueItems: true, items: {type: string}}
        certainty: {enum: [speculative, possible, probable, high, certain]}
        guarantee:
          enum: [exact_within_coverage, sound_over_approximation, sound_under_approximation, best_effort, heuristic]
        evidence: {type: object}
        unresolved: {type: array, items: {type: object}}
  rejected: {type: array, uniqueItems: true, items: {type: string}}
  unresolved: {type: array, items: {type: object}}
  coverage: {type: object}
  guarantee:
    enum: [exact_within_coverage, sound_over_approximation, sound_under_approximation, best_effort, heuristic]
  trace: {type: object}
