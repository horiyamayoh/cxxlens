$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.m2-completion.v1.json
title: cxxlens.m2-completion.v1
type: object
required: [schema, acceptance_command, foundation_manifests, conformant_catalog_ids, deferred_catalog, stable_public_headers, matrix, performance_limits, vectors]
additionalProperties: false
properties:
  schema: {const: cxxlens.m2-completion.v1}
  acceptance_command: {type: string, minLength: 1}
  foundation_manifests:
    type: array
    minItems: 2
    uniqueItems: true
    items: {type: string, pattern: '^schemas/cxxlens_m[01]_completion\.yaml$'}
  conformant_catalog_ids:
    type: array
    uniqueItems: true
    items: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}$'}
  deferred_catalog:
    type: array
    uniqueItems: true
    items:
      type: object
      required: [id, blocker]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}$'}
        blocker: {type: string, minLength: 1}
  stable_public_headers:
    type: array
    minItems: 4
    uniqueItems: true
    items: {type: string, pattern: '^include/cxxlens/.+\.hpp$'}
  matrix:
    type: object
    required: [jobs, scheduler_seeds, orders, roots, repeats, backends, cache_states, expected_executions]
    additionalProperties: false
    properties:
      jobs: {type: array, uniqueItems: true, items: {type: integer, minimum: 1}}
      scheduler_seeds: {type: array, uniqueItems: true, items: {type: integer, minimum: 0}}
      orders: {type: array, uniqueItems: true, items: {enum: [forward, reverse]}}
      roots: {type: array, minItems: 2, uniqueItems: true, items: {type: string, minLength: 1}}
      repeats: {type: integer, minimum: 2}
      backends: {type: array, uniqueItems: true, items: {enum: [memory, sqlite]}}
      cache_states: {type: array, uniqueItems: true, items: {enum: [cold, warm]}}
      expected_executions: {type: integer, minimum: 1}
  performance_limits:
    type: object
    required: [maximum_cold_scheduled_tasks, maximum_warm_scheduled_tasks, maximum_fact_candidates, maximum_refinements]
    additionalProperties: false
    properties:
      maximum_cold_scheduled_tasks: {type: integer, minimum: 1}
      maximum_warm_scheduled_tasks: {const: 0}
      maximum_fact_candidates: {type: integer, minimum: 1}
      maximum_refinements: {type: integer, minimum: 0}
  vectors:
    type: array
    minItems: 4
    items:
      type: object
      required: [id, owner_issue, catalog_ids, requirements, invariants, tests, fixture]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^M2-[A-Z0-9-]+$'}
        owner_issue: {type: integer, minimum: 23, maximum: 26}
        catalog_ids:
          type: array
          uniqueItems: true
          items: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}$'}
        requirements:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, pattern: '^(FR|QR)-[0-9]{3}$'}
        invariants:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, pattern: '^[a-z][a-z0-9.-]*$'}
        tests:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, minLength: 1}
        fixture: {type: string, minLength: 1}
