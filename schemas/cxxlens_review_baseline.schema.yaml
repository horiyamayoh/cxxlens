$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.review-baseline.v1.schema.yaml
title: cxxlens review baseline v1
type: object
additionalProperties: false
required: [schema, id, version, source_fingerprint, rows, diagnostics, unresolved]
properties:
  schema: {const: cxxlens.review-baseline.v1}
  id: {type: string, minLength: 1}
  version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$'}
  source_fingerprint: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  rows:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [finding_id, rule_id, rule_version, semantic_location, state, provenance]
      properties:
        finding_id: {type: string, minLength: 1}
        rule_id: {type: string, minLength: 1}
        rule_version: {type: string, minLength: 1}
        semantic_location: {type: object}
        state: {enum: [exact, equivalent, changed, new_finding, resolved, ambiguous]}
        provenance: {type: array, items: {type: object}}
  diagnostics: {type: array, items: {type: object}}
  unresolved: {type: array, items: {type: object}}
