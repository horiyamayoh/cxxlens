$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-release-qualification-evaluation-report.v1
title: cxxlens distribution 1.0 release qualification evaluation report
type: object
additionalProperties: false
required:
  - schema
  - result
  - generated_at
  - run_url
  - git
  - release
  - qualification
  - qualified
  - scope_inventory
  - evidence
  - production_support
  - strict_report
  - reason_codes
properties:
  schema:
    const: cxxlens.ng-release-qualification-evaluation-report.v1
  result:
    const: passed
  generated_at:
    type: string
    format: date-time
  run_url:
    type: string
    format: uri
  git:
    type: object
    additionalProperties: false
    required: [revision, tree, branch, clean]
    properties:
      revision: {$ref: '#/$defs/revision'}
      tree: {$ref: '#/$defs/revision'}
      branch: {const: main}
      clean: {const: true}
  release:
    const: {id: distribution-1.0, version: 1.0.0}
  qualification:
    enum: [qualified, not-qualified]
  qualified:
    type: boolean
  scope_inventory:
    $ref: '#/$defs/scope_inventory'
  evidence:
    type: object
    additionalProperties: false
    required:
      - foundation_report_digest
      - readiness_report_digest
      - public_callable_report_digest
      - g5_report_digest
      - security_report_digest
      - materialization_contract_digest
      - materialization_evidence
      - install_manifests
      - materialization_reports
      - materialization_report_sets
      - same_revision
    properties:
      foundation_report_digest: {$ref: '#/$defs/digest'}
      readiness_report_digest: {$ref: '#/$defs/digest'}
      public_callable_report_digest: {$ref: '#/$defs/digest'}
      g5_report_digest: {$ref: '#/$defs/digest'}
      security_report_digest: {$ref: '#/$defs/digest'}
      materialization_contract_digest: {$ref: '#/$defs/digest'}
      materialization_evidence: {$ref: '#/$defs/materialization_evidence'}
      install_manifests:
        type: array
        minItems: 2
        maxItems: 2
        uniqueItems: true
        allOf:
          - contains:
              type: object
              required: [configuration]
              properties:
                configuration: {const: static}
            minContains: 1
            maxContains: 1
          - contains:
              type: object
              required: [configuration]
              properties:
                configuration: {const: shared}
            minContains: 1
            maxContains: 1
        items:
          type: object
          additionalProperties: false
          required: [configuration, manifest_digest, prefix_digest]
          properties:
            configuration: {enum: [static, shared]}
            manifest_digest: {$ref: '#/$defs/digest'}
            prefix_digest: {$ref: '#/$defs/digest'}
      materialization_reports:
        oneOf:
          - {const: []}
          - {$ref: '#/$defs/materialization_report_matrix'}
      materialization_report_sets:
        oneOf:
          - {const: []}
          - {$ref: '#/$defs/materialization_report_set_matrix'}
      same_revision: {const: true}
    allOf:
      - if:
          properties:
            materialization_evidence:
              properties: {state: {const: tracked-gap-empty}}
              required: [state]
          required: [materialization_evidence]
        then:
          properties:
            materialization_reports: {const: []}
            materialization_report_sets: {const: []}
        else:
          properties:
            materialization_reports: {$ref: '#/$defs/materialization_report_matrix'}
            materialization_report_sets: {$ref: '#/$defs/materialization_report_set_matrix'}
  production_support:
    const: []
  strict_report:
    type: object
    additionalProperties: false
    required: [schema, eligible, emitted]
    properties:
      schema: {const: cxxlens.ng-release-qualification-report.v1}
      eligible: {type: boolean}
      emitted: {const: false}
  reason_codes:
    type: array
    uniqueItems: true
    items:
      enum: [release.scope-not-qualified]
allOf:
  - if:
      properties:
        qualification: {const: qualified}
      required: [qualification]
    then:
      properties:
        qualified: {const: true}
        scope_inventory:
          properties:
            closure_status: {const: qualified}
            summary:
              properties:
                tracked_gap: {const: 0}
                blocked: {const: 0}
        strict_report:
          properties:
            eligible: {const: true}
        evidence:
          properties:
            materialization_evidence:
              properties: {state: {const: exact-matrix}}
        reason_codes:
          maxItems: 0
    else:
      properties:
        qualification: {const: not-qualified}
        qualified: {const: false}
        scope_inventory:
          properties:
            closure_status: {const: classified-with-gaps}
            summary:
              anyOf:
                - properties:
                    tracked_gap: {minimum: 1}
                - properties:
                    blocked: {minimum: 1}
        strict_report:
          properties:
            eligible: {const: false}
        reason_codes:
          const: [release.scope-not-qualified]
$defs:
  digest:
    type: string
    pattern: '^sha256:[0-9a-f]{64}$'
  revision:
    type: string
    pattern: '^[0-9a-f]{40}$'
  materialization_evidence:
    type: object
    additionalProperties: false
    required: [state, request_count, report_count, report_set_count, owner_issue, feedback]
    properties:
      state: {enum: [exact-matrix, tracked-gap-empty]}
      request_count: {type: integer, minimum: 0, maximum: 4}
      report_count: {type: integer, minimum: 0, maximum: 4}
      report_set_count: {type: integer, minimum: 0, maximum: 2}
      owner_issue:
        oneOf:
          - {const: '#181'}
          - {type: 'null'}
      feedback:
        type: array
        uniqueItems: true
        items: {enum: [DF-0182, DF-0187, DF-0191, DF-0192, DF-0195, DF-0196, DF-0197]}
    allOf:
      - if:
          properties: {state: {const: tracked-gap-empty}}
          required: [state]
        then:
          properties:
            request_count: {const: 0}
            report_count: {const: 0}
            report_set_count: {const: 0}
            owner_issue: {const: '#181'}
            feedback: {const: [DF-0182, DF-0187, DF-0191, DF-0192, DF-0195, DF-0196, DF-0197]}
        else:
          properties:
            request_count: {const: 4}
            report_count: {const: 4}
            report_set_count: {const: 2}
            owner_issue: {type: 'null'}
            feedback: {const: []}
  materialization_report_matrix:
    type: array
    minItems: 4
    maxItems: 4
    uniqueItems: true
    allOf:
      - contains:
          type: object
          required: [configuration, backend]
          properties: {configuration: {const: static}, backend: {const: memory}}
        minContains: 1
        maxContains: 1
      - contains:
          type: object
          required: [configuration, backend]
          properties: {configuration: {const: static}, backend: {const: sqlite}}
        minContains: 1
        maxContains: 1
      - contains:
          type: object
          required: [configuration, backend]
          properties: {configuration: {const: shared}, backend: {const: memory}}
        minContains: 1
        maxContains: 1
      - contains:
          type: object
          required: [configuration, backend]
          properties: {configuration: {const: shared}, backend: {const: sqlite}}
        minContains: 1
        maxContains: 1
    items:
      type: object
      additionalProperties: false
      required: [configuration, backend, request_digest, request_byte_count, report_digest, report_byte_count, execution_receipt_digest, actual_exit_status, exact_stdout_byte_count, stdout_digest, parsed_response_count, stderr_digest]
      properties:
        configuration: {enum: [static, shared]}
        backend: {enum: [memory, sqlite]}
        request_digest: {$ref: '#/$defs/digest'}
        request_byte_count: {type: integer, minimum: 1, maximum: 1073741824}
        report_digest: {$ref: '#/$defs/digest'}
        report_byte_count: {type: integer, minimum: 1, maximum: 1073741824}
        execution_receipt_digest: {$ref: '#/$defs/digest'}
        actual_exit_status: {const: 0}
        exact_stdout_byte_count: {type: integer, minimum: 1, maximum: 1073741824}
        stdout_digest: {$ref: '#/$defs/digest'}
        parsed_response_count: {const: 1}
        stderr_digest: {$ref: '#/$defs/digest'}
  materialization_report_set_matrix:
    type: array
    minItems: 2
    maxItems: 2
    uniqueItems: true
    allOf:
      - contains:
          type: object
          required: [configuration]
          properties: {configuration: {const: static}}
        minContains: 1
        maxContains: 1
      - contains:
          type: object
          required: [configuration]
          properties: {configuration: {const: shared}}
        minContains: 1
        maxContains: 1
    items:
      type: object
      additionalProperties: false
      required: [configuration, report_set_digest]
      properties:
        configuration: {enum: [static, shared]}
        report_set_digest: {$ref: '#/$defs/digest'}
  scope_inventory:
    type: object
    additionalProperties: false
    required:
      - manifest_path
      - manifest_digest
      - authority_census_digest
      - evidence_census_digest
      - classification_digest
      - evidence_tests
      - summary
      - closure_status
    properties:
      manifest_path:
        const: schemas/cxxlens_ng_production_scope_closure.yaml
      manifest_digest: {$ref: '#/$defs/digest'}
      authority_census_digest: {$ref: '#/$defs/digest'}
      evidence_census_digest: {$ref: '#/$defs/digest'}
      classification_digest: {$ref: '#/$defs/digest'}
      evidence_tests:
        type: array
        minItems: 1
        uniqueItems: true
        items: {type: string, pattern: '^quality\.(?:ng-[a-z0-9_]+|ownership)$'}
      summary:
        type: object
        additionalProperties: false
        required:
          - domain_count
          - assignable_count
          - expanded_count
          - aggregate_count
          - qualified
          - tracked_gap
          - blocked
          - not_applicable
        properties:
          domain_count: {const: 30}
          assignable_count: {type: integer, minimum: 1}
          expanded_count: {type: integer, minimum: 1}
          aggregate_count: {const: 14}
          qualified: {type: integer, minimum: 0}
          tracked_gap: {type: integer, minimum: 0}
          blocked: {type: integer, minimum: 0}
          not_applicable: {type: integer, minimum: 0}
      closure_status:
        enum: [classified-with-gaps, qualified]
