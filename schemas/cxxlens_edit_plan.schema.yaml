$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.edit-plan.v1.schema.yaml
title: cxxlens immutable edit plan v1
type: object
additionalProperties: false
required: [schema, semantics_version, id, snapshot, valid, edits, conflicts, diagnostics, unresolved, coverage]
properties:
  schema: {const: cxxlens.edit-plan.v1}
  semantics_version: {const: 1.0.0}
  id: {type: string, pattern: '^plan_[0-9a-f]{64}$'}
  snapshot:
    type: object
    additionalProperties: false
    required: [catalog_version, fact_snapshot_id]
    properties:
      catalog_version: {type: string, minLength: 1}
      fact_snapshot_id: {type: string, pattern: '^snapshot_[0-9a-f]{64}$'}
  valid: {type: boolean}
  edits: {type: array, items: {$ref: '#/$defs/edit'}}
  conflicts: {type: array, items: {$ref: '#/$defs/conflict'}}
  diagnostics: {type: array, items: {type: object}}
  unresolved: {type: array, items: {$ref: cxxlens_unresolved.schema.yaml}}
  coverage: {$ref: cxxlens_coverage.schema.yaml}
$defs:
  edit:
    type: object
    additionalProperties: false
    required: [id, kind, file, begin, end, replacement, precondition, atomic_group, evidence]
    properties:
      id: {type: string, pattern: '^edit_[0-9a-f]{64}$'}
      kind: {enum: [insert, replace, erase, create_file, delete_file]}
      file: {type: string, minLength: 1}
      begin: {type: integer, minimum: 0}
      end: {type: integer, minimum: 0}
      replacement: {type: string}
      atomic_group: {type: string, minLength: 1}
      precondition:
        type: object
        additionalProperties: false
        required: [source_digest, file_identity, catalog_version, fact_snapshot_id, directly_spelled, verified_variants]
        properties:
          source_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
          file_identity: {type: string, minLength: 1}
          catalog_version: {type: string, minLength: 1}
          fact_snapshot_id: {type: string, pattern: '^snapshot_[0-9a-f]{64}$'}
          directly_spelled: {type: boolean}
          verified_variants: {type: array, minItems: 1, uniqueItems: true, items: {type: string, pattern: '^variant_[0-9a-f]{64}$'}}
      evidence: {$ref: cxxlens_evidence.schema.yaml}
  conflict:
    type: object
    additionalProperties: false
    required: [kind, edit_ids, variants, stable_code]
    properties:
      kind: {enum: [overlap, insert_order, file_lifecycle, variant_divergence, macro_origin]}
      edit_ids: {type: array, minItems: 1, uniqueItems: true, items: {type: string, pattern: '^edit_[0-9a-f]{64}$'}}
      variants: {type: array, uniqueItems: true, items: {type: string, pattern: '^variant_[0-9a-f]{64}$'}}
      stable_code: {type: string, minLength: 1}
