$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens_ng_clang22_materialization_report.schema.yaml
title: cxxlens installed Clang 22 materialization report
type: object
additionalProperties: false
required:
  - schema
  - report_version
  - response_kind
  - result
  - generated_at
  - process_exit_status
  - raw_input_observation
properties:
  schema: {const: cxxlens.clang22-materialization-report.v2}
  report_version: {const: 2.1.0}
  response_kind: {enum: [detailed, compact_failure]}
  result: {enum: [passed, failed]}
  generated_at: {type: string, format: date-time}
  process_exit_status: {enum: [0, 1]}
  raw_input_observation: {$ref: '#/$defs/raw_input_observation'}
  binding:
    type: object
    additionalProperties: false
    required: [state, request]
    properties:
      state: {enum: [raw-input-only, request-bound]}
      request:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/request_binding'}
    allOf:
      - if:
          properties: {state: {const: raw-input-only}}
          required: [state]
        then:
          properties: {request: {type: 'null'}}
        else:
          properties: {request: {$ref: '#/$defs/request_binding'}}
  effects: {$ref: '#/$defs/effect_ledger'}
  source:
    type: object
    additionalProperties: false
    required: [revision, tree]
    properties:
      revision: {$ref: '#/$defs/revision'}
      tree: {$ref: '#/$defs/revision'}
  request:
    $ref: '#/$defs/request_binding'
  installation:
    type: object
    additionalProperties: false
    required: [requested, measured]
    properties:
      requested:
        type: object
        additionalProperties: false
        required: [occurrence_manifest_digest]
        properties:
          occurrence_manifest_digest: {$ref: '#/$defs/content_digest'}
      measured:
        type: object
        additionalProperties: false
        required: [manifest_path, manifest_file_digest, occurrence_payload_digest, inventory_digest, source_revision, source_tree, configuration, files, tool, worker]
        properties:
          manifest_path: {const: share/cxxlens/materialization/clang22/occurrence-v1.json}
          manifest_file_digest: {$ref: '#/$defs/content_digest'}
          occurrence_payload_digest: {$ref: '#/$defs/content_digest'}
          inventory_digest: {$ref: '#/$defs/content_digest'}
          source_revision: {$ref: '#/$defs/revision'}
          source_tree: {$ref: '#/$defs/revision'}
          configuration: {enum: [static, shared]}
          files:
            type: array
            minItems: 13
            maxItems: 19
            uniqueItems: true
            items: {$ref: '#/$defs/measured_occurrence_inventory_file'}
          tool:
            allOf:
              - {$ref: '#/$defs/measured_occurrence_file'}
              - properties:
                  path: {const: bin/cxxlens-clang22-materialize}
                required: [path]
          worker:
            allOf:
              - {$ref: '#/$defs/measured_occurrence_file'}
              - properties:
                  path: {const: bin/cxxlens-clang-worker-22}
                required: [path]
        allOf:
          - if:
              properties: {configuration: {const: static}}
              required: [configuration]
            then:
              properties: {files: {minItems: 13, maxItems: 13}}
            else:
              properties: {files: {minItems: 19, maxItems: 19}}
  provider:
    type: object
    additionalProperties: false
    required: [tool_executable, tool_interface_version, worker_executable, provider_id, provider_version, semantic_contract_digest, protocol_major, protocol_minor, required_features, sandbox_policy_digest]
    properties:
      tool_executable: {const: cxxlens-clang22-materialize}
      tool_interface_version: {const: 2.1.0}
      worker_executable: {const: cxxlens-clang-worker-22}
      provider_id: {const: cxxlens.clang22.reference}
      provider_version: {const: 1.0.0}
      semantic_contract_digest: {$ref: '#/$defs/content_digest'}
      protocol_major: {const: 1}
      protocol_minor: {const: 1}
      required_features: {const: [task-input-chunks-v1]}
      sandbox_policy_digest: {$ref: '#/$defs/content_digest'}
  project:
    type: object
    additionalProperties: false
    required: [project_id, catalog_id, catalog_digest, logical_root, catalog_environment_digest, catalog_compile_unit_census_digest, catalog_compile_units]
    properties:
      project_id: {$ref: '#/$defs/strong_id'}
      catalog_id: {$ref: '#/$defs/strong_id'}
      catalog_digest: {$ref: '#/$defs/content_digest'}
      logical_root: {$ref: '#/$defs/project_logical_path'}
      catalog_environment_digest: {$ref: '#/$defs/content_digest'}
      catalog_compile_unit_census_digest: {$ref: '#/$defs/semantic_digest'}
      catalog_compile_units:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/catalog_compile_unit'}
  registry:
    type: object
    additionalProperties: false
    required: [authority_registry_digest, base_descriptors, descriptors]
    properties:
      authority_registry_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      base_descriptors:
        type: array
        minItems: 6
        maxItems: 6
        uniqueItems: true
        items: {$ref: '#/$defs/base_descriptor_binding'}
      descriptors:
        type: array
        minItems: 6
        maxItems: 6
        uniqueItems: true
        items: {$ref: '#/$defs/descriptor_binding'}
  engine: {$ref: '#/$defs/engine_binding'}
  interpretation_policy: {$ref: '#/$defs/interpretation_policy'}
  trust_policy: {$ref: '#/$defs/trust_policy'}
  adoption:
    type: object
    additionalProperties: false
    required: [boundary, visibility, state, partial_policy, all_tasks_mandatory, all_groups_mandatory, all_batches_mandatory, task_result_set_digest, raw_frames]
    properties:
      boundary: {const: sealed-materialization-result}
      visibility: {const: tool-private-immutable}
      state: {enum: [sealed, discarded]}
      partial_policy: {const: forbid}
      all_tasks_mandatory: {const: true}
      all_groups_mandatory: {const: true}
      all_batches_mandatory: {const: true}
      task_result_set_digest: {$ref: '#/$defs/content_digest'}
      raw_frames:
        type: object
        additionalProperties: false
        required: [authority, retained, frame_count, frame_set_digest]
        properties:
          authority: {const: diagnostic-only-non-authoritative}
          retained: {const: false}
          frame_count: {type: integer, minimum: 0}
          frame_set_digest: {$ref: '#/$defs/content_digest'}
  task_results:
    type: array
    uniqueItems: true
    items: {$ref: '#/$defs/task_result'}
  span_validation:
    type: object
    additionalProperties: false
    required: [contract, bundle_fields, optionality, origin_evidence, observed_bundle_count, absent_bundle_count, entity_absent_bundle_count, call_absent_bundle_count, absent_bundle_unresolved_count, source_dependent_canonical_omission_count, unique_bundle_count, constructed_source_span_claim_count, recomputed_id_mismatch_count, invalid_range_count, task_binding_mismatch_count, hard_references_resolved, validated_bundle_bindings, bundle_task_binding_set_digest, bundle_set_digest, source_span_claim_set_digest, evidence_digest]
    properties:
      contract: {const: full-primary-span-bundle-v2}
      bundle_fields: {const: [span_id, snapshot, file, begin, end, role, read_only]}
      optionality: {const: entity-and-call-optional-all-or-none}
      origin_evidence: {const: separately-retained-and-digest-bound}
      observed_bundle_count: {type: integer, minimum: 0}
      absent_bundle_count: {type: integer, minimum: 0}
      entity_absent_bundle_count: {type: integer, minimum: 0}
      call_absent_bundle_count: {type: integer, minimum: 0}
      absent_bundle_unresolved_count: {type: integer, minimum: 0}
      source_dependent_canonical_omission_count: {type: integer, minimum: 0}
      unique_bundle_count: {type: integer, minimum: 0}
      constructed_source_span_claim_count: {type: integer, minimum: 0}
      recomputed_id_mismatch_count: {type: integer, minimum: 0}
      invalid_range_count: {type: integer, minimum: 0}
      task_binding_mismatch_count: {type: integer, minimum: 0}
      hard_references_resolved: {type: boolean}
      validated_bundle_bindings:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/span_bundle_binding'}
      bundle_task_binding_set_digest: {$ref: '#/$defs/content_digest'}
      bundle_set_digest: {$ref: '#/$defs/content_digest'}
      source_span_claim_set_digest: {$ref: '#/$defs/content_digest'}
      evidence_digest: {$ref: '#/$defs/content_digest'}
  base_claims:
    type: object
    additionalProperties: false
    required: [descriptor_ids, stage, transaction_visibility, descriptor_results, total_row_count, total_claim_count, claim_set_digest, validated_before_hard_references]
    properties:
      descriptor_ids: {const: [build.project.v1, build.toolchain_context.v1, build.variant.v1, source.file.v1, build.compile_unit.v1, source.span.v1]}
      stage: {const: canonical_claim}
      transaction_visibility: {const: unpublished-until-single-commit}
      descriptor_results:
        type: array
        minItems: 6
        maxItems: 6
        uniqueItems: true
        items: {$ref: '#/$defs/base_claim_result'}
      total_row_count: {type: integer, minimum: 0}
      total_claim_count: {type: integer, minimum: 0}
      claim_set_digest: {$ref: '#/$defs/content_digest'}
      validated_before_hard_references: {type: boolean}
  side_channels:
    type: object
    additionalProperties: false
    required: [transport_coverage, coverage, unresolved, evidence, guarantee]
    properties:
      transport_coverage:
        allOf:
          - {$ref: '#/$defs/coverage_summary'}
          - properties:
              record_type: {const: typed-transport-coverage-unit}
            required: [record_type]
      coverage:
        allOf:
          - {$ref: '#/$defs/coverage_summary'}
          - properties:
              record_type: {const: typed-coverage-unit}
            required: [record_type]
      unresolved:
        type: object
        additionalProperties: false
        required: [record_type, record_count, blocking_count, categories, category_counts, digest]
        properties:
          record_type: {const: typed-unresolved-item}
          record_count: {type: integer, minimum: 0}
          blocking_count: {type: integer, minimum: 0}
          categories:
            type: array
            uniqueItems: true
            items: {enum: [ambiguous_identity, budget_exhausted, claim_conflict, closure_missing, custom, external_dependency, missing_input, missing_primary_span_bundle, model_missing, open_world, precision_not_achieved, provider_unavailable, stale_input, trust_boundary, unsupported_construct]}
          category_counts:
            type: object
            propertyNames:
              enum: [ambiguous_identity, budget_exhausted, claim_conflict, closure_missing, custom, external_dependency, missing_input, missing_primary_span_bundle, model_missing, open_world, precision_not_achieved, provider_unavailable, stale_input, trust_boundary, unsupported_construct]
            additionalProperties: {type: integer, minimum: 1}
          digest: {$ref: '#/$defs/content_digest'}
      evidence:
        type: object
        additionalProperties: false
        required: [record_type, record_count, kinds, kind_counts, subject_binding, digest]
        properties:
          record_type: {const: typed-evidence-edge}
          record_count: {type: integer, minimum: 0}
          kinds:
            type: array
            uniqueItems: true
            items: {enum: [source_observation, compile_context, provider_execution, canonicalization, model_assumption, derivation, user_configuration, dynamic_observation, verification, exclusion, closure_proof]}
          kind_counts:
            type: object
            propertyNames:
              enum: [source_observation, compile_context, provider_execution, canonicalization, model_assumption, derivation, user_configuration, dynamic_observation, verification, exclusion, closure_proof]
            additionalProperties: {type: integer, minimum: 1}
          subject_binding: {const: exact-claim-or-task-identity}
          digest: {$ref: '#/$defs/content_digest'}
      guarantee:
        type: object
        additionalProperties: false
        required: [record_type, profile_id, profile_digest, approximation, scope, assumptions, verification_modalities, observation_descriptor_censuses, digest]
        properties:
          record_type: {const: typed-guarantee}
          profile_id: {const: cxxlens.clang22-materialization-guarantee-profile.v1}
          profile_digest: {$ref: '#/$defs/semantic_digest'}
          approximation: {enum: [unknown, under_approximation, over_approximation, exact]}
          scope: {$ref: '#/$defs/strong_id'}
          assumptions:
            type: array
            maxItems: 0
          verification_modalities:
            type: array
            minItems: 3
            maxItems: 3
            uniqueItems: true
            prefixItems:
              - allOf:
                  - {$ref: '#/$defs/registered_symbol'}
                  - {const: clang22.materialization-sealed.v1}
              - allOf:
                  - {$ref: '#/$defs/registered_symbol'}
                  - {const: provider.transcript-sealed.v1}
              - allOf:
                  - {$ref: '#/$defs/registered_symbol'}
                  - {const: sdk.claim-envelope-validated.v1}
            items: false
          observation_descriptor_censuses:
            type: array
            minItems: 3
            maxItems: 3
            uniqueItems: true
            prefixItems:
              - allOf:
                  - {$ref: '#/$defs/observation_descriptor_census'}
                  - properties: {descriptor_id: {const: frontend.clang22.call_observation.v2}}
                    required: [descriptor_id]
              - allOf:
                  - {$ref: '#/$defs/observation_descriptor_census'}
                  - properties: {descriptor_id: {const: frontend.clang22.entity_observation.v2}}
                    required: [descriptor_id]
              - allOf:
                  - {$ref: '#/$defs/observation_descriptor_census'}
                  - properties: {descriptor_id: {const: frontend.clang22.type_observation.v2}}
                    required: [descriptor_id]
            items: false
          digest: {$ref: '#/$defs/content_digest'}
        allOf:
          - if:
              properties: {approximation: {const: exact}}
              required: [approximation]
            then:
              properties:
                observation_descriptor_censuses:
                  not:
                    contains:
                      type: object
                      properties:
                        non_exact_equivalence_count: {minimum: 1}
                      required: [non_exact_equivalence_count]
  claim_stages:
    type: array
    minItems: 6
    maxItems: 6
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [descriptor_id, stage, claim_content_ids, claim_content_count, stored_claim_refs, sdk_claim_occurrence_count, origin_association_ids, origin_association_count, claim_content_set_digest, sdk_claim_occurrence_set_digest, origin_association_set_digest, provenance_edge_set_digest, guarantee_digest, claim_stage_digest]
      properties:
        descriptor_id:
          enum: [cc.call_direct_target.v1, cc.call_site.v1, cc.entity.v1, frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
        stage: {enum: [assertion, canonical_claim]}
        claim_content_ids:
          type: array
          uniqueItems: true
          items: {type: string, pattern: '^claim-content:sha256:[0-9a-f]{64}$'}
        claim_content_count: {type: integer, minimum: 0}
        stored_claim_refs:
          type: array
          uniqueItems: true
          items: {$ref: '#/$defs/claim_ref'}
        sdk_claim_occurrence_count: {type: integer, minimum: 0}
        origin_association_ids:
          type: array
          uniqueItems: true
          items: {type: string, pattern: '^materialization-claim-association:sha256:[0-9a-f]{64}$'}
        origin_association_count: {type: integer, minimum: 0}
        claim_content_set_digest: {$ref: '#/$defs/content_digest'}
        sdk_claim_occurrence_set_digest: {$ref: '#/$defs/content_digest'}
        origin_association_set_digest: {$ref: '#/$defs/content_digest'}
        provenance_edge_set_digest: {$ref: '#/$defs/content_digest'}
        guarantee_digest: {$ref: '#/$defs/content_digest'}
        observation_equivalence_census: {$ref: '#/$defs/observation_equivalence_census'}
        claim_stage_digest: {$ref: '#/$defs/content_digest'}
      allOf:
        - if:
            properties:
              descriptor_id:
                enum: [frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
            required: [descriptor_id]
          then:
            required: [observation_equivalence_census]
          else:
            not:
              required: [observation_equivalence_census]
  provenance:
    type: object
    additionalProperties: false
    required: [record_type, edge_count, canonical_claim_count, canonical_claims_with_exact_input_edges, orphan_count, ambiguous_count, edge_set_digest]
    properties:
      record_type: {const: typed-provenance-edge-summary}
      edge_count: {type: integer, minimum: 0}
      canonical_claim_count: {type: integer, minimum: 0}
      canonical_claims_with_exact_input_edges: {type: integer, minimum: 0}
      orphan_count: {type: integer, minimum: 0}
      ambiguous_count: {type: integer, minimum: 0}
      edge_set_digest: {$ref: '#/$defs/content_digest'}
  store:
    type: object
    additionalProperties: false
    required: [selector, direct_basis, claim_rows, claim_envelopes, canonicalization_edges, origin_associations, claim_batch_validation, partitions, snapshot_manifest]
    properties:
      selector: {$ref: '#/$defs/series_selector'}
      direct_basis:
        type: object
        additionalProperties: false
        required: [projection_version, materializer_semantics_digest, basis_digest, producer_input_basis_digest, canonical_adoption_transform_digest, base_ingestion_transform_digest]
        properties:
          projection_version: {const: cxxlens.clang22-direct-materialization-basis.v1}
          materializer_semantics_digest: {$ref: '#/$defs/semantic_digest'}
          basis_digest: {$ref: '#/$defs/semantic_digest'}
          producer_input_basis_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
          canonical_adoption_transform_digest: {$ref: '#/$defs/semantic_digest'}
          base_ingestion_transform_digest: {$ref: '#/$defs/semantic_digest'}
      claim_rows:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/claim_row'}
      claim_envelopes:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/sdk_claim_envelope'}
      canonicalization_edges:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/canonicalization_edge'}
      origin_associations:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/claim_origin_association'}
      claim_batch_validation: {$ref: '#/$defs/claim_batch_validation'}
      partitions:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/store_partition'}
      snapshot_manifest: {$ref: '#/$defs/snapshot_manifest'}
  publication:
    type: object
    additionalProperties: false
    required: [backend, selector, series_id, genesis, expected_parent_publication, observed_parent_publication, observed_parent_record, head_observation, publication_attempted, outcome, partial_policy, candidate_snapshot_id, candidate_identity_state, candidate_identity, invocation_commit_state, committed_transaction_count, invocation_committed_record, terminal_head, candidate_visibility, prior_history_retained, head_effect, store_failure, sqlite_effect_root_receipt, sqlite_reopen_status, recovery_receipt]
    properties:
      backend: {enum: [memory, sqlite]}
      selector: {$ref: '#/$defs/series_selector_fields'}
      series_id: {type: string, pattern: '^snapshot-series:sha256:[0-9a-f]{64}$'}
      genesis: {type: boolean}
      expected_parent_publication: {$ref: '#/$defs/nullable_id'}
      observed_parent_publication: {$ref: '#/$defs/nullable_id'}
      observed_parent_record:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/publication_record'}
      head_observation: {enum: [absent, present]}
      publication_attempted: {const: true}
      outcome: {enum: [committed_verified, rejected_stale, rejected_store_failure, publication_outcome_unknown, committed_unverified]}
      partial_policy: {const: forbid}
      candidate_snapshot_id: {type: string, pattern: '^snapshot:sha256:[0-9a-f]{64}$'}
      candidate_identity_state: {enum: [not_constructed, constructed]}
      candidate_identity:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/publication_identity_projection'}
      invocation_commit_state: {enum: [not_committed, committed, unknown]}
      committed_transaction_count:
        oneOf:
          - {type: integer, minimum: 0, maximum: 1}
          - {type: 'null'}
      invocation_committed_record:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/publication_record'}
      terminal_head: {$ref: '#/$defs/terminal_head_observation'}
      candidate_visibility: {enum: [not_applicable, absent, present_external, present_unknown_attribution, present_by_invocation, unknown]}
      prior_history_retained:
        oneOf:
          - {type: boolean}
          - {type: 'null'}
      head_effect: {enum: [unchanged, externally_advanced, advanced_to_candidate, unknown]}
      store_failure:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/store_failure'}
      sqlite_effect_root_receipt:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/sqlite_effect_root_receipt'}
      sqlite_reopen_status: {enum: [not_applicable, opened, open_failed]}
      recovery_receipt:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/publication_recovery_receipt'}
    allOf:
      - if:
          properties: {head_observation: {const: absent}}
          required: [head_observation]
        then:
          properties:
            observed_parent_publication: {type: 'null'}
            observed_parent_record: {type: 'null'}
        else:
          properties:
            observed_parent_publication: {$ref: '#/$defs/strong_id'}
            observed_parent_record: {$ref: '#/$defs/publication_record'}
      - if:
          properties: {candidate_identity_state: {const: not_constructed}}
          required: [candidate_identity_state]
        then:
          properties:
            candidate_identity: {type: 'null'}
            candidate_visibility: {const: not_applicable}
        else:
          properties:
            candidate_identity: {$ref: '#/$defs/publication_identity_projection'}
            candidate_visibility:
              not: {const: not_applicable}
      - if:
          properties: {invocation_commit_state: {enum: [not_committed, unknown]}}
          required: [invocation_commit_state]
        then:
          properties: {invocation_committed_record: {type: 'null'}}
        else:
          properties: {invocation_committed_record: {$ref: '#/$defs/publication_record'}}
      - if:
          properties: {candidate_visibility: {const: present_by_invocation}}
          required: [candidate_visibility]
        then:
          properties:
            candidate_identity_state: {const: constructed}
            invocation_commit_state: {const: committed}
            invocation_committed_record: {$ref: '#/$defs/publication_record'}
      - if:
          properties:
            candidate_visibility: {const: present_by_invocation}
            recovery_receipt: {type: object}
          required: [candidate_visibility, recovery_receipt]
        then:
          properties:
            recovery_receipt:
              properties:
                candidate:
                  properties: {status: {const: present}}
      - if:
          properties: {candidate_visibility: {enum: [absent, present_external, present_unknown_attribution]}}
          required: [candidate_visibility]
        then:
          properties:
            candidate_identity_state: {const: constructed}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
          allOf:
            - if:
                properties: {candidate_visibility: {const: absent}}
                required: [candidate_visibility]
              then:
                properties:
                  recovery_receipt:
                    properties:
                      candidate:
                        properties: {status: {const: not_found}}
              else:
                properties:
                  recovery_receipt:
                    properties:
                      candidate:
                        properties: {status: {const: present}}
      - if:
          properties: {candidate_visibility: {const: unknown}}
          required: [candidate_visibility]
        then:
          properties:
            candidate_identity_state: {const: constructed}
            recovery_receipt:
              allOf:
                - {$ref: '#/$defs/publication_recovery_receipt'}
                - properties:
                    candidate:
                      properties: {status: {enum: [error, not_attempted]}}
      - if:
          properties:
            candidate_visibility: {const: not_applicable}
            recovery_receipt: {type: object}
          required: [candidate_visibility, recovery_receipt]
        then:
          properties:
            recovery_receipt:
              properties:
                candidate:
                  properties: {status: {const: not_applicable}}
      - if:
          properties:
            sqlite_reopen_status: {const: opened}
            recovery_receipt: {type: object}
          required: [sqlite_reopen_status, recovery_receipt]
        then:
          properties:
            recovery_receipt:
              properties: {reopen_status: {const: opened}}
      - if:
          properties:
            sqlite_reopen_status: {const: open_failed}
            recovery_receipt: {type: object}
          required: [sqlite_reopen_status, recovery_receipt]
        then:
          properties:
            recovery_receipt:
              properties: {reopen_status: {const: open_failed}}
  semantic_verification:
    type: object
    additionalProperties: false
    required: [status, reopened_store, reopen_attempt, failure]
    properties:
      status: {enum: [passed, not_published, publication_unknown, committed_unverified]}
      reopened_store:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/reopened_store'}
      reopen_attempt:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/reopen_verification_attempt'}
      failure:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/semantic_verification_failure'}
  authority_digests:
    type: array
    minItems: 5
    maxItems: 5
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [path, digest]
      properties:
        path:
          enum: [schemas/cxxlens_ng_clang22_materialization_contract.yaml, schemas/cxxlens_ng_clang22_materialization_contract.schema.yaml, schemas/cxxlens_ng_clang22_materialization_request.schema.yaml, schemas/cxxlens_ng_clang22_materialization_report.schema.yaml, schemas/cxxlens_ng_relation_registry.yaml]
        digest: {$ref: '#/$defs/content_digest'}
  error:
    oneOf:
      - {type: 'null'}
      - {$ref: '#/$defs/error'}
oneOf:
  - properties:
      response_kind: {const: detailed}
    required: [source, request, installation, provider, project, registry, engine, interpretation_policy, trust_policy, adoption, task_results, span_validation, base_claims, side_channels, claim_stages, provenance, store, publication, semantic_verification, authority_digests, error]
    not:
      anyOf:
        - {required: [binding]}
        - {required: [effects]}
  - properties:
      response_kind: {const: compact_failure}
      result: {const: failed}
      process_exit_status: {const: 1}
      error: {$ref: '#/$defs/error'}
    required: [binding, effects, error]
    not:
      anyOf:
        - {required: [source]}
        - {required: [request]}
        - {required: [installation]}
        - {required: [provider]}
        - {required: [project]}
        - {required: [registry]}
        - {required: [engine]}
        - {required: [interpretation_policy]}
        - {required: [trust_policy]}
        - {required: [adoption]}
        - {required: [task_results]}
        - {required: [span_validation]}
        - {required: [base_claims]}
        - {required: [side_channels]}
        - {required: [claim_stages]}
        - {required: [provenance]}
        - {required: [store]}
        - {required: [publication]}
        - {required: [semantic_verification]}
        - {required: [authority_digests]}
allOf:
  - if:
      properties:
        error:
          properties: {phase: {const: input-limit}}
          required: [phase]
      required: [error]
    then:
      properties:
        error:
          properties: {code: {const: materialization.request-invalid}}
  - if:
      properties:
        error:
          properties: {phase: {const: json-decode}}
          required: [phase]
      required: [error]
    then:
      properties:
        error:
          properties:
            code: {enum: [materialization.request-invalid, materialization.spool-failure]}
  - if:
      properties:
        error:
          properties: {phase: {const: request-envelope}}
          required: [phase]
      required: [error]
    then:
      properties:
        error:
          properties: {code: {const: materialization.request-invalid}}
  - if:
      properties:
        error:
          properties: {phase: {const: request-version}}
          required: [phase]
      required: [error]
    then:
      properties:
        error:
          properties: {code: {const: materialization.version-unsupported}}
  - if:
      properties:
        error:
          properties: {phase: {const: request-schema}}
          required: [phase]
      required: [error]
    then:
      properties:
        error:
          properties:
            code: {enum: [materialization.request-invalid, materialization.spool-failure]}
  - if:
      properties:
        error:
          properties: {phase: {const: request-binding}}
          required: [phase]
      required: [error]
    then:
      properties:
        error:
          properties:
            code:
              enum:
                - materialization.identity-mismatch
                - materialization.catalog-census-mismatch
                - materialization.task-binding-mismatch
                - materialization.descriptor-binding-mismatch
                - materialization.spool-failure
  - if:
      properties:
        response_kind: {const: compact_failure}
        error:
          properties: {phase: {const: input-limit}}
          required: [phase]
      required: [response_kind, error]
    then:
      properties:
        raw_input_observation:
          properties: {observed_size_bytes: {const: 1073741825}, complete: {const: false}}
        binding:
          properties: {state: {const: raw-input-only}}
        effects:
          properties:
            worker_launch_attempt_count: {const: 0}
            worker_launch_success_count: {const: 0}
            store_draft_state: {const: not-created}
            head_observation: {const: not-observed}
  - if:
      properties:
        response_kind: {const: compact_failure}
        error:
          not:
            properties: {phase: {const: input-limit}}
            required: [phase]
      required: [response_kind, error]
    then:
      properties:
        raw_input_observation:
          properties: {complete: {const: true}}
  - if:
      properties:
        response_kind: {const: compact_failure}
        binding:
          properties: {state: {const: raw-input-only}}
          required: [state]
      required: [response_kind, binding]
    then:
      properties:
        error:
          properties:
            phase: {enum: [input-limit, json-decode, request-envelope, request-version, request-schema, request-binding]}
        effects:
          properties:
            worker_launch_attempt_count: {const: 0}
            worker_launch_success_count: {const: 0}
            store_draft_state: {const: not-created}
            head_observation: {const: not-observed}
  - if:
      properties:
        error:
          type: object
          properties: {code: {const: materialization.spool-failure}}
          required: [code]
      required: [error]
    then:
      properties:
        response_kind: {const: compact_failure}
        result: {const: failed}
        process_exit_status: {const: 1}
        raw_input_observation:
          properties: {complete: {const: true}}
        binding:
          properties: {state: {const: raw-input-only}, request: {type: 'null'}}
          required: [state, request]
        error:
          properties:
            phase: {enum: [json-decode, request-schema, request-binding]}
          required: [phase]
      required: [response_kind, binding, error]
  - if:
      properties:
        response_kind: {const: compact_failure}
        binding:
          properties: {state: {const: request-bound}}
          required: [state]
      required: [response_kind, binding]
    then:
      properties:
        error:
          properties:
            phase: {enum: [installation-binding, worker-launch, transcript, materialization-validation, store-open, store-stage, report-construction]}
  - if:
      properties:
        response_kind: {const: compact_failure}
        error:
          properties:
            code: {const: materialization.store-failure}
            phase: {enum: [store-open, store-stage]}
          required: [code, phase]
      required: [response_kind, error]
    then:
      properties:
        effects:
          properties:
            store_failure_cause:
              allOf:
                - {$ref: '#/$defs/store_failure_cause'}
                - properties:
                    kind: {const: sdk_error}
                  required: [kind]
                - if:
                    properties: {operation: {const: head_current}}
                    required: [operation]
                  then:
                    properties: {access_path: {const: current-selector}}
                  else:
                    properties: {access_path: {type: 'null'}}
    else:
      properties:
        effects:
          properties: {store_failure_cause: {type: 'null'}}
  - if:
      properties:
        response_kind: {const: compact_failure}
        effects:
          properties:
            store_failure_cause:
              type: object
              properties:
                kind: {const: sdk_error}
                operation: {const: head_current}
                code: {const: store.current-not-found}
              required: [kind, operation, code]
          required: [store_failure_cause]
      required: [response_kind, effects]
    then:
      properties:
        effects:
          properties:
            head_observation: {const: absent}
            observed_head_publication: {type: 'null'}
  - if:
      properties:
        response_kind: {const: compact_failure}
        effects:
          properties:
            store_failure_cause:
              type: object
              properties:
                kind: {const: sdk_error}
                operation: {const: head_current}
                code: {not: {const: store.current-not-found}}
              required: [kind, operation, code]
          required: [store_failure_cause]
      required: [response_kind, effects]
    then:
      properties:
        effects:
          properties:
            head_observation: {const: sdk-error}
            observed_head_publication: {type: 'null'}
  - if:
      properties:
        response_kind: {const: compact_failure}
        effects:
          properties: {head_observation: {const: sdk-error}}
          required: [head_observation]
      required: [response_kind, effects]
    then:
      properties:
        error:
          properties:
            code: {const: materialization.store-failure}
            phase: {const: store-stage}
          required: [code, phase]
        effects:
          properties:
            observed_head_publication: {type: 'null'}
            store_failure_cause:
              allOf:
                - {$ref: '#/$defs/store_failure_cause'}
                - properties:
                    kind: {const: sdk_error}
                    operation: {const: head_current}
                    access_path: {const: current-selector}
                    code: {not: {const: store.current-not-found}}
                  required: [kind, operation, access_path, code]
  - if:
      properties: {response_kind: {const: detailed}}
      required: [response_kind]
    then:
      properties:
        raw_input_observation:
          properties: {complete: {const: true}}
        adoption:
          properties: {state: {const: sealed}}
        task_results: {minItems: 1}
        side_channels:
          properties:
            guarantee:
              properties: {approximation: {const: exact}}
  - if:
      properties: {response_kind: {const: detailed}, result: {const: passed}}
      required: [response_kind, result]
    then:
      properties:
        process_exit_status: {const: 0}
        error: {type: 'null'}
        publication:
          properties:
            outcome: {const: committed_verified}
            candidate_identity_state: {const: constructed}
            candidate_identity: {$ref: '#/$defs/publication_identity_projection'}
            invocation_commit_state: {const: committed}
            committed_transaction_count: {const: 1}
            invocation_committed_record: {$ref: '#/$defs/publication_record'}
            terminal_head:
              properties:
                status: {const: present}
                record: {$ref: '#/$defs/publication_record'}
            candidate_visibility: {const: present_by_invocation}
            prior_history_retained: {const: true}
            head_effect: {const: advanced_to_candidate}
            store_failure: {type: 'null'}
            recovery_receipt: {type: 'null'}
        semantic_verification:
          properties:
            status: {const: passed}
            reopened_store: {$ref: '#/$defs/reopened_store'}
            reopen_attempt: {type: 'null'}
            failure: {type: 'null'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties: {outcome: {const: committed_verified}}
          required: [outcome]
      required: [response_kind, publication]
    then:
      properties: {result: {const: passed}}
  - if:
      properties: {response_kind: {const: detailed}, result: {const: failed}}
      required: [response_kind, result]
    then:
      properties:
        process_exit_status: {const: 1}
        error:
          allOf:
            - {$ref: '#/$defs/error'}
            - properties:
                code: {enum: [materialization.stale-parent, materialization.store-failure]}
                phase: {enum: [publication, post-publication-verification]}
              required: [code, phase]
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties: {outcome: {const: rejected_stale}}
          required: [outcome]
      required: [response_kind, publication]
    then:
      properties:
        result: {const: failed}
        error:
          properties: {code: {const: materialization.stale-parent}, phase: {const: publication}}
        publication:
          properties:
            backend: {const: sqlite}
            candidate_identity_state: {enum: [not_constructed, constructed]}
            invocation_commit_state: {const: not_committed}
            committed_transaction_count: {const: 0}
            invocation_committed_record: {type: 'null'}
            terminal_head:
              properties: {status: {enum: [absent, present, unavailable, corrupt]}}
            candidate_visibility: {enum: [not_applicable, absent, present_external, unknown]}
            prior_history_retained:
              oneOf:
                - {type: boolean}
                - {type: 'null'}
            head_effect: {enum: [unchanged, externally_advanced, unknown]}
            store_failure:
              allOf:
                - {$ref: '#/$defs/store_failure'}
                - properties: {category: {const: stale_parent}}
            sqlite_reopen_status: {enum: [opened, open_failed]}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
        semantic_verification:
          properties:
            status: {const: not_published}
            reopened_store: {type: 'null'}
            reopen_attempt: {type: 'null'}
            failure: {type: 'null'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties: {outcome: {const: rejected_store_failure}}
          required: [outcome]
      required: [response_kind, publication]
    then:
      properties:
        result: {const: failed}
        error:
          properties: {code: {const: materialization.store-failure}, phase: {const: publication}}
        publication:
          properties:
            backend: {const: sqlite}
            candidate_identity_state: {enum: [not_constructed, constructed]}
            invocation_commit_state: {const: not_committed}
            committed_transaction_count: {const: 0}
            invocation_committed_record: {type: 'null'}
            terminal_head:
              properties: {status: {enum: [absent, present, unavailable, corrupt]}}
            candidate_visibility: {enum: [not_applicable, absent, present_external, unknown]}
            prior_history_retained:
              oneOf:
                - {type: boolean}
                - {type: 'null'}
            head_effect: {enum: [unchanged, externally_advanced, unknown]}
            store_failure:
              allOf:
                - {$ref: '#/$defs/store_failure'}
                - properties:
                    category: {enum: [counter_overflow, hash_collision, persistence_corrupt]}
        semantic_verification:
          properties:
            status: {const: not_published}
            reopened_store: {type: 'null'}
            reopen_attempt: {type: 'null'}
            failure: {type: 'null'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties:
            outcome: {enum: [rejected_stale, rejected_store_failure]}
            sqlite_reopen_status: {const: open_failed}
          required: [outcome, sqlite_reopen_status]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            terminal_head:
              properties: {status: {enum: [unavailable, corrupt]}}
            prior_history_retained: {type: 'null'}
            head_effect: {const: unknown}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
          allOf:
            - if:
                properties: {candidate_identity_state: {const: constructed}}
                required: [candidate_identity_state]
              then:
                properties: {candidate_visibility: {const: unknown}}
              else:
                properties: {candidate_visibility: {const: not_applicable}}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties: {outcome: {const: publication_outcome_unknown}}
          required: [outcome]
      required: [response_kind, publication]
    then:
      properties:
        result: {const: failed}
        error:
          properties: {code: {const: materialization.store-failure}, phase: {const: publication}}
        publication:
          properties:
            backend: {const: sqlite}
            candidate_identity_state: {const: constructed}
            invocation_commit_state: {const: unknown}
            committed_transaction_count: {type: 'null'}
            invocation_committed_record: {type: 'null'}
            terminal_head:
              properties: {status: {enum: [absent, present, unavailable, corrupt]}}
            candidate_visibility: {enum: [absent, present_unknown_attribution, unknown]}
            prior_history_retained:
              oneOf:
                - {const: false}
                - {const: true}
                - {type: 'null'}
            head_effect: {enum: [advanced_to_candidate, externally_advanced, unknown]}
            store_failure:
              allOf:
                - {$ref: '#/$defs/store_failure'}
                - properties:
                    category: {const: persistence_io}
            sqlite_reopen_status: {enum: [opened, open_failed]}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
        semantic_verification:
          properties:
            status: {const: publication_unknown}
            reopened_store: {type: 'null'}
            reopen_attempt: {type: 'null'}
            failure: {type: 'null'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties:
            outcome: {const: publication_outcome_unknown}
            sqlite_reopen_status: {const: opened}
          required: [outcome, sqlite_reopen_status]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            terminal_head:
              properties: {status: {enum: [absent, present, unavailable, corrupt]}}
            candidate_visibility: {enum: [absent, present_unknown_attribution, unknown]}
            prior_history_retained:
              oneOf:
                - {type: boolean}
                - {type: 'null'}
            head_effect: {enum: [advanced_to_candidate, externally_advanced, unknown]}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties:
            outcome: {const: publication_outcome_unknown}
            sqlite_reopen_status: {const: open_failed}
          required: [outcome, sqlite_reopen_status]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            terminal_head:
              properties: {status: {enum: [unavailable, corrupt]}}
            candidate_visibility: {const: unknown}
            prior_history_retained: {type: 'null'}
            head_effect: {const: unknown}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties: {outcome: {const: committed_unverified}}
          required: [outcome]
      required: [response_kind, publication]
    then:
      properties:
        result: {const: failed}
        error:
          properties:
            code: {const: materialization.store-failure}
            phase: {const: post-publication-verification}
        publication:
          properties:
            candidate_identity_state: {const: constructed}
            candidate_identity: {$ref: '#/$defs/publication_identity_projection'}
            invocation_commit_state: {const: committed}
            committed_transaction_count: {const: 1}
            invocation_committed_record: {$ref: '#/$defs/publication_record'}
            terminal_head:
              properties: {status: {enum: [absent, present, unavailable, corrupt]}}
            candidate_visibility: {enum: [absent, present_by_invocation, unknown]}
            prior_history_retained:
              oneOf:
                - {type: boolean}
                - {type: 'null'}
            head_effect: {enum: [advanced_to_candidate, externally_advanced, unknown]}
            store_failure:
              allOf:
                - {$ref: '#/$defs/store_failure'}
                - properties: {category: {const: post_commit_verification}}
        semantic_verification:
          properties:
            status: {const: committed_unverified}
            reopened_store: {type: 'null'}
            reopen_attempt: {$ref: '#/$defs/reopen_verification_attempt'}
            failure: {$ref: '#/$defs/semantic_verification_failure'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties:
            backend: {const: sqlite}
            outcome: {const: committed_unverified}
            sqlite_reopen_status: {const: opened}
          required: [backend, outcome, sqlite_reopen_status]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            terminal_head:
              properties: {status: {enum: [absent, present, unavailable, corrupt]}}
            candidate_visibility: {enum: [absent, present_by_invocation, unknown]}
            prior_history_retained:
              oneOf:
                - {type: boolean}
                - {type: 'null'}
            head_effect: {enum: [advanced_to_candidate, externally_advanced, unknown]}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties:
            backend: {const: sqlite}
            outcome: {const: committed_unverified}
            sqlite_reopen_status: {const: open_failed}
          required: [backend, outcome, sqlite_reopen_status]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            terminal_head:
              properties: {status: {enum: [unavailable, corrupt]}}
            candidate_visibility: {const: unknown}
            prior_history_retained: {type: 'null'}
            head_effect: {const: unknown}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties:
            backend: {const: sqlite}
            outcome: {const: rejected_store_failure}
          required: [backend, outcome]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            sqlite_reopen_status: {enum: [opened, open_failed]}
            recovery_receipt: {$ref: '#/$defs/publication_recovery_receipt'}
  - if:
      properties:
        response_kind: {const: detailed}
        result: {const: passed}
        publication:
          properties: {backend: {const: sqlite}}
          required: [backend]
      required: [response_kind, result, publication]
    then:
      properties:
        publication:
          properties: {sqlite_reopen_status: {const: opened}}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties: {backend: {const: memory}}
          required: [backend]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            genesis: {const: true}
            outcome: {enum: [committed_verified, committed_unverified]}
            expected_parent_publication: {type: 'null'}
            observed_parent_publication: {type: 'null'}
            observed_parent_record: {type: 'null'}
            head_observation: {const: absent}
            sqlite_effect_root_receipt: {type: 'null'}
            sqlite_reopen_status: {const: not_applicable}
            recovery_receipt: {type: 'null'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties: {backend: {const: sqlite}}
          required: [backend]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            sqlite_effect_root_receipt: {$ref: '#/$defs/sqlite_effect_root_receipt'}
  - if:
      properties:
        response_kind: {const: detailed}
        publication:
          properties:
            backend: {const: memory}
            outcome: {const: committed_unverified}
          required: [backend, outcome]
      required: [response_kind, publication]
    then:
      properties:
        publication:
          properties:
            terminal_head:
              properties:
                status: {const: present}
                record: {$ref: '#/$defs/publication_record'}
            candidate_visibility: {const: present_by_invocation}
            prior_history_retained: {const: true}
            head_effect: {const: advanced_to_candidate}
$defs:
  measured_occurrence_file:
    type: object
    additionalProperties: false
    required: [path, digest]
    properties:
      path:
        type: string
        minLength: 1
        maxLength: 4096
        pattern: '^(?!/)(?!.*(?:^|/)\.\.?/)(?!.*//)[^\\\u0000]+$'
      digest: {$ref: '#/$defs/content_digest'}
  measured_occurrence_inventory_file:
    type: object
    additionalProperties: false
    required: [role, path, digest]
    properties:
      role: {$ref: '#/$defs/registered_symbol'}
      path:
        type: string
        minLength: 1
        maxLength: 4095
        pattern: '^(?!/)(?!.*(?:^|/)\.\.?(?:/|$))(?!.*//)[^\\\u0000]+$'
      digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  coverage_summary:
    type: object
    additionalProperties: false
    required: [record_type, record_count, state_counts, balance, digest]
    properties:
      record_type: {type: string}
      record_count: {type: integer, minimum: 0}
      state_counts:
        type: object
        additionalProperties: false
        required: [covered, excluded, not_applicable, failed, unresolved, unsupported, stale, truncated]
        properties:
          covered: {type: integer, minimum: 0}
          excluded: {type: integer, minimum: 0}
          not_applicable: {type: integer, minimum: 0}
          failed: {type: integer, minimum: 0}
          unresolved: {type: integer, minimum: 0}
          unsupported: {type: integer, minimum: 0}
          stale: {type: integer, minimum: 0}
          truncated: {type: integer, minimum: 0}
      balance: {enum: [exact, incomplete]}
      digest: {$ref: '#/$defs/content_digest'}
  coverage_record:
    type: object
    additionalProperties: false
    required: [kind, id, state, reason]
    properties:
      kind: {$ref: '#/$defs/registered_symbol'}
      id: {$ref: '#/$defs/strong_id'}
      state: {enum: [covered, excluded, not_applicable, failed, unresolved, unsupported, stale, truncated]}
      reason: {type: string, maxLength: 4096}
    allOf:
      - if:
          properties: {state: {const: covered}}
          required: [state]
        then:
          properties: {reason: {const: ''}}
        else:
          properties: {reason: {type: string, minLength: 1}}
  sqlite_effect_root_receipt:
    type: object
    additionalProperties: false
    required: [contract, root_observation_digest, relative_path, parent_resolution, leaf_resolution]
    properties:
      contract: {const: rooted-vfs-v1}
      root_observation_digest: {$ref: '#/$defs/content_digest'}
      relative_path:
        type: string
        minLength: 1
        maxLength: 4095
        pattern: '^(?!/)(?!.*(?:^|/)\.\.?(?:/|$))(?!.*//)[^\\\u0000]+$'
      parent_resolution: {const: openat2-beneath-no-symlinks-no-magiclinks}
      leaf_resolution: {const: database-and-sidecars-rooted-no-follow}
  raw_input_observation:
    type: object
    additionalProperties: false
    required: [byte_limit, observed_size_bytes, observed_prefix_digest, complete]
    properties:
      byte_limit: {const: 1073741824}
      observed_size_bytes: {type: integer, minimum: 0, maximum: 1073741825}
      observed_prefix_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      complete: {type: boolean}
    allOf:
      - if:
          properties: {complete: {const: false}}
          required: [complete]
        then:
          properties: {observed_size_bytes: {const: 1073741825}}
        else:
          properties: {observed_size_bytes: {maximum: 1073741824}}
  request_binding:
    type: object
    additionalProperties: false
