      - if:
          properties: {close_reopen_status: {const: open_failed}}
          required: [close_reopen_status]
        then:
          properties:
            backend: {const: sqlite}
            open_error_code: {type: string, pattern: '^store\.[a-z0-9.-]+$'}
            open_error_field: {$ref: '#/$defs/strong_id'}
            handle_receipts:
              prefixItems:
                - properties: {status: {const: not_attempted}}
                - properties: {status: {const: not_attempted}}
                - properties: {status: {const: not_attempted}}
        else:
          properties:
            open_error_code: {type: 'null'}
            open_error_field: {type: 'null'}
            handle_receipts:
              prefixItems:
                - properties:
                    status:
                      not: {const: not_attempted}
                - properties:
                    status:
                      not: {const: not_attempted}
                - properties:
                    status:
                      not: {const: not_attempted}
      - if:
          properties: {backend: {const: memory}}
          required: [backend]
        then:
          properties: {close_reopen_status: {const: not_applicable}}
