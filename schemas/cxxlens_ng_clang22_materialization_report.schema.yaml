    properties:
      materialization_request_id: {$ref: '#/$defs/strong_id'}
      request_digest: {$ref: '#/$defs/semantic_digest'}
      semantic_request_digest: {$ref: '#/$defs/semantic_digest'}
  effect_ledger:
    type: object
    additionalProperties: false
    required: [worker_launch_attempt_count, worker_launch_success_count, store_draft_state, head_observation, observed_head_publication, publication_attempted, committed_transaction_count, prior_history_retained, store_failure_cause]
    properties:
      worker_launch_attempt_count: {type: integer, minimum: 0}
      worker_launch_success_count: {type: integer, minimum: 0}
      store_draft_state: {enum: [not-created, discarded]}
      head_observation: {enum: [not-observed, absent, present, sdk-error]}
      observed_head_publication: {$ref: '#/$defs/nullable_id'}
      publication_attempted: {const: false}
      committed_transaction_count: {const: 0}
      prior_history_retained: {const: true}
      store_failure_cause:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/store_failure_cause'}
    allOf:
      - if:
          properties: {head_observation: {enum: [not-observed, absent, sdk-error]}}
          required: [head_observation]
        then:
          properties: {observed_head_publication: {type: 'null'}}
        else:
          properties: {observed_head_publication: {$ref: '#/$defs/strong_id'}}
  terminal_head_observation:
    type: object
    additionalProperties: false
    required: [status, record]
    properties:
      status: {enum: [absent, present, unavailable, corrupt]}
      record:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/publication_record'}
    allOf:
      - if:
          properties: {status: {const: present}}
          required: [status]
        then:
          properties: {record: {$ref: '#/$defs/publication_record'}}
        else:
          properties: {record: {type: 'null'}}
  store_failure:
    type: object
    additionalProperties: false
    required: [category, cause, diagnostic_digest]
    properties:
      category: {enum: [stale_parent, counter_overflow, hash_collision, persistence_io, persistence_corrupt, post_commit_verification]}
      cause: {$ref: '#/$defs/store_failure_cause'}
      diagnostic_digest: {$ref: '#/$defs/content_digest'}
    allOf:
      - if:
          properties: {category: {const: stale_parent}}
          required: [category]
        then:
          properties:
            cause:
              properties:
                kind: {const: sdk_error}
                operation: {const: writer_publish}
                code: {const: store.publication-conflict}
      - if:
          properties: {category: {const: counter_overflow}}
          required: [category]
        then:
          properties:
            cause:
              properties:
                kind: {const: sdk_error}
                operation: {const: writer_publish}
                code: {const: store.counter-overflow}
                field: {enum: [publication_sequence, physical_generation]}
      - if:
          properties: {category: {const: hash_collision}}
          required: [category]
        then:
          properties:
            cause:
              properties:
                kind: {const: sdk_error}
                operation: {const: writer_publish}
                code: {const: store.hash-collision}
      - if:
          properties: {category: {const: persistence_io}}
          required: [category]
        then:
          properties:
            cause:
              properties:
                kind: {const: sdk_error}
                operation: {const: writer_publish}
                code: {const: store.sqlite-failure}
                field: {const: database}
                detail:
                  properties: {kind: {const: opaque}}
      - if:
          properties: {category: {const: persistence_corrupt}}
          required: [category]
        then:
          properties:
            cause:
              properties:
                kind: {const: sdk_error}
                operation: {const: writer_publish}
                code: {enum: [store.corrupt, store.snapshot-ambiguous]}
  store_failure_cause:
    oneOf:
      - type: object
        additionalProperties: false
        required: [kind, operation, access_path, code, field, detail]
        properties:
          kind: {const: sdk_error}
          operation: {$ref: '#/$defs/store_operation'}
          access_path:
            oneOf:
              - {type: 'null'}
              - {enum: [current-selector, open-publication, open-snapshot]}
          code: {type: string, pattern: '^(?:store|sdk)\.[a-z0-9.-]+$'}
          field: {$ref: '#/$defs/strong_id'}
          detail: {$ref: '#/$defs/store_detail_observation'}
      - type: object
        additionalProperties: false
        required: [kind, operation, access_path, projection, expected_digest, actual_digest]
        properties:
          kind: {const: verification_mismatch}
          operation: {$ref: '#/$defs/store_operation'}
          access_path:
            oneOf:
              - {type: 'null'}
              - {enum: [current-selector, open-publication, open-snapshot]}
          projection: {enum: [publication-semantic-fields, physical-generation-transition, snapshot-manifest, descriptor-inventory, partition-bindings, rows, claim-annotations, coverage, unresolved, closure, cursor-projection, canonical-export, open-snapshot-return-binding, cross-path-semantic-projection]}
          expected_digest: {$ref: '#/$defs/content_digest'}
          actual_digest: {$ref: '#/$defs/content_digest'}
  store_operation:
    enum: [configuration, store_open, head_current, writer_begin, partition_stage, closure_stage, writer_validate, writer_publish, store_reopen, verify_current, verify_open_publication, verify_open_snapshot, verify_projection]
