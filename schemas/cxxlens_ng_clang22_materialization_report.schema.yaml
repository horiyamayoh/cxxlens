    oneOf:
      - type: object
        additionalProperties: false
        required: [kind, value]
        properties:
          kind: {const: stable}
          value: {type: string, maxLength: 4096}
      - type: object
        additionalProperties: false
        required: [kind, byte_count, digest, diagnostic]
        properties:
          kind: {const: opaque}
          byte_count: {type: integer, minimum: 0}
          digest: {$ref: '#/$defs/content_digest'}
          diagnostic: {type: string, maxLength: 4096}
