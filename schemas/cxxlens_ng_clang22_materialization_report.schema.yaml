    type: object
    additionalProperties: false
    required: [originating_task, provenance_edge, evidence_edges, source_bundle]
    properties:
      originating_task: {$ref: '#/$defs/task_semantic_context'}
      provenance_edge: {$ref: '#/$defs/base_row_edge'}
      evidence_edges:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/base_row_edge'}
      source_bundle:
        oneOf:
          - {type: 'null'}
          - {$ref: '#/$defs/base_row_source_bundle_edge'}
  descriptor_binding:
    type: object
    additionalProperties: false
    required: [descriptor_id, descriptor_version, contract_digest, runtime_descriptor_digest, dependency_group_id, atomic_output_group_id, batch_id, output_stage]
    properties:
      descriptor_id:
        enum: [cc.call_direct_target.v1, cc.call_site.v1, cc.entity.v1, frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
      descriptor_version: {enum: [1.0.0, 2.0.0]}
      contract_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      runtime_descriptor_digest: {$ref: '#/$defs/semantic_digest'}
      dependency_group_id: {enum: [canonical, observation]}
      atomic_output_group_id: {const: clang22-atomic}
      batch_id: {type: string, pattern: '^(?:cc\.(?:call_direct_target|call_site|entity)\.v1|frontend\.clang22\.(?:call|entity|type)_observation\.v2)-batch$'}
      output_stage: {enum: [assertion, canonical_claim]}
  base_descriptor_binding:
    type: object
    additionalProperties: false
    required: [descriptor_id, descriptor_version, contract_digest, runtime_descriptor_digest, stage_order, output_stage, owner]
    properties:
      descriptor_id:
        enum: [build.project.v1, build.toolchain_context.v1, build.variant.v1, source.file.v1, build.compile_unit.v1, source.span.v1]
      descriptor_version: {const: 1.0.0}
      contract_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      runtime_descriptor_digest: {$ref: '#/$defs/semantic_digest'}
      stage_order: {type: integer, minimum: 0, maximum: 5}
      output_stage: {const: canonical_claim}
      owner: {const: installed-tool}
  base_claim_result:
    type: object
    additionalProperties: false
    required: [descriptor_id, row_count, claim_count, row_set_digest, row_envelope_bindings, row_envelope_binding_set_digest, condition_fragment_set_digest, interpretation_domain_set_digest, producer_identity_digest, provenance_edge_set_digest, evidence_edge_set_digest, guarantee_digest, envelope_set_digest]
    properties:
      descriptor_id:
        enum: [build.project.v1, build.toolchain_context.v1, build.variant.v1, source.file.v1, build.compile_unit.v1, source.span.v1]
      row_count: {type: integer, minimum: 0}
      claim_count: {type: integer, minimum: 0}
      row_set_digest: {$ref: '#/$defs/content_digest'}
      row_envelope_bindings:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/base_row_envelope_binding'}
      row_envelope_binding_set_digest: {$ref: '#/$defs/content_digest'}
      condition_fragment_set_digest: {$ref: '#/$defs/content_digest'}
      interpretation_domain_set_digest: {$ref: '#/$defs/content_digest'}
      producer_identity_digest: {$ref: '#/$defs/content_digest'}
      provenance_edge_set_digest: {$ref: '#/$defs/content_digest'}
      evidence_edge_set_digest: {$ref: '#/$defs/content_digest'}
      guarantee_digest: {$ref: '#/$defs/content_digest'}
      envelope_set_digest: {$ref: '#/$defs/content_digest'}
  group_result:
    type: object
    additionalProperties: false
    required: [dependency_group_id, atomic_output_group_id, descriptor_ids, sealed, batch_set_digest]
    properties:
      dependency_group_id: {enum: [canonical, observation]}
      atomic_output_group_id: {const: clang22-atomic}
      descriptor_ids:
        type: array
        minItems: 3
        maxItems: 3
        uniqueItems: true
        items:
          enum: [cc.call_direct_target.v1, cc.call_site.v1, cc.entity.v1, frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
      sealed: {type: boolean}
      batch_set_digest: {$ref: '#/$defs/content_digest'}
  batch_result:
    type: object
    additionalProperties: false
    required: [batch_id, descriptor_id, runtime_descriptor_digest, dependency_group_id, atomic_output_group_id, row_count, ordered_chunk_digests, ordered_chunk_set_digest, row_bindings, row_binding_set_digest, worker_assertion_claim_refs, worker_assertion_claim_occurrence_count, claim_content_ids, claim_content_count, claim_content_set_digest, sdk_claim_occurrence_set_digest, provenance_edge_digests, provenance_edge_set_digest, batch_digest, sealed]
    properties:
      batch_id: {type: string, minLength: 1}
      descriptor_id:
        enum: [cc.call_direct_target.v1, cc.call_site.v1, cc.entity.v1, frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
      runtime_descriptor_digest: {$ref: '#/$defs/semantic_digest'}
      dependency_group_id: {enum: [canonical, observation]}
      atomic_output_group_id: {const: clang22-atomic}
      row_count: {type: integer, minimum: 0}
      ordered_chunk_digests:
        type: array
        items: {$ref: '#/$defs/content_digest'}
      ordered_chunk_set_digest: {$ref: '#/$defs/content_digest'}
      row_bindings:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/materialized_row_binding'}
      row_binding_set_digest: {$ref: '#/$defs/content_digest'}
      worker_assertion_claim_refs:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/claim_ref'}
      worker_assertion_claim_occurrence_count: {type: integer, minimum: 0}
      claim_content_ids:
        type: array
        uniqueItems: true
        items: {type: string, pattern: '^claim-content:sha256:[0-9a-f]{64}$'}
      claim_content_count: {type: integer, minimum: 0}
      claim_content_set_digest: {$ref: '#/$defs/content_digest'}
      sdk_claim_occurrence_set_digest: {$ref: '#/$defs/content_digest'}
      provenance_edge_digests:
        type: array
        uniqueItems: true
        items: {$ref: '#/$defs/content_digest'}
      provenance_edge_set_digest: {$ref: '#/$defs/content_digest'}
      observation_equivalence_census: {$ref: '#/$defs/observation_equivalence_census'}
      batch_digest: {$ref: '#/$defs/content_digest'}
      sealed: {type: boolean}
    allOf:
      - if:
          properties: {row_count: {const: 0}}
          required: [row_count]
        then:
          properties:
            ordered_chunk_digests: {maxItems: 0}
            row_bindings: {maxItems: 0}
            worker_assertion_claim_refs: {maxItems: 0}
            claim_content_ids: {maxItems: 0}
            worker_assertion_claim_occurrence_count: {const: 0}
            claim_content_count: {const: 0}
            provenance_edge_digests: {maxItems: 0}
        else:
          properties:
            ordered_chunk_digests: {minItems: 1}
            row_bindings: {minItems: 1}
            provenance_edge_digests: {minItems: 1}
      - if:
          properties:
            descriptor_id:
              enum: [frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]
          required: [descriptor_id]
        then:
          required: [observation_equivalence_census]
        else:
          not:
            required: [observation_equivalence_census]
  task_result:
    type: object
    additionalProperties: false
    required: [provider_task_id, provider_execution_id, selected_catalog_compile_unit_id, compile_unit_id, task_input_digest, terminal, input_transfer, runtime_receipt, coverage, groups, batches, side_channel_components, side_channel_digest, task_result_digest]
    properties:
      provider_task_id: {type: string, pattern: '^task:semantic-v2:sha256:[0-9a-f]{64}$'}
      provider_execution_id: {$ref: '#/$defs/strong_id'}
      selected_catalog_compile_unit_id: {$ref: '#/$defs/strong_id'}
      compile_unit_id: {$ref: '#/$defs/strong_id'}
      task_input_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
      terminal:
        enum: [provider.success, provider.timeout, provider.cancelled, provider.output-limit, provider.crash, provider.malformed-frame, provider.checksum-mismatch, provider.truncated-stream, provider.schema-invalid, provider.coverage-incomplete, provider.runtime-unavailable, provider.binary-identity-mismatch, provider.protocol-state-invalid, provider.credit-exceeded, provider.backpressure, provider.task-binding-mismatch, provider.batch-invalid, provider.batch-state-invalid, provider.relation-incompatible, provider.required-feature-missing, provider.protocol-minor-mismatch, provider.unknown-required-extension, provider.invalid-frame-flags, provider.unsupported-compression, provider.frontend-request-invalid, security.sandbox-insufficient, security.sandbox-policy-mismatch]
      input_transfer:
        type: object
        additionalProperties: false
        required: [protocol_version, required_feature, task_input_codec, logical_input_bytes, logical_input_digest, canonical_chunk_bytes, chunk_count, ordered_chunk_payload_digest_set_digest]
        properties:
          protocol_version: {const: 1.1.0}
          required_feature: {const: task-input-chunks-v1}
          task_input_codec: {const: cxxlens.clang22.task.v3}
          logical_input_bytes: {type: integer, minimum: 0, maximum: 67108864}
          logical_input_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
          canonical_chunk_bytes: {const: 1048576}
          chunk_count: {type: integer, minimum: 0, maximum: 64}
          ordered_chunk_payload_digest_set_digest: {$ref: '#/$defs/semantic_digest'}
      runtime_receipt:
        type: object
        additionalProperties: false
        required: [raw_frame_stream_bytes, raw_frame_stream_digest, frame_count, frame_transcript_digest, sealed_transcript_digest]
        properties:
          raw_frame_stream_bytes: {type: integer, minimum: 1}
          raw_frame_stream_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
          frame_count: {type: integer, minimum: 1}
          frame_transcript_digest: {$ref: '#/$defs/semantic_digest'}
          sealed_transcript_digest: {$ref: '#/$defs/semantic_digest'}
      coverage:
        type: object
        additionalProperties: false
        required: [transport_records, transport_record_set_digest, semantic_records, semantic_record_set_digest]
        properties:
          transport_records:
            type: array
            minItems: 1
            maxItems: 1
            prefixItems:
              - allOf:
                  - {$ref: '#/$defs/coverage_record'}
                  - properties:
                      kind: {const: task}
                    required: [kind]
            items: false
          transport_record_set_digest: {$ref: '#/$defs/semantic_digest'}
          semantic_records:
            type: array
            minItems: 3
            maxItems: 3
            uniqueItems: true
            prefixItems:
              - allOf:
                  - {$ref: '#/$defs/coverage_record'}
                  - properties: {kind: {const: cc.call-extraction}}
                    required: [kind]
              - allOf:
                  - {$ref: '#/$defs/coverage_record'}
                  - properties: {kind: {const: cc.entity}}
                    required: [kind]
              - allOf:
                  - {$ref: '#/$defs/coverage_record'}
                  - properties: {kind: {const: frontend.clang22.observation}}
                    required: [kind]
            items: false
          semantic_record_set_digest: {$ref: '#/$defs/semantic_digest'}
      groups:
        type: array
        minItems: 2
        maxItems: 2
        uniqueItems: true
        items: {$ref: '#/$defs/group_result'}
      batches:
        type: array
        minItems: 6
        maxItems: 6
        uniqueItems: true
        items: {$ref: '#/$defs/batch_result'}
      side_channel_components:
        type: object
        additionalProperties: false
        required: [transport_coverage_set_digest, semantic_coverage_set_digest, unresolved_set_digest, evidence_set_digest, guarantee_profile_id, guarantee_profile_digest, guarantee_fragment_digest]
        properties:
          transport_coverage_set_digest: {$ref: '#/$defs/semantic_digest'}
          semantic_coverage_set_digest: {$ref: '#/$defs/semantic_digest'}
          unresolved_set_digest: {$ref: '#/$defs/content_digest'}
          evidence_set_digest: {$ref: '#/$defs/content_digest'}
          guarantee_profile_id: {const: cxxlens.clang22-materialization-guarantee-profile.v1}
          guarantee_profile_digest: {$ref: '#/$defs/semantic_digest'}
          guarantee_fragment_digest: {$ref: '#/$defs/content_digest'}
      side_channel_digest: {$ref: '#/$defs/content_digest'}
      task_result_digest: {$ref: '#/$defs/content_digest'}
  error:
    type: object
    additionalProperties: false
    required: [code, phase, subject, diagnostic]
    properties:
      code:
        enum: [materialization.request-invalid, materialization.spool-failure, materialization.version-unsupported, materialization.identity-mismatch, materialization.catalog-census-mismatch, materialization.task-binding-mismatch, materialization.descriptor-binding-mismatch, materialization.transcript-invalid, materialization.group-incomplete, materialization.span-invalid, materialization.claim-invalid, materialization.coverage-incomplete, materialization.stale-parent, materialization.store-failure, materialization.worker-failure, materialization.report-invalid]
      phase: {enum: [input-limit, json-decode, request-envelope, request-version, request-schema, request-binding, installation-binding, worker-launch, transcript, materialization-validation, store-open, store-stage, publication, post-publication-verification, report-construction]}
      subject: {$ref: '#/$defs/strong_id'}
      diagnostic: {type: string, minLength: 1, maxLength: 4096}
