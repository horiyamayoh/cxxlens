$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.qa-profile.v1.schema.yaml
title: cxxlens QA profile v1
type: object
additionalProperties: false
required: [schema, identity, steps, environment, budgets]
properties:
  schema: {const: cxxlens.qa-profile.v1}
  identity: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  steps:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, kind, requirement, argv, dependencies]
      properties:
        id: {type: string, minLength: 1}
        kind: {enum: [build, test, lint, static_analysis, sanitizer, coverage]}
        requirement: {enum: [required, optional]}
        argv: {type: array, minItems: 1, items: {type: string}}
        dependencies: {type: array, uniqueItems: true, items: {type: string}}
  environment: {type: object, additionalProperties: {type: string}}
  budgets:
    type: object
    required: [timeout_seconds, stdout_bytes, stderr_bytes, retries, parallelism]
    properties:
      timeout_seconds: {type: integer, minimum: 1}
      stdout_bytes: {type: integer, minimum: 1}
      stderr_bytes: {type: integer, minimum: 1}
      retries: {type: integer, minimum: 0}
      parallelism: {type: integer, minimum: 1}
