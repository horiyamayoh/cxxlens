$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.explanation.v1.schema.yaml
title: cxxlens structured explanation v1
type: object
additionalProperties: false
required: [schema, semantics_version, library_version, title, summary, steps, evidence, unresolved, suggested_actions, properties]
properties:
  schema: {const: cxxlens.explanation.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string, minLength: 1}
  title: {type: string, minLength: 1}
  summary: {type: string, minLength: 1}
  steps: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
  evidence: {type: object}
  unresolved: {type: array, items: {type: object}}
  suggested_actions: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
  properties: {type: object, additionalProperties: {type: string}}
