$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.api-test-coverage-report.v1.json
title: cxxlens.api-test-coverage-report.v1
type: object
required:
- schema
- complete_api_count
- certified_api_count
- declared_member_count
- covered_member_count
- declared_use_case_count
- covered_use_case_count
- uncovered_api_ids
- uncovered_member_refs
- uncovered_use_case_ids
- semantic_digest
additionalProperties: false
properties:
  schema: {const: cxxlens.api-test-coverage-report.v1}
  complete_api_count: {type: integer, minimum: 0}
  certified_api_count: {type: integer, minimum: 0}
  declared_member_count: {type: integer, minimum: 0}
  covered_member_count: {type: integer, minimum: 0}
  declared_use_case_count: {type: integer, minimum: 0}
  covered_use_case_count: {type: integer, minimum: 0}
  uncovered_api_ids:
    type: array
    uniqueItems: true
    items: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}$'}
  uncovered_member_refs:
    type: array
    uniqueItems: true
    items: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}#[0-9]+$'}
  uncovered_use_case_ids:
    type: array
    uniqueItems: true
    items: {type: string, pattern: '^UC-[A-Z]+-[0-9]{3}$'}
  semantic_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
