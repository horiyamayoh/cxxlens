schema: cxxlens.ng-public-api-catalog.v1
kind: public-cpp-api-catalog
document_version: 1.1.0
maturity: implemented
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md
  index: docs/design/catalogs/README.md
  decision_adr: docs/design/adr/0012-author-sdk-surface.md
  owner_issue: '#66'
  owner: steward.ng-sdk
compatibility:
  version_axis: public-cpp-source-api
  current: 1.0.0
  relation_axis: relation-descriptor
  query_ir_axis: logical-query-ir
  provider_protocol_axis: provider-protocol

packages:
  - id: author-sdk
    cmake_package: cxxlensProviderSDK
    target: cxxlens::provider_sdk
    headers:
      - include/cxxlens/sdk.hpp
      - include/cxxlens/sdk/common.hpp
      - include/cxxlens/sdk/claim.hpp
      - include/cxxlens/sdk/relation.hpp
      - include/cxxlens/sdk/query.hpp
      - include/cxxlens/sdk/provider.hpp
      - include/cxxlens/sdk/testing.hpp
      - include/cxxlens/sdk/recipe.hpp
    llvm_clang_dependency: forbidden
    link_dependencies: [cxx-standard-library]
  - id: clang22-native-author-sdk
    cmake_package: cxxlensClang22ProviderSDK
    target: cxxlens::clang22_provider_sdk
    headers: [include/cxxlens/provider/clang22.hpp]
    llvm_clang_dependency: explicit-native-only
    link_dependencies: [cxxlens::provider_sdk, cxxlens::cxxlens, clang-22]

author_paths:
  - id: generated-typed-query
    entry: public.relation-static
    implementation: include/cxxlens/relations/cc_call_site.hpp
    positive_example: examples/sdk/typed_query.cpp
    negative_example: examples/sdk/negative/generated_unknown_column.cpp
    negative_mode: compile-fail
    harness: tests/unit/sdk/sdk_test.cpp
  - id: runtime-dynamic-query
    entry: public.relation-dynamic
    implementation: src/sdk/query.cpp
    positive_example: examples/sdk/dynamic_query.cpp
    negative_example: examples/sdk/negative/dynamic_literal_type_mismatch.cpp
    negative_mode: runtime-rejection
    harness: tests/unit/sdk/sdk_test.cpp
  - id: portable-provider
    entry: public.provider-sdk
    implementation: src/sdk/provider.cpp
    positive_example: examples/sdk/portable_provider.cpp
    negative_example: examples/sdk/negative/provider_no_credit.cpp
    negative_mode: runtime-rejection
    harness: tests/unit/sdk/sdk_test.cpp
  - id: clang22-native-provider
    entry: public.native-provider-sdk
    implementation: src/llvm/clang22/provider_sdk.cpp
    positive_example: examples/sdk/clang22_native_provider.cpp
    negative_example: examples/sdk/negative/native_pointer_escape.cpp
    negative_mode: compile-fail
    harness: tests/unit/sdk/sdk_test.cpp
  - id: high-level-recipe
    entry: public.recipe-foundation
    implementation: src/sdk/recipe.cpp
    positive_example: examples/sdk/recipe.cpp
    negative_example: examples/sdk/negative/invalid_recipe.cpp
    negative_mode: runtime-rejection
    harness: tests/unit/sdk/sdk_test.cpp

entries:
  - id: public.common
    status: implemented
    owner_issue: '#66'
    profile: NG0
    target: cxxlens::provider_sdk
    headers: [include/cxxlens/sdk/common.hpp]
    symbols:
      - name: result
        kind: template
        signature: 'template<class T> class result; result<void>; struct error; struct semantic_version'
      - name: semantic_digest
        kind: function-family
        signature: 'string semantic_digest(string_view domain, string_view bytes); string content_digest(span<const byte>)'
    errors: []
    lifetime: [result-and-error-own-their-values]
    threading: [value-objects-follow-contained-value-threading]
    versioning: [semantic-digest-requires-explicit-domain, source-api-axis-independent-from-standard-library-expected]
    invariants: [success-and-error-are-disjoint, digest-is-full-lowercase-sha256]
    implementation_evidence: [src/sdk/common.cpp, tests/unit/sdk/sdk_test.cpp]

  - id: public.project-catalog
    status: implemented
    owner_issue: '#66'
    profile: NG0
    target: cxxlens::provider_sdk
    headers: [include/cxxlens/sdk/relation.hpp]
    symbols:
      - name: project_catalog
        kind: value
        signature: 'struct project_catalog { string catalog_id; string catalog_digest; string logical_root; vector<string> compile_units; result<void> validate() const; }'
    errors: [sdk.project-catalog-invalid]
    lifetime: [value-owned-and-detached]
    threading: [immutable-values-may-be-copied-across-threads]
    versioning: [catalog-digest-binds-exact-input]
    invariants: [compile-units-canonical-sorted-unique, no-first-wins]
    implementation_evidence: [src/sdk/relation.cpp, tests/unit/sdk/sdk_test.cpp]

  - id: public.relation-static
    status: implemented
    owner_issue: '#67'
    profile: NG0
    target: cxxlens::provider_sdk
    headers: [include/cxxlens/relations/cc_entity.hpp, include/cxxlens/relations/cc_call_site.hpp, include/cxxlens/relations/cc_call_direct_target.hpp, include/cxxlens/relations/company_lock_acquire.hpp, include/cxxlens/sdk/relation.hpp]
    symbols:
      - name: query.from
        kind: template
        signature: 'template<relation_tag Relation> result<query::builder> query::from(string_view alias = {})'
      - name: query.col
        kind: template
        signature: 'template<column_tag Column> column_ref query::col()'
      - name: row_builder
        kind: class
        signature: 'row_builder(relation_descriptor); result<void> set(column_ref, detached_cell); result<detached_row> finish() &&'
      - name: static_row_builder
        kind: template
        signature: 'template<class Relation> static_row_builder; set<Column>(detached_cell); finish() &&; template<class Relation> static_row_view; get<Column>() const'
    errors: [sdk.relation-invalid, sdk.column-invalid, sdk.duplicate-column, sdk.reference-invalid, sdk.descriptor-digest-mismatch, sdk.native-address-payload, sdk.cell-invalid, sdk.foreign-column, sdk.duplicate-cell, sdk.cell-type-mismatch, sdk.required-cell-missing, sdk.unknown-cell]
    lifetime: [generated-tags-are-static-metadata, rows-are-value-owned-and-detached]
    threading: [generated-descriptor-is-immutable, builders-are-thread-confined]
    versioning: [tag-binds-exact-descriptor-id-and-semantic-major]
    invariants: [generated-from-accepted-relation-registry, committed-generated-source-is-reproducible, external-idl-requires-zero-core-source-diff, native-pointers-not-representable]
    implementation_evidence: [tools/sdk/relation_idl_compiler.py, src/sdk/relation.cpp, examples/sdk/typed_query.cpp]

  - id: public.relation-dynamic
    status: implemented
    owner_issue: '#67'
    profile: NG0
    target: cxxlens::provider_sdk
    headers: [include/cxxlens/sdk/relation.hpp, include/cxxlens/sdk/query.hpp]
    symbols:
      - name: relation_registry
        kind: class
        signature: 'result<void> add(relation_descriptor); result<dynamic_relation> require(string_view name, uint32_t semantic_major) const; result<relation_engine> build(string generation)'
      - name: relation_engine
        kind: class
        signature: 'require(name, major) const; require_id(descriptor_id) const; registry_digest() const; generation() const'
      - name: dynamic_query.from
        kind: function
        signature: 'static result<query::builder> dynamic_query::from(const dynamic_relation&, string_view alias = {})'
    errors: [sdk.relation-invalid, sdk.descriptor-digest-mismatch, sdk.duplicate-descriptor, sdk.descriptor-conflict, sdk.relation-not-found, sdk.relation-major-mismatch, sdk.column-not-found, sdk.registry-frozen, sdk.registry-empty, sdk.engine-generation-invalid, sdk.registry-reference-missing, sdk.hard-reference-cycle]
    lifetime: [dynamic-relation-shares-immutable-descriptor-ownership]
    threading: [published-dynamic-relations-and-engines-are-immutable]
    versioning: [lookup-requires-explicit-semantic-major, registry-digest-binds-exact-descriptors, engine-generation-is-explicit, no-adjacent-version-fallback]
    invariants: [duplicate-and-conflict-reject, registry-mutation-after-engine-build-rejects, same-descriptor-model-as-generated-tags]
    implementation_evidence: [src/sdk/relation.cpp, examples/sdk/dynamic_query.cpp, tests/unit/sdk/sdk_test.cpp]

  - id: public.claim-kernel
    status: implemented
    owner_issue: '#67'
    profile: NG0
    target: cxxlens::provider_sdk
    headers: [include/cxxlens/sdk/claim.hpp, include/cxxlens/sdk/relation.hpp]
    symbols:
      - name: claim
        kind: value
        signature: 'struct observation; struct claim; claim_condition; claim_guarantee; direct_claim_basis; derived_claim_basis'
      - name: claim-stage-validator
        kind: function-family
        signature: 'make_assertion; make_canonical_claim; make_derived_claim; validate_claim'
      - name: claim_batch
        kind: class
        signature: 'result<void> add_observation(const relation_engine&, observation); result<void> add(claim); result<claim_batch_result> commit(const relation_engine&, span<const claim> existing = {}) &&'
    errors: [sdk.claim-condition-invalid, sdk.condition-universe-mismatch, sdk.claim-guarantee-invalid, sdk.claim-envelope-invalid, sdk.claim-basis-invalid, sdk.claim-stage-invalid, sdk.claim-identity-mismatch, sdk.hard-reference-missing]
    lifetime: [claims-own-detached-rows-and-envelope-values, batch-result-owns-unresolved-conflict-and-differential-records]
    threading: [claim-values-may-cross-threads, claim-batch-is-thread-confined]
    versioning: [claim-envelope-v2, semantic-key-assertion-and-content-use-independent-domain-separated-identities]
    invariants: [observation-is-not-a-claim-stage, identities-ignore-arrival-jobs-root-and-engine-generation, hard-missing-rejects-atomic-batch, soft-missing-preserves-claim-and-unresolved, same-domain-functional-overlap-is-conflict, cross-domain-overlap-is-differential-disagreement, set-multiset-functional-assertion-and-keyed-union-are-explicit]
    implementation_evidence: [src/sdk/claim.cpp, examples/sdk/relation_claim_batch.cpp, tests/unit/sdk/sdk_test.cpp, schemas/cxxlens_ng_claim_envelope.schema.yaml]

  - id: public.snapshot-store
    status: implemented
    owner_issue: '#66'
    profile: NG0
    target: cxxlens::provider_sdk
    headers: [include/cxxlens/sdk/relation.hpp]
    symbols:
      - name: snapshot_builder
        kind: class
        signature: 'result<void> add(detached_row); result<snapshot_handle> publish() &&'
      - name: row_cursor
        kind: class
        signature: 'result<optional<row_view>> next()'
    errors: [sdk.snapshot-unknown-relation, sdk.snapshot-relation-mismatch, sdk.snapshot-empty, sdk.row-descriptor-mismatch, sdk.row-view-expired, sdk.cursor-thread-violation]
    lifetime: [snapshot-handle-owns-immutable-data, row-view-expires-on-cursor-advance]
    threading: [snapshot-handles-concurrent-readable, row-cursor-thread-affine]
    versioning: [snapshot-id-binds-descriptor-digests-and-canonical-rows]
    invariants: [publish-atomically-after-independent-row-validation, empty-distinct-from-error]
    implementation_evidence: [src/sdk/relation.cpp, tests/unit/sdk/sdk_test.cpp]

  - id: public.logical-query
    status: implemented
    owner_issue: '#66'
    profile: NG0
    target: cxxlens::provider_sdk
    headers: [include/cxxlens/sdk/query.hpp]
    symbols:
      - name: query.builder
        kind: class
        signature: 'from(const relation_descriptor&, string_view alias); where; project; inner_join; semi_join; union_with(const builder&); distinct; order_by; limit; condition_restrict(string_view universe, alternatives); interpretation_restrict(string_view)'
      - name: query.literal
        kind: value
        signature: 'boolean; signed_integer; unsigned_integer; utf8; typed; exact(value_type, scalar_value)'
      - name: logical_query_ir
        kind: value
        signature: 'result<void> validate() const; string canonical_form() const; string digest() const'
    errors: [sdk.query-alias-invalid, sdk.query-literal-type-mismatch, sdk.query-column-type-mismatch, sdk.query-foreign-column, sdk.query-column-mismatch, sdk.query-empty-expression, sdk.query-empty-projection, sdk.query-empty-order, sdk.query-project-terminal, sdk.query-union-schema-mismatch, sdk.query-limit-requires-order, sdk.query-condition-missing, sdk.query-interpretation-missing, sdk.query-ir-invalid, sdk.query-duplicate-relation, sdk.query-nontopological-node, sdk.query-node-invalid, sdk.query-root-missing, sdk.query-output-column-foreign]
    lifetime: [builder-and-ir-own-all-descriptors-expressions-and-strings]
    threading: [builders-are-thread-confined, completed-ir-is-value-owned]
    versioning: [logical-query-ir-version-is-independent, operator-ids-are-versioned]
    invariants: [typed-and-dynamic-paths-normalize-to-identical-ir, no-implicit-literal-coercion, limit-requires-total-order]
    implementation_evidence: [src/sdk/query.cpp, examples/sdk/typed_query.cpp, examples/sdk/dynamic_query.cpp, tests/unit/sdk/sdk_test.cpp]

  - id: public.provider-sdk
    status: implemented
