schema: cxxlens.ng-public-api-catalog.v1
kind: public-cpp-api-catalog
document_version: 1.41.0
maturity: implemented
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md
  index: docs/design/catalogs/README.md
  decision_adr: docs/design/adr/0012-author-sdk-surface.md
  owner_issue: '#66'
  owner: steward.ng-sdk
compatibility:
  version_axis: public-cpp-source-api
  current: 2.0.0
  relation_axis: relation-descriptor
  query_ir_axis: logical-query-ir
  provider_protocol_axis: provider-protocol

packages:
  - id: author-sdk
    cmake_package: cxxlensProviderSDK
    target: cxxlens::provider_sdk
    headers:
      - include/cxxlens/sdk.hpp
      - include/cxxlens/sdk/common.hpp
      - include/cxxlens/sdk/claim.hpp
      - include/cxxlens/sdk/relation.hpp
      - include/cxxlens/sdk/store.hpp
      - include/cxxlens/sdk/query.hpp
      - include/cxxlens/sdk/provider.hpp
      - include/cxxlens/sdk/testing.hpp
      - include/cxxlens/sdk/recipe.hpp
    llvm_clang_dependency: forbidden
    link_dependencies: [cxx-standard-library]
  - id: clang22-native-author-sdk
    cmake_package: cxxlensClang22ProviderSDK
    target: cxxlens::clang22_provider_sdk
    headers: [include/cxxlens/provider/clang22.hpp]
    llvm_clang_dependency: explicit-native-only
    link_dependencies: [cxxlens::provider_sdk, clang-22]

author_paths:
  - id: generated-typed-query
    entry: public.relation-static
    implementation: include/cxxlens/relations/cc_call_site.hpp
    positive_example: examples/sdk/typed_query.cpp
    negative_example: examples/sdk/negative/generated_unknown_column.cpp
    negative_mode: compile-fail
    harness: tests/unit/sdk/sdk_test.cpp
  - id: runtime-dynamic-query
    entry: public.relation-dynamic
    implementation: src/sdk/query.cpp
    positive_example: examples/sdk/dynamic_query.cpp
    negative_example: examples/sdk/negative/dynamic_literal_type_mismatch.cpp
    negative_mode: runtime-rejection
    harness: tests/unit/sdk/sdk_test.cpp
  - id: portable-provider
    entry: public.provider-sdk
    implementation: src/sdk/provider.cpp
    positive_example: examples/sdk/portable_provider.cpp
    negative_example: examples/sdk/negative/provider_no_credit.cpp
    negative_mode: runtime-rejection
    harness: tests/unit/sdk/sdk_test.cpp
  - id: clang22-native-provider
    entry: public.native-provider-sdk
    implementation: src/llvm/clang22/provider_sdk.cpp
    positive_example: examples/sdk/clang22_native_provider.cpp
    negative_example: examples/sdk/negative/native_pointer_escape.cpp
    negative_mode: compile-fail
    harness: tests/unit/sdk/sdk_test.cpp
  - id: high-level-recipe
    entry: public.recipe
    implementation: src/sdk/recipe.cpp
    positive_example: examples/sdk/recipe.cpp
    negative_example: examples/sdk/negative/invalid_recipe.cpp
    negative_mode: runtime-rejection
    harness: tests/integration/r2_vertical_slice_test.cpp

