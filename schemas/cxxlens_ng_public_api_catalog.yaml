        signature: 'result<void> begin(string dependency_group, string atomic_output_group, string batch_id); result<void> push(const detached_row&); result<void> end()'
      - name: protocol_writer
        kind: class
        signature: 'protocol_writer(frame_sink&, protocol_limits); void grant_credit(protocol_credit); result<void> send(message_type, span<const byte> control, span<const byte> payload)'
      - name: run_worker
        kind: function
        signature: 'result<void> run_worker(portable_provider&, const task&, protocol_writer&, execution_context)'
      - name: execution_budget
        kind: value
        signature: 'struct execution_budget { wall_ms; cpu_ms; rss_bytes; output_bytes; rows; diagnostics; open_files; created_files; subprocesses; }'
      - name: provider.manifest
        kind: value
        signature: 'result<void> validate() const; string canonical_json() const; exact cxxlens.provider-manifest.v1 fields'
      - name: provider_harness
        kind: class
        signature: 'result<conformance_report> run(portable_provider&, const task&, provider_fault) const'
    errors: [provider.oversized-control, provider.oversized-payload, provider.oversized-frame, provider.unknown-message-type, provider.malformed-frame, provider.protocol-major-mismatch, provider.checksum-mismatch, provider.truncated-stream, provider.backpressure, provider.batch-state-invalid, provider.coverage-invalid, provider.coverage-duplicate-request, provider.coverage-duplicate-state, provider.coverage-unrequested, provider.coverage-incomplete, provider.unresolved-invalid, provider.evidence-invalid, provider.manifest-invalid, provider.scaffold-invalid, provider.cancelled, provider.output-limit, provider.task-invalid, provider.noncontiguous-sequence, sdk.golden-mismatch, sdk.harness-empty-transcript, sdk.harness-fault-not-observed]
    lifetime: [provider-context-and-relation-sink-are-callback-scoped, protocol-writer-borrows-frame-sink]
    threading: [worker-callback-is-synchronous-and-thread-confined, cancellation-is-stop-token-based]
