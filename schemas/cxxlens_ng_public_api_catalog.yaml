    invariants: [provider-author-does-not-construct-frames-or-checksums, credit-and-sequence-fail-closed, coverage-unresolved-evidence-not-omitted, cxxlens-provider-manifest-v1-schema-exact]
    implementation_evidence: [src/sdk/provider.cpp, src/sdk/testing.cpp, examples/sdk/portable_provider.cpp, tools/sdk/provider_scaffold_main.cpp]

