        signature: 'template<class T> class result; result<void>; struct error; struct semantic_version'
      - name: semantic_digest
        kind: function-family
        signature: 'result<string> semantic_digest(string_view domain, string_view bytes); string content_digest(span<const byte>)'
      - name: canonical_identity_digest
        kind: function-family
        signature: 'canonical_value; vector<byte> canonical_binary(const canonical_value&); string canonical_identity_digest(string_view, span<const canonical_value>)'
