- id: union-schema-mismatch
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.union-schema-mismatch
  input:
    operator: query.union.v1
    case: mismatched-schema
- id: distinct-condition-in-key
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.distinct-key-invalid
  input:
    operator: query.distinct.v1
    case: condition-in-key
- id: order-by-without-total-tie-break
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.order-not-total
  input:
    operator: query.order_by.v1
    case: missing-total-tie-break
- id: limit-without-order
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.limit-unordered
  input:
    operator: query.limit.v1
