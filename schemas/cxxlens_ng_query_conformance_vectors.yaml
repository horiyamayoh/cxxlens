schema: cxxlens.query-conformance-vectors.v1
document_version: 1.3.0
authority:
  owner_issue: '#166'
  decision_adr: docs/design/adr/0090-g5-closure-incrementality-qualification.md
contract: schemas/cxxlens_ng_logical_query_contract.yaml
vectors:
- id: exact-query-contract
  class: positive
  operation: validate_contract
  expected:
    decision: accepted
    reason_code: query.contract-valid
  input:
    document: canonical
- id: scan-missing-descriptor
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.scan-descriptor-missing
  input:
    operator: query.scan.v1
    case: missing-descriptor
- id: filter-implicit-sql-null
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.sql-null-forbidden
  input:
    operator: query.filter.v1
    case: implicit-sql-null
- id: project-implicit-distinct
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.project-distinct-forbidden
  input:
    operator: query.project.v1
    case: implicit-distinct
- id: inner-join-implicit-null-equality
  class: negative
  operation: validate_operator_use
