    prefix_sealed: true
    token: &continuation_binding
      logical_ir_digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
      snapshot_id: snapshot-1
      relation_descriptor_digests: sha256:2222222222222222222222222222222222222222222222222222222222222222
      total_order_specification: sha256:3333333333333333333333333333333333333333333333333333333333333333
      last_total_key: sha256:4444444444444444444444444444444444444444444444444444444444444444
      result_schema_digest: sha256:5555555555555555555555555555555555555555555555555555555555555555
