- id: condition-restrict-empty
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.condition-empty-restriction
  input:
    operator: query.condition_restrict.v1
    case: empty-alternatives
- id: interpretation-restrict-implicit-default
  class: negative
  operation: validate_operator_use
  expected:
    decision: rejected
    reason_code: query.interpretation-default-forbidden
  input:
    operator: query.interpretation_restrict.v1
    case: implicit-default
- id: group-is-ng1
  class: positive
  operation: validate_deferred_operator
  expected:
    decision: accepted
    reason_code: query.operator-deferred
  input:
    operator: query.group.v1
    attempt_profile: NG1
- id: aggregate-partial-is-not-ng0
  class: negative
  operation: validate_deferred_operator
  expected:
    decision: rejected
    reason_code: query.partial-aggregate
  input:
    operator: query.aggregate.v1
    attempt_profile: NG0
- id: static-dynamic-normalized-digest
  class: positive
  operation: compare_normalized_ir
  expected:
    decision: accepted
    reason_code: query.normalized-digest-equal
  input:
    static: &flagship_query
      schema: cxxlens.logical-query-ir.v1
      ir_version: 1.0.0
      surface: static
      relation_requirements:
      - descriptor_id: cc.call_site.v1
        minimum_minor: 0
        maximum_minor: any-compatible
      - descriptor_id: cc.call_direct_target.v1
        minimum_minor: 0
        maximum_minor: any-compatible
      - descriptor_id: cc.entity.v1
        minimum_minor: 0
        maximum_minor: any-compatible
      root:
        operator: query.project.v1
        inputs:
        - operator: query.limit.v1
          inputs:
          - operator: query.order_by.v1
            inputs:
            - operator: query.distinct.v1
              inputs:
              - operator: query.filter.v1
                inputs:
                - operator: query.inner_join.v1
                  inputs:
                  - operator: query.inner_join.v1
                    inputs:
                    - operator: query.semi_join.v1
                      inputs:
                      - operator: query.union.v1
                        inputs:
                        - operator: query.condition_restrict.v1
                          inputs:
                          - operator: query.interpretation_restrict.v1
                            inputs:
                            - operator: query.scan.v1
                              inputs: []
                              arguments:
                                descriptor_id: cc.call_site.v1
                                alias: calls_debug
                            arguments:
                              interpretation: cc.canonical-1
                          arguments:
                            universe: build-matrix-1
                            alternatives: [debug]
                        - operator: query.condition_restrict.v1
                          inputs:
                          - operator: query.interpretation_restrict.v1
                            inputs:
                            - operator: query.scan.v1
                              inputs: []
                              arguments:
                                descriptor_id: cc.call_site.v1
                                alias: calls
                            arguments:
                              interpretation: cc.canonical-1
                          arguments:
                            universe: build-matrix-1
                            alternatives: [release]
                        arguments: {}
                      - operator: query.scan.v1
                        inputs: []
                        arguments:
                          descriptor_id: cc.call_direct_target.v1
                          alias: targets
                      arguments:
                        predicate:
                          kind: column_equals_present
                          left:
                            column_id: cc.call_site.v1.call
                            availability: require
                            source_alias: calls
                          right:
                            column_id: cc.call_direct_target.v1.call
                            availability: require
                            source_alias: targets
                    - operator: query.scan.v1
                      inputs: []
                      arguments:
                        descriptor_id: cc.call_direct_target.v1
                        alias: targets_join
                    arguments:
                      predicate:
                        kind: column_equals_present
                        left:
                          column_id: cc.call_site.v1.call
                          availability: require
                          source_alias: calls
                        right:
                          column_id: cc.call_direct_target.v1.call
                          availability: require
                          source_alias: targets_join
                  - operator: query.scan.v1
                    inputs: []
                    arguments:
                      descriptor_id: cc.entity.v1
                      alias: entities
                  arguments:
                    predicate:
                      kind: column_equals_present
                      left:
                        column_id: cc.call_direct_target.v1.target
                        availability: require
                        source_alias: targets_join
                      right:
                        column_id: cc.entity.v1.entity
                        availability: require
                        source_alias: entities
                arguments:
                  predicate:
                    kind: equals_present
                    column:
                      column_id: cc.entity.v1.qualified_name
                      availability: require
                      source_alias: entities
                    literal:
                      type: utf8_string
                      value: app::dangerous
              arguments: {}
            arguments:
              keys:
              - column:
                  column_id: cc.call_site.v1.call
                  availability: require
                  source_alias: calls
                direction: ascending
                cell_state_order: [absent, present, unknown]
          arguments:
            count: 2
        arguments:
          columns:
          - column:
              column_id: cc.call_site.v1.call
              availability: require
              source_alias: calls
            output: output.call
          - column:
              column_id: cc.call_site.v1.source
              availability: require
              source_alias: calls
            output: output.source
      output_schema:
      - id: output.call
        type: typed_id<cc_call_id>
        required: true
      - id: output.source
        type: typed_id<source_span_id>
        required: true
      condition_policy:
        require_same_universe: true
        empty_intersection: discard
      interpretation_policy:
        join_compatibility: exact-id-equality
    dynamic:
      <<: *flagship_query
      surface: dynamic
      relation_requirements:
      - descriptor_id: cc.entity.v1
        minimum_minor: 0
        maximum_minor: any-compatible
      - descriptor_id: cc.call_direct_target.v1
        minimum_minor: 0
        maximum_minor: any-compatible
      - descriptor_id: cc.call_site.v1
        minimum_minor: 0
        maximum_minor: any-compatible
- id: backend-and-order-parity
  class: positive
  operation: evaluate_backend_matrix
  expected:
    decision: accepted
    reason_code: query.backend-matrix-equal
    execution_status: complete
    row_count: 2
  input:
    ir: *flagship_query
    dataset: &flagship_dataset
      cc.call_site.v1:
      - values:
          cc.call_site.v1.call: {state: present, type: 'typed_id<cc_call_id>', value: call-4}
          cc.call_site.v1.source: {state: present, type: 'typed_id<source_span_id>', value: span-4}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-call-4]
        provenance: [evidence-call-4]
      - values:
          cc.call_site.v1.call: {state: present, type: 'typed_id<cc_call_id>', value: call-2}
          cc.call_site.v1.source: {state: present, type: 'typed_id<source_span_id>', value: span-2}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-call-2]
        provenance: [evidence-call-2]
      - values:
          cc.call_site.v1.call: {state: present, type: 'typed_id<cc_call_id>', value: call-1}
          cc.call_site.v1.source: {state: present, type: 'typed_id<source_span_id>', value: span-1}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-call-1]
        provenance: [evidence-call-1]
      cc.call_direct_target.v1:
      - values:
          cc.call_direct_target.v1.call: {state: present, type: 'typed_id<cc_call_id>', value: call-2}
          cc.call_direct_target.v1.target: {state: present, type: 'typed_id<cc_entity_id>', value: entity-safe}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-target-2]
        provenance: [evidence-target-2]
      - values:
          cc.call_direct_target.v1.call: {state: present, type: 'typed_id<cc_call_id>', value: call-1}
          cc.call_direct_target.v1.target: {state: present, type: 'typed_id<cc_entity_id>', value: entity-danger}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-target-1]
        provenance: [evidence-target-1]
      - values:
          cc.call_direct_target.v1.call: {state: present, type: 'typed_id<cc_call_id>', value: call-4}
          cc.call_direct_target.v1.target: {state: present, type: 'typed_id<cc_entity_id>', value: entity-danger}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-target-4]
        provenance: [evidence-target-4]
      cc.entity.v1:
      - values:
          cc.entity.v1.entity: {state: present, type: 'typed_id<cc_entity_id>', value: entity-safe}
          cc.entity.v1.qualified_name: {state: present, type: utf8_string, value: app::safe}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-entity-safe]
        provenance: [evidence-entity-safe]
      - values:
          cc.entity.v1.entity: {state: present, type: 'typed_id<cc_entity_id>', value: entity-danger}
          cc.entity.v1.qualified_name: {state: present, type: utf8_string, value: app::dangerous}
        multiplicity: 1
        presence: {universe: build-matrix-1, alternatives: [debug, release]}
        interpretation: cc.canonical-1
        claim_contributors: [claim-entity-danger]
        provenance: [evidence-entity-danger]
- id: deterministic-output-truncation
  class: positive
