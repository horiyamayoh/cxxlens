      operator: query.scan.v1
      descriptor_id: cc.call_site.v1
      index_name: sqlite-call-index
- id: bound-contributor-fragments-no-cross-product
  class: positive
  operation: validate_bound_contributor_fragments
  expected:
    decision: accepted
    reason_code: query.bound-contributor-attribution-preserved
  input:
    operator: query.inner_join.v1
    expected_fragments:
    - claim_contributors: [claim-a]
      producer_contracts: [producer-a]
      provenance: [evidence-a]
      approximation: exact
    - claim_contributors: [claim-b]
      producer_contracts: [producer-b]
      provenance: [evidence-b]
      approximation: under_approximation
    contributor_edges:
    - claim_contributor: claim-a
      producer: producer-a
      provenance: evidence-a
      guarantee: exact
      condition: [release]
      interpretation: cc.canonical-1
    - claim_contributor: claim-b
      producer: producer-b
      provenance: evidence-b
      guarantee: under_approximation
      condition: [release]
      interpretation: cc.canonical-1
- id: filtered-out-weak-empty-summary
  class: positive
  operation: validate_empty_result_summary
  expected:
    decision: accepted
    reason_code: query.empty-summary-source-excluded
  input:
    result_rows: []
    selected_condition: [asan]
    selected_interpretation: cc.selected-1
    source_fragments:
    - claim_contributors: [claim-weak]
      assumptions: [assumption-weak]
      approximation: unknown
      interpretation: cc.other-1
    - claim_contributors: [claim-exact]
      assumptions: [assumption-exact]
      approximation: exact
      interpretation: cc.canonical-1
    expected_fragments:
    - claim_contributors: []
      assumptions: [assumptions:unknown]
      approximation: unknown
      condition: [asan]
      interpretation: cc.selected-1
      scope: query-empty
