      operator: query.scan.v1
      descriptor_id: cc.call_site.v1
- id: physical-index-is-not-logical-authority
  class: negative
  operation: validate_logical_authority
  expected:
    decision: rejected
    reason_code: query.physical-authority-leak
  input:
