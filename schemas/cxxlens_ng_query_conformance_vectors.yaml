    reason_code: query.partial-safe
    execution_status: failed_before_result
    row_count: 0
  input:
    kind: upstream-interruption-unsealed
    published_rows: 0
- id: sealed-ordered-cancel-prefix
  class: positive
  operation: validate_partial_execution
  expected:
    decision: accepted
    reason_code: query.partial-safe
    execution_status: cancelled_with_partial
    row_count: 2
  input:
    kind: ordered-sealed-prefix
    ordered: true
    prefix_sealed: true
    published_rows: 2
