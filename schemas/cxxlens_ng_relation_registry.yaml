schema: cxxlens.relation-registry.v1
kind: relation-registry
document_version: 1.2.0
maturity: accepted
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md
  index: docs/design/catalogs/README.md
  decision_adr: docs/design/adr/0057-detached-scalar-value-validation.md
  owner_issue: '#114'
  owner: steward.ng-relations
compatibility:
  version_axis: relation-descriptor
  current: 1.2.0
  semantic_major_policy: exact-major-compatible-minor
  unknown_optional_columns: preserve
  unknown_open_symbols: preserve
  unknown_closed_symbols: reject
registry_policy:
  mutation: build-time-only
  discovery: descriptor-document-or-installation-manifest
  duplicate_descriptor: reject
  digest_mismatch: reject
  incompatible_key_change: reject
  hard_reference_cycle: reject
  extension_code_change: forbidden
scalar_value_contract:
  validator: detached-cell-value-v2
  boundaries: [row-builder, dynamic-row, logical-query-literal, provider-decode, store-reopen]
  digest_grammar: canonical-sha256-or-semantic-v2-sha256-lowercase-64hex
  semantic_version_grammar: canonical-u32-major-minor-patch-no-leading-zero
  utf8_policy: strict-unicode-scalar-sequences
  identity_policy: nonempty-control-free-utf8-and-canonical-type-parameter
  open_symbol_policy: preserve-control-free-value
  closed_symbol_policy: exact-symbol-contract-membership
  unknown_reason_policy: nonempty-control-free-utf8
  set_encoding:
    format: canonical-length-prefixed-string-elements-v1
    empty: zero-bytes
    element_length: u32-little-endian
    ordering: strict-byte-lexicographic-unique
    element_validation: recursive-scalar-contract
system_claim_envelope:
  schema: cxxlens.claim-envelope.v2
  instance_schema: schemas/cxxlens_ng_claim_envelope.schema.yaml
  visibility: system-only
  condition_authority: envelope-presence-only
  user_column_projection: excluded-unless-explicitly-requested
  identity:
    semantic_key:
    - descriptor
    - authoritative-key-tuple
    assertion:
    - semantic-key
    - condition-universe
    - canonical-condition
    - interpretation-domain
    - producer-semantic-contract
    content:
    - assertion
    - authoritative-payload-tuple
  columns:
  - id: system.claim.v2.descriptor
    name: descriptor
    type: relation_descriptor_id
    required: true
    semantic_role: descriptor
  - id: system.claim.v2.semantic_key
    name: semantic_key
    type: semantic_key_id
    required: true
    semantic_role: key
  - id: system.claim.v2.assertion
    name: assertion
    type: assertion_id
    required: true
    semantic_role: assertion
  - id: system.claim.v2.content
    name: content
    type: content_digest
    required: true
    semantic_role: content
  - id: system.claim.v2.presence
    name: presence
    type: condition_ref
    required: true
    semantic_role: condition
  - id: system.claim.v2.interpretation
    name: interpretation
    type: interpretation_domain_id
    required: true
    semantic_role: interpretation
  - id: system.claim.v2.stage
    name: stage
    type: closed_symbol<claim-stage/1>
    required: true
    semantic_role: stage
  - id: system.claim.v2.producer
    name: producer
    type: producer_ref
    required: true
    semantic_role: producer
  - id: system.claim.v2.producer_input_basis
    name: producer_input_basis
    type: tagged<producer-input-basis/1>
    required: true
    semantic_role: producer
  - id: system.claim.v2.provenance_root
    name: provenance_root
    type: evidence_id
    required: true
    semantic_role: provenance
  - id: system.claim.v2.guarantee
    name: guarantee
    type: guarantee
    required: true
    semantic_role: guarantee
api_projection:
  static:
    descriptor_source: relations[].descriptor_id
    column_source: relations[].columns[].id
  dynamic:
    relation_lookup:
    - name
    - semantic-major
    descriptor_result: relations[].descriptor_id
    column_lookup: name
    column_result: relations[].columns[].id
  logical_ir:
    relation_operand: descriptor_id
    column_operand: column_id
  parity: exact-id-equality
symbol_contracts:
- id: claim-stage/1
  openness: closed
  values:
  - assertion
  - canonical_claim
  - derived_claim
  unknown_value: reject
- id: cc.canonicalization-state/1
  openness: closed
  values:
  - canonicalized
  - provider_local
  - ambiguous_equivalence_set
  unknown_value: reject
- id: core.claim-conflict-kind/1
  openness: closed
  values:
  - authoritative_payload_mismatch
  unknown_value: reject
- id: cc.call-kind/1
  openness: open
  values:
  - function
  - member
  - constructor
  - destructor
  - operator
  - indirect
  unknown_value: preserve
- id: company.lock-mode/1
  openness: open
  values:
  - exclusive
  - shared
  - upgrade
  unknown_value: preserve
evolution_policies:
- id: ng0.additive.v1
  patch:
  - documentation
  - test-metadata
  - validation-message
  minor:
  - optional-column
  - index-hint
  - partition-hint
  - open-symbol
  - optional-capability
  - unknown-preserving-metadata
  major:
  - key
  - column-semantics
  - required-column
  - cardinality
  - condition-semantics
  - closure-interpretation
  - identity-contract
  - closed-symbol
  - source-coordinate-semantics
  old_reader_unknown_optional: preserve
  new_reader_missing_optional: absent
