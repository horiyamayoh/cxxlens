$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.store-conformance-vectors.v1
type: object
additionalProperties: false
required: [schema, document_version, authority, contract, vectors]
properties:
  schema: {const: cxxlens.store-conformance-vectors.v1}
  document_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  authority:
    type: object
    additionalProperties: false
    required: [owner_issue, decision_adr]
    properties:
      owner_issue: {const: '#63'}
      decision_adr:
        const: docs/design/adr/0009-snapshot-identity-publication-series.md
  contract: {const: schemas/cxxlens_ng_snapshot_store_contract.yaml}
  vectors:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, class, operation, input, expected]
      properties:
        id: {type: string, pattern: '^[a-z][a-z0-9_.-]+$'}
        class: {enum: [positive, negative]}
        operation:
          enum:
            - identity_graph
            - claim_identity
            - producer_basis
            - closure_binding
            - closure_mutation_matrix
            - snapshot_digest_matrix
            - select_current
            - publish
            - compact
            - format_open
            - collision
            - open_publication
        input: {type: object, additionalProperties: true}
        expected:
          type: object
          additionalProperties: false
          required: [decision, reason_code]
          properties:
            decision: {enum: [accepted, rejected]}
            reason_code: {type: string, pattern: '^store\.[a-z0-9_.-]+$'}
            value: {}
