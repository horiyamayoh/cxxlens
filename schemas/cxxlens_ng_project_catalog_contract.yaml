schema: cxxlens.project-catalog-contract.v1
document_version: 1.0.0
maturity: accepted
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md#53-canonical-tuple
  decision_adr: docs/design/adr/0063-project-catalog-bottom-up-identity.md
