$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.effect-summary-report.v1.schema.yaml
title: cxxlens effect summary report v1
type: object
additionalProperties: false
required: [schema, snapshot, provider_version, converged, summaries, diagnostics, unresolved, coverage]
properties:
  schema: {const: cxxlens.effect-summary-report.v1}
  snapshot: {type: string, minLength: 1}
  provider_version: {type: string, minLength: 1}
  converged: {type: boolean}
  summaries:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [id, callable, signature, model_pack, context, variants, effects, inputs_to_return, inputs_to_output, confidence, evidence]
      properties:
        id: {type: string, minLength: 1}
        callable: {type: string, minLength: 1}
        signature: {type: string, minLength: 1}
        model_pack: {type: string, minLength: 1}
        context: {type: string, minLength: 1}
        variants: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
        effects: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
        inputs_to_return: {type: array, uniqueItems: true, items: {type: integer, minimum: 0}}
        inputs_to_output: {type: array, items: {type: array, prefixItems: [{type: integer, minimum: 0}, {type: integer, minimum: 0}], items: false}}
        confidence: {enum: [certain, probable, possible, speculative]}
        evidence: {type: array, items: {type: object}}
  diagnostics: {type: array, items: {type: object}}
  unresolved: {type: array, items: {type: object}}
  coverage: {type: object}
