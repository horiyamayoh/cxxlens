    - docs/development/testing-fixtures.md
    - docs/doxygen-main.md
    - docs/support-matrix.md
    - docs/tutorials/README.md
  stale_markers:
    - id: legacy-api-id
      pattern: '\bAPI-[A-Z][A-Z0-9-]*-[0-9]{3}\b'
      allowed_paths: []
    - id: central-fact-kind
      pattern: '\bfact_kind(?:::[a-z_]+)?\b'
      allowed_paths:
        - docs/design/adr/0003-versioned-relation-kernel.md
        - docs/design/cxxlens_next_generation_integrated_design_ja.md
    - id: legacy-api-freeze
      pattern: '(cxxlens_public_api_contract|124 API|124 public API|旧 124 API|public API contract freeze)'
      allowed_paths:
        - AGENTS.md
        - CONTRIBUTING.md
        - README.md
        - docs/archive/README.md
        - docs/design/README.md
        - docs/design/adr/0002-semantic-relation-platform.md
        - docs/design/adr/0004-legacy-contract-reset.md
        - docs/design/cxxlens_next_generation_integrated_design_ja.md
    - id: legacy-milestone
      pattern: '(\bPhase [ABC]\b|\bM[012]\b|M0/M1/M2)'
      allowed_paths:
        - README.md
        - docs/design/README.md
        - docs/design/adr/0004-legacy-contract-reset.md
        - docs/design/cxxlens_next_generation_integrated_design_ja.md
        - docs/development/architecture.md
        - docs/development/build-and-test.md
        - docs/development/testing-fixtures.md
        - docs/support-matrix.md
    - id: legacy-package-contract
      pattern: '(package_contract_|Package Contract)'
      allowed_paths:
        - docs/archive/README.md
        - docs/design/README.md
    - id: use-case-kernel
      pattern: '(use-case-driven|public use-case API|use-case 固定)'
      allowed_paths:
        - docs/archive/README.md
        - docs/design/adr/0003-versioned-relation-kernel.md
        - docs/design/cxxlens_next_generation_integrated_design_ja.md
