$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.query-plan.v1.schema.yaml
title: cxxlens internal deterministic query plan v1
type: object
additionalProperties: false
required:
- schema
- semantics_version
- library_version
- selector
- reusable_subexpression_key
- snapshot_key
- minimum_precision
- required_facts
- required_capabilities
- candidate_budget
- refinement_budget
- result_limit
- stages
properties:
  schema: {const: cxxlens.query-plan.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  selector: {type: string}
  reusable_subexpression_key: {type: string, minLength: 1}
  snapshot_key: {type: string, minLength: 1}
  minimum_precision: {type: string}
  required_facts:
    type: array
    uniqueItems: true
    items: {type: string}
  required_capabilities:
    type: array
    uniqueItems: true
    items: {type: string}
  candidate_budget: {type: integer, minimum: 1}
  refinement_budget: {type: integer, minimum: 1}
  result_limit: {type: [integer, 'null'], minimum: 0}
  stages:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, kind, inputs, required_facts, estimated_cost, optional]
      properties:
        id: {type: string, minLength: 1}
        kind: {type: string}
        inputs: {type: array, items: {type: string}}
        required_facts: {type: array, uniqueItems: true, items: {type: string}}
        estimated_cost: {type: integer, minimum: 0}
        optional: {type: boolean}
