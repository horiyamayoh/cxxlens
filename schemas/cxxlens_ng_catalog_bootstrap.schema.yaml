$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-catalog-bootstrap.v1
title: cxxlens next-generation catalog bootstrap
type: object
additionalProperties: false
required:
  - schema
  - kind
  - document_version
  - maturity
  - authority
  - compatibility
  - replaces
  - entries
properties:
  schema:
    const: cxxlens.ng-catalog-bootstrap.v1
  kind:
    enum:
      - relation-registry
      - provider-protocol
      - public-cpp-api-catalog
      - acceptance-manifest
      - security-profile
  document_version:
    type: string
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
  maturity:
    enum: [bootstrap, contract-candidate, accepted, qualified]
  authority:
    type: object
    additionalProperties: false
    required: [design, index, bootstrap_issue, owner]
    properties:
      design:
        const: docs/design/cxxlens_next_generation_integrated_design_ja.md
      index:
        const: docs/design/catalogs/README.md
      bootstrap_issue:
        const: '#58'
      owner:
        const: steward.ng-catalogs
  compatibility:
    type: object
    additionalProperties: false
    required: [version_axis, current, exact_contract_issue]
    properties:
      version_axis:
        type: string
        minLength: 1
      current:
        type: string
        pattern: '^[0-9]+\.[0-9]+\.[0-9]+-bootstrap$'
      exact_contract_issue:
        type: string
        pattern: '^#[0-9]+$'
  replaces:
    type: array
    uniqueItems: true
    items:
      type: string
      minLength: 1
  entries:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, status, owner_issue, profile, contract_issue, summary]
      properties:
        id:
          type: string
          pattern: '^[a-z][a-z0-9.-]+$'
        status:
          enum: [contract-pending, accepted, implemented, qualified, unsupported]
        owner_issue:
          type: string
          pattern: '^#[0-9]+$'
        profile:
          enum: [NG0, NG1, NG2, NG3, release]
        contract_issue:
          type: string
          pattern: '^#[0-9]+$'
        depends_on:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: '^[a-z][a-z0-9.-]+$'
        summary:
          type: string
          minLength: 1
