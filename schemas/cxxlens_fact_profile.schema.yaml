$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.fact-profile.v1.json
title: cxxlens.fact-profile.v1
type: object
required: [schema, semantics_version, library_version, kinds, precision]
additionalProperties: false
properties:
  schema: {const: cxxlens.fact-profile.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  kinds:
    type: array
    items:
      enum:
      - file
      - compile_command
      - symbol
      - type
      - declaration
      - definition
      - reference
      - call
      - construction
      - conversion
      - inheritance
      - override_relation
      - include_relation
      - macro_definition
      - macro_expansion
      - cfg_summary
      - flow_summary
      - effect_summary
      - dynamic_observation
      - coverage_region
      - custom
    uniqueItems: true
  precision:
    enum:
    - ast_structural
    - local_semantic
    - workspace_semantic
    - local_flow
    - interprocedural_summary
    - path_sensitive
    - dynamic_observation
