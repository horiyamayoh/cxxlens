$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.fact-requirement.v1.json
title: cxxlens.fact-requirement.v1
type: object
required: [schema, semantics_version, library_version, file, compile_unit, variant,
           fact_kind, precision, input_digest, requirement_id]
additionalProperties: false
properties:
  schema: {const: cxxlens.fact-requirement.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  file: {type: string, minLength: 1, pattern: '^(?!/).+'}
  compile_unit: {type: string, pattern: '^cu_[0-9a-f]{64}$'}
  variant: {type: string, pattern: '^variant_[0-9a-f]{64}$'}
  fact_kind: {type: integer, minimum: 0, maximum: 20}
  precision: {type: integer, minimum: 0, maximum: 6}
  input_digest: {type: string, pattern: '^[0-9a-f]{16,64}$'}
  requirement_id:
    type: string
    pattern: '^f=[0-9a-f]+;u=cu_[0-9a-f]{64};v=variant_[0-9a-f]{64};k=[0-9]+;p=[0-9]+;i=[0-9a-f]{16,64}$'
