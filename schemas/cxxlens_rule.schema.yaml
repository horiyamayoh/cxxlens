$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.rule.v1.schema.yaml
title: cxxlens immutable rule v1
type: object
additionalProperties: false
required: [schema, semantics_version, id, version, metadata, when, unless, requirements, diagnostics, fix_proposal]
properties:
  schema: {const: cxxlens.rule.v1}
  semantics_version: {const: 1.0.0}
  id: {type: string, pattern: '^[a-z][a-z0-9_.-]*$'}
  version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$'}
  metadata:
    type: object
    additionalProperties: false
    required: [title, description, category, tags, severity, confidence]
    properties:
      title: {type: string, minLength: 1}
      description: {type: string, minLength: 1}
      category: {type: string, minLength: 1}
      tags: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
      severity: {enum: [note, info, warning, error, fatal]}
      confidence: {enum: [certain, probable, possible, heuristic]}
  when: {type: object}
  unless: {type: [object, 'null']}
  requirements: {type: object}
  diagnostics:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [kind, text, placeholders]
      properties:
        kind: {enum: [diagnose, note]}
        text: {type: string, minLength: 1}
        placeholders: {type: array, uniqueItems: true, items: {type: string, pattern: '^[a-z][a-z0-9_.-]*$'}}
  fix_proposal: {type: [object, 'null']}
