$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.query-execution-result.v1
title: cxxlens deterministic query execution result
type: object
additionalProperties: false
required:
  - schema
  - logical_ir_digest
  - snapshot_id
  - publication_id
  - status
  - ordered
  - rows
  - input_coverage
  - closure_ids
  - unresolved
  - conflicts
  - differential_disagreements
  - producer_contracts
  - summary_guarantee
  - inputs_complete
  - closed
  - logical_explanation
  - physical_explanation
properties:
  schema: {const: cxxlens.query-execution-result.v1}
  logical_ir_digest: {$ref: '#/$defs/semantic_digest'}
  snapshot_id: {$ref: '#/$defs/typed_digest'}
  publication_id: {$ref: '#/$defs/typed_digest'}
  status:
    enum: [complete, truncated, cancelled_with_partial, failed_before_result]
  ordered: {type: boolean}
  rows:
    type: array
    items: {$ref: '#/$defs/row'}
  input_coverage:
    type: array
    items: {$ref: '#/$defs/coverage'}
  closure_ids:
    description: Sorted unique certificates applied to every required query input range.
    type: array
    uniqueItems: true
    items: {$ref: '#/$defs/typed_digest'}
  unresolved:
    type: array
    items: {$ref: '#/$defs/unresolved'}
  conflicts:
    type: array
    uniqueItems: true
    items: {$ref: '#/$defs/claim_conflict'}
  differential_disagreements:
    type: array
    items: {$ref: '#/$defs/differential_disagreement'}
  producer_contracts:
    type: array
    uniqueItems: true
    items: {$ref: '#/$defs/producer_contract'}
  summary_guarantee: {$ref: '#/$defs/summary_guarantee'}
  inputs_complete: {type: boolean}
  closed: {type: boolean}
  logical_explanation: {$ref: '#/$defs/explanation'}
  physical_explanation: {$ref: '#/$defs/explanation'}
$defs:
  digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  semantic_digest:
    oneOf:
      - {$ref: '#/$defs/digest'}
      - {type: string, pattern: '^semantic-v2:sha256:[0-9a-f]{64}$'}
  typed_digest:
    type: string
    pattern: '^[a-z][a-z0-9_.-]*:sha256:[0-9a-f]{64}$'
  string_set:
    type: array
    uniqueItems: true
    items: {type: string, minLength: 1}
  nonempty_string_set:
    type: array
    minItems: 1
    uniqueItems: true
    items: {type: string, minLength: 1}
  row:
    type: object
    additionalProperties: false
    required:
      - values
      - multiplicity
      - condition_universe
      - condition_fragments
      - contributor_guarantees
      - interpretation
      - claim_contributors
      - producer_contracts
      - provenance
    properties:
      values: {type: object}
      multiplicity: {type: integer, minimum: 1}
      condition_universe: {type: string, minLength: 1}
      condition_fragments: {$ref: '#/$defs/string_set'}
      contributor_guarantees:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/guarantee'}
      interpretation: {type: string, minLength: 1}
      claim_contributors: {$ref: '#/$defs/string_set'}
      producer_contracts:
        type: array
        uniqueItems: true
        minItems: 1
        items: {$ref: '#/$defs/producer_contract'}
      provenance: {$ref: '#/$defs/string_set'}
  coverage:
    type: object
    additionalProperties: false
    required: [relation, domain, key, state, reason]
    properties:
      relation: {type: string, minLength: 1}
      domain: {type: string, minLength: 1}
      key: {type: string, minLength: 1}
      state: {type: string, minLength: 1}
      reason: {type: string}
  unresolved:
    type: object
    additionalProperties: false
    required: [code, subject, detail]
    properties:
      code: {type: string, pattern: '^sdk\.query-[a-z0-9-]+$'}
      subject: {type: string}
      detail: {type: string}
  producer_contract:
    type: object
    additionalProperties: false
    required: [id, semantic_contract]
    properties:
      id: {type: string, minLength: 1}
      semantic_contract: {$ref: '#/$defs/digest'}
  claim_conflict:
    type: object
    additionalProperties: false
    required:
      - relation
      - semantic_key
      - interpretation
      - overlap_fragments
      - assertions
      - contents
    properties:
      relation: {type: string, minLength: 1}
      semantic_key: {type: string, minLength: 1}
      interpretation: {type: string, minLength: 1}
      overlap_fragments: {$ref: '#/$defs/nonempty_string_set'}
      assertions: {$ref: '#/$defs/nonempty_string_set'}
      contents: {$ref: '#/$defs/nonempty_string_set'}
  differential_disagreement:
    type: object
    additionalProperties: false
    required:
      - relation
      - semantic_key
      - left_interpretation
      - right_interpretation
      - left_content
      - right_content
      - overlap_fragments
    properties:
      relation: {type: string, minLength: 1}
      semantic_key: {type: string, minLength: 1}
      left_interpretation: {type: string, minLength: 1}
      right_interpretation: {type: string, minLength: 1}
      left_content: {type: string, minLength: 1}
      right_content: {type: string, minLength: 1}
      overlap_fragments: {$ref: '#/$defs/string_set'}
  guarantee:
    type: object
    additionalProperties: false
    required: [approximation, scope, assumptions, verification_modalities]
    properties:
      approximation:
        enum: [unknown, under_approximation, over_approximation, exact]
      scope: {type: string, minLength: 1}
      assumptions: {type: string, minLength: 1}
      verification_modalities: {$ref: '#/$defs/string_set'}
  guarantee_fragment:
    type: object
    additionalProperties: false
    required:
      - guarantee
      - condition_universe
      - condition_fragments
      - interpretation
      - assumptions
      - claim_contributors
      - provenance
      - coverage_states
      - closure_ids
      - condition_partition_complete
      - conflicting
      - unresolved
      - requires_closure
    properties:
      guarantee: {$ref: '#/$defs/guarantee'}
      condition_universe: {type: string, minLength: 1}
      condition_fragments: {$ref: '#/$defs/string_set'}
      interpretation: {type: string, minLength: 1}
      assumptions: {$ref: '#/$defs/string_set'}
      claim_contributors: {$ref: '#/$defs/string_set'}
      provenance: {$ref: '#/$defs/string_set'}
      coverage_states: {$ref: '#/$defs/string_set'}
      closure_ids: {$ref: '#/$defs/string_set'}
      condition_partition_complete: {type: boolean}
      conflicting: {type: boolean}
      unresolved: {type: boolean}
      requires_closure: {type: boolean}
  summary_guarantee:
    type: object
    additionalProperties: false
    required:
      - approximation
      - scope
      - condition_partition
      - interpretation_partitions
      - assumptions
      - verification_modalities
      - fragment_count
      - fragment_set_digest
      - drill_down_ref
      - fragments
    properties:
      approximation:
        enum: [unknown, under_approximation, over_approximation, exact]
      scope: {type: string, minLength: 1}
      condition_partition:
        type: object
        additionalProperties: false
        required: [universe, alternatives]
        properties:
          universe: {type: string, minLength: 1}
          alternatives: {$ref: '#/$defs/string_set'}
      interpretation_partitions: {$ref: '#/$defs/nonempty_string_set'}
      assumptions: {$ref: '#/$defs/string_set'}
      verification_modalities: {$ref: '#/$defs/string_set'}
      fragment_count: {type: integer, minimum: 1}
      fragment_set_digest: {$ref: '#/$defs/semantic_digest'}
      drill_down_ref: {type: string, pattern: '^fragments:semantic-v2:sha256:[0-9a-f]{64}$'}
      fragments:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/guarantee_fragment'}
  explanation:
    type: object
    additionalProperties: false
    required: [id, text]
    properties:
      id: {type: string, minLength: 1}
      text: {type: string, minLength: 1}
