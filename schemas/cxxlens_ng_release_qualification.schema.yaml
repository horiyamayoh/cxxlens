$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-release-qualification.v1
type: object
additionalProperties: false
required: [schema, document_version, maturity, authority, binding, prerequisites, package, materialization, sqlite_store_v3_qualification, provider, security, performance, documentation, claim_policy, required_artifacts]
properties:
  schema: {const: cxxlens.ng-release-qualification.v1}
  document_version: {const: 1.7.0}
  maturity: {const: implemented}
  authority:
    type: object
    additionalProperties: false
    required: [design, adr, amendments, owner_issue]
    properties:
      design: {const: docs/design/cxxlens_next_generation_integrated_design_ja.md}
      adr: {const: docs/design/adr/0091-distribution-1-production-qualification.md}
      amendments: {const: [docs/design/adr/0096-clang22-installed-materialization-boundary.md, docs/design/adr/0097-sqlite-v3-chunked-payload-migration.md]}
      owner_issue: {const: '#167'}
  binding:
    type: object
    additionalProperties: false
    required: [release, package_version, acceptance_gate, branch, ci_job, report_schema, report_artifact]
    properties:
      release: {const: distribution-1.0}
      package_version: {const: 1.0.0}
      acceptance_gate: {const: gate.release}
      branch: {const: main}
      ci_job: {const: release-qualification}
      report_schema: {const: cxxlens.ng-release-qualification-report.v1}
      report_artifact: {const: 'cxxlens-ng-release-qualification-${revision}'}
  prerequisites:
    type: object
    additionalProperties: false
    required: [gates, migrations, r0_r3_evidence, readiness_evidence, public_callable_evidence, r4_evidence, sqlite_store_v3_evidence, release_evaluation_evidence, same_revision]
    properties:
      gates: {const: [gate.g0, gate.g1, gate.g2, gate.g3, gate.g4, gate.g5]}
      migrations: {const: [R0, R1, R2, R3, R4]}
      r0_r3_evidence: {const: cxxlens.ng-foundation-completion-report.v1}
      readiness_evidence: {const: cxxlens.ng-api-development-readiness-report.v1}
      public_callable_evidence: {const: cxxlens.ng-public-callable-inventory-report.v1}
      r4_evidence: {const: cxxlens.ng-g5-qualification-report.v1}
      sqlite_store_v3_evidence: {const: cxxlens.ng-sqlite-store-v3-qualification-report.v1}
      release_evaluation_evidence: {const: cxxlens.ng-release-qualification-evaluation-report.v1}
      same_revision: {const: required}
  package:
    type: object
    additionalProperties: false
    required: [configurations, prefix_relocation, real_project_consumer, storage_backends, required_files]
    properties:
      configurations:
        const:
          - {id: static, build_shared: 'OFF'}
          - {id: shared, build_shared: 'ON'}
      prefix_relocation: {const: required}
      real_project_consumer: {const: install.real-project-consumer}
      storage_backends: {const: [memory, sqlite]}
      required_files:
        type: array
        minItems: 4
        uniqueItems: true
        items: {$ref: '#/$defs/text'}
  materialization:
    const:
      tool: cxxlens-clang22-materialize
      contract: schemas/cxxlens_ng_clang22_materialization_contract.yaml
      contract_schema: schemas/cxxlens_ng_clang22_materialization_contract.schema.yaml
      request_schema: schemas/cxxlens_ng_clang22_materialization_request.schema.yaml
      report_schema: schemas/cxxlens_ng_clang22_materialization_report.schema.yaml
      occurrence_manifest_schema: schemas/cxxlens_ng_clang22_materializer_occurrence_manifest.schema.yaml
      occurrence_manifest_path: share/cxxlens/materialization/clang22/occurrence-v1.json
      request_filename: cxxlens-clang22-materialization-request.json
      report_filename: cxxlens-clang22-materialization-report.json
      execution_receipt_filename: cxxlens-clang22-materialization-execution-receipt.json
      execution_receipt_schema: schemas/cxxlens_ng_clang22_materialization_execution_receipt.schema.yaml
      execution_receipt:
        schema: cxxlens.clang22-materialization-execution-receipt.v1
        encoding: strict-json-single-object
        maximum_bytes: 65536
        fields: [actual_exit_status, exact_stdout_byte_count, stdout_sha256, parsed_response_count, stderr_sha256]
        report_cross_binding: exact-stdout-bytes-equal-report-artifact
        qualified: {actual_exit_status: 0, parsed_response_count: 1}
        schema_valid_failure: {actual_exit_status: 1, parsed_response_count: 1, release_eligible: false}
        no_response_failure: {actual_exit_status: 2, parsed_response_count: 0, release_eligible: false}
      configurations: [static, shared]
      cardinality: exactly-one-per-configuration-and-backend
      relocated_installed_execution: required
      runtime_loader_environment: unset
      storage_backends: [memory, sqlite]
      exact_observation_equivalence: required-zero-non-exact-per-descriptor
      tuple_evidence_binding: exact-configuration-two-report-set-digest
      report_set_digest:
        algorithm: sha256
        encoding: canonical-json-sorted-keys-no-whitespace
        projection: [configuration, reports]
        backend_order: [memory, sqlite]
        report_entry_fields: [backend, report_digest, execution_receipt_digest]
  sqlite_store_v3_qualification:
    const:
      authority: docs/design/adr/0097-sqlite-v3-chunked-payload-migration.md
      report_schema: schemas/cxxlens_ng_sqlite_store_v3_qualification_report.schema.yaml
      checker: tools/quality/check_ng_sqlite_store_v3_qualification.py
      report_filename: cxxlens-ng-sqlite-store-v3-qualification-report.json
      report_artifact: cxxlens-ng-sqlite-store-v3-qualification-${revision}
      maximum_bytes: 16777216
      status: required
      binding: exact-revision-source-tree-schema-contract-artifact-and-report-set-digests
      configurations: [static, shared]
      required_cases: [current-v3.0.0-cold-reopen, v2.6.0-read-only-zero-mutation, compact-v2.6.0-to-v3.0.0-same-semantic-digest, limit-length-exceeding-valid-canonical-v5-reopened-parity]
  provider:
    type: object
    additionalProperties: false
    required: [provider_id, provider_version, relations, relation_descriptors, observation_relation_descriptors, interpretation, qualification, capabilities, guarantee, binary_digest_source, static_pending_tuple_is_production, required_positive_evidence]
    properties:
      provider_id: {const: cxxlens.clang22.reference}
      provider_version: {const: 1.0.0}
      relations: {const: [cc.entity@1, cc.call_site@1, cc.call_direct_target@1]}
      relation_descriptors: {const: [cc.entity.v1, cc.call_site.v1, cc.call_direct_target.v1]}
      observation_relation_descriptors: {const: [frontend.clang22.call_observation.v2, frontend.clang22.entity_observation.v2, frontend.clang22.type_observation.v2]}
      interpretation: {const: cc.clang22-canonical-1}
      qualification: {const: production-supported}
      capabilities: {const: [canonical-entity, call-site, direct-target, process-isolation]}
      guarantee: {const: exact-claims-with-coverage-unresolved-and-provenance}
      binary_digest_source: {const: installed-worker-file}
      static_pending_tuple_is_production: {const: forbidden}
      required_positive_evidence:
        const: [adapter.clang22-provider-normalizer, sdk.example-clang22-native, install.clang22-materialization]
  security:
    type: object
    additionalProperties: false
    required: [profile, conformance_report_schema, required_negative_evidence]
    properties:
      profile: {const: schemas/cxxlens_ng_security_profile.yaml}
      conformance_report_schema: {const: cxxlens.security-conformance-report.v1}
      required_negative_evidence:
        type: array
        minItems: 5
        uniqueItems: true
        items: {$ref: '#/$defs/text'}
  performance:
    type: object
    additionalProperties: false
    required: [authority, report_schema, exact_revision]
    properties:
      authority: {const: schemas/cxxlens_ng_g5_qualification.yaml}
      report_schema: {const: cxxlens.ng-g5-qualification-report.v1}
      exact_revision: {const: required}
  documentation:
    type: object
    additionalProperties: false
    required: [doxygen_contract, public_callable_inventory, public_callable_inventory_schema, public_callable_report_schema, public_callable_report_filename, public_callable_review_filename, support_matrix]
    properties:
      doxygen_contract: {const: required}
      public_callable_inventory: {const: schemas/cxxlens_ng_public_callable_inventory.yaml}
      public_callable_inventory_schema: {const: schemas/cxxlens_ng_public_callable_inventory.schema.yaml}
      public_callable_report_schema: {const: schemas/cxxlens_ng_public_callable_inventory_report.schema.yaml}
      public_callable_report_filename: {const: cxxlens-ng-public-callable-inventory-report.json}
      public_callable_review_filename: {const: cxxlens-ng-public-callable-inventory-review.md}
      support_matrix: {const: docs/support-matrix.md}
  claim_policy:
    type: object
    additionalProperties: false
    required: [production_authority, required_tuple_fields, required_claim_fields, pending_or_wildcard, unlisted_surface, tuple_evidence_projection]
    properties:
      production_authority: {const: exact-gr-report-tuple-only}
      required_tuple_fields: {const: [provider_id, provider_version, binary_digest, relation, interpretation, toolchain, platform]}
      required_claim_fields: {const: [capabilities, guarantee, security_profile_digest, evidence_digest]}
      pending_or_wildcard: {const: forbidden}
      unlisted_surface: {const: unsupported}
      tuple_evidence_projection: {const: [install_manifest, installed_worker, materialization_tool, materialization_request_artifacts, materialization_report_set, materialization_contract, sqlite_store_v3_qualification, g5_report, security_report, public_callable_report, configuration]}
  required_artifacts:
    type: array
    minItems: 10
    uniqueItems: true
    items: {$ref: '#/$defs/text'}
$defs:
  text: {type: string, minLength: 1}
