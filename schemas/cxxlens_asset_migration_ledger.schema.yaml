$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.asset-migration-ledger.v2
title: cxxlens completed tracked asset migration ledger
type: object
additionalProperties: false
required: [schema, document_version, generated_by, source_policy, asset_count, classifications, assets]
properties:
  schema:
    const: cxxlens.asset-migration-ledger.v2
  document_version:
    const: 2.0.0
  generated_by:
    const: tools/quality/check_documentation_consistency.py
  source_policy:
    const: schemas/cxxlens_asset_migration_policy.yaml
  asset_count:
    type: integer
    minimum: 1
  classifications:
    type: object
    additionalProperties: false
    required: [active, archived, generated]
    properties:
      active: {type: integer, minimum: 0}
      archived: {type: integer, minimum: 0}
      generated: {type: integer, minimum: 0}
  assets:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [path, status, authority, replacement, removal_issue]
      properties:
        path: {type: string, minLength: 1}
        status:
          enum: [active, archived, generated]
        authority:
          enum: [active, historical, generated-inventory]
        replacement:
          type: [string, 'null']
        removal_issue:
          anyOf:
            - type: 'null'
            - const: '#72'
