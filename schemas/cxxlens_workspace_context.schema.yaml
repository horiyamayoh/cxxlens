$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.workspace-context.v1.json
title: cxxlens.workspace-context.v1
type: object
required: [schema, semantics_version, library_version, compatible, header_inference, query, snapshot_key, stale_inputs, units]
additionalProperties: false
properties:
  schema: {const: cxxlens.workspace-context.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  compatible: {type: boolean}
  header_inference: {enum: [none, stem-match]}
  query: {type: string}
  snapshot_key: {type: string, pattern: '^snapshot_[0-9a-f]{64}$'}
  stale_inputs:
    type: array
    items: {type: string}
    uniqueItems: true
  units:
    type: array
    items:
      type: object
      required: [arguments, command_digest, compile_unit_id, directory, driver_mode, file, includes, language_standard, macros, resource_directory, response_files_expanded, system_includes, target, undefines, variant_id]
      additionalProperties: false
      properties:
        arguments: {type: array, items: {type: string}}
        command_digest: {type: string, pattern: '^[0-9a-f]{64}$'}
        compile_unit_id: {type: string, pattern: '^cu_[0-9a-f]{64}$'}
        directory: {type: string}
        driver_mode: {enum: [c, c++]}
        file: {type: string}
        includes: {type: array, items: {type: string}, uniqueItems: true}
        language_standard: {type: string}
        macros: {type: array, items: {type: string}, uniqueItems: true}
        resource_directory: {type: [string, 'null']}
        response_files_expanded: {const: true}
        system_includes: {type: array, items: {type: string}, uniqueItems: true}
        target: {type: string}
        undefines: {type: array, items: {type: string}, uniqueItems: true}
        variant_id: {type: string, pattern: '^variant_[0-9a-f]{64}$'}
