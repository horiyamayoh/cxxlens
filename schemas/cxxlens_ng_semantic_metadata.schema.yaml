$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.semantic-metadata.v1
type: object
additionalProperties: false
required: [schema, truth, guarantee, contributors, provenance_root]
properties:
  schema: {const: cxxlens.semantic-metadata.v1}
  truth:
    type: object
    additionalProperties: false
    required: [positive, negative]
    properties: {positive: {type: boolean}, negative: {type: boolean}}
  guarantee:
    type: object
    additionalProperties: false
    required: [approximation, scope, condition, interpretation, assumptions, verification_modalities, coverage, closures]
    properties:
      approximation: {enum: [unknown, under_approximation, over_approximation, exact]}
      scope: {type: string, minLength: 1}
      condition: {type: string, minLength: 1}
      interpretation: {type: string, minLength: 1}
      assumptions: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
      verification_modalities: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
      coverage:
        type: array
        items: {enum: [covered, excluded, not_applicable, failed, unresolved, unsupported, stale, truncated]}
      closures: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
      confidence:
        type: object
        additionalProperties: false
        required: [value, calibration_id, population_id, metric]
        properties:
          value: {type: number, minimum: 0, maximum: 1}
          calibration_id: {type: string, minLength: 1}
          population_id: {type: string, minLength: 1}
          metric: {type: string, minLength: 1}
  contributors: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
  provenance_root: {type: string, minLength: 1}
