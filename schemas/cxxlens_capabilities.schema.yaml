$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.capabilities.v1.json
title: cxxlens.capabilities.v1
type: object
required: [schema, semantics_version, library_version, capabilities]
additionalProperties: false
properties:
  schema: {const: cxxlens.capabilities.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  capabilities:
    type: array
    items:
      type: object
      required: [id, state, summary, limitation]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^[a-z][a-z0-9_-]*(\.[a-z][a-z0-9_-]*)+$'}
        state:
          enum: [available, experimental, disabled_at_build, unavailable_for_llvm,
                 unavailable_for_platform]
        summary: {type: string, minLength: 1}
        limitation:
          oneOf:
          - {type: 'null'}
          - {type: string, minLength: 1}
    uniqueItems: true
