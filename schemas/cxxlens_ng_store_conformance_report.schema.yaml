$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.store-conformance-report.v1
type: object
additionalProperties: false
required: [schema, contract_digest, vector_results, perturbation_matrix, status]
properties:
  schema: {const: cxxlens.store-conformance-report.v1}
  contract_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  vector_results:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, decision, reason_code, matched]
      properties:
        id: {type: string, minLength: 1}
        decision: {enum: [accepted, rejected]}
        reason_code: {type: string, pattern: '^store\.[a-z0-9_.-]+$'}
        value: {}
        matched: {const: true}
  perturbation_matrix:
    type: object
    additionalProperties: false
    required: [backends, roots, jobs, orders, comparisons, all_equal]
    properties:
      backends: {const: [memory, sqlite]}
      roots: {const: [root-a, root-b]}
      jobs: {const: [1, 2, 8]}
      orders: {const: [forward, reverse, seeded-shuffle]}
      comparisons: {const: 36}
      all_equal: {const: true}
  status: {const: green}
