$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.public-api-contract-freeze.v1.schema.yaml
title: cxxlens public API contract freeze v1
type: object
additionalProperties: false
required: [schema, document_version, state, phase_c_authorized, repository, inputs, summary, coverage, evidence, authorization]
properties:
  schema: {const: cxxlens.public-api-contract-freeze.v1}
  document_version: {const: 1.0.0}
  state: {const: frozen}
  phase_c_authorized: {const: true}
  repository:
    oneOf:
      - $ref: '#/$defs/source_binding'
      - $ref: '#/$defs/exact_binding'
  inputs:
    type: object
    additionalProperties: false
    required: [fingerprint, categories]
    properties:
      fingerprint: {$ref: '#/$defs/digest'}
      categories:
        type: array
        minItems: 10
        uniqueItems: true
        items: {$ref: '#/$defs/input_category'}
  summary:
    type: object
    additionalProperties: false
    required: [packages, apis, atomic_units, exact_declarations, unresolved_declarations, implementation_states, contract_states, readiness_states]
    properties:
      packages: {const: 22}
      apis: {const: 124}
      atomic_units: {const: 124}
      exact_declarations: {const: 124}
      unresolved_declarations: {const: 0}
      implementation_states:
        type: object
        additionalProperties: false
        required: [conformant, unimplemented]
        properties:
          conformant: {const: 47}
          unimplemented: {const: 77}
      contract_states:
        type: object
        additionalProperties: false
        required: [frozen]
        properties: {frozen: {const: 22}}
      readiness_states:
        type: object
        additionalProperties: false
        required: [blocked, complete]
        properties:
          blocked: {const: 77}
          complete: {const: 47}
  coverage:
    type: object
    additionalProperties: false
    required: [package_owners, api_primary_owners, ownership_registry, downstream_edges]
    properties:
      package_owners:
        type: array
        minItems: 22
        maxItems: 22
        items: {$ref: '#/$defs/package_owner'}
      api_primary_owners:
        type: array
        minItems: 124
        maxItems: 124
        items: {$ref: '#/$defs/api_owner'}
      ownership_registry: {$ref: '#/$defs/ownership_registry'}
      downstream_edges:
        type: object
        additionalProperties: false
        required: [task_packets, ownership_skeletons, ready_apis, authorization_apis]
        properties:
          task_packets: {const: 124}
          ownership_skeletons: {const: 124}
          ready_apis: {const: 124}
          authorization_apis: {const: 124}
  evidence:
    type: object
    additionalProperties: false
    required: [package_validations, phase_a, high_risk, integration]
    properties:
      package_validations:
        type: array
        minItems: 9
        maxItems: 9
        items: {$ref: '#/$defs/package_validation'}
      phase_a:
        type: array
        minItems: 3
        maxItems: 3
        items: {$ref: '#/$defs/artifact_evidence'}
      high_risk:
        type: object
        additionalProperties: false
        required: [state, semantic_digest, candidate_fingerprint_match]
        properties:
          state: {const: validated}
          semantic_digest: {$ref: '#/$defs/digest'}
          candidate_fingerprint_match: {const: true}
      integration:
        type: object
        additionalProperties: false
        required: [state, package_count, api_count, atomic_unit_count, source_tree, installed_tree, compiler_families, linkage]
        properties:
          state: {const: green}
          package_count: {const: 22}
          api_count: {const: 124}
          atomic_unit_count: {const: 124}
          source_tree: {const: true}
          installed_tree: {const: true}
          compiler_families:
            type: array
            prefixItems: [{const: Clang}, {const: GCC}]
            minItems: 2
            maxItems: 2
          linkage:
            type: array
            prefixItems: [{const: shared}, {const: static}]
            minItems: 2
            maxItems: 2
  authorization:
    type: object
    additionalProperties: false
    required: [mode, scope, prerequisite_issues, evidence_binding, drift_policy]
    properties:
      mode: {const: serial-single-writer}
      scope: {const: phase-c-public-api-implementation}
      prerequisite_issues:
        type: array
        minItems: 22
        maxItems: 22
        uniqueItems: true
        items: {pattern: '^#[0-9]+$'}
      evidence_binding: {const: same-git-head}
      drift_policy:
        type: object
        additionalProperties: false
        required: [invalidates_on_input_change, revokes_phase_c_authorization]
        properties:
          invalidates_on_input_change: {const: true}
          revokes_phase_c_authorization: {const: true}
$defs:
  digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  git_sha: {type: string, pattern: '^[0-9a-f]{40}$'}
  source_binding:
    type: object
    additionalProperties: false
    required: [binding, input_fingerprint]
    properties:
      binding: {const: git-head-at-execution}
      input_fingerprint: {$ref: '#/$defs/digest'}
  exact_binding:
    type: object
    additionalProperties: false
    required: [binding, input_fingerprint, commit_sha, tree_sha, evidence_commit_sha, worktree_clean, integration_report]
    properties:
      binding: {const: exact-git-commit}
      input_fingerprint: {$ref: '#/$defs/digest'}
      commit_sha: {$ref: '#/$defs/git_sha'}
      tree_sha: {$ref: '#/$defs/git_sha'}
      evidence_commit_sha: {$ref: '#/$defs/git_sha'}
      worktree_clean: {const: true}
      integration_report: {$ref: '#/$defs/artifact_evidence'}
  input_category:
    type: object
    additionalProperties: false
    required: [id, digest, files]
    properties:
      id: {type: string, pattern: '^[a-z][a-z0-9_]*$'}
      digest: {$ref: '#/$defs/digest'}
      files:
        type: array
        minItems: 1
        items: {$ref: '#/$defs/file_evidence'}
  file_evidence:
    type: object
    additionalProperties: false
    required: [path, sha256]
    properties:
      path: {type: string, minLength: 1}
      sha256: {$ref: '#/$defs/digest'}
  artifact_evidence:
    type: object
    additionalProperties: false
    required: [path, sha256]
    properties:
      path: {type: string, minLength: 1}
      sha256: {$ref: '#/$defs/digest'}
  package_owner:
    type: object
    additionalProperties: false
    required: [package, issue, api_count, state, candidate_fingerprint]
    properties:
      package: {type: string, minLength: 1}
      issue: {pattern: '^#(43|44|45|46|47|48|49|50|51)$'}
      api_count: {type: integer, minimum: 1}
      state: {const: frozen}
      candidate_fingerprint: {$ref: '#/$defs/digest'}
  api_owner:
    type: object
    additionalProperties: false
    required: [api_id, atomic_unit, package, owner_issue, declaration_source, signature_fingerprint, candidate_fingerprint, contract_traceability, implementation_state, readiness_state]
    properties:
      api_id: {pattern: '^API-[A-Z]+-[0-9]{3}$'}
      atomic_unit: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
      package: {type: string, minLength: 1}
      owner_issue: {pattern: '^#(43|44|45|46|47|48|49|50|51)$'}
      declaration_source: {pattern: '^include/cxxlens/.+[.]hpp$'}
      signature_fingerprint: {$ref: '#/$defs/digest'}
      candidate_fingerprint: {$ref: '#/$defs/digest'}
      contract_traceability:
        type: array
        minItems: 1
        uniqueItems: true
        items: {pattern: '^(UC-[A-Z]+|FR|QR)-[0-9]{3}$'}
      implementation_state: {enum: [conformant, unimplemented]}
      readiness_state: {enum: [blocked, complete]}
  ownership_registry:
    type: object
    additionalProperties: false
    required: [public_types, shared_components, providers, schemas, semantic_digest]
    properties:
      public_types: {const: 230}
      shared_components: {const: 66}
      providers: {const: 26}
      schemas: {type: integer, minimum: 84}
      semantic_digest: {$ref: '#/$defs/digest'}
  package_validation:
    type: object
    additionalProperties: false
    required: [issue, result, packages, apis, candidate_fingerprint]
    properties:
      issue: {pattern: '^#(43|44|45|46|47|48|49|50|51)$'}
      result: {const: validated}
      packages: {type: integer, minimum: 1}
      apis: {type: integer, minimum: 1}
      candidate_fingerprint: {$ref: '#/$defs/digest'}
