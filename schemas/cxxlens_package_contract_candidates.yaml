  policies:
  - id: graph.snapshot-construction.v1
    ownership_and_lifetime:
    - Hierarchy/override/call/include construction is detached immutable value state bound to one catalog/fact snapshot and
      owns no AST/backend pointer.
    - Returned spans/references borrow from immutable shared backing until owner destruction; builders retain no caller views.
    const_noexcept_thread_safety:
    - Const snapshot reads are safe concurrently; accessor noexcept functions allocate nothing.
    - Builders and projections return detached values; allocation/serialization may throw std::bad_alloc.
    callback_and_exception:
    - No callback is retained; expected identity/provider/schema/budget failure uses result and stable codes.
    - Traversal never lets provider exceptions cross the engine boundary without typed failure coverage.
    execution_context_and_budgets:
    - Every operation binds cancellation/deadline and positive finite depth/node/edge/path limits before traversal.
    - Filesystem/process/time access remains behind workspace/provider ports; zero never means unbounded.
    result_semantics:
      empty_success: Zero nodes/edges is success only with complete requested-universe coverage and no unresolved rows.
      unresolved: Unknown endpoints, missing facts, cycles requiring downgrade, and open-world targets remain explicit rows.
      unsupported: Unsupported kind/relation/schema is a structured error, never an empty or nearest-version graph.
      ambiguous: All semantic/variant/dynamic candidates survive with evidence and unresolved ambiguity; no first-wins.
      partial: Valid canonical rows survive provider failure or budget truncation with incomplete coverage and downgraded
        guarantee.
      failure: Invalid IDs/limits, dangling edges, conflicting duplicate payload, or schema invariant fails atomically.
    evidence_coverage_guarantee:
    - Each edge/path carries authoritative evidence and graph coverage conserves the full requested universe.
    - Open-world, unresolved, truncation, or provider failure forbids an exact guarantee; confidence cannot upgrade it.
    ordering_duplicates_variants:
    - Nodes, edges, paths, properties, variants, and contributors use declared canonical total orders.
    - Same-ID equal payload merges contributors; conflict rejects; parallel/self/variant edges remain explicit.
    schema_and_versioning:
    - cxxlens.graph.v1 and cxxlens.graph-options.v1 are exact authorities; DOT is presentation only.
