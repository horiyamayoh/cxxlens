  policies:
  - id: rules.immutable-construction.v1
    ownership_and_lifetime:
    - Rule construction uses detached immutable values and retains no caller view, AST/backend pointer, or callback.
    - Borrowed accessors remain valid only while the immutable owner lives; rendered output owns its bytes.
    const_noexcept_thread_safety:
    - Immutable builders and const reads are safe concurrently; no writer is hidden behind const.
    - Noexcept accessors allocate nothing; build/run/render allocation may fail without partial mutation.
    callback_and_exception:
    - Typed diagnostic templates replace retained arbitrary callbacks; placeholders come from a closed registry.
    - Provider/template/render exceptions are caught at the engine boundary and become stable result failures.
    execution_context_and_budgets:
    - Rule runs bind one snapshot, cancellation/deadline, candidate/result budgets, and shared provisioning before evaluation.
    - Report rendering uses a positive byte budget and performs no filesystem/process/time side effect.
    result_semantics:
      empty_success: Empty findings/output is complete only when the authoritative requested universe is completely covered.
      unresolved: Missing providers, candidate ambiguity, unsafe fixes, and unknown/expired suppression state remain typed
        rows.
      unsupported: Unsupported rule/format/schema/version is a structured error without nearest-version fallback.
      ambiguous: All semantic/variant/suppression candidates remain with provenance; no name-only or first-wins choice.
      partial: Valid findings/records survive continue-partial or output truncation with accounting and downgraded guarantee.
      failure: Invalid metadata/template/pattern/input, duplicate conflict, or invariant failure returns no fabricated success.
    evidence_coverage_guarantee:
    - 'Finding authority remains #43; suppression and renderers preserve IDs, evidence, coverage, unresolved, confidence,
      and guarantee.'
    - Suppression/truncation accounting cannot upgrade incomplete authority or hide failed/unresolved requested units.
    ordering_duplicates_variants:
    - 'Rules order by ID/version and findings by #43 canonical order; output never follows worker/container order.'
    - Same-ID equal payload merges contributors; conflict rejects; variants and suppression provenance remain explicit.
    schema_and_versioning:
    - Rule, suppression, report-options, and rendered-report v1 schemas are exact independent axes.
    - Consumer object version incompatibility rejects unless a named migration exists; Markdown/SARIF/diff are projections.
    change_policy:
    - Identity, requirements, failure/suppression precedence, ordering, projection, compatibility, owner, or schema changes
      invalidate fingerprint.
