    - cxxlens.method-spec.v1
    behavior: Versioned generation values are canonical projections of authoritative plan/result rows.
  - id: registry.generate.capabilities.v1
    kind: capability_registry
    owner_atomic_unit: AU-GEN-002
    steward: steward.generate
    entries:
    - generate.atomic-artifact-write
    - generate.compile-verify
    - generate.structural-audit
    behavior: Optional validation is negotiated explicitly and unavailable capabilities remain unresolved.
  - id: registry.mock.errors.v1
    kind: error_registry
    owner_atomic_unit: AU-MOCK-003
    steward: steward.mock
    entries:
    - generate.mock-axis-incomplete
    - generate.mock-target-ambiguous
    - generate.type-unspellable
    behavior: Mock/fake census and all four decision axes fail closed without silent surfaces.
  - id: registry.method-harness.errors.v1
    kind: error_registry
    owner_atomic_unit: AU-METHOD-002
    steward: steward.method-harness
    entries:
    - generate.method-ambiguous
    - generate.method-spec-invalid
    - generate.method-unsupported
    behavior: Parse offsets and zero/one/many resolution use stable codes and evidence.
  - id: registry.copy.errors.v1
    kind: error_registry
    owner_atomic_unit: AU-COPY-001
    steward: steward.copy
    entries:
    - generate.copy-closure-incomplete
    - generate.macro-surface-rejected
    - generate.odr-risk-rejected
