  policies:
  - id: generation.census-plan.v1
    ownership_and_lifetime:
    - Values, builders, plans and results are immutable detached values; no AST pointer escapes a frontend job.
    const_noexcept_thread_safety:
    - Const observers are concurrent-read safe; workspace operations use one immutable snapshot and explicit execution context.
    callback_and_exception:
    - Provider, formatter, frontend, compiler and link exceptions become typed failure/unresolved rows and cannot cross the
      API boundary.
    execution_context_and_budgets:
    - Cancellation, deadline, memory, preview/output, artifact and validation budgets are finite inputs and preserve partial
      accounting.
    result_semantics:
      empty_success: Complete zero surface/artifact output is success only when target resolution and coverage are complete.
      unresolved: Missing fact, model, tool, ownership relation or variant is typed unresolved with retained authoritative
        rows.
      unsupported: Ineligible C++ surface, input model, path or validation mode is explicit and never omitted.
      ambiguous: Target overload, type closure, path/content or variant ambiguity is fail-closed and never first-wins.
      partial: Provider, budget or validation partiality retains coverage and prevents publishable/usable/link-ready overclaim.
      failure: Invariant, stale, safety, transaction or rollback failure is typed; partial commit and false success are forbidden.
    evidence_coverage_guarantee:
    - Census, decisions, artifacts, diagnostics and unresolved rows conserve the requested universe and carry typed evidence/guarantee.
    ordering_duplicates_variants:
    - Canonical semantic IDs/order, equal-row dedup, unequal collision rejection and explicit per-variant divergence are mandatory.
    schema_and_versioning:
    - C++ API, plan/result/method/options schemas, payload/template/tool identities and semantics versions evolve independently
      and explicitly.
    change_policy:
    - '#49 owns candidate semantics only; #52 spikes, #53 integration and #54 freeze remain separate authorities.'
