- issue: '#48'
  state: candidate
  packages:
  - transform
  normative_document: docs/design/package_contract_48.md
  candidate_headers:
  - contracts/candidates/48/transform.hpp
  usage_examples:
  - contracts/candidates/48/transform_usage.cpp
  policies:
  - id: transform.operation-construction.v1
    ownership_and_lifetime:
    - Transform operation construction uses detached immutable value state and stores no AST/backend pointer or caller view.
    - Plan/result spans borrow only while immutable shared backing lives; transactions retain only canonical paths/digests/state.
    const_noexcept_thread_safety:
    - Planning/preview are logically const and safe concurrently; apply requires the one workspace writer lock.
    - Noexcept accessors allocate nothing; failures never leave partially mutated public values.
    callback_and_exception:
    - No callback is retained; formatter/frontend/filesystem ports catch failures at adapter boundaries.
    - Expected stale/conflict/macro/variant/format/reparse/transaction outcomes use result and stable codes.
    execution_context_and_budgets:
    - Selection, formatting, reparse, preview, prepare, commit, and rollback bind cancellation/deadline/output budgets.
    - External effects use structured filesystem/process ports; shell command concatenation is forbidden.
    result_semantics:
      empty_success: Zero edits is success only with complete coverage and uniquely resolved zero matches.
      unresolved: Missing facts/variants, unsafe macro/generated origin, and unavailable tools remain typed plan rows.
      unsupported: Unsupported construct/schema/tool policy is structured failure without best-effort mutation.
      ambiguous: All semantic targets/variants/conflicts remain explicit; no name-only, first-wins, or offset rebase.
      partial: Valid planning rows may survive partial analysis, but an incomplete/invalid plan is never write-eligible.
      failure: Invalid input/path/range/conflict/stale/reparse/transaction/rollback state fails closed with no false commit.
    evidence_coverage_guarantee:
    - Each edit/conflict/file result preserves evidence, coverage, diagnostics, variants, digests, and guarantee.
    - Any unresolved/partial/truncation/recovery state forbids a committed/exact claim.
    ordering_duplicates_variants:
    - Files/edits/conflicts/results use canonical semantic path/range/kind/full-ID order, never discovery/container order.
    - Equal edits deduplicate with provenance; overlap/lifecycle/variant conflict rejects and contradictory variants never
      merge.
    schema_and_versioning:
    - edit-plan, transform-options, apply-result, and transaction v1 are exact independent authorities.
    - Unknown semantic/schema/tool versions reject or require explicit replan/migration; preview is non-authoritative projection.
    change_policy:
    - Identity, editability, dry-run, stale/conflict, formatter/reparse, transaction/rollback, ordering, owner, or schema
      changes invalidate fingerprint.
