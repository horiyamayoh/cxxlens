- issue: '#50'
  state: candidate
  packages:
  - flow
  - models
  normative_document: docs/design/package_contract_50.md
  candidate_headers:
  - contracts/candidates/50/flow.hpp
  - contracts/candidates/50/models.hpp
  usage_examples:
  - contracts/candidates/50/flow_models_usage.cpp
  policies:
  - id: flow.model-pack.v1
    ownership_and_lifetime:
    - Models, policies, paths, summaries and reports are immutable detached values bound to one catalog/fact/model snapshot;
      AST pointers never escape.
    const_noexcept_thread_safety:
    - Const observers permit concurrent reads; provider/solver execution is isolated per operation and variant with explicit
      context.
    callback_and_exception:
    - Provider/model callbacks are capability-gated; exceptions become stable failure/unresolved rows and cannot cross the
      API boundary.
    execution_context_and_budgets:
    - Context/path/step/state/fixpoint/time/memory/output and model-I/O budgets are finite typed inputs with cancellation
      accounting.
    result_semantics:
      empty_success: Complete zero paths/findings/summaries/models is success only with available providers, resolved targets
        and conserved coverage.
      unresolved: Missing CFG/body/model/alias/dynamic target/variant or unknown external effect remains typed unresolved.
      unsupported: Unsupported language construct, sensitivity, model kind/version or protocol transition remains explicit.
      ambiguous: Overload/model/path/state/variant conflicts retain all candidates and never use first-wins.
      partial: Provider/budget/fixpoint partiality retains valid rows, coverage and downgraded guarantee.
      failure: Invalid policy/model/protocol, stale snapshot, non-convergence or I/O/schema failure is typed and cannot become
        clean success.
    evidence_coverage_guarantee:
    - Availability, paths, findings, summaries and model bindings carry provider/model versions, evidence, coverage and guarantee
      conservation.
    ordering_duplicates_variants:
    - Canonical semantic IDs/worklist/SCC/order, equal-row provenance merge, unequal conflict rejection and explicit variant
      divergence are mandatory.
    schema_and_versioning:
    - C++ API, CFG/effect providers, model pack and report schemas/lattice semantics versions evolve independently and invalidate
      stale caches.
    change_policy:
    - '#50 owns candidate semantics only; #52 feasibility/cost, #53 integration and #54 freeze remain separate authorities.'
