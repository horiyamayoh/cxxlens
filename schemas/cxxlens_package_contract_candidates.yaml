- issue: '#51'
  state: candidate
  packages:
  - qa
  - review
  normative_document: docs/design/package_contract_51.md
  candidate_headers:
  - contracts/candidates/51/qa.hpp
  - contracts/candidates/51/review.hpp
  usage_examples:
  - contracts/candidates/51/review_qa_usage.cpp
  policies:
  - id: qa.profile-process.v1
    ownership_and_lifetime:
    - Diffs, baselines, profiles, policies, coverage and reports are immutable detached values bound to explicit repository/workspace/tool
      snapshots; AST and process handles never escape.
    const_noexcept_thread_safety:
    - Const observers permit concurrent reads; Git/process/coverage operations are isolated per execution context and return
      detached canonical evidence.
    callback_and_exception:
    - Provider/parser callbacks are capability-gated; exceptions, signals and crashes become stable failure or unresolved
      rows and cannot cross the API boundary.
    execution_context_and_budgets:
    - Diff/input/output/process/time/retry/parallel/coverage/association budgets are finite typed inputs with cancellation
      and omitted-row accounting.
    result_semantics:
      empty_success: Complete zero changes/findings/steps/coverage rows is success only with resolved inputs, available providers
        and conserved coverage.
      unresolved: Missing Git/tool/baseline/build identity, source mapping or association target remains typed unresolved.
      unsupported: Combined diff, tool/version/coverage format or requested execution policy that is unsupported remains explicit.
      ambiguous: Rename/equivalence/path/tool/association/variant conflicts retain all candidates and never use first-wins.
      partial: Stage/provider/budget/cancellation partiality retains valid rows, evidence, coverage and downgraded guarantee;
        a gate becomes indeterminate.
      failure: Invalid input/policy, stale identity, forbidden process, parser/I/O/crash or required-step failure is typed
        and cannot become pass.
    evidence_coverage_guarantee:
    - Commit/tool/build/config identities, stage/association evidence, coverage and guarantee are conserved across filtering,
      baseline and gate projection.
    ordering_duplicates_variants:
    - Canonical path/coordinate/finding/step/association ordering, equal-row provenance merge, unequal conflict rejection
      and explicit variant state are mandatory.
    schema_and_versioning:
    - C++ API, diff/baseline/report/profile/coverage schemas and Git/tool/provider semantics versions evolve independently
      and invalidate stale caches.
    change_policy:
    - '#51 owns candidate semantics only; #52 feasibility/cost, #53 integration and #54 freeze remain separate authorities.'
