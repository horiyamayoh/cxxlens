$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.error.v1.schema.yaml
title: cxxlens error v1
type: object
required:
- schema
- semantics_version
- library_version
- code
- message
- scope
- locations
- causes
- suggested_actions
- attributes
- retryable
properties:
  schema: {const: cxxlens.error.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  code: {type: string, pattern: '^[a-z][a-z0-9-]*(\.[a-z][a-z0-9-]*)+$'}
  message: {type: string}
  scope: {enum: [operation, file, compile_unit, build_variant, symbol, workspace]}
  locations: {type: array, items: {type: object}}
  causes: {type: array, items: {$ref: '#'}}
  suggested_actions: {type: array, items: {type: string}}
  attributes: {type: object, additionalProperties: {type: string}}
  retryable: {type: boolean}
additionalProperties: false
