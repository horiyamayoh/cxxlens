$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.finding.v1.schema.yaml
title: cxxlens finding v1
type: object
required:
- schema
- semantics_version
- library_version
- id
- rule_or_recipe
- subject_semantic_id
- primary
- variant_signature
- identity_parameters
- severity
- confidence
- guarantee
- message
- evidence
- unresolved
- coverage
- achieved_precision
- required_precision
properties:
  schema: {const: cxxlens.finding.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  id: {type: string, pattern: '^finding_[0-9a-f]{64}$'}
  rule_or_recipe: {type: string}
  subject_semantic_id: {type: string}
  primary: {type: object}
  variant_signature: {type: [string, 'null']}
  identity_parameters: {type: object, additionalProperties: {type: string}}
  severity: {enum: [note, info, warning, error, fatal]}
  confidence: {enum: [speculative, possible, probable, high, certain]}
  guarantee:
    enum:
    - exact_within_coverage
    - sound_over_approximation
    - sound_under_approximation
    - best_effort
    - heuristic
  message: {type: string}
  evidence: {type: object}
  unresolved: {type: array, items: {type: object}}
  coverage: {type: object}
  achieved_precision: {type: integer, minimum: 0, maximum: 6}
  required_precision: {type: integer, minimum: 0, maximum: 6}
additionalProperties: false
