$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schema/phase-b-contract-integration/v1
title: cxxlens Phase B contract integration manifest
type: object
additionalProperties: false
required: [schema, document_version, authorities, counts, public_headers, package_examples, matrices, traceability, evidence_inputs, report]
properties:
  schema: {const: cxxlens.phase-b-contract-integration.v1}
  document_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  authorities:
    type: object
    additionalProperties: false
    required: [catalog, candidates, high_risk, ownership, conventions]
    properties:
      catalog: {$ref: '#/$defs/path'}
      candidates: {$ref: '#/$defs/path'}
      high_risk: {$ref: '#/$defs/path'}
      ownership: {$ref: '#/$defs/path'}
      conventions: {$ref: '#/$defs/path'}
  counts:
    type: object
    additionalProperties: false
    required: [packages, apis, atomic_units]
    properties:
      packages: {const: 22}
      apis: {const: 124}
      atomic_units: {const: 124}
  public_headers:
    type: object
    additionalProperties: false
    required: [umbrella, explicit_interop, ordinary]
    properties:
      umbrella: {const: include/cxxlens/cxxlens.hpp}
      explicit_interop: {const: include/cxxlens/interop/clang.hpp}
      ordinary:
        type: array
        minItems: 1
        uniqueItems: true
        items: {$ref: '#/$defs/path'}
  package_examples:
    type: array
    minItems: 22
    maxItems: 22
    items:
      type: object
      additionalProperties: false
      required: [package, header, source, scenarios, installed]
      properties:
        package: {type: string, pattern: '^[a-z][a-z0-9_]*$'}
        header: {type: string, pattern: '^<cxxlens/.+\.hpp>$'}
        source: {$ref: '#/$defs/path'}
        scenarios:
          type: array
          uniqueItems: true
          minItems: 4
          items: {enum: [positive, negative, ambiguous, partial]}
        installed: {const: true}
  matrices:
    type: object
    additionalProperties: false
    required: [language, warnings_as_errors, compiler_families, include_order, source_tree, installed_tree, linkage]
    properties:
      language: {const: C++23}
      warnings_as_errors: {const: true}
      compiler_families:
        type: array
        uniqueItems: true
        contains: {const: GCC}
        minContains: 1
        allOf: [{contains: {const: Clang}, minContains: 1}]
        items: {enum: [GCC, Clang]}
      include_order: {const: [forward, reverse, repeated]}
      source_tree: {const: true}
      installed_tree: {const: true}
      linkage: {const: [static, shared]}
  traceability:
    type: object
    additionalProperties: false
    required: [api_dimensions, doxygen_authority, package_document_pattern]
    properties:
      api_dimensions:
        type: array
        uniqueItems: true
        minItems: 10
        items: {type: string}
      doxygen_authority: {$ref: '#/$defs/path'}
      package_document_pattern: {const: 'docs/design/package_contract_{issue}.md'}
  evidence_inputs:
    type: array
    minItems: 8
    uniqueItems: true
    items: {$ref: '#/$defs/path'}
  report:
    type: object
    additionalProperties: false
    required: [schema, binding, output]
    properties:
      schema: {const: cxxlens.phase-b-contract-integration-report.v1}
      binding: {const: git-head-at-execution}
      output: {const: phase-b-contract-integration-report.json}
$defs:
  path: {type: string, minLength: 1, pattern: '^[A-Za-z0-9_.\-/]+$'}
