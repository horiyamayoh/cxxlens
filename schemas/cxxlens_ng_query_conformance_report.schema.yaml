$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.query-conformance-report.v1
title: cxxlens Logical Query IR conformance report
type: object
additionalProperties: false
required:
- schema
- contract_digest
- operator_digests
- vector_results
- backend_matrix
- status
properties:
  schema:
    const: cxxlens.query-conformance-report.v1
  contract_digest:
    $ref: '#/$defs/digest'
  operator_digests:
    type: array
    minItems: 12
    maxItems: 12
    items:
      type: object
      additionalProperties: false
      required: [id, digest]
      properties:
        id:
          type: string
          pattern: ^query\.[a-z][a-z0-9_]*\.v1$
        digest:
          $ref: '#/$defs/digest'
  vector_results:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, decision, reason_code, matched]
      properties:
        id:
          type: string
          minLength: 1
        decision:
          enum: [accepted, rejected]
        reason_code:
          type: string
          pattern: ^query\.[a-z0-9.-]+$
        execution_status:
          enum: [complete, truncated, cancelled_with_partial, failed_before_result]
        row_count:
          type: integer
          minimum: 0
        result_digest:
          $ref: '#/$defs/digest'
        matched:
          const: true
  backend_matrix:
    type: object
    additionalProperties: false
    required: [backends, physical_orders, comparisons, all_equal]
    properties:
      backends:
        type: array
        const: [memory, sqlite]
      physical_orders:
        type: array
        const: [forward, reverse, seeded-shuffle]
      comparisons:
        type: integer
        minimum: 1
      all_equal:
        const: true
  status:
    const: green
$defs:
  digest:
    type: string
    pattern: ^sha256:[0-9a-f]{64}$
