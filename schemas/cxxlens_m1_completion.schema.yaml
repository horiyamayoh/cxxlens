$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.m1-completion.v1.json
title: cxxlens.m1-completion.v1
type: object
required:
- schema
- acceptance_command
- conformant_catalog_ids
- deferred_catalog
- stable_public_headers
- explicit_interop_header
- fact_kinds
- matrix
- vectors
additionalProperties: false
properties:
  schema: {const: cxxlens.m1-completion.v1}
  acceptance_command: {type: string, minLength: 1}
  conformant_catalog_ids:
    type: array
    items: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}$'}
    uniqueItems: true
  deferred_catalog:
    type: array
    items:
      type: object
      required: [id, blocker]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}$'}
        blocker: {type: string, minLength: 1}
  stable_public_headers:
    type: array
    items: {type: string, pattern: '^include/cxxlens/.+\.hpp$'}
    uniqueItems: true
  explicit_interop_header: {const: include/cxxlens/interop/clang.hpp}
  fact_kinds:
    type: array
    items: {type: string, pattern: '^[a-z][a-z0-9_]*$'}
    uniqueItems: true
  matrix:
    type: object
    required: [jobs, scheduler_seeds, orders, roots, repeats, backends, cache_states]
    additionalProperties: false
    properties:
      jobs: {type: array, items: {type: integer, minimum: 1}, uniqueItems: true}
      scheduler_seeds: {type: array, items: {type: integer, minimum: 0}, uniqueItems: true}
      orders: {type: array, items: {enum: [forward, reverse]}, uniqueItems: true}
      roots: {type: array, items: {type: string}, minItems: 2, uniqueItems: true}
      repeats: {type: integer, minimum: 2}
      backends: {type: array, items: {enum: [memory, sqlite]}, uniqueItems: true}
      cache_states: {type: array, items: {enum: [cold, warm]}, uniqueItems: true}
  vectors:
    type: array
    minItems: 10
    items:
      type: object
      required: [id, owner_issue, catalog_ids, requirements, fact_kinds, invariants, tests, fixture]
      additionalProperties: false
      properties:
        id: {type: string, pattern: '^M1-[A-Z0-9-]+$'}
        owner_issue: {type: integer, minimum: 13, maximum: 22}
        catalog_ids:
          type: array
          items: {type: string, pattern: '^API-[A-Z]+-[0-9]{3}$'}
          uniqueItems: true
        requirements:
          type: array
          items: {type: string, pattern: '^(FR|QR)-[0-9]{3}$'}
          minItems: 1
          uniqueItems: true
        fact_kinds:
          type: array
          items: {type: string, pattern: '^[a-z][a-z0-9_]*$'}
          uniqueItems: true
        invariants:
          type: array
          items: {type: string, pattern: '^[a-z][a-z0-9.-]*$'}
          minItems: 1
          uniqueItems: true
        tests:
          type: array
          items: {type: string, minLength: 1}
          minItems: 1
          uniqueItems: true
        fixture: {type: string, minLength: 1}
