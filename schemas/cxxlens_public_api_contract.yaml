- id: core
  header: <cxxlens/core.hpp>
  purpose: Version, capability, IDs, errors, evidence, coverage and findings.
  public_types:
  - semantic_version
  - api_versions
  - capability_set
  - typed_id<T>
  - error
  - unresolved
  - evidence
  - coverage_report
  - diagnostic
  - finding
  - finding_set
  - execution_context
  apis:
  - id: API-CORE-001
    symbol: versions()
    kind: free_function
    phase: M0
    maturity: contract-defined
    guarantees:
    - Returns all relevant product/schema/LLVM versions.
  - id: API-CORE-002
    symbol: capabilities()
    kind: free_function
    phase: M0
    maturity: contract-defined
    guarantees:
    - Never represents an unavailable capability as an empty successful result.
  - id: API-CORE-003
    symbol: evidence::{add,items,to_json,to_markdown}
    kind: method_family
    phase: M0
    maturity: contract-defined
    guarantees:
    - Structured evidence is authoritative; prose is a projection.
  - id: API-CORE-004
    symbol: coverage_report::{complete,units,to_json,to_markdown}
    kind: method_family
    phase: M0
    maturity: contract-defined
    guarantees:
    - Complete accounting of requested, covered, excluded, failed, unresolved and not-applicable units.
  - id: API-CORE-005
    symbol: finding::{id,why,unresolved_items,explain,to_json}
    kind: method_family
    phase: M0
    maturity: contract-defined
    guarantees:
    - Stable identity does not depend on message text or absolute checkout root.
  - id: API-CORE-006
    symbol: finding_set::{minimum_confidence,minimum_severity,to_json,to_markdown,to_sarif}
    kind: method_family
    phase: M0
    maturity: contract-defined
