invariants:
- Stable public headers do not expose clang::* or llvm::* types.
- AST pointers never outlive a frontend job or borrowed callback.
- Every material result carries evidence, guarantee, coverage and unresolved information where applicable.
- Mutation and generation require an immutable validated plan before side effects.
- No relevant translation unit, variant, surface, decision or artifact is silently omitted.
- Semantic IDs and output order are deterministic across parallelism and checkout-root relocation.
