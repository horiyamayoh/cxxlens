  notes:
  - All 123 API IDs and symbols are preserved.
  - maturity is renamed to contract_maturity; implementation_state is independent.
  - Placeholder fact names are migrated to typed dependency expressions.
- from_schema: cxxlens.api-catalog.v2
  to_schema: cxxlens.api-catalog.v2
  api_id_changes: []
  symbol_changes: []
  notes:
  - API-SEL-001/002/003/006/008/009/010/011 declarations are frozen by the M2 selector contract.
  - M3 selector families API-SEL-004/005/007 remain unresolved and unimplemented.
  - API-SRCH-003/004/005/006/007 and API-EXP-002 are frozen by the M2 public search contract.
  - API-EXP-001/003 remain unresolved indivisible families until every declared member is implemented.
