$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens_ng_portable_provider_task_contract.schema.yaml
title: cxxlens portable provider task contract
type: object
additionalProperties: false
required: [schema, document_version, maturity, authority, session, task_projection, validation, context, protocol, acceptance]
properties:
  schema: {const: cxxlens.portable-provider-task-contract.v1}
  document_version: {const: 1.0.0}
  maturity: {const: accepted}
  authority:
    type: object
    additionalProperties: false
    required: [design, decision_adr, owner_issue, owner]
    properties:
      design: {type: string, minLength: 1}
      decision_adr: {const: docs/design/adr/0064-portable-provider-task-session-binding.md}
      owner_issue: {const: '#122'}
      owner: {const: steward.ng-provider-runtime}
  session: {$ref: '#/$defs/nonempty_object'}
  task_projection:
    type: object
    additionalProperties: false
    required: [codec, domain, fields, descriptor_identity, ordering, task_id]
    properties:
      codec: {const: cxxlens-canonical-tuple-v1}
      domain: {const: cxxlens.provider-task.v1}
      fields: {const: [contract_tag, provider_identity, project_catalog_id, project_catalog_digest, requested_outputs, condition, interpretation, offered_outputs, required_relations, interpretation_domains, input_stage, output_stage, dependency_groups]}
      descriptor_identity: {const: [descriptor_id, descriptor_digest]}
      ordering: {const: canonical-byte-order}
      task_id: {const: task-prefix-plus-semantic-digest-v2}
  validation: {$ref: '#/$defs/nonempty_object'}
  context: {$ref: '#/$defs/nonempty_object'}
  protocol:
    type: object
    additionalProperties: false
    required: [batch_begin, logical_process_validator]
    properties:
      batch_begin: {const: [task_id, descriptor_id, descriptor_digest, dependency_group_id, atomic_output_group_id, batch_id]}
      logical_process_validator: {const: shared}
  acceptance:
    type: array
    minItems: 8
    uniqueItems: true
    items: {type: string, pattern: '^[a-z0-9-]+$'}
$defs:
  nonempty_object:
    type: object
    minProperties: 1
    additionalProperties: true
