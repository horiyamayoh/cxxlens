$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.api-ready.execution-result.v1.schema.yaml
title: cxxlens API shard execution result v1
type: object
additionalProperties: false
required:
  - schema
  - subject_kind
  - subject_id
  - input_sha
  - shard_id
  - shard_digest
  - status
  - started_at
  - ended_at
  - steps
  - verified_unit_artifacts
  - artifact_digest
properties:
  schema: {const: cxxlens.api-ready.execution-result.v1}
  subject_kind: {enum: [atomic_unit, package_integration]}
  subject_id: {type: string, minLength: 1}
  input_sha: {type: string, pattern: '^([0-9a-f]{40}|[0-9a-f]{64})$'}
  shard_id: {type: string, minLength: 1}
  shard_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  status: {enum: [passed, failed]}
  started_at: {type: string, format: date-time}
  ended_at: {type: string, format: date-time}
  steps:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - id
        - scope
        - fixture_category
        - evidence_paths
        - command
        - exit_status
        - stdout_digest
        - stderr_digest
      properties:
        id: {type: string, minLength: 1}
        scope: {enum: [global_setup, unit_local, global_verification]}
        fixture_category:
          type: [string, 'null']
          enum: [positive, negative, ambiguous, null]
        evidence_paths:
          type: array
          uniqueItems: true
          items: {type: string, minLength: 1}
        command:
          type: object
          additionalProperties: false
          required: [id, argv, environment]
          properties:
            id: {type: string, minLength: 1}
            argv:
              type: array
              minItems: 1
              items: {type: string, minLength: 1}
            environment:
              type: object
              additionalProperties: {type: string}
        exit_status: {type: integer, minimum: 0}
        stdout_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
        stderr_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  verified_unit_artifacts:
    type: array
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [atomic_unit_id, path, artifact_digest]
      properties:
        atomic_unit_id: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
        path: {type: string, minLength: 1}
        artifact_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  artifact_digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
