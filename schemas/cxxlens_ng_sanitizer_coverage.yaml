schema: cxxlens.ng-sanitizer-coverage.v1
document_version: 1.0.0
maturity: implemented
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md
  adr: docs/design/adr/0062-first-party-sanitizer-closure.md
  owner_issue: '#119'
scope:
  first_party_objects: all-compile-database-entries
  noninstrumented_external_allowlist: []
  installed_consumers: [core, provider-sdk, clang22-provider-sdk, examples]
configurations:
  normal:
    required_sanitizers: []
    forbidden_sanitizers: [address, undefined, thread]
  asan-ubsan:
    required_sanitizers: [address, undefined]
    forbidden_sanitizers: [thread]
  tsan:
    required_sanitizers: [thread]
    forbidden_sanitizers: [address, undefined]
runtime:
  failure_exit_code: 86
  asan_options: detect_leaks=1:halt_on_error=1:exitcode=86:handle_segv=0:symbolize=1
  ubsan_options: halt_on_error=1:exitcode=86:print_stacktrace=1:symbolize=1
  tsan_options: halt_on_error=1:exitcode=86:handle_segv=0:second_deadlock_stack=1:symbolize=1
  symbolizer: llvm-symbolizer
canaries:
  - {id: address, roles: [test-fixture], expected_sanitizer: address}
  - {id: undefined, roles: [test-fixture], expected_sanitizer: undefined}
  - {id: thread, roles: [test, provider], expected_sanitizer: thread}
ci:
  workflow: .github/workflows/nightly.yml
  coverage_checker: tools/quality/check_sanitizer_coverage.py
  check_after_ctest: true
