schema: cxxlens.ng-api-development-readiness.v1
document_version: 1.3.0
maturity: implemented
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md
  adr: docs/design/adr/0089-high-level-author-sdk-and-wave0-readiness.md
  owner_issue: '#168'
  foundation_issue: '#165'
  callable_inventory_issue: '#169'
binding:
  branch: main
  report_schema: cxxlens.ng-api-development-readiness-report.v1
  report_artifact: cxxlens-ng-api-development-readiness-${revision}
target_contract:
  authority: schemas/cxxlens_ng_release_bundle.yaml
  provider_sdk_role: high-level-author-sdk
  direct_dependencies:
    cxxlens::base: []
    cxxlens::kernel: [cxxlens::base]
    cxxlens::query: [cxxlens::kernel]
    cxxlens::cpp: [cxxlens::query]
    cxxlens::recipes: [cxxlens::query]
    cxxlens::cxxlens: [cxxlens::base, cxxlens::kernel, cxxlens::query, cxxlens::cpp]
    cxxlens::provider_sdk: [cxxlens::cxxlens, cxxlens::recipes]
public_header_authority:
  admission: schemas/cxxlens_ng_public_api_catalog.yaml
  generated_relation_binding: schemas/cxxlens_ng_relation_registry.yaml
  migration_checker_role: superseded-asset-denylist-only
  extra_header: reject
  missing_header: reject
public_callable_authority:
  decision_adr: docs/design/adr/0092-exact-public-callable-inventory.md
  inventory: schemas/cxxlens_ng_public_callable_inventory.yaml
  inventory_schema: schemas/cxxlens_ng_public_callable_inventory.schema.yaml
  report_schema: schemas/cxxlens_ng_public_callable_inventory_report.schema.yaml
  checker: tools/quality/public_callable_inventory.py
  report_filename: cxxlens-ng-public-callable-inventory-report.json
  review_filename: cxxlens-ng-public-callable-inventory-review.md
  extractor: clang-ast-json-22
  doxygen_correspondence: exact-bidirectional
  required_result: passed
production_scope_closure:
  decision_adr: docs/design/adr/0095-production-scope-closure.md
  owner_issue: '#179'
  manifest: schemas/cxxlens_ng_production_scope_closure.yaml
  manifest_schema: schemas/cxxlens_ng_production_scope_closure.schema.yaml
  report_schema: schemas/cxxlens_ng_production_scope_closure_report.schema.yaml
  checker: tools/quality/check_ng_production_scope_closure.py
  inventory_binding:
    - manifest-digest
    - authority-census-digest
    - classification-digest
    - derived-summary
    - closure-status
  normal_mode: allow-explicit-gaps
  final_mode: require-qualified
  release_evaluation_job: release-evaluation
  terminal_job: production-scope-closure
implementation_learning:
  decision_adr: docs/design/adr/0093-implementation-learning-design-feedback.md
  owner_issue: '#171'
  handbook: docs/development/implementation-learning/README.md
  mental_models: docs/development/implementation-learning/mental-models
  records: docs/development/implementation-learning/records
  index: docs/development/implementation-learning/records/README.md
  record_schema: schemas/cxxlens_ng_design_feedback_record.schema.yaml
  checker: tools/quality/check_ng_design_feedback.py
  issue_template: .github/ISSUE_TEMPLATE/design-feedback.yml
  feedback_record_authority_role: never-normative-resolution-refs-own-authority
  mental_model_authority_role: non-normative-explanatory-only
  completion_check: issue-ready
required_status_checks:
  strict: true
  contexts:
    - build-test (OFF)
    - build-test (ON)
    - gcc-public-headers
    - install-consumer (OFF)
    - install-consumer (ON)
    - quality-contracts
    - quality-evidence
merged_main_checks:
  - foundation-completion
  - wave0-readiness
  - g5-qualification
  - release-evaluation
  - production-scope-closure
baseline:
  exact_revision_tree: required
  clean_main_checkout: required
  required_evidence:
    - toolchain-provenance
    - static-shared-build-test
    - static-shared-install-manifest
    - public-header-inventory
    - authority-digests
    - implementation-learning-contract
    - test-inventory
    - generated-header-inventory
    - public-callable-inventory-report
    - public-callable-review
    - foundation-completion-report
    - branch-protection-status-names
    - production-scope-inventory-binding
api_unit_workflow:
  maximum_active_write_units: 1
  active_write_units: []
  required_stages:
    - semantics-identity-partiality
    - registry-schema-catalog
    - generated-static-dynamic-parity
    - production-implementation
    - memory-sqlite-parity
    - typed-dynamic-ir-parity
    - positive-negative-boundary-determinism-tests
    - exact-callable-ast-doxygen-correspondence
    - implementation-learning-checkpoint
    - doxygen-example-install-consumer
    - support-stability-evidence
    - exact-sha-ci
  completion_evidence:
    - public-header-signature-ownership-lifetime
    - error-unresolved-coverage-closure-guarantee
    - identity-version-ordering-unknown-handling
    - registry-schema-catalog
    - reproducible-generation
    - correct-target-layer
    - memory-sqlite-reason-code-parity
    - static-dynamic-descriptor-ir-result-parity
    - positive-negative-malformed-boundary-permutation-tests
    - public-callable-inventory-review-binding
    - design-feedback-none-or-issue-ready
    - doxygen-example-install-consumer
    - support-claim
    - pre-main-required-checks
    - merged-main-required-checks
gate_ownership:
  foundation: '#113'
  g5: '#166'
  release: '#167'
