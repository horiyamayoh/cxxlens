$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.custom-fact.v1.json
title: cxxlens.custom-fact.v1
type: object
required: [schema, provider_namespace, schema_id, schema_version, semantic_key, payload, source]
additionalProperties: false
properties:
  schema: {const: cxxlens.custom-fact.v1}
  provider_namespace:
    type: string
    pattern: '^[a-z][a-z0-9]*(?:[.][a-z][a-z0-9_-]*){2,}$'
  schema_id:
    type: string
    pattern: '^[a-z][a-z0-9]*(?:[.][a-z][a-z0-9_-]*){2,}$'
  schema_version:
    type: object
    required: [major, minor, patch, prerelease]
    additionalProperties: false
    properties:
      major: {type: integer, minimum: 1, maximum: 65535}
      minor: {type: integer, minimum: 0, maximum: 65535}
      patch: {type: integer, minimum: 0, maximum: 65535}
      prerelease: {type: string, pattern: '^(?:|[0-9A-Za-z-]+(?:[.][0-9A-Za-z-]+)*)$'}
  semantic_key:
    type: string
    minLength: 1
    pattern: '^[a-z][a-z0-9_.-]*:[a-z][a-z0-9_.-]*_[0-9a-f]{64}(?::[0-9A-Za-z_.-]+)*$'
  payload:
    type: object
    propertyNames:
      pattern: '^(?!(?:.*(?:clang|llvm|ast|pointer|address|source_manager|compiler_instance|qual_type|decl_ptr)))[a-z][a-z0-9_.-]*$'
    additionalProperties: {$ref: cxxlens_fact.schema.yaml#/$defs/safe_value}
  source:
    oneOf:
    - {$ref: cxxlens_source_span.schema.yaml}
    - {type: 'null'}
