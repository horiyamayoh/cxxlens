$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.observation.v1.json
title: cxxlens.observation.v1
type: object
required:
- schema
- adapter
- compile_unit_id
- variant_id
- kind
- payload
- diagnostics
- coverage_contributions
additionalProperties: false
properties:
  schema: {const: cxxlens.observation.v1}
  adapter:
    type: object
    required: [id, version, llvm_major]
    additionalProperties: false
    properties:
      id: {type: string, pattern: '^[a-z][a-z0-9.-]+$'}
      version: {type: string, minLength: 1}
      llvm_major: {type: integer, minimum: 1}
  compile_unit_id: {type: string, pattern: '^cu_[0-9a-f]{64}$'}
  variant_id: {type: string, pattern: '^variant_[0-9a-f]{64}$'}
  kind: {type: string}
  source:
    oneOf:
    - {$ref: cxxlens_source_span.schema.yaml}
    - {type: 'null'}
  payload:
    type: object
    required: [version, fields]
    additionalProperties: false
    properties:
      version: {type: integer, minimum: 1}
      fields:
        type: object
        propertyNames:
          pattern: '^(?!(?:.*(?:clang|llvm|ast|pointer|address|source_manager|compiler_instance|qual_type|decl_ptr)))[a-z][a-z0-9_.-]*$'
        additionalProperties: {$ref: '#/$defs/safe_value'}
  diagnostics:
    type: array
    items:
      type: object
      required: [id, message, severity]
      properties:
        id: {type: string}
        message: {type: string}
        severity: {type: string}
      additionalProperties: true
  coverage_contributions:
    type: array
    items:
      type: object
      required: [kind, id, state]
      properties:
        kind: {type: string}
        id: {type: string}
        state: {enum: [covered, excluded, failed, unresolved, not_applicable]}
        reason: {type: [string, 'null']}
      additionalProperties: false
  name_identity: {$ref: '#/$defs/name_identity'}
  type_identity: {$ref: '#/$defs/type_identity'}
$defs:
  safe_value:
    oneOf:
    - type: string
      pattern: '^(?!.*(?:clang::|llvm::|0x[0-9A-Fa-f]{6,})).*$'
    - {type: number}
    - {type: boolean}
    - {type: 'null'}
    - type: array
      items: {$ref: '#/$defs/safe_value'}
    - type: object
      propertyNames:
        pattern: '^(?!(?:.*(?:clang|llvm|ast|pointer|address|source_manager|compiler_instance|qual_type|decl_ptr)))[a-z][a-z0-9_.-]*$'
      additionalProperties: {$ref: '#/$defs/safe_value'}
  name_identity:
    type: object
    required: [display_qualified_name]
    additionalProperties: false
    properties:
      display_qualified_name: {type: string}
      usr: {type: string, minLength: 1}
      semantic_owner: {type: string, minLength: 1}
      declaration_kind: {type: string, minLength: 1}
      signature_structure: {type: string, minLength: 1}
    anyOf:
    - required: [usr]
    - required: [semantic_owner, declaration_kind, signature_structure]
  type_identity:
    type: object
    required: [display_spelling, canonical_structure, builtin, components]
    additionalProperties: false
    properties:
      display_spelling: {type: string}
      canonical_structure: {type: string, minLength: 1}
      declaration_id: {type: string, pattern: '^symbol_[0-9a-f]{64}$'}
      builtin: {type: boolean}
      components:
        type: array
        items: {type: string, pattern: '^type_[0-9a-f]{64}$'}
        uniqueItems: true
    allOf:
    - if: {properties: {builtin: {const: false}}}
      then:
        anyOf:
        - required: [declaration_id]
        - properties: {components: {minItems: 1}}
