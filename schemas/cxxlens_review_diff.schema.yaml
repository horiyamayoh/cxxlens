$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.review-diff.v1.schema.yaml
title: cxxlens review diff v1
type: object
additionalProperties: false
required: [schema, identity, repository, base, head, dirty_state, files, diagnostics, unresolved]
properties:
  schema: {const: cxxlens.review-diff.v1}
  identity: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  repository: {type: string}
  base: {type: string, minLength: 1}
  head: {type: string, minLength: 1}
  dirty_state: {enum: [clean, index, worktree, untracked, mixed, unknown]}
  files:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [path, kind, binary, hunks]
      properties:
        path: {type: string, minLength: 1}
        old_path: {type: [string, 'null']}
        kind: {enum: [added, deleted, modified, renamed, copied, binary, submodule]}
        binary: {type: boolean}
        hunks: {type: array, items: {type: object}}
  diagnostics: {type: array, items: {type: object}}
  unresolved: {type: array, items: {type: object}}
