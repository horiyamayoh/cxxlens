$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-authority-transition.v1.schema.yaml
title: cxxlens next-generation authority transition v1
type: object
additionalProperties: false
required:
  - schema
  - document_version
  - state
  - authority
  - superseded
  - dispatch
  - baseline
  - preserved_invariants
  - validation
properties:
  schema: {const: cxxlens.ng-authority-transition.v1}
  document_version: {const: 1.0.0}
  state: {const: active}
  authority:
    type: object
    additionalProperties: false
    required: [document, document_id, issue, tracking_issue]
    properties:
      document: {const: docs/design/cxxlens_next_generation_integrated_design_ja.md}
      document_id: {const: CXXLENS-NG-SRAD-002}
      issue: {const: '#57'}
      tracking_issue: {const: '#56'}
  superseded:
    type: array
    minItems: 3
    maxItems: 3
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [id, path, disposition, new_work_authorized]
      properties:
        id: {enum: [legacy-integrated-design, legacy-api-catalog, legacy-api-freeze]}
        path: {type: string, minLength: 1}
        disposition: {const: migration-provenance}
        new_work_authorized: {const: false}
  dispatch:
    type: object
    additionalProperties: false
    required: [legacy_phase_c_authorized, legacy_atomic_unit_runner, no_new_legacy_api, replacement_tracker]
    properties:
      legacy_phase_c_authorized: {const: false}
      legacy_atomic_unit_runner: {const: revoked}
      no_new_legacy_api: {const: true}
      replacement_tracker: {const: '#56'}
  baseline:
    type: object
    additionalProperties: false
    required: [path, source_commit, conformant_apis, unimplemented_apis]
    properties:
      path: {const: schemas/cxxlens_legacy_api_baseline.yaml}
      source_commit: {pattern: '^[0-9a-f]{40}$'}
      conformant_apis: {const: 47}
      unimplemented_apis: {const: 77}
  preserved_invariants:
    type: array
    minItems: 8
    uniqueItems: true
    items: {type: string, minLength: 1}
  validation:
    type: object
    additionalProperties: false
    required: [checker, report_binding, inputs]
    properties:
      checker: {const: tools/quality/check_ng_authority.py}
      report_binding: {const: exact-git-commit}
      inputs:
        type: array
        minItems: 10
        uniqueItems: true
        items: {type: string, minLength: 1}
