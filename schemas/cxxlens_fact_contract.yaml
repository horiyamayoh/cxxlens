schema: cxxlens.fact-contract.v1
semantics_version: 1.0.0
public_fact_kinds:
- call
- cfg_summary
- compile_command
- construction
- conversion
- coverage_region
- custom
- declaration
- definition
- dynamic_observation
- effect_summary
- file
- flow_summary
- include_relation
- inheritance
- macro_definition
- macro_expansion
- override_relation
- reference
- symbol
- type
dependency_aliases:
  control_flow: [cfg_summary]
  coverage: [coverage_region]
  finding: [custom]
profiles:
  minimal: [compile_command, file]
  semantic_search:
  - call
  - compile_command
  - declaration
  - definition
  - file
  - include_relation
  - inheritance
  - macro_expansion
  - override_relation
  - reference
  - symbol
  - type
identity:
  name_primary: usr
  name_fallback_required: [semantic_owner, declaration_kind, signature_structure]
  forbidden_name_only: display_qualified_name
  type_required: canonical_structure
  non_builtin_type_requires_one_of: [declaration_id, components]
  forbidden_type_only: display_spelling
collections:
  canonical_order: lexicographic_full_id
  duplicates: reject
  contributor_merge: sort_unique
relations:
  inheritance: direct_edge_only
  override: direct_edge_only
  transitive_closure: derived_query_result
observation:
  lifetime: frontend_job_only
  forbidden_payload_fragments:
  - clang
  - llvm
  - ast
  - pointer
  - address
  - source_manager
  - compiler_instance
  - qual_type
  - decl_ptr
  opaque_payload_requires_version: true
