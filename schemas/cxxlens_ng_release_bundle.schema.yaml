$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.ng-release-bundle.v1
title: cxxlens next-generation release bundle
type: object
additionalProperties: false
required:
  - schema
  - document_version
  - maturity
  - authority
  - product_boundary
  - distribution_surface
  - stability_tiers
  - profiles
  - releases
  - non_blocking_migrations
  - g5_qualification
  - release_qualification
  - production_scope_closure
  - provider_protocol_boundary
  - version_axes
  - snapshot_format_binding
  - compatibility_contexts
  - compatibility_rules
  - migrations
  - inspection
properties:
  schema:
    const: cxxlens.ng-release-bundle.v1
  document_version:
    $ref: '#/$defs/semver'
  maturity:
    const: accepted-contract
  authority:
    type: object
    additionalProperties: false
    required: [design, adr, decision_issue, tracking_issue]
    properties:
      design:
        const: docs/design/cxxlens_next_generation_integrated_design_ja.md
      adr:
        const: docs/design/adr/0005-product-boundary-release-compatibility.md
      decision_issue:
        const: '#59'
      tracking_issue:
        const: '#56'
  product_boundary:
    type: object
    additionalProperties: false
    required: [components, invariants]
    properties:
      components:
        type: array
        minItems: 6
        uniqueItems: true
        items:
          type: object
          additionalProperties: false
          required: [id, domain, depends_on, forbidden_dependencies, exported_values]
          properties:
            id:
              $ref: '#/$defs/id'
            domain:
              enum: [language-neutral, cxx-project, native-major-specific, application]
            depends_on:
              $ref: '#/$defs/id_array'
            forbidden_dependencies:
              $ref: '#/$defs/id_array'
            exported_values:
              $ref: '#/$defs/id_array'
      invariants:
        type: array
        minItems: 4
        uniqueItems: true
        items:
          type: object
          additionalProperties: false
          required: [id, rule]
          properties:
            id:
              $ref: '#/$defs/id'
            rule:
              type: string
              minLength: 1
  distribution_surface:
    type: object
    additionalProperties: false
    required:
      - public_targets
      - aggregate_target
      - aggregate_excludes
      - native_packages
      - source_surface
      - implementation_state
      - implementation_issue
      - package_qualification
    properties:
      public_targets:
        type: array
        minItems: 7
        uniqueItems: true
        items:
          type: object
          additionalProperties: false
          required: [name, component, direct_dependencies, stability]
          properties:
            name:
              type: string
              pattern: '^cxxlens::[a-z][a-z_]*$'
            component:
              $ref: '#/$defs/id'
            direct_dependencies:
              type: array
              uniqueItems: true
              items:
                type: string
                pattern: '^cxxlens::[a-z][a-z_]*$'
            stability:
              enum: [stable-at-1.0, versioned, experimental, native-major-specific, internal]
      aggregate_target:
        const: cxxlens::cxxlens
      aggregate_excludes:
        type: array
        minItems: 4
        uniqueItems: true
        items:
          type: string
          minLength: 1
      native_packages:
        type: array
        minItems: 2
        uniqueItems: true
        items:
          type: string
          minLength: 1
      source_surface:
        type: object
        additionalProperties: false
        required: [headers, cxx_modules, umbrella_excludes]
        properties:
          headers:
            const: authoritative
          cxx_modules:
            const: experimental-not-installed-in-1.0
          umbrella_excludes:
            type: array
            minItems: 4
            uniqueItems: true
            items:
              type: string
              minLength: 1
      implementation_state:
        const: implemented
      implementation_issue:
        const: '#67'
      package_qualification:
        type: object
        additionalProperties: false
        required:
          - implementation_issue
          - ci_job
          - configurations
          - artifact_source
          - clean_environment
          - direct_installed_tools
          - installed_consumers
          - prefix_relocation
          - exported_transitive_dependencies
          - build_tree_runtime_paths
          - shared_runtime
        properties:
          implementation_issue:
            const: '#118'
          ci_job:
            const: install-consumer
          configurations:
            type: array
            const:
              - {id: static, build_shared: 'OFF'}
              - {id: shared, build_shared: 'ON'}
          artifact_source:
            const: same-configured-and-tested-prefix
          clean_environment:
            const: [LD_LIBRARY_PATH, DYLD_LIBRARY_PATH]
          direct_installed_tools:
            const: [cxxlens-provider-scaffold, cxxlens-sdk-doctor, cxxlens-clang-worker-22, cxxlens-clang22-materialize]
          installed_consumers:
            const: [core, provider-sdk, clang22-provider-sdk, real-project, examples]
          prefix_relocation:
            const: required
          exported_transitive_dependencies:
            const: consumer-link-verified
          build_tree_runtime_paths:
            const: forbidden
          shared_runtime:
            type: object
            additionalProperties: false
            required:
              - linux_tool_origin
              - linux_library_origin
              - macos_tool_origin
              - macos_library_origin
              - soname_binding
              - missing_dependency_diagnostic
            properties:
              linux_tool_origin:
                const: '$ORIGIN/../<install-libdir>'
              linux_library_origin:
                const: '$ORIGIN'
              macos_tool_origin:
                const: '@loader_path/../<install-libdir>'
              macos_library_origin:
                const: '@loader_path'
              soname_binding:
                const: distribution-major
              missing_dependency_diagnostic:
                const: loader-explicit-soname
  stability_tiers:
    type: array
    minItems: 5
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [id, source_compatibility, abi_compatibility]
      properties:
        id:
          enum: [stable, versioned, experimental, native-major-specific, internal]
        source_compatibility:
          type: string
          minLength: 1
        abi_compatibility:
          type: string
          minLength: 1
  profiles:
    type: array
    minItems: 4
    maxItems: 4
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [id, release_role, first_eligible_release, distribution_requirement, protocol_scope]
      properties:
        id:
          enum: [NG0, NG1, NG2, NG3]
        release_role:
          type: string
          minLength: 1
        first_eligible_release:
          type: string
          minLength: 1
        distribution_requirement:
          type: string
          minLength: 1
        protocol_scope:
          type: string
          minLength: 1
  releases:
    type: array
    minItems: 4
    maxItems: 4
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [id, distribution_range, state, required_profiles, optional_profiles, blocker_migrations, blocker_gates, production_supported]
      properties:
        id:
          enum: [ng0-contract-candidate, distribution-1.0, distribution-1.x, future-major]
        distribution_range:
          type: string
          minLength: 1
        state:
          enum: [contract-candidate, planned, conditional, qualification-in-progress, qualified]
        required_profiles:
          $ref: '#/$defs/profile_array'
        optional_profiles:
          $ref: '#/$defs/profile_array'
        blocker_migrations:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: '^R[0-7]$'
        blocker_gates:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: '^gate\.(g[0-5]|release)$'
        production_supported:
          type: boolean
        activation_rule:
          type: string
          minLength: 1
  non_blocking_migrations:
    type: object
    additionalProperties: false
    required: [distribution-1.0, distribution-1.x]
    properties:
      distribution-1.0:
        $ref: '#/$defs/migration_array'
      distribution-1.x:
        $ref: '#/$defs/migration_array'
  g5_qualification:
    type: object
    additionalProperties: false
    required: [migration, gate, authority, ci_job, status]
    properties:
      migration: {const: R4}
      gate: {const: gate.g5}
      authority: {const: schemas/cxxlens_ng_g5_qualification.yaml}
      ci_job: {const: g5-qualification}
      status: {const: implemented}
  release_qualification:
    type: object
    additionalProperties: false
    required: [gate, authority, materialization_contract, materialization_report_matrix, materialization_report_set_binding, sqlite_store_v3_qualification, checker, ci_job, status, claim_scope, report_artifact, required_evidence]
    properties:
      gate: {const: gate.release}
      authority: {const: schemas/cxxlens_ng_release_qualification.yaml}
      materialization_contract: {const: schemas/cxxlens_ng_clang22_materialization_contract.yaml}
      materialization_report_matrix:
        const:
          - {configuration: static, backend: memory}
          - {configuration: static, backend: sqlite}
          - {configuration: shared, backend: memory}
          - {configuration: shared, backend: sqlite}
      materialization_report_set_binding: {const: exact-configuration-two-report-set-digest}
      sqlite_store_v3_qualification:
        const:
          authority: docs/design/adr/0097-sqlite-v3-chunked-payload-migration.md
          report_schema: schemas/cxxlens_ng_sqlite_store_v3_qualification_report.schema.yaml
          checker: tools/quality/check_ng_sqlite_store_v3_qualification.py
          artifact: cxxlens-ng-sqlite-store-v3-qualification-${revision}
          maximum_bytes: 16777216
          binding: exact-revision-source-tree-schema-contract-artifact-and-report-set-digests
      checker: {const: tools/quality/check_ng_release_qualification.py}
      ci_job: {const: release-qualification}
      status: {const: implemented}
      claim_scope: {const: exact-gr-report-tuples-only}
      report_artifact: {const: 'cxxlens-ng-release-qualification-${revision}'}
      required_evidence:
        const: [same-sha-foundation-report, same-sha-wave0-readiness-report, same-sha-public-callable-report-and-review, same-sha-g5-report, same-sha-sqlite-store-v3-qualification-report, static-relocated-install-artifact, shared-relocated-install-artifact, static-shared-runtime-junit, static-shared-clang22-materialization-reports-and-execution-receipts, real-project-memory-sqlite-and-major-rejection, security-conformance-and-negative-paths, doxygen-contract-and-support-matrix, license-and-notice]
  production_scope_closure:
    type: object
    additionalProperties: false
    required: [contract, authority, decision_adr, schema, checker, namespace_ids, report, evaluation]
    properties:
      contract: {const: cxxlens.ng-production-scope-closure.v1}
      authority: {const: schemas/cxxlens_ng_production_scope_closure.yaml}
      decision_adr: {const: docs/design/adr/0095-production-scope-closure.md}
      schema: {const: schemas/cxxlens_ng_production_scope_closure.schema.yaml}
      checker: {const: tools/quality/check_ng_production_scope_closure.py}
      namespace_ids:
        const: [release.profile, release.gate, release.migration, distribution.target, distribution.native-package, distribution.installed-tool, distribution.consumer-configuration, distribution.source-surface, public.package, public.author-path, public.catalog-entry, public.header, public.callable, relation.descriptor, relation.static-admission, provider.profile-feature, provider.message, provider.execution-surface, provider.support-tuple, provider.production-tuple-template, query.operator, query.result-status, query.backend, g5.closure-kind, security.profile, security.namespace, security.sandbox-profile, security.sandbox-policy, compatibility.axis, quality.check]
      report:
        type: object
        additionalProperties: false
        required: [schema, ci_job, artifact]
        properties:
          schema: {const: schemas/cxxlens_ng_production_scope_closure_report.schema.yaml}
          ci_job: {const: production-scope-closure}
          artifact: {const: 'cxxlens-ng-production-scope-closure-${revision}'}
      evaluation:
        type: object
        additionalProperties: false
        required: [schema, ci_job, artifact, not_qualified_satisfies_gate_release]
        properties:
          schema: {const: schemas/cxxlens_ng_release_qualification_evaluation_report.schema.yaml}
          ci_job: {const: release-evaluation}
          artifact: {const: 'cxxlens-ng-release-qualification-evaluation-${revision}'}
          not_qualified_satisfies_gate_release: {const: false}
  provider_protocol_boundary:
    type: object
    additionalProperties: false
    required: [NG0, NG1, exact_contract_issue]
    properties:
      NG0:
        $ref: '#/$defs/id_array'
      NG1:
        $ref: '#/$defs/id_array'
      exact_contract_issue:
        const: '#64'
  version_axes:
    type: array
    minItems: 13
    maxItems: 13
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [id, compatibility, migration]
      properties:
        id:
          $ref: '#/$defs/id'
        compatibility:
          type: string
          minLength: 1
        migration:
          type: string
          minLength: 1
  snapshot_format_binding:
    const:
      authority: schemas/cxxlens_ng_sqlite_store_contract.yaml
      decision_adr: docs/design/adr/0097-sqlite-v3-chunked-payload-migration.md
      axis: snapshot-format
      axis_semantics: release-capability-bundle-version-not-a-direct-store-readable-format-tuple
      axis_current: 3.0.0
      axis_projection: [version, features, contract-digest]
      backend_store_compatibility_projection: backend-qualified-features-only-memory-and-sqlite-readable-tuples-do-not-replace-axis-version
      contract_digest: exact-sqlite-store-contract-canonical-json-sha256
      current_binary_capability_features: [memory-readable-2.6.0-direct, sqlite-readable-3.0.0-direct, sqlite-v2.6.0-read-only-migration-required, compact-v2.6.0-to-v3.0.0-explicit]
      artifact_context_rule: exact-backend-qualified-feature-never-axis-version-substitution
      memory_current:
        backend: memory
        readable_format: 2.6.0
        direct_open: true
        migration_required: false
      sqlite_current:
        backend: sqlite
        id: cxxlens.sqlite-semantic-store.v3
        readable_format: 3.0.0
        direct_open: true
        migration_required: false
        mutation: allowed-after-full-validation
      sqlite_predecessor:
        backend: sqlite
        id: cxxlens.sqlite-semantic-store.v2
        readable_format: 2.6.0
        direct_open: true
        migration_required: true
        mutation: read-only
        capability_feature: sqlite-v2.6.0-read-only-migration-required
        artifact_context_feature: sqlite-store-artifact-v2.6.0-pre-migration
      registered_migration:
        id: compact-v2.6.0-to-v3.0.0
        handler: snapshot-store-compact
        coordinate: sqlite-store-readable-format
        backend: sqlite
        from: 2.6.0
        to: 3.0.0
        source_context_feature: sqlite-store-artifact-v2.6.0-pre-migration
        required_capability_features: [sqlite-v2.6.0-read-only-migration-required, compact-v2.6.0-to-v3.0.0-explicit]
        implicit: false
        authority_status: accepted
      qualification_evidence:
        status: required
        current_authority: independently-validated-exact-2x4-release-evidence
        report_schema: schemas/cxxlens_ng_sqlite_store_v3_qualification_report.schema.yaml
        checker: tools/quality/check_ng_sqlite_store_v3_qualification.py
        report_filename: cxxlens-ng-sqlite-store-v3-qualification-report.json
        artifact: cxxlens-ng-sqlite-store-v3-qualification-${revision}
        maximum_bytes: 16777216
        revision_binding: exact-revision-source-tree-schema-contract-artifact-and-report-set-digests
        configurations: [static, shared]
        required_cases: [current-v3.0.0-cold-reopen, v2.6.0-read-only-zero-mutation, compact-v2.6.0-to-v3.0.0-same-semantic-digest, limit-length-exceeding-valid-canonical-v5-reopened-parity]
  compatibility_contexts:
    type: array
    minItems: 4
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [id, required_axes]
      properties:
        id:
          enum: [provider-handshake, snapshot-open, query-load, release-startup]
        required_axes:
          $ref: '#/$defs/id_array'
  compatibility_rules:
    type: object
    additionalProperties: false
    required:
      - decisions
      - no_implicit_bundle_selection
      - no_silent_fallback
      - required_feature_missing
      - unknown_required_feature
      - unknown_optional_feature
      - missing_required_axis
      - major_mismatch
      - backend_artifact_major_migration
      - older_offered_minor
      - newer_compatible_minor
      - report_schema
      - request_schema
    properties:
      decisions:
        type: array
        const: [supported, migration-required, unsupported]
      no_implicit_bundle_selection:
        const: true
      no_silent_fallback:
        const: true
      required_feature_missing:
        const: unsupported
      unknown_required_feature:
        const: unsupported
      unknown_optional_feature:
        const: preserved-as-unavailable
      missing_required_axis:
        const: unsupported
      major_mismatch:
        const: unsupported
      backend_artifact_major_migration:
        const: exact-registered-sqlite-store-readable-format-only
      older_offered_minor:
        const: migration-required-only-with-explicit-path
      newer_compatible_minor:
        const: supported
      report_schema:
        const: schemas/cxxlens_ng_compatibility_report.schema.yaml
      request_schema:
        const: schemas/cxxlens_ng_compatibility_request.schema.yaml
  migrations:
    type: array
    uniqueItems: true
    items:
      type: object
      additionalProperties: false
      required: [id, axis, from, to, handler, implicit, state]
      properties:
        id:
          $ref: '#/$defs/id'
        axis:
          $ref: '#/$defs/id'
        coordinate:
          $ref: '#/$defs/id'
        backend:
          $ref: '#/$defs/id'
        source_context_feature:
          $ref: '#/$defs/id'
        from:
          $ref: '#/$defs/semver'
        to:
          $ref: '#/$defs/semver'
        handler:
          $ref: '#/$defs/id'
        implicit:
          type: boolean
        state:
          enum: [planned, implemented, qualified]
      allOf:
        - if:
            properties:
              axis:
                const: snapshot-format
            required: [axis]
          then:
            required: [coordinate, backend, source_context_feature]
            properties:
              coordinate:
                const: sqlite-store-readable-format
              backend:
                const: sqlite
              source_context_feature:
                const: sqlite-store-artifact-v2.6.0-pre-migration
  inspection:
    type: object
    additionalProperties: false
    required: [inspect, doctor, report_reason_codes, fallback_used]
    properties:
      inspect:
        const: side-effect-free-contract-decision
      doctor:
        const: contract-decision-plus-runtime-qualification-findings
      report_reason_codes:
        $ref: '#/$defs/reason_array'
      fallback_used:
        const: false
$defs:
  id:
    type: string
    pattern: '^[a-z][a-z0-9.-]+$'
  id_array:
    type: array
    uniqueItems: true
    items:
      $ref: '#/$defs/id'
  migration_array:
    type: array
    uniqueItems: true
    items:
      type: string
      pattern: '^R[0-7]$'
  profile_array:
    type: array
    uniqueItems: true
    items:
      enum: [NG0, NG1, NG2, NG3]
  reason_array:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      pattern: '^compat\.[a-z][a-z-]+$'
  semver:
    type: string
    pattern: '^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
