schema: cxxlens.ng-release-bundle.v1
document_version: 1.6.0
maturity: accepted-contract
authority:
  design: docs/design/cxxlens_next_generation_integrated_design_ja.md
  adr: docs/design/adr/0005-product-boundary-release-compatibility.md
  decision_issue: '#59'
  tracking_issue: '#56'

product_boundary:
  components:
    - id: relation-kernel
      domain: language-neutral
      depends_on: []
      forbidden_dependencies: [cc-cpp-semantics, native-provider]
      exported_values: [relation-descriptor, semantic-claim, snapshot, logical-row]
    - id: logical-query
      domain: language-neutral
      depends_on: [relation-kernel]
      forbidden_dependencies: [cc-cpp-semantics, native-provider]
      exported_values: [logical-query-ir, query-result, compatibility-report]
    - id: cc-cpp-semantics
      domain: cxx-project
      depends_on: [relation-kernel, logical-query]
      forbidden_dependencies: [native-provider]
      exported_values: [cc-relation-descriptor, cc-semantic-service]
    - id: author-sdk
      domain: application
      depends_on: [relation-kernel, logical-query, cc-cpp-semantics, recipes]
      forbidden_dependencies: [native-provider]
      exported_values: [provider-manifest, provider-task, relation-batch, logical-query-ir, recipe-result]
    - id: native-provider
      domain: native-major-specific
      depends_on: [cc-cpp-semantics, author-sdk]
      forbidden_dependencies: []
      exported_values: [detached-observation, provider-certificate]
    - id: recipes
      domain: application
      depends_on: [cc-cpp-semantics, logical-query]
      forbidden_dependencies: [native-provider]
      exported_values: [recipe-descriptor, recipe-result]
  invariants:
    - id: boundary.kernel-language-neutral
      rule: relation-kernel and logical-query never depend on C/C++ semantic or native-provider types.
    - id: boundary.native-process-only
      rule: compiler-native objects remain inside a major-specific provider process and never cross the protocol.
    - id: boundary.provider-port
      rule: the kernel consumes detached protocol values through a port and never links a provider implementation.
    - id: boundary.recipe-downward-only
      rule: recipes consume public query and C/C++ semantic contracts without kernel-private access.

distribution_surface:
  public_targets:
    - name: cxxlens::base
      component: relation-kernel
      direct_dependencies: []
      stability: stable-at-1.0
    - name: cxxlens::kernel
      component: relation-kernel
      direct_dependencies: [cxxlens::base]
      stability: stable-at-1.0
    - name: cxxlens::query
      component: logical-query
      direct_dependencies: [cxxlens::kernel]
      stability: stable-at-1.0
    - name: cxxlens::cpp
      component: cc-cpp-semantics
      direct_dependencies: [cxxlens::query]
      stability: stable-at-1.0
    - name: cxxlens::provider_sdk
      component: author-sdk
      direct_dependencies: [cxxlens::cxxlens, cxxlens::recipes]
      stability: versioned
    - name: cxxlens::recipes
      component: recipes
      direct_dependencies: [cxxlens::query]
      stability: versioned
    - name: cxxlens::cxxlens
      component: cc-cpp-semantics
      direct_dependencies: [cxxlens::base, cxxlens::kernel, cxxlens::query, cxxlens::cpp]
      stability: stable-at-1.0
  aggregate_target: cxxlens::cxxlens
  aggregate_excludes: [cxxlens::provider_sdk, cxxlens::recipes, native-provider, native-sdk]
  native_packages: [cxxlens-clang-worker-22, cxxlens-provider-clang22-sdk]
  source_surface:
    headers: authoritative
    cxx_modules: experimental-not-installed-in-1.0
    umbrella_excludes: [provider-sdk, recipes, native-provider, native-sdk]
  implementation_state: implemented
  implementation_issue: '#67'
  package_qualification:
    implementation_issue: '#118'
    ci_job: install-consumer
    configurations:
      - {id: static, build_shared: 'OFF'}
      - {id: shared, build_shared: 'ON'}
    artifact_source: same-configured-and-tested-prefix
    clean_environment: [LD_LIBRARY_PATH, DYLD_LIBRARY_PATH]
    direct_installed_tools: [cxxlens-provider-scaffold, cxxlens-sdk-doctor, cxxlens-clang-worker-22]
    installed_consumers: [core, provider-sdk, clang22-provider-sdk, real-project, examples]
    prefix_relocation: required
    exported_transitive_dependencies: consumer-link-verified
    build_tree_runtime_paths: forbidden
    shared_runtime:
      linux_tool_origin: '$ORIGIN/../<install-libdir>'
      linux_library_origin: '$ORIGIN'
      macos_tool_origin: '@loader_path/../<install-libdir>'
      macos_library_origin: '@loader_path'
      soname_binding: distribution-major
      missing_dependency_diagnostic: loader-explicit-soname

stability_tiers:
  - id: stable
    source_compatibility: maintained-within-1.x
    abi_compatibility: certified-tuples-only
  - id: versioned
    source_compatibility: axis-major-governed
    abi_compatibility: not-implied
  - id: experimental
    source_compatibility: not-promised
    abi_compatibility: not-promised
  - id: native-major-specific
    source_compatibility: exact-provider-major-and-toolchain
    abi_compatibility: exact-certified-tuple-only
  - id: internal
    source_compatibility: none
    abi_compatibility: none

profiles:
  - id: NG0
    release_role: 1.0-candidate-minimum
    first_eligible_release: pre-1.0
    distribution_requirement: required-by-1.0
    protocol_scope: minimal-vertical-slice
  - id: NG1
    release_role: 1.0-production-hardening
    first_eligible_release: '1.0'
    distribution_requirement: required-by-1.0
    protocol_scope: production-hardening
  - id: NG2
    release_role: optional-analysis-capabilities
    first_eligible_release: 1.x
    distribution_requirement: not-a-1.0-blocker
    protocol_scope: inherits-ng1
  - id: NG3
    release_role: optional-mutation-and-artifact-capabilities
    first_eligible_release: 1.x
    distribution_requirement: not-a-1.0-blocker
    protocol_scope: inherits-ng1

releases:
  - id: ng0-contract-candidate
    distribution_range: pre-1.0
    state: contract-candidate
    required_profiles: [NG0]
    optional_profiles: []
    blocker_migrations: [R0, R1, R2, R3]
    blocker_gates: [gate.g0, gate.g1, gate.g2, gate.g3, gate.g4]
    production_supported: false
  - id: distribution-1.0
    distribution_range: '1.0'
    state: qualification-in-progress
    required_profiles: [NG0, NG1]
    optional_profiles: []
    blocker_migrations: [R0, R1, R2, R3, R4]
    blocker_gates: [gate.g0, gate.g1, gate.g2, gate.g3, gate.g4, gate.g5, gate.release]
    production_supported: false
  - id: distribution-1.x
    distribution_range: 1.x
    state: planned
    required_profiles: [NG0, NG1]
    optional_profiles: [NG2, NG3]
    blocker_migrations: [R0, R1, R2, R3, R4]
    blocker_gates: [gate.g0, gate.g1, gate.g2, gate.g3, gate.g4, gate.g5, gate.release]
    production_supported: false
  - id: future-major
    distribution_range: 2.x+
    state: conditional
    required_profiles: [NG0, NG1]
    optional_profiles: [NG2, NG3]
    blocker_migrations: []
    blocker_gates: []
    production_supported: false
    activation_rule: breaking-change-to-an-accepted-stable-version-axis

non_blocking_migrations:
  distribution-1.0: [R5, R6, R7]
  distribution-1.x: [R5, R6, R7]

g5_qualification:
  migration: R4
  gate: gate.g5
  authority: schemas/cxxlens_ng_g5_qualification.yaml
  ci_job: g5-qualification
  status: implemented

release_qualification:
  gate: gate.release
  authority: schemas/cxxlens_ng_release_qualification.yaml
  checker: tools/quality/check_ng_release_qualification.py
  ci_job: release-qualification
  status: implemented
  claim_scope: exact-gr-report-tuples-only
  report_artifact: cxxlens-ng-release-qualification-${revision}
  required_evidence:
    - same-sha-foundation-report
    - same-sha-wave0-readiness-report
    - same-sha-public-callable-report-and-review
    - same-sha-g5-report
    - static-relocated-install-artifact
    - shared-relocated-install-artifact
    - static-shared-runtime-junit
    - real-project-memory-sqlite-and-major-rejection
    - security-conformance-and-negative-paths
    - doxygen-contract-and-support-matrix
    - license-and-notice

production_scope_closure:
  contract: cxxlens.ng-production-scope-closure.v1
  authority: schemas/cxxlens_ng_production_scope_closure.yaml
  decision_adr: docs/design/adr/0095-production-scope-closure.md
  schema: schemas/cxxlens_ng_production_scope_closure.schema.yaml
  checker: tools/quality/check_ng_production_scope_closure.py
  namespace_ids:
    - release.profile
    - release.gate
    - release.migration
    - distribution.target
    - distribution.native-package
    - distribution.installed-tool
    - distribution.consumer-configuration
    - distribution.source-surface
    - public.package
    - public.author-path
    - public.catalog-entry
    - public.header
    - public.callable
    - relation.descriptor
    - relation.static-admission
    - provider.profile-feature
    - provider.message
    - provider.execution-surface
    - provider.support-tuple
    - provider.production-tuple-template
    - query.operator
    - query.result-status
    - query.backend
    - g5.closure-kind
    - security.profile
    - security.namespace
    - security.sandbox-profile
    - security.sandbox-policy
    - compatibility.axis
    - quality.check
  report:
    schema: schemas/cxxlens_ng_production_scope_closure_report.schema.yaml
    ci_job: production-scope-closure
    artifact: cxxlens-ng-production-scope-closure-${revision}
  evaluation:
    schema: schemas/cxxlens_ng_release_qualification_evaluation_report.schema.yaml
    ci_job: release-evaluation
    artifact: cxxlens-ng-release-qualification-evaluation-${revision}
    not_qualified_satisfies_gate_release: false

provider_protocol_boundary:
  NG0:
    - manifest-and-binary-digest
    - major-and-encoding-negotiation
    - framed-bounded-task-and-batch
    - checksums-and-schema-validation
    - cancellation-deadline-and-terminal-state
    - coverage-unresolved-and-structured-failure
    - unknown-required-feature-rejection
    - process-failure-isolation
  NG1:
    - streaming-backpressure-and-heartbeat
    - hung-worker-recovery-and-long-run-qualification
    - multi-process-immutable-readers
    - adjacent-provider-differential
    - production-conformance-and-compatibility-matrix
  exact_contract_issue: '#64'

version_axes:
  - id: distribution
    compatibility: exact-selected-release
    migration: explicit-only
  - id: kernel-semantics
    compatibility: same-major-minimum-minor
    migration: explicit-only
  - id: relation-descriptor
    compatibility: declared-major-minor-and-exact-digest
    migration: explicit-only
  - id: identity-contract
    compatibility: exact-major
    migration: explicit-recompute-from-canonical-source-only
  - id: condition-semantics
    compatibility: exact-major
    migration: explicit-only
  - id: snapshot-format
    compatibility: same-major-minimum-minor
    migration: explicit-only
  - id: provider-protocol
    compatibility: same-major-feature-negotiation
    migration: reject-major-mismatch
  - id: provider-implementation
    compatibility: certified-tuple
    migration: none
  - id: native-sdk
    compatibility: exact-provider-major-and-toolchain
    migration: none
  - id: logical-query-ir
    compatibility: same-major-minimum-minor
    migration: explicit-only
  - id: recipe-semantics
    compatibility: declared-major-minor
    migration: explicit-only
  - id: model-assumption-pack
    compatibility: exact-digest
    migration: explicit-only
  - id: patch-artifact-plan
    compatibility: same-major-minimum-minor
    migration: explicit-only

compatibility_contexts:
  - id: provider-handshake
    required_axes: [provider-protocol, provider-implementation, relation-descriptor, identity-contract, condition-semantics]
  - id: snapshot-open
    required_axes: [snapshot-format, relation-descriptor, identity-contract, condition-semantics]
  - id: query-load
    required_axes: [kernel-semantics, relation-descriptor, identity-contract, condition-semantics, logical-query-ir]
  - id: release-startup
    required_axes: [distribution, kernel-semantics, relation-descriptor, identity-contract, condition-semantics, snapshot-format, provider-protocol, provider-implementation, native-sdk, logical-query-ir, recipe-semantics, model-assumption-pack, patch-artifact-plan]

compatibility_rules:
  decisions: [supported, migration-required, unsupported]
  no_implicit_bundle_selection: true
  no_silent_fallback: true
  required_feature_missing: unsupported
  unknown_required_feature: unsupported
  unknown_optional_feature: preserved-as-unavailable
  missing_required_axis: unsupported
  major_mismatch: unsupported
  older_offered_minor: migration-required-only-with-explicit-path
  newer_compatible_minor: supported
  report_schema: schemas/cxxlens_ng_compatibility_report.schema.yaml
  request_schema: schemas/cxxlens_ng_compatibility_request.schema.yaml

migrations:
  - id: snapshot-format-1.0-to-1.1
    axis: snapshot-format
    from: 1.0.0
    to: 1.1.0
    handler: cxxlens-migrate-snapshot-v1.0-to-v1.1
    state: planned

inspection:
  inspect: side-effect-free-contract-decision
  doctor: contract-decision-plus-runtime-qualification-findings
  report_reason_codes:
    - compat.exact
    - compat.same-major
    - compat.optional-feature-unavailable
    - compat.migration-required
    - compat.release-not-qualified
    - compat.release-unknown
    - compat.axis-missing
    - compat.axis-duplicate
    - compat.axis-major-mismatch
    - compat.axis-version-mismatch
    - compat.axis-version-too-old
    - compat.contract-digest-mismatch
    - compat.required-feature-missing
    - compat.request-invalid
  fallback_used: false
