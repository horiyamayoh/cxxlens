$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.provider-task.v1
type: object
additionalProperties: false
required:
  - schema
  - task_id
  - provider
  - outputs
  - input_partitions
  - condition
  - interpretation
  - budget
  - dependency_groups
  - partial_policy
properties:
  schema: {const: cxxlens.provider-task.v1}
  task_id: {type: string, pattern: '^task:semantic-v2:sha256:[0-9a-f]{64}$'}
  provider:
    type: object
    additionalProperties: false
    required: [id, version, binary_digest, semantic_contract_digest]
    properties:
      id: {type: string, pattern: '^[a-z][a-z0-9_-]*(\.[a-z0-9_-]+)+$'}
      version: {type: string, pattern: '^[1-9][0-9]*\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'}
      binary_digest: {$ref: '#/$defs/digest'}
      semantic_contract_digest: {$ref: '#/$defs/digest'}
  outputs: {type: array, minItems: 1, uniqueItems: true, items: {type: string}}
  input_partitions: {type: array, uniqueItems: true, items: {type: string}}
  condition: {type: string, minLength: 1, pattern: '^[^\x00-\x1f\x7f]+$'}
  interpretation: {type: string, pattern: '^[a-z][a-z0-9_-]*(\.[a-z0-9_-]+)+$'}
  budget:
    type: object
    additionalProperties: false
    required: [wall_ms, cpu_ms, address_space_bytes, transport_bytes, output_bytes, rows, diagnostics, open_files, subprocesses, minimum_progress_bytes_per_second]
    properties:
      wall_ms: {$ref: '#/$defs/positive'}
      cpu_ms: {$ref: '#/$defs/positive'}
      address_space_bytes: {$ref: '#/$defs/positive'}
      transport_bytes: {$ref: '#/$defs/positive'}
      output_bytes: {$ref: '#/$defs/positive'}
      rows: {$ref: '#/$defs/positive'}
      diagnostics: {$ref: '#/$defs/positive'}
      open_files: {$ref: '#/$defs/positive'}
      subprocesses: {$ref: '#/$defs/positive'}
      minimum_progress_bytes_per_second: {$ref: '#/$defs/positive'}
  dependency_groups:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, depends_on, atomic_output_groups]
      properties:
        id: {type: string, minLength: 1}
        depends_on: {type: array, uniqueItems: true, items: {type: string}}
        atomic_output_groups: {type: array, minItems: 1, uniqueItems: true, items: {type: string}}
  partial_policy: {enum: [forbid, declared_dependency_groups]}
$defs:
  digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  positive: {type: integer, minimum: 1}
