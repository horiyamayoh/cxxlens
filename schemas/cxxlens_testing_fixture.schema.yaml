$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.testing.fixture.v1.json
title: cxxlens.testing.fixture.v1
type: object
required:
- arguments
- compilation_database
- files
- language
- library_version
- main_file
- schema
- semantics_version
- standard
- target
- variants
additionalProperties: false
properties:
  schema: {const: cxxlens.testing.fixture.v1}
  library_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  semantics_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  language: {enum: [c, c++]}
  main_file: {type: string}
  standard: {type: string}
  target: {type: string}
  arguments:
    type: array
    items: {type: string}
  compilation_database: {type: string}
  files:
    type: array
    items:
      type: object
      required: [content, generated, kind, path, system_header]
      additionalProperties: false
      properties:
        content: {type: string}
        generated: {type: boolean}
        kind: {enum: [source, header]}
        path: {type: string}
        system_header: {type: boolean}
  variants:
    type: array
    items:
      type: object
      required: [arguments, environment, name]
      additionalProperties: false
      properties:
        arguments:
          type: array
          items: {type: string}
        environment:
          type: object
          additionalProperties: {type: string}
        name: {type: string}
