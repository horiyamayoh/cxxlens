schema: cxxlens.ng-sqlite-store-contract.v1
document_version: 1.1.0
maturity: implemented
authority:
  semantic_contract: schemas/cxxlens_ng_snapshot_store_contract.yaml
  decision_adr: docs/design/adr/0013-ng-sqlite-physical-store.md
  owner_issue: '#68'
physical_format:
  id: cxxlens.sqlite-semantic-store.v2
  current: 2.4.0
  semantic_snapshot_id_excludes_format: true
runtime:
  discovery: explicit-runtime-library
  candidates:
    linux: [libsqlite3.so.0, libsqlite3.so]
    macos: [libsqlite3.dylib, /usr/lib/libsqlite3.dylib]
  missing_runtime: store.backend-unavailable
tables:
  - name: cxxlens_ng_metadata
    primary_key: [key]
    columns: [key, value]
  - name: cxxlens_ng_publication
    primary_key: [publication_id]
    columns:
      - publication_id
      - series_id
      - snapshot_id
      - sequence
      - generation
      - parent
      - state
      - checksum
      - payload
indexes:
  - name: cxxlens_ng_publication_series
    columns: [series_id, sequence]
payload:
  write_schema: cxxlens.ng-snapshot-payload.v5
  readable_schemas:
    - cxxlens.ng-snapshot-payload.v1
    - cxxlens.ng-snapshot-payload.v2
    - cxxlens.ng-snapshot-payload.v3
    - cxxlens.ng-snapshot-payload.v4
    - cxxlens.ng-snapshot-payload.v5
  encoding: versioned-length-prefixed-binary
  checksum: sha256-full-256
  canonical_semantics_revalidated_on_open: true
  query_annotations:
    introduced: cxxlens.ng-snapshot-payload.v2
    fields:
      - condition
      - interpretation
      - semantic_key
      - assertion
      - claim_content
      - producer_id
      - producer_semantic_contract
      - provenance_root
      - guarantee
      - relation_coverage
    annotationless_payload_query: reject-with-sdk.query-annotations-unavailable
  closure_proof_projection:
    introduced: cxxlens.ng-snapshot-payload.v4
    fields: [partition_identity_binding, validated_closure_certificate_subject]
    legacy_id_only_payload_closed_world: forbidden
  semantic_object_graph:
    introduced: cxxlens.ng-snapshot-payload.v5
    source: canonical-partition-claim-envelope-coverage-unresolved
    reconstruct_on: [open, compaction]
    compare: [manifest, detached-rows, annotations, claim-contents, coverage, unresolved]
    mismatch: corrupt
transaction:
  journal_mode: WAL
  synchronous: FULL
  write: begin-immediate-insert-or-replace-commit
  publication_visibility: committed-record-only
  stale_parent: reject-before-write
compaction:
  algorithm: copy-on-write-physical-generation
  reader_pin: shared-generation-token
  semantic_digest_revalidation: required
  semantic_object_graph_revalidation: required
corruption:
  checksum_mismatch: mark-publication-corrupt
  semantic_digest_mismatch: mark-publication-corrupt
  semantic_object_graph_mismatch: mark-publication-corrupt
  current_fallback: forbidden
  explicit_intact_prior_open: allowed
