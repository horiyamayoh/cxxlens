    primary_key: [key]
    columns: [key, value]
  - name: cxxlens_ng_publication
    primary_key: [publication_id]
    columns:
      - publication_id
      - series_id
      - snapshot_id
      - sequence
      - generation
      - parent
      - state
      - payload_checksum
      - payload_byte_count
      - payload_chunk_count
  - name: cxxlens_ng_payload_chunk
    primary_key: [publication_id, generation, chunk_ordinal]
    columns:
      - publication_id
      - generation
      - chunk_ordinal
      - byte_offset
      - byte_count
      - checksum
      - payload
  - name: cxxlens_ng_series_head
    primary_key: [series_id]
    columns: [series_id, current_publication, sequence]
indexes:
  - name: cxxlens_ng_publication_series
    columns: [series_id, sequence]
  - name: cxxlens_ng_payload_chunk_locator
    columns: [publication_id, generation, chunk_ordinal]
