$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.api-ready.v1.schema.yaml
title: cxxlens atomic-unit ready DAG and shard report v1
type: object
additionalProperties: false
required:
  - schema
  - input_fingerprints
  - semantic_digest
  - providers
  - global_gates
  - dependency_requests
  - edges
  - topological_waves
  - nodes
  - shards
  - package_integration_shards
  - summary
properties:
  schema: {const: cxxlens.api-ready.v1}
  input_fingerprints:
    type: object
    additionalProperties: {$ref: '#/$defs/digest'}
    required:
      - task_packets
      - ownership
      - global_contract_conventions
      - contract_ownership_registry
      - m0
      - m1
      - m2
      - dependency_requests
  semantic_digest: {$ref: '#/$defs/digest'}
  providers:
    type: object
    additionalProperties: false
    required: [facts, capabilities]
    properties:
      facts:
        type: array
        items: {$ref: '#/$defs/provider'}
      capabilities:
        type: array
        items: {$ref: '#/$defs/provider'}
  global_gates:
    type: array
    minItems: 1
    items: {$ref: '#/$defs/gate'}
  dependency_requests:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [request_id, state, requesting_atomic_unit, blocked_api_ids]
      properties:
        request_id: {type: string, minLength: 1}
        state: {enum: [pending, accepted, resolved, rejected]}
        requesting_atomic_unit: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
        blocked_api_ids:
          $ref: '#/$defs/api_ids'
  edges:
    type: array
    items:
      type: object
      additionalProperties: false
      required:
        - from
        - to
        - scope
        - kind
        - component_id
        - reason
        - owner
        - source_contract
        - required_semantics_version
        - via_api_ids
      properties:
        from:
          pattern: '^(AU-[A-Z]+-[0-9]{3}|integration[.][a-z][a-z0-9_]*)$'
        to: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
        scope: {enum: [readiness, package_integration]}
        kind:
          enum:
            - api_dependency
            - package_internal_engine
            - shared_public_type
            - fact_provider_implementation
            - capability_provider_implementation
            - schema_fixture_contract
            - package_integration_prerequisite
        component_id: {type: [string, 'null']}
        reason: {type: string, minLength: 1}
        owner: {$ref: '#/$defs/edge_owner'}
        source_contract: {type: string, minLength: 1}
        required_semantics_version: {type: [string, 'null']}
        via_api_ids:
          $ref: '#/$defs/api_ids'
  topological_waves:
    type: array
    minItems: 1
    items:
      type: array
      minItems: 1
      uniqueItems: true
      items: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
  nodes:
    type: array
    minItems: 1
    items: {$ref: '#/$defs/node'}
  shards:
    type: array
    minItems: 1
    items: {$ref: '#/$defs/shard'}
  package_integration_shards:
    type: array
    minItems: 1
    items: {$ref: '#/$defs/package_integration_shard'}
  summary:
    type: object
    additionalProperties: false
    required:
      - api_count
      - unit_count
      - package_count
      - edge_count
      - readiness_edge_count
      - edge_kind_counts
      - state_counts
      - ready_waves
    properties:
      api_count: {type: integer, minimum: 1}
      unit_count: {type: integer, minimum: 1}
      package_count: {type: integer, minimum: 1}
      edge_count: {type: integer, minimum: 0}
      readiness_edge_count: {type: integer, minimum: 0}
      edge_kind_counts:
        type: object
        additionalProperties: {type: integer, minimum: 0}
      state_counts:
        type: object
        additionalProperties: {type: integer, minimum: 0}
      ready_waves:
        type: array
        items:
          type: array
          minItems: 1
          uniqueItems: true
          items: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
$defs:
  digest:
    type: string
    pattern: '^sha256:[0-9a-f]{64}$'
  string_list:
    type: array
    uniqueItems: true
    items: {type: string, minLength: 1}
  api_ids:
    type: array
    minItems: 1
    uniqueItems: true
    items: {pattern: '^API-[A-Z]+-[0-9]{3}$'}
  provider:
    type: object
    additionalProperties: false
    required:
      - id
      - contract_id
      - kind
      - state
      - semantics_state
      - required_semantics_version
      - provided_semantics_version
      - owner
      - source_contract
      - evidence
    properties:
      id: {type: string, minLength: 1}
      contract_id: {type: string, minLength: 1}
      kind:
        enum: [fact_provider_implementation, capability_provider_implementation]
      state: {enum: [available, unavailable]}
      semantics_state: {enum: [complete, incomplete]}
      required_semantics_version: {type: string, minLength: 1}
      provided_semantics_version: {type: [string, 'null']}
      owner: {$ref: '#/$defs/edge_owner'}
      source_contract: {type: string, minLength: 1}
      evidence:
        $ref: '#/$defs/string_list'
  edge_owner:
    type: object
    additionalProperties: false
    required: [atomic_unit_id, steward]
    properties:
      atomic_unit_id: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
      steward: {type: string, minLength: 1}
  gate:
    type: object
    additionalProperties: false
    required: [id, state, command]
    properties:
      id: {type: string, minLength: 1}
      state: {const: required}
      command: {$ref: '#/$defs/command'}
  blocker:
    type: object
    additionalProperties: false
    required: [code, subject, steward, chain]
    properties:
      code: {type: string, minLength: 1}
      subject: {type: string, minLength: 1}
      steward: {type: string, minLength: 1}
      chain:
        $ref: '#/$defs/string_list'
  node:
    type: object
    additionalProperties: false
    required:
      - atomic_unit_id
      - api_ids
      - phases
      - state
      - dependencies
      - dependency_kinds
      - shared_components
      - required_facts
      - required_capabilities
      - prerequisites
      - blockers
      - shard_id
    properties:
      atomic_unit_id: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
      api_ids: {$ref: '#/$defs/api_ids'}
      phases: {$ref: '#/$defs/string_list'}
      state: {enum: [complete, ready, blocked]}
      dependencies:
        type: array
        uniqueItems: true
        items: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
      dependency_kinds:
        $ref: '#/$defs/string_list'
      shared_components:
        type: array
        minItems: 3
        uniqueItems: true
        items: {type: string, minLength: 1}
      required_facts: {$ref: '#/$defs/string_list'}
      required_capabilities: {$ref: '#/$defs/string_list'}
      prerequisites:
        type: object
        additionalProperties: {type: boolean}
        properties:
          global_gate_declarations: {const: true}
          observed_global_gates: {const: false}
        required:
          - exact_contract
          - contract_candidate
          - contract_frozen
          - frozen_skeleton
          - ownership
          - fixtures
          - providers
          - provider_availability
          - provider_semantics
          - dependencies
          - global_gate_declarations
          - observed_global_gates
      blockers:
        type: array
        items: {$ref: '#/$defs/blocker'}
      shard_id: {type: string, pattern: '^shard[.]au-[a-z]+-[0-9]{3}$'}
  command:
    type: object
    additionalProperties: false
    required: [id, argv, environment]
    properties:
      id: {type: string, minLength: 1}
      argv:
        type: array
        minItems: 1
        items: {type: string, minLength: 1}
      environment:
        type: object
        additionalProperties: {type: string}
  shard:
    type: object
    additionalProperties: false
    required:
      - id
      - atomic_unit_id
      - api_ids
      - state
      - package_integration_role
      - fixture_categories
      - selected_evidence_paths
      - mandatory_gate_ids
      - commands
      - execution_steps
      - execution_result_path
      - acceptance_command
      - semantic_digest
    properties:
      id: {type: string, pattern: '^shard[.]au-[a-z]+-[0-9]{3}$'}
      atomic_unit_id: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
      api_ids: {$ref: '#/$defs/api_ids'}
      state: {enum: [verification, active, blocked]}
      package_integration_role: {type: string, minLength: 1}
      fixture_categories:
        type: array
        minItems: 3
        uniqueItems: true
        items: {enum: [positive, negative, ambiguous]}
      selected_evidence_paths: {$ref: '#/$defs/string_list'}
      mandatory_gate_ids: {$ref: '#/$defs/string_list'}
      commands:
        type: array
        minItems: 1
        items: {$ref: '#/$defs/command'}
      execution_steps:
        type: array
        minItems: 9
        items: {$ref: '#/$defs/execution_step'}
      execution_result_path:
        {type: string, pattern: '^build/dev-clang/agent-results/AU-[A-Z]+-[0-9]{3}[.]json$'}
      acceptance_command: {$ref: '#/$defs/acceptance_command'}
      semantic_digest: {$ref: '#/$defs/digest'}
  package_integration_shard:
    type: object
    additionalProperties: false
    required:
      - id
      - package_id
      - package_integration_role
      - state
      - conformant_unit_artifacts
      - blocked_atomic_units
      - allowed_write_paths
      - mandatory_gate_ids
      - commands
      - execution_steps
      - execution_result_path
      - acceptance_command
      - semantic_digest
    properties:
      id: {type: string, pattern: '^integration[.][a-z][a-z0-9_]*$'}
      package_id: {type: string, pattern: '^[a-z][a-z0-9_]*$'}
      package_integration_role:
        {type: string, pattern: '^integration[.]package[.][a-z][a-z0-9_]*$'}
      state: {enum: [verification, blocked]}
      conformant_unit_artifacts:
        type: array
        uniqueItems: true
        items:
          type: object
          additionalProperties: false
          required:
            - atomic_unit_id
            - shard_id
            - shard_digest
            - execution_result_path
            - required_execution_status
          properties:
            atomic_unit_id: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
            shard_id: {type: string, pattern: '^shard[.]au-[a-z]+-[0-9]{3}$'}
            shard_digest: {$ref: '#/$defs/digest'}
            execution_result_path:
              {type: string, pattern: '^build/dev-clang/agent-results/AU-[A-Z]+-[0-9]{3}[.]json$'}
            required_execution_status: {const: passed}
      blocked_atomic_units:
        type: array
        uniqueItems: true
        items: {pattern: '^AU-[A-Z]+-[0-9]{3}$'}
      allowed_write_paths: {$ref: '#/$defs/string_list'}
      mandatory_gate_ids: {$ref: '#/$defs/string_list'}
      commands:
        type: array
        minItems: 1
        items: {$ref: '#/$defs/command'}
      execution_steps:
        type: array
        minItems: 6
        items: {$ref: '#/$defs/execution_step'}
      execution_result_path:
        {type: string, pattern: '^build/dev-clang/agent-results/integration[.][a-z][a-z0-9_]*[.]json$'}
      acceptance_command: {$ref: '#/$defs/acceptance_command'}
      semantic_digest: {$ref: '#/$defs/digest'}
  acceptance_command:
    allOf:
      - $ref: '#/$defs/command'
      - type: object
        properties:
          argv:
            contains: {const: --execute}
            minContains: 1
            maxContains: 1
  execution_step:
    type: object
    additionalProperties: false
    required: [id, scope, fixture_category, evidence_paths, command]
    properties:
      id: {type: string, minLength: 1}
      scope: {enum: [global_setup, unit_local, global_verification]}
      fixture_category:
        type: [string, 'null']
        enum: [positive, negative, ambiguous, null]
      evidence_paths: {$ref: '#/$defs/string_list'}
      command: {$ref: '#/$defs/command'}
