schema: cxxlens.query-runtime-contract.v1
document_version: 1.19.0
maturity: implemented
authority:
  logical_contract: schemas/cxxlens_ng_logical_query_contract.yaml
  guarantee_contract: schemas/cxxlens_ng_semantic_guarantee_contract.yaml
  snapshot_contract: schemas/cxxlens_ng_snapshot_store_contract.yaml
  decision_adr: docs/design/adr/0074-query-row-guarantee-set-validation.md
  owner_issue: '#143'
  owner: steward.ng-query-runtime
compatibility:
  version_axis: query-runtime-result
  current: 1.0.0
  logical_ir_axis_independent: true
  physical_plan_stability: internal-only
input:
  snapshot:
    kind: immutable-published-snapshot-handle
    required_projection:
      - detached-row
      - condition
      - interpretation
      - semantic-key
      - assertion-contributor
      - claim-content
      - producer-id
      - producer-semantic-contract
      - provenance-root
      - guarantee
      - exact-partition-identity-binding
      - validated-closure-certificate-subject
    annotationless_payload: reject-query-not-synthesize
    output_column_compatibility:
      key: exact-column-id
      bind_phase: before-scan
      reference_sites: [predicate, project, order, join, implicit-output-schema]
      value_type_fields: [scalar, parameter, optional]
      descriptor_fields: [required, role]
      required_or_direct_missing: reject
      absent_if_schema_missing: optional-additive-only-typed-absent
      mismatch: sdk.query-snapshot-schema-mismatch
  logical_ir:
    version: 1.0.0
    validation: exact-operator-arguments-column-shape-and-order
    column_identity:
      authority: source-alias-plus-stable-column-id
      scan_alias: semantic-query-local-occurrence
      relation_descriptor: stable-column-authority-only
    argument_decoder: typed-fail-closed
    argument_json:
      lexical_standard: RFC-8259
      raw_utf8: strict
      surrogate_pairs: combine
      invalid_or_isolated_surrogate: reject
      leading_zero_integer: reject
    typed_literal_codec:
      byte_backed_scalar_kinds: [bytes, set]
      wire_encoding: lowercase-hex
      decoded_value: byte-vector
      set_parameter: exact-preserved
      malformed_or_noncanonical: reject
  runtime_request:
    excluded_from_logical_digest: true
    fields:
      - max_rows_scanned
      - max_rows_output
      - max_intermediate_rows
      - max_memory_bytes
      - cancellation
planner:
  id: cxxlens.reference-query-planner.v1
  deterministic: true
  public_authority: false
  canonical_traversal:
    node_order: rooted-postorder
    shared_node_evaluation: once
    union_child_order: canonical-subtree-digest
    digest_collision_tie_break: raw-canonical-subtree-bytes
    runtime_controls_follow_traversal: true
    diagnostic_node_ids: canonical-postorder-ordinal
  scan:
    order: canonical-claim-evidence-occurrence-order
    non_multiset_same_content: one-semantic-row
    occurrence_metadata: canonical-set-union
    multiset_multiplicity: preserve
    row_key: source-alias-plus-stable-column-id
  join: bounded-reference-nested-loop
  self_join:
    duplicate_stable_column_ids: preserve-per-source-alias
    predicate_binding: exact-source-occurrence
    provenance: canonical-set-union-without-cell-collapse
  distinct: canonical-key-reduction
  order: explicit-keys-plus-canonical-row-tie-break
  physical_explain:
    observable: true
    semantic_identity: false
    forbidden_in_logical_ir:
      - backend
      - index
      - join_algorithm
      - spill
      - page_order
execution:
  operators:
    - query.scan.v1
    - query.filter.v1
    - query.project.v1
    - query.inner_join.v1
    - query.semi_join.v1
    - query.anti_join.v1
    - query.union.v1
    - query.distinct.v1
    - query.order_by.v1
    - query.limit.v1
    - query.condition_restrict.v1
    - query.interpretation_restrict.v1
  source_backends: [memory, sqlite]
  physical_arrival_order_observable: false
  commutative_identity_runtime_equivalence: true
  cell_policy:
    states: [present, absent, unknown]
    sql_null_coercion: forbidden
    unknown_to_false: forbidden
    conflict_to_boolean: forbidden
  condition:
    join: exact-universe-intersection
    distinct: union-within-values-universe-interpretation-key
  interpretation:
    join: exact-id-only
  evidence:
    scan_same_content_occurrences: canonical-set-union
    join: canonical-set-union
    semi_join: left-plus-all-compatible-witnesses
    semi_join_order: preserve-left-total-order-keys-and-filtered-subsequence
    anti_join: preserve-left-plus-applicable-right-closure-id
    anti_join_without_closure: no-absence-rows-plus-sdk.query-closure-missing
    distinct: canonical-set-union
  guarantees:
    composition: conservative-componentwise-meet
    incomplete_or_partial_exact_upgrade: forbidden
  terminal_projection:
    implicit_when_no_explicit_project: true
    alias_calculation_shared_with_canonicalizer: true
    application_order: before-canonical-sort-budget-and-publication
    output_column_prefix: output.
    duplicate_leaf_alias: source-alias-prefixed
    preserves: [multiplicity, condition, interpretation, evidence, guarantee]
budget:
  zero_is_valid_empty_budget: true
  intermediate_accounting:
    enforcement: reserve-before-vector-retention
    row_scope: per-operator-output-collection
    checked_arithmetic: true
    stop_candidate_loop_immediately: true
    semi_join_witness_vector: forbidden
  memory_accounting:
    unit: deterministic-canonical-logical-payload-byte
    scope: execution-wide-retained
    includes:
      - operator-annotated-rows
      - scan-source-annotation-payload
      - distinct-key-scratch
      - semi-join-selected-candidate
      - implicit-terminal-projection-growth
    excludes:
      - decoded-ir-argument-metadata
      - order-key-metadata
      - container-allocator-overhead
      - in-place-sort-control-stack
      - completed-result-side-channel-payload
    process_rss_quota: false
    observed_bad_alloc: sdk.query-memory-budget
  physical_metrics: [peak-logical-bytes, peak-intermediate-rows]
  scan_or_intermediate_exhaustion:
    rows: []
    status: failed_before_result
    unresolved: required
  output_exhaustion:
    ordered: total-order-prefix
    unordered: canonical-semantic-prefix
    status: truncated
    unresolved: required
cancellation:
  probe_lifetime: synchronous-borrowed
  checkpoints: [before-execution, before-publish-row]
  before_execution:
    rows: []
    status: failed_before_result
  after_logical_completion:
    zero_published_rows: failed_before_result
    positive_sealed_prefix: cancelled_with_partial
  unresolved: required
  physical_schedule_independent: true
result:
  schema: schemas/cxxlens_ng_query_execution_result.schema.yaml
  canonical_json:
    encoder: shared-sdk-internal
    control_bytes_00_1f: always-escaped
    utf8: strict-validated-before-retention
    unicode_normalization: none-byte-preserving
    invalid_utf8: reject-sdk.cell-invalid
    byte_scalar_encoding: lowercase-hex
    backend_semantic_projection: byte-identical
  row_cursor:
    thread_affine: true
    view_lifetime: until-next-advance
    owned_copy: detached
    observable_fields:
      - values
      - multiplicity
      - condition
      - interpretation
      - claim_contributors
      - producer_contracts
      - provenance
      - contributor_guarantees
      - contributor_edges
  execution_statuses:
    - complete
    - truncated
    - cancelled_with_partial
    - failed_before_result
  required_side_channels:
    - input_coverage
    - closure_ids
    - unresolved
    - conflicts
    - differential_disagreements
    - producer_contracts
    - summary_guarantee
    - logical_explanation
    - physical_explanation
  summary_guarantee:
    operation: conservative-meet-over-result-contributing-fragments
    source: final-annotated-row-fragments
    empty_result_source: canonical-zero-row-proof-context-never-scan-annotations
    zero_row_proof:
      selection_binding: logical-condition-and-interpretation-restrictions
      open_or_incomplete: synthetic-query-empty-unknown
      exact_requires: complete-input-and-execution-plus-all-applicable-closures
      filtered_source_annotations: forbidden
    required_fields:
      - approximation
      - scope
      - condition_partition
      - interpretation_partitions
      - assumptions
      - verification_modalities
      - fragment_count
      - fragment_set_digest
      - drill_down_ref
    fragment_index:
      canonical_order: fragment-canonical-json
      digest_binding: exact-canonical-fragment-set
      drill_down: embedded-lossless-fragments
      attribution: singleton-bound-contributor-edge
    composition:
      filter_project_restrict: surviving-fragments-only
      zero_rows: selection-bound-synthetic-proof-never-source-reaggregation
      join_semi_union_distinct: canonical-bound-edge-composition-then-conservative-meet
      approximation: componentwise-soundness-completeness-all
      verification: implication-closed-intersection
      assumptions: canonical-id-set-union
      scope: single-scope-or-no-exact-upgrade
      condition: exact-fragment-partition
      interpretation: partition-no-cross-domain-upgrade
    exact_preconditions:
      - every-fragment-exact
      - input-and-execution-complete
      - relation-scope-specific-closure-applied
      - no-blocking-coverage
      - no-overlapping-same-domain-conflict
      - no-overlapping-unresolved
      - condition-partition-complete
  success_implies_input_complete: false
  success_implies_closed: false
  closure_applicability:
    required_kind: relation-key-enumeration
    proof_scope: every-reachable-scan-input-range
    exact_binding_fields:
      - relation-descriptor
      - partition-id
      - partition-content
      - coverage
      - condition
      - interpretation
      - assumption-set
      - producer-semantics
      - closure-kind
    condition_rule: exact-partition-certificate-may-cover-explicit-query-subset
    interpretation_rule: exact-match
    join_rule: every-input-relation-proved
    unrelated_certificate: ignored
    legacy-id-only-payload: never-closed
    result_closure_ids: applied-certificates-only
  canonical_order:
    ordered_query: declared-total-order
    unordered_query: canonical-annotated-row-order
    row_projection:
      contributor_guarantees: canonical-structured-set
      contributor_guarantee_validation: reject-noncanonical-order-or-duplicate
      public_surface_cardinality: cursor-owned-copy-canonical-json-schema-identical
      contributor_edges: canonical-bound-claim-producer-provenance-guarantee-condition-interpretation-set
      independent_evidence_sets: derived-projections-only
      guarantee_fields: [approximation, scope, assumptions, verification_modalities]
      guarantee_order: canonical-json-lexical
      lossless_against_row_cursor: true
    conflict_projection:
      shape: structured-exact-object
      fields: [assertions, contents, interpretation, overlap_fragments, relation, semantic_key]
      collection_fields: [overlap_fragments, assertions, contents]
      collection_order: lexical-sort-deduplicate
      shared_with_claim_kernel: true
      lossless_against_public_api: true
qualification:
  backends: [memory, sqlite]
  input_orders: [forward, reverse, seeded-shuffle]
  union_input_orders: [left-right, right-left]
  comparisons:
    - logical_ir_digest
    - canonical_semantic_rows
    - execution_status
    - input_coverage
    - unresolved
    - conflicts
    - differential_disagreements
    - producer_contracts
    - summary_guarantee
    - row-contributor-guarantees
  static_dynamic_digest_equal: required
  root_relocation: required
  installed_consumers: [static, shared]
