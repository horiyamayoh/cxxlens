$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.high-risk-contract-validation.v1.schema.yaml
title: cxxlens high-risk contract validation v1
type: object
additionalProperties: false
required: [schema, document_version, candidate_authority, candidate_snapshot, spike_harness, evidence, gate, domains]
properties:
  schema: {const: cxxlens.high-risk-contract-validation.v1}
  document_version: {type: string, pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'}
  candidate_authority: {const: schemas/cxxlens_package_contract_candidates.yaml}
  candidate_snapshot:
    type: array
    minItems: 9
    maxItems: 9
    items: {$ref: '#/$defs/candidate'}
  spike_harness: {const: tests/contract_spikes/high_risk_contract_spike.py}
  evidence:
    type: object
    additionalProperties: false
    required: [path, sha256, semantic_digest]
    properties:
      path: {const: tests/contract_spikes/high_risk_validation_evidence.json}
      sha256: {$ref: '#/$defs/sha256'}
      semantic_digest: {$ref: '#/$defs/digest'}
  gate:
    type: object
    additionalProperties: false
    required: [state, required_domains, candidate_fingerprint_match, evidence_reproducible, production_surface_clean, next_issue]
    properties:
      state: {const: validated}
      required_domains:
        type: array
        minItems: 7
        maxItems: 7
        uniqueItems: true
        items: {enum: [graph, flow_resource, transform_transaction, generation_surface, review_gate, qa_process_coverage, interop_extractor]}
      candidate_fingerprint_match: {const: true}
      evidence_reproducible: {const: true}
      production_surface_clean: {const: true}
      next_issue: {const: '#53'}
  domains:
    type: array
    minItems: 7
    maxItems: 7
    items: {$ref: '#/$defs/domain'}
$defs:
  sha256: {type: string, pattern: '^[0-9a-f]{64}$'}
  digest: {type: string, pattern: '^sha256:[0-9a-f]{64}$'}
  strings:
    type: array
    minItems: 1
    uniqueItems: true
    items: {type: string, minLength: 1}
  candidate:
    type: object
    additionalProperties: false
    required: [issue, fingerprint, result, backlink]
    properties:
      issue: {pattern: '^#(43|44|45|46|47|48|49|50|51)$'}
      fingerprint: {$ref: '#/$defs/digest'}
      result: {enum: [validated, validated-with-change, rejected-and-replaced]}
      backlink: {type: string, pattern: '^docs/design/package_contract_[0-9]+\.md#issue-52-validation-backlink$'}
  binding:
    type: object
    additionalProperties: false
    required: [issue, fingerprint, api_ids]
    properties:
      issue: {pattern: '^#(43|44|45|46|47|48|49|50|51)$'}
      fingerprint: {$ref: '#/$defs/digest'}
      api_ids:
        type: array
        minItems: 1
        uniqueItems: true
        items: {pattern: '^API-[A-Z]+-[0-9]{3}$'}
  fixture:
    type: object
    additionalProperties: false
    required: [id, description, expected]
    properties:
      id: {type: string, minLength: 1}
      description: {type: string, minLength: 1}
      expected: {type: string, minLength: 1}
  command:
    type: object
    additionalProperties: false
    required: [argv, purpose]
    properties:
      argv:
        type: array
        minItems: 1
        items: {type: string}
      purpose: {type: string, minLength: 1}
  budgets:
    type: object
    additionalProperties: false
    required: [time_ms, memory_bytes, path_count, state_count, output_bytes]
    properties:
      time_ms: {type: integer, minimum: 1}
      memory_bytes: {type: integer, minimum: 1}
      path_count: {type: integer, minimum: 1}
      state_count: {type: integer, minimum: 1}
      output_bytes: {type: integer, minimum: 1}
  domain:
    type: object
    additionalProperties: false
    required: [id, result, candidate_bindings, risk_hypotheses, fixtures, budgets, providers_and_ports, mock_unverified_scope, commands, evidence_result, retained_artifacts, deletion_condition, contract_changes]
    properties:
      id: {enum: [graph, flow_resource, transform_transaction, generation_surface, review_gate, qa_process_coverage, interop_extractor]}
      result: {enum: [validated, validated-with-change, rejected-and-replaced]}
      candidate_bindings:
        type: array
        minItems: 1
        items: {$ref: '#/$defs/binding'}
      risk_hypotheses: {$ref: '#/$defs/strings'}
      fixtures:
        type: object
        additionalProperties: false
        required: [positive, negative, ambiguous]
        properties:
          positive: {$ref: '#/$defs/fixture'}
          negative: {$ref: '#/$defs/fixture'}
          ambiguous: {$ref: '#/$defs/fixture'}
      budgets: {$ref: '#/$defs/budgets'}
      providers_and_ports: {$ref: '#/$defs/strings'}
      mock_unverified_scope:
        type: array
        uniqueItems: true
        items: {type: string, minLength: 1}
      commands:
        type: array
        minItems: 1
        items: {$ref: '#/$defs/command'}
      evidence_result: {type: string, pattern: '^#/results/[a-z_]+$'}
      retained_artifacts: {$ref: '#/$defs/strings'}
      deletion_condition: {type: string, minLength: 1}
      contract_changes:
        type: array
        uniqueItems: true
        items: {type: string, minLength: 1}
