$schema: https://json-schema.org/draft/2020-12/schema
$id: https://schemas.cxxlens.dev/cxxlens.coverage-delta.v1.json
title: cxxlens.coverage-delta.v1
type: object
required: [schema, semantics_version, library_version, requested, warm, scheduled,
           covered, failed, unresolved]
additionalProperties: false
properties:
  schema: {const: cxxlens.coverage-delta.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string}
  requested: {type: integer, minimum: 0}
  warm: {type: integer, minimum: 0}
  scheduled: {type: integer, minimum: 0}
  covered: {type: integer, minimum: 0}
  failed: {type: integer, minimum: 0}
  unresolved: {type: integer, minimum: 0}
