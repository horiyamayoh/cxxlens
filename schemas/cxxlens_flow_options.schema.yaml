$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.flow-options.v1.schema.yaml
title: cxxlens flow options v1
type: object
additionalProperties: false
required: [schema, max_context_depth, max_paths, max_steps, max_states, widening_after_iterations, sensitivity, unknown_calls]
properties:
  schema: {const: cxxlens.flow-options.v1}
  max_context_depth: {type: integer, minimum: 0}
  max_paths: {type: integer, minimum: 1}
  max_steps: {type: integer, minimum: 1}
  max_states: {type: integer, minimum: 1}
  widening_after_iterations: {type: integer, minimum: 1}
  sensitivity: {enum: [value, field, path, alias_bounded]}
  unknown_calls: {enum: [preserve_unresolved, conservative_propagation, reject]}
  provider_requirements:
    type: array
    uniqueItems: true
    items: {enum: [flow.cfg, flow.effect-summaries]}
