$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.security-conformance-vectors.v1
type: object
additionalProperties: false
required: [schema, document_version, authority, contract, vectors]
properties:
  schema: {const: cxxlens.security-conformance-vectors.v1}
  document_version: {const: 1.1.0}
  authority:
    type: object
    additionalProperties: false
    required: [owner_issue, decision_adr]
    properties:
      owner_issue: {const: '#137'}
      decision_adr: {const: docs/design/adr/0068-sandbox-assurance-closed-enum-boundary.md}
  contract: {const: schemas/cxxlens_ng_security_profile.yaml}
  vectors:
    type: array
    minItems: 28
    items:
      type: object
      additionalProperties: false
      required: [id, class, operation, input, expected]
      properties:
        id: {type: string, pattern: '^[a-z0-9][a-z0-9-]+$'}
        class: {enum: [positive, negative]}
        operation: {enum: [namespace, certificate, discovery, sandbox, product_execution, validation, support]}
        input:
          type: object
          additionalProperties: false
          required: [scenario]
          properties:
            scenario: {type: string, minLength: 1}
        expected:
          type: object
          additionalProperties: false
          required: [decision, reason_code]
          properties:
            decision: {enum: [accepted, rejected]}
            reason_code: {type: string, pattern: '^security\.[a-z0-9-]+$'}
            value: {}
