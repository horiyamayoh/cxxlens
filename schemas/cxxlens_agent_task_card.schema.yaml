$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.agent-task-card.v1.schema.yaml
title: cxxlens selector agent task card v1
type: object
additionalProperties: false
required: [schema, semantics_version, library_version, goal, required_headers, api_calls, preconditions, expected_outputs, failure_modes, verification_steps]
properties:
  schema: {const: cxxlens.agent-task-card.v1}
  semantics_version: {const: 1.0.0}
  library_version: {type: string, minLength: 1}
  goal: {type: string, minLength: 1}
  required_headers: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
  api_calls: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
  preconditions: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
  expected_outputs: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
  failure_modes: {type: array, uniqueItems: true, items: {type: string, minLength: 1}}
  verification_steps: {type: array, minItems: 1, uniqueItems: true, items: {type: string, minLength: 1}}
