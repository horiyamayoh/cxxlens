$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.asset-migration-policy.v1
title: cxxlens tracked asset migration policy
type: object
additionalProperties: false
required: [schema, document_version, issue, output, default_rules, overrides, drift]
properties:
  schema:
    const: cxxlens.asset-migration-policy.v1
  document_version:
    type: string
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
  issue:
    const: '#58'
  output:
    const: schemas/cxxlens_asset_migration_ledger.json
  default_rules:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [prefix, record]
      properties:
        prefix:
          type: string
          pattern: '^.+/$'
        record:
          $ref: '#/$defs/record'
  overrides:
    type: array
    items:
      type: object
      additionalProperties: false
      required: [path, record]
      properties:
        path:
          type: string
          minLength: 1
        record:
          $ref: '#/$defs/record'
  drift:
    type: object
    additionalProperties: false
    required: [active_markdown, stale_markers]
    properties:
      active_markdown:
        type: array
        uniqueItems: true
        items:
          type: string
          pattern: '\.md$'
      stale_markers:
        type: array
        items:
          type: object
          additionalProperties: false
          required: [id, pattern, allowed_paths]
          properties:
            id:
              type: string
              pattern: '^[a-z][a-z0-9.-]+$'
            pattern:
              type: string
              minLength: 1
            allowed_paths:
              type: array
              uniqueItems: true
              items:
                type: string
                minLength: 1
$defs:
  record:
    type: object
    additionalProperties: false
    required:
      - disposition
      - status
      - owner
      - profile
      - authority
      - replacement
      - removal_issue
    properties:
      disposition:
        enum: [inherit, migrate, replace, archive, delete]
      status:
        enum: [active, planned, redirect, archived, legacy-baseline, generated]
      owner:
        type: string
        pattern: '^[a-z][a-z0-9.-]+$'
      profile:
        enum: [NG0, NG1, NG2, NG3, migration, release, repository]
      authority:
        enum:
          - normative
          - informative
          - implementation
          - migration-provenance
          - generated-inventory
          - operational
      replacement:
        type: [string, 'null']
      removal_issue:
        anyOf:
          - type: 'null'
          - type: string
            pattern: '^#[0-9]+$'
