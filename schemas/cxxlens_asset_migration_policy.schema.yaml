$schema: https://json-schema.org/draft/2020-12/schema
$id: https://cxxlens.dev/schemas/cxxlens.asset-migration-policy.v2
title: cxxlens completed asset migration policy
type: object
additionalProperties: false
required: [schema, document_version, issue, output, archive_prefixes]
properties:
  schema:
    const: cxxlens.asset-migration-policy.v2
  document_version:
    type: string
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+$'
  issue:
    const: '#72'
  output:
    const: schemas/cxxlens_asset_migration_ledger.json
  archive_prefixes:
    type: array
    minItems: 1
    uniqueItems: true
    items:
      type: string
      pattern: '^.+/$'
