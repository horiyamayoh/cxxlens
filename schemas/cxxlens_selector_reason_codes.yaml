schema: cxxlens.selector-reason-codes.v1
normalization_version: 1
structural_identity: canonical_selector_json
truth_values: [matched, not_matched, ambiguous]
truth_tables:
  negate:
    matched: not_matched
    not_matched: matched
    ambiguous: ambiguous
  all: conservative_kleene_conjunction
  any: conservative_kleene_disjunction
migrations:
- from: cxxlens.selector.v0
  to: cxxlens.selector.v1
  behavior: add canonical version envelope and normalize expression
