  - id: scope.clang22-installed-adoption-gap
    owner_issue: '#181'
    scope: included
    qualification: tracked-gap
    gap:
      finding: scope.tracked-gap.clang22-installed-adoption
      remediation: Implement the accepted DF-0195 through DF-0199 sealed-evidence, measured-occurrence, authenticated-streaming, head-observation, and canonical-Base64 authority; resolve DF-0200 bounded claim/Store staging; then complete installed actual-source worker output adoption with exact publication and query evidence; do not claim generic relation-row reference enforcement.
    feedback: [DF-0182, DF-0187, DF-0191, DF-0192, DF-0195, DF-0196, DF-0197, DF-0198, DF-0199, DF-0200]
