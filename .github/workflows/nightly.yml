name: Nightly quality

on:
  schedule:
    - cron: "17 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang 22 and Ninja
        run: |
          wget --quiet https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install --yes ninja-build
      - name: ASan and UBSan
        env:
          CXX: clang++-22
        run: |
          cmake --preset asan-ubsan
          cmake --build --preset asan-ubsan
          ctest --preset asan-ubsan

  thread-sanitizer:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang 22 and Ninja
        run: |
          wget --quiet https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install --yes ninja-build
      - name: TSan
        env:
          CXX: clang++-22
        run: |
          cmake --preset tsan
          cmake --build --preset tsan
          ctest --preset tsan

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang tools
        run: |
          wget --quiet https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install --yes clang-tidy-22 ninja-build
      - name: clang-tidy
        env:
          CXX: clang++-22
        run: |
          cmake --preset ci-quick
          cmake --build --preset ci-quick
          cmake --build --preset ci-quick --target cxxlens-clang-tidy
