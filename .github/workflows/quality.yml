name: Quality gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  issues: read

env:
  CMAKE_GENERATOR: Ninja

jobs:
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shared: ["OFF", "ON"]
    steps:
      - uses: actions/checkout@v4
      - name: Install exact Clang 22 toolchain
        run: |
          wget --quiet https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install --yes libclang-22-dev llvm-22-dev ninja-build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --requirement tools/quality/requirements.txt
      - name: Configure, build, and test
        env:
          CXX: clang++-22
        run: |
          cmake --preset ci-quick -DCXXLENS_CLANG_ADAPTER=ON \
            -DCXXLENS_BUILD_SHARED=${{ matrix.shared }}
          cmake --build --preset ci-quick
          ctest --preset ci-quick
      - name: Contract and migration gates
        run: cmake --build --preset ci-quick --target cxxlens-quality

  install-consumer:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shared: ["OFF", "ON"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Clang 22 and Ninja
        run: |
          wget --quiet https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install --yes libclang-22-dev llvm-22-dev ninja-build
      - name: Verify installed packages
        env:
          CXX: clang++-22
        run: |
          cmake --preset install-check -DCXXLENS_CLANG_ADAPTER=ON \
            -DCXXLENS_BUILD_SHARED=${{ matrix.shared }}
          cmake --build --preset install-check
          ctest --preset install-check --label-regex install
      - name: Preserve the qualified release-layout artifact
        uses: actions/upload-artifact@v4
        with:
          name: cxxlens-install-${{ matrix.shared == 'ON' && 'shared' || 'static' }}-${{ github.sha }}
          path: build/install-check/tests/install-consumer/relocated-prefix
          if-no-files-found: error
          retention-days: 30

  gcc-public-headers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Compile LLVM-independent public headers
        run: |
          g++ -std=c++23 -Wall -Wextra -Wpedantic -Werror -Iinclude \
            -fsyntax-only tests/public_headers/cxxlens_header_test.cpp
          g++ -std=c++23 -Wall -Wextra -Wpedantic -Werror -Iinclude \
            -fsyntax-only tests/public_headers/sdk_header_test.cpp

  foundation-completion:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test, install-consumer, gcc-public-headers]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --requirement tools/quality/requirements.txt
      - name: Generate same-SHA foundation completion report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python tools/quality/check_ng_foundation_completion.py report \
            --root . \
            --output "${RUNNER_TEMP}/cxxlens-ng-foundation-completion-report.json" \
            --repository "${GITHUB_REPOSITORY}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}" \
            --branch main \
            --ci-job build-test \
            --ci-job install-consumer \
            --ci-job gcc-public-headers
      - uses: actions/upload-artifact@v4
        with:
          name: cxxlens-ng-foundation-completion-${{ github.sha }}
          path: ${{ runner.temp }}/cxxlens-ng-foundation-completion-report.json
          if-no-files-found: error
          retention-days: 90
