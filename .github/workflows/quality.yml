name: Quality gates

on:
  pull_request:
  push:

permissions:
  contents: read
  issues: read

concurrency:
  group: quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CMAKE_GENERATOR: Ninja
  CMAKE_BUILD_PARALLEL_LEVEL: ${{ vars.CXXLENS_BUILD_JOBS || 4 }}
  CTEST_PARALLEL_LEVEL: ${{ vars.CXXLENS_TEST_JOBS || 4 }}

jobs:
  build-test:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shared: ["OFF", "ON"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft || matrix.shared == 'OFF'
      - name: Install exact Clang 22 toolchain
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft || matrix.shared == 'OFF'
        run: python3 tools/ci/bootstrap_supply_chain.py install --profile developer
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft || matrix.shared == 'OFF'
        with:
          python-version: "3.12.11"
      - if: github.event_name != 'pull_request' || !github.event.pull_request.draft || matrix.shared == 'OFF'
        run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - name: Configure, build, and test
        if: github.event_name != 'pull_request' || !github.event.pull_request.draft || matrix.shared == 'OFF'
        env:
          CXX: clang++-22
        run: |
          cmake --preset ci-quick -DCXXLENS_CLANG_ADAPTER=ON \
            -DCXXLENS_BUILD_SHARED=${{ matrix.shared }}
          cmake --build --preset ci-quick
          ctest --preset ci-quick --parallel "${CTEST_PARALLEL_LEVEL}" \
            --label-exclude 'quality|install' \
            --output-junit "ctest-build-${{ matrix.shared }}.xml"
          python tools/quality/collect_toolchain_provenance.py \
            --compiler clang++-22 --configuration "ci-quick;shared=${{ matrix.shared }}" \
            --output "build/ci-quick/toolchain-build-${{ matrix.shared }}.json"
          python tools/quality/check_quality_ownership.py evidence \
            --check-id cpp.runtime-tests \
            --configuration "${{ matrix.shared == 'ON' && 'shared-clang22' || 'static-clang22' }}" \
            --toolchain-provenance "build/ci-quick/toolchain-build-${{ matrix.shared }}.json" \
            --checker tests/CMakeLists.txt \
            --output "build/ci-quick/ctest-build-${{ matrix.shared }}.xml" \
            --output build/ci-quick/.ninja_log \
            --evidence-output "build/ci-quick/build-test-${{ matrix.shared }}.evidence.json"
      - name: Preserve build/test timing evidence
        if: success() && (github.event_name != 'pull_request' || !github.event.pull_request.draft || matrix.shared == 'OFF')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-build-test-${{ matrix.shared }}-${{ github.sha }}
          path: |
            build/ci-quick/ctest-build-${{ matrix.shared }}.xml
            build/ci-quick/.ninja_log
            build/ci-quick/toolchain-build-${{ matrix.shared }}.json
            build/ci-quick/build-test-${{ matrix.shared }}.evidence.json
          if-no-files-found: error

  quality-contracts:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 2
      - name: Install exact Clang 22 toolchain
        run: python3 tools/ci/bootstrap_supply_chain.py install --profile developer
      - name: Install exact Doxygen toolchain
        run: python3 tools/ci/bootstrap_supply_chain.py install --profile documentation
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - name: Generate linkage-independent quality evidence once
        env:
          CXX: clang++-22
        run: |
          cmake --preset ci-quick -DCXXLENS_CLANG_ADAPTER=ON \
            -DCXXLENS_BUILD_DOCS=ON
          ctest --preset ci-quick --parallel "${CTEST_PARALLEL_LEVEL}" \
            --label-regex quality \
            --output-junit ctest-quality.xml
          cmake --build --preset ci-quick --target cxxlens-quality \
            2>&1 | tee build/ci-quick/quality-production.log
          python tools/quality/collect_toolchain_provenance.py \
            --compiler clang++-22 --configuration "ci-quick;quality-contracts" \
            --output build/ci-quick/toolchain-quality.json
          python tools/quality/check_quality_ownership.py evidence \
            --check-id quality.unit-contracts \
            --configuration linkage-independent \
            --toolchain-provenance build/ci-quick/toolchain-quality.json \
            --checker tests/CMakeLists.txt \
            --output build/ci-quick/ctest-quality.xml \
            --evidence-output build/ci-quick/quality-unit.evidence.json
          python tools/quality/check_quality_ownership.py evidence \
            --check-id quality.production-contracts \
            --configuration linkage-independent \
            --toolchain-provenance build/ci-quick/toolchain-quality.json \
            --checker cmake/CxxlensDeveloperTools.cmake \
            --output build/ci-quick/quality-production.log \
            --evidence-output build/ci-quick/quality-production.evidence.json
      - name: Generate exact-SHA public callable review
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python tools/quality/public_callable_inventory.py report \
            --root . \
            --compiler clang++-22 \
            --doxygen-xml build/ci-quick/doxygen/xml \
            --output-json "${RUNNER_TEMP}/cxxlens-ng-public-callable-inventory-report.json" \
            --output-markdown "${RUNNER_TEMP}/cxxlens-ng-public-callable-inventory-review.md" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-quality-${{ github.sha }}
          path: |
            build/ci-quick/ctest-quality.xml
            build/ci-quick/.ninja_log
            schemas/cxxlens_ng_quality_ownership.yaml
            build/ci-quick/toolchain-quality.json
            build/ci-quick/quality-production.log
            build/ci-quick/quality-unit.evidence.json
            build/ci-quick/quality-production.evidence.json
          if-no-files-found: error
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: cxxlens-ng-public-callable-inventory-${{ github.sha }}
          path: |
            ${{ runner.temp }}/cxxlens-ng-public-callable-inventory-report.json
            ${{ runner.temp }}/cxxlens-ng-public-callable-inventory-review.md
          if-no-files-found: error
          retention-days: 90

  install-consumer:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        shared: ["OFF", "ON"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install Clang 22 and Ninja
        run: python3 tools/ci/bootstrap_supply_chain.py install --profile developer
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - name: Verify installed packages
        env:
          CXX: clang++-22
        run: |
          cmake --preset install-check -DCXXLENS_CLANG_ADAPTER=ON \
            -DCXXLENS_BUILD_SHARED=${{ matrix.shared }}
          cmake --build --preset install-check --target \
            cxxlens-provider-scaffold cxxlens-sdk-doctor cxxlens-clang-worker-22
          ctest --preset install-check --parallel "${CTEST_PARALLEL_LEVEL}" \
            --label-regex install \
            --output-junit "ctest-install-${{ matrix.shared }}.xml"
          python tools/quality/collect_toolchain_provenance.py \
            --compiler clang++-22 --configuration "install-check;shared=${{ matrix.shared }}" \
            --output "build/install-check/toolchain-install-${{ matrix.shared }}.json"
          python tools/quality/check_quality_ownership.py evidence \
            --check-id package.installed-consumers \
            --configuration "${{ matrix.shared == 'ON' && 'shared-clang22' || 'static-clang22' }}" \
            --toolchain-provenance "build/install-check/toolchain-install-${{ matrix.shared }}.json" \
            --checker tests/install/run_install_test.cmake.in \
            --output "build/install-check/ctest-install-${{ matrix.shared }}.xml" \
            --output build/install-check/tests/install-consumer/relocated-prefix \
            --output build/install-check/tests/install-consumer/install-artifact-manifest.json \
            --evidence-output "build/install-check/install-${{ matrix.shared }}.evidence.json"
      - name: Preserve the qualified release-layout artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-install-${{ matrix.shared == 'ON' && 'shared' || 'static' }}-${{ github.sha }}
          path: |
            build/install-check/tests/install-consumer/relocated-prefix
            build/install-check/tests/install-consumer/install-artifact-manifest.json
            build/install-check/ctest-install-${{ matrix.shared }}.xml
            build/install-check/.ninja_log
            build/install-check/toolchain-install-${{ matrix.shared }}.json
            build/install-check/install-${{ matrix.shared }}.evidence.json
          if-no-files-found: error
          retention-days: 30

  gcc-public-headers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - name: Compile LLVM-independent public headers
        run: |
          mkdir -p build/gcc-public-headers
          g++ -std=c++23 -Wall -Wextra -Wpedantic -Werror -Iinclude \
            -fsyntax-only tests/public_headers/cxxlens_header_test.cpp
          g++ -std=c++23 -Wall -Wextra -Wpedantic -Werror -Iinclude \
            -fsyntax-only tests/public_headers/sdk_header_test.cpp
          python tools/quality/collect_toolchain_provenance.py \
            --compiler g++ --configuration gcc-public-headers \
            --output build/gcc-public-headers/toolchain.json
          python tools/quality/check_quality_ownership.py evidence \
            --check-id public-headers.gcc --configuration gcc \
            --toolchain-provenance build/gcc-public-headers/toolchain.json \
            --checker tests/public_headers/cxxlens_header_test.cpp \
            --checker tests/public_headers/sdk_header_test.cpp \
            --evidence-output build/gcc-public-headers/gcc.evidence.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-gcc-public-headers-${{ github.sha }}
          path: |
            build/gcc-public-headers/toolchain.json
            build/gcc-public-headers/gcc.evidence.json
          if-no-files-found: error

  quality-evidence:
    if: github.event_name != 'pull_request' || !github.event.pull_request.draft
    needs: [build-test, quality-contracts, install-consumer, gcc-public-headers]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          pattern: cxxlens-*-${{ github.sha }}
          path: build/quality-evidence-input
      - name: Reject missing, duplicate, or mismatched evidence
        run: |
          python tools/quality/check_quality_ownership.py aggregate \
            --mode full --evidence-dir build/quality-evidence-input \
            --report build/quality-evidence-set.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-quality-evidence-${{ github.sha }}
          path: build/quality-evidence-set.json
          if-no-files-found: error

  foundation-completion:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-test, quality-contracts, install-consumer, gcc-public-headers, quality-evidence]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          pattern: cxxlens-*-${{ github.sha }}
          path: build/foundation-provenance-input
      - name: Generate same-SHA foundation completion report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python tools/quality/collect_toolchain_provenance.py \
            --compiler g++ --configuration foundation-completion \
            --output build/foundation-provenance-input/toolchain-foundation.json
          python tools/quality/check_ng_foundation_completion.py report \
            --root . \
            --output "${RUNNER_TEMP}/cxxlens-ng-foundation-completion-report.json" \
            --repository "${GITHUB_REPOSITORY}" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}" \
            --branch main \
            --provenance-dir build/foundation-provenance-input \
            --ci-job build-test \
            --ci-job quality-contracts \
            --ci-job install-consumer \
            --ci-job gcc-public-headers \
            --ci-job quality-evidence
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-ng-foundation-completion-${{ github.sha }}
          path: ${{ runner.temp }}/cxxlens-ng-foundation-completion-report.json
          if-no-files-found: error
          retention-days: 90

  wave0-readiness:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [foundation-completion]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          pattern: cxxlens-*-${{ github.sha }}
          path: build/wave0-readiness-input
      - name: Generate exact-SHA Wave 0 readiness baseline
        run: |
          python tools/quality/check_ng_api_development_readiness.py report \
            --root . \
            --output "${RUNNER_TEMP}/cxxlens-ng-api-development-readiness-report.json" \
            --evidence-dir build/wave0-readiness-input \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}" \
            --ci-job "build-test (OFF)" \
            --ci-job "build-test (ON)" \
            --ci-job gcc-public-headers \
            --ci-job "install-consumer (OFF)" \
            --ci-job "install-consumer (ON)" \
            --ci-job quality-contracts \
            --ci-job quality-evidence \
            --ci-job foundation-completion
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-ng-api-development-readiness-${{ github.sha }}
          path: ${{ runner.temp }}/cxxlens-ng-api-development-readiness-report.json
          if-no-files-found: error
          retention-days: 90

  g5-qualification:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [wave0-readiness]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install exact Clang 22 toolchain
        run: python3 tools/ci/bootstrap_supply_chain.py install --profile developer
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - name: Build and measure the exact-SHA G5 runtime
        env:
          CXX: clang++-22
        run: |
          cmake --preset ci-quick -DCXXLENS_CLANG_ADAPTER=ON
          cmake --build --preset ci-quick --target cxxlens-g5-runtime
          python tools/quality/check_ng_g5_qualification.py report \
            --root . \
            --runtime build/ci-quick/tests/cxxlens-g5-runtime \
            --benchmark "${RUNNER_TEMP}/cxxlens-g5-performance.json" \
            --output "${RUNNER_TEMP}/cxxlens-ng-g5-qualification-report.json" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-ng-g5-qualification-${{ github.sha }}
          path: |
            ${{ runner.temp }}/cxxlens-g5-performance.json
            ${{ runner.temp }}/cxxlens-ng-g5-qualification-report.json
          if-no-files-found: error
          retention-days: 90

  release-evaluation:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [g5-qualification]
    runs-on: ubuntu-24.04
    outputs:
      qualification: ${{ steps.evaluate.outputs.qualification }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          pattern: cxxlens-*-${{ github.sha }}
          path: build/release-evaluation-input
      - name: Evaluate exact-SHA distribution 1.0 qualification
        id: evaluate
        run: |
          python tools/quality/check_ng_security_contract.py report \
            --root . \
            --output "${RUNNER_TEMP}/cxxlens-ng-security-conformance-report.json"
          python tools/quality/check_ng_release_qualification.py evaluate \
            --root . \
            --evidence-dir build/release-evaluation-input \
            --security-report "${RUNNER_TEMP}/cxxlens-ng-security-conformance-report.json" \
            --output "${RUNNER_TEMP}/cxxlens-ng-release-qualification-evaluation-report.json" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}" \
            --github-output "${GITHUB_OUTPUT}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-ng-release-qualification-evaluation-${{ github.sha }}
          path: |
            ${{ runner.temp }}/cxxlens-ng-security-conformance-report.json
            ${{ runner.temp }}/cxxlens-ng-release-qualification-evaluation-report.json
          if-no-files-found: error
          retention-days: 365

  release-qualification:
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.release-evaluation.outputs.qualification == 'qualified'
    needs: [release-evaluation]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          pattern: cxxlens-*-${{ github.sha }}
          path: build/release-qualification-input
      - name: Generate exact-SHA distribution 1.0 GR report
        run: |
          python tools/quality/check_ng_release_qualification.py report \
            --root . \
            --evidence-dir build/release-qualification-input \
            --security-report "build/release-qualification-input/cxxlens-ng-release-qualification-evaluation-${GITHUB_SHA}/cxxlens-ng-security-conformance-report.json" \
            --evaluation "build/release-qualification-input/cxxlens-ng-release-qualification-evaluation-${GITHUB_SHA}/cxxlens-ng-release-qualification-evaluation-report.json" \
            --output "${RUNNER_TEMP}/cxxlens-ng-release-qualification-report.json" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-ng-release-qualification-${{ github.sha }}
          path: ${{ runner.temp }}/cxxlens-ng-release-qualification-report.json
          if-no-files-found: error
          retention-days: 365

  production-scope-closure:
    if: >-
      always() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    needs: [release-evaluation, release-qualification]
    runs-on: ubuntu-24.04
    steps:
      - name: Validate qualification dependency results
        env:
          EVALUATION_RESULT: ${{ needs.release-evaluation.result }}
          QUALIFICATION: ${{ needs.release-evaluation.outputs.qualification }}
          STRICT_RESULT: ${{ needs.release-qualification.result }}
        run: |
          if [[ "${EVALUATION_RESULT}" == "success" && "${QUALIFICATION}" == "not-qualified" && "${STRICT_RESULT}" == "skipped" ]]; then
            exit 0
          fi
          if [[ "${EVALUATION_RESULT}" == "success" && "${QUALIFICATION}" == "qualified" && "${STRICT_RESULT}" == "success" ]]; then
            exit 0
          fi
          echo "invalid qualification dependency matrix: evaluation=${EVALUATION_RESULT}, qualification=${QUALIFICATION}, strict=${STRICT_RESULT}" >&2
          exit 1
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12.11"
      - run: "python -m pip install --require-hashes --only-binary=:all: --requirement tools/quality/requirements.lock"
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: cxxlens-ng-release-qualification-evaluation-${{ github.sha }}
          path: build/production-scope-input/evaluation
      - if: needs.release-evaluation.outputs.qualification == 'qualified'
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: cxxlens-ng-release-qualification-${{ github.sha }}
          path: build/production-scope-input/gr
      - name: Generate classified production-scope report
        if: needs.release-evaluation.outputs.qualification == 'not-qualified'
        run: |
          python tools/quality/check_ng_production_scope_closure.py --root . report \
            --mode normal \
            --evaluation build/production-scope-input/evaluation/cxxlens-ng-release-qualification-evaluation-report.json \
            --output "${RUNNER_TEMP}/cxxlens-ng-production-scope-closure-report.json" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}"
      - name: Generate final production-scope report
        if: needs.release-evaluation.outputs.qualification == 'qualified'
        run: |
          python tools/quality/check_ng_release_qualification.py verify-evaluation-binding \
            --root . \
            --evaluation build/production-scope-input/evaluation/cxxlens-ng-release-qualification-evaluation-report.json \
            --gr build/production-scope-input/gr/cxxlens-ng-release-qualification-report.json
          python tools/quality/check_ng_production_scope_closure.py --root . report \
            --mode final \
            --evaluation build/production-scope-input/evaluation/cxxlens-ng-release-qualification-evaluation-report.json \
            --gr build/production-scope-input/gr/cxxlens-ng-release-qualification-report.json \
            --output "${RUNNER_TEMP}/cxxlens-ng-production-scope-closure-report.json" \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --expected-revision "${GITHUB_SHA}"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: cxxlens-ng-production-scope-closure-${{ github.sha }}
          path: ${{ runner.temp }}/cxxlens-ng-production-scope-closure-report.json
          if-no-files-found: error
          retention-days: 365
